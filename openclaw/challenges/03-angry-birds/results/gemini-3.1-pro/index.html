<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Angry Birds Clone</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
    #ui { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); pointer-events: auto; }
    #ui h1 { margin: 0 0 10px 0; font-size: 20px; color: #333; }
    .stat { font-size: 18px; margin-bottom: 5px; font-weight: bold; color: #444; }
    button { padding: 10px 20px; font-size: 16px; background-color: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; margin-top: 10px; font-weight: bold; }
    button:hover { background-color: #ff6b81; }
    #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: white; text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: none; pointer-events: none; z-index: 100; text-align: center; }
</style>
</head>
<body>
    <div id="ui">
        <h1>Angry Birds Clone</h1>
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="stat">Birds Left: <span id="birds-left">3</span></div>
        <div class="stat">Pigs Left: <span id="pigs-left">3</span></div>
        <button onclick="initGame()">Reset Game</button>
    </div>
    <div id="message"></div>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Mouse, MouseConstraint, Events, Vector } = Matter;
        let engine, render, runner, mouse, mouseConstraint;
        let bird, slingshot, ground;
        let birdsLeft = 3;
        let pigsLeft = 3;
        let score = 0;
        let gameState = 'playing'; // playing, aiming, flying, won, lost
        let entities = []; 

        const SLING_POS = { x: 200, y: 450 };
        const BIRD_RADIUS = 15;
        const PIG_RADIUS = 18;

        function createDestructible(x, y, w, h, type) {
            let options = { render: {} };
            let maxHp = 100;
            if (type === 'wood') {
                options.render.fillStyle = '#D2B48C';
                options.render.strokeStyle = '#8B4513';
                options.render.lineWidth = 2;
                options.density = 0.002;
                options.friction = 0.5;
                maxHp = 50;
            } else if (type === 'stone') {
                options.render.fillStyle = '#A9A9A9';
                options.render.strokeStyle = '#696969';
                options.render.lineWidth = 2;
                options.density = 0.005;
                options.friction = 0.6;
                maxHp = 100;
            }
            let body = Bodies.rectangle(x, y, w, h, options);
            body.entityType = type;
            body.hp = maxHp;
            body.maxHp = maxHp;
            return body;
        }

        function createPig(x, y) {
            let options = {
                render: { fillStyle: '#2ecc71', strokeStyle: '#27ae60', lineWidth: 3 },
                density: 0.0015,
                restitution: 0.4,
                friction: 0.5
            };
            let body = Bodies.circle(x, y, PIG_RADIUS, options);
            body.entityType = 'pig';
            body.hp = 30;
            return body;
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('birds-left').innerText = birdsLeft;
            document.getElementById('pigs-left').innerText = pigsLeft;
        }

        function showMessage(msg) {
            const el = document.getElementById('message');
            el.innerText = msg;
            el.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        function spawnBird() {
            bird = Bodies.circle(SLING_POS.x, SLING_POS.y, BIRD_RADIUS, {
                render: { fillStyle: '#ff4757', strokeStyle: '#c0392b', lineWidth: 2 },
                restitution: 0.4,
                density: 0.004,
                friction: 0.3
            });
            bird.entityType = 'bird';
            slingshot.bodyB = bird;
            slingshot.pointB = { x: 0, y: 0 };
            Composite.add(engine.world, bird);
            gameState = 'aiming';
        }

        function buildFortress() {
            entities.push(createDestructible(700, 500, 20, 100, 'wood'));
            entities.push(createDestructible(800, 500, 20, 100, 'wood'));
            entities.push(createDestructible(750, 440, 120, 20, 'wood'));
            
            entities.push(createDestructible(650, 400, 20, 80, 'stone'));
            entities.push(createDestructible(850, 400, 20, 80, 'stone'));
            entities.push(createDestructible(750, 350, 220, 20, 'stone'));
            
            entities.push(createDestructible(950, 500, 20, 100, 'wood'));
            entities.push(createDestructible(1050, 500, 20, 100, 'wood'));
            entities.push(createDestructible(1000, 440, 120, 20, 'stone'));

            entities.push(createPig(750, 530));
            entities.push(createPig(750, 400));
            entities.push(createPig(1000, 530));

            Composite.add(engine.world, entities);
        }

        function initGame() {
            if (engine) {
                Render.stop(render);
                Runner.stop(runner);
                Composite.clear(engine.world);
                Engine.clear(engine);
                render.canvas.remove();
            }

            birdsLeft = 3;
            pigsLeft = 3;
            score = 0;
            gameState = 'playing';
            entities = [];
            hideMessage();
            updateUI();

            engine = Engine.create();
            render = Render.create({
                element: document.body,
                engine: engine,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#87CEEB' }
            });

            ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight - 30, window.innerWidth * 2, 60, { 
                isStatic: true, render: { fillStyle: '#2ed573' } 
            });
            
            let slingBase = Bodies.rectangle(SLING_POS.x, SLING_POS.y + 60, 20, 120, { 
                isStatic: true, render: { fillStyle: '#8e44ad' }, collisionFilter: { group: -1 } 
            });

            slingshot = Constraint.create({
                pointA: SLING_POS, bodyB: null, stiffness: 0.05, damping: 0.01, render: { strokeStyle: '#4a2311', lineWidth: 5 }
            });

            Composite.add(engine.world, [ground, slingBase, slingshot]);
            buildFortress();
            spawnBird();

            mouse = Mouse.create(render.canvas);
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse, constraint: { angularStiffness: 0, render: { visible: false } }
            });
            Composite.add(engine.world, mouseConstraint);
            render.mouse = mouse;

            Events.on(mouseConstraint, 'enddrag', function(event) {
                if (gameState === 'aiming' && event.body === bird) {
                    let dist = Vector.magnitude(Vector.sub(bird.position, SLING_POS));
                    if (dist > 20) {
                        slingshot.bodyB = null;
                        gameState = 'flying';
                        birdsLeft--;
                        updateUI();
                        setTimeout(checkTurnEnd, 1000);
                    }
                }
            });

            Events.on(render, 'afterRender', function() {
                const ctx = render.context;
                if (gameState === 'aiming' && mouseConstraint.body === bird) {
                    ctx.beginPath();
                    ctx.moveTo(SLING_POS.x, SLING_POS.y);
                    ctx.lineTo(bird.position.x, bird.position.y);
                    ctx.strokeStyle = '#4a2311';
                    ctx.lineWidth = 5;
                    ctx.stroke();

                    let force = Vector.sub(SLING_POS, bird.position);
                    let velocity = Vector.mult(force, 0.15); 
                    let pos = { x: bird.position.x, y: bird.position.y };
                    ctx.beginPath();
                    for(let i=0; i<20; i++) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                        ctx.arc(pos.x, pos.y, 3, 0, 2 * Math.PI);
                        ctx.fill();
                        pos.x += velocity.x;
                        pos.y += velocity.y;
                        velocity.y += engine.gravity.y * engine.gravity.scale * 16.666;
                    }
                }

                if (gameState === 'flying' && bird) {
                    if (bird.position.x > window.innerWidth + 200 || bird.position.x < -200 || bird.position.y > window.innerHeight + 200) {
                        checkTurnEnd(); 
                    }
                }
            });

            Events.on(engine, 'collisionStart', function(event) {
                let pairs = event.pairs;
                for (let i = 0; i < pairs.length; i++) {
                    let pair = pairs[i];
                    let impact = pair.collision.depth * 2 + (pair.bodyA.speed + pair.bodyB.speed) * 0.5;
                    if (impact > 2) {
                        damageEntity(pair.bodyA, impact);
                        damageEntity(pair.bodyB, impact);
                    }
                }
            });

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);
        }

        function damageEntity(body, damage) {
            if (!body.hp) return;
            body.hp -= damage * 5;
            if (body.hp <= 0 && entities.includes(body)) {
                Composite.remove(engine.world, body);
                entities = entities.filter(e => e !== body);
                score += (body.entityType === 'pig') ? 500 : 50;
                
                if (body.entityType === 'pig') {
                    pigsLeft--;
                    createParticles(body.position.x, body.position.y, '#2ecc71');
                } else {
                    createParticles(body.position.x, body.position.y, body.render.fillStyle);
                }
                
                updateUI();
                checkWinCondition();
            } else if (body.hp > 0 && body.maxHp) {
                body.render.opacity = Math.max(0.3, body.hp / body.maxHp);
            }
        }

        function createParticles(x, y, color) {
            for(let i=0; i<5; i++) {
                let p = Bodies.circle(x + (Math.random()-0.5)*20, y + (Math.random()-0.5)*20, 4, {
                    render: { fillStyle: color }, isSensor: true, frictionAir: 0.1
                });
                Matter.Body.setVelocity(p, { x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10 - 5 });
                Composite.add(engine.world, p);
                setTimeout(() => Composite.remove(engine.world, p), 1000);
            }
        }

        let turnCheckTimeout;
        function checkTurnEnd() {
            if (gameState !== 'flying') return;
            
            if (bird.speed < 0.5 || bird.position.x > window.innerWidth || bird.position.y > window.innerHeight) {
                Composite.remove(engine.world, bird);
                
                if (pigsLeft > 0) {
                    if (birdsLeft > 0) {
                        spawnBird();
                    } else {
                        gameState = 'lost';
                        showMessage('GAME OVER');
                    }
                }
            } else {
                clearTimeout(turnCheckTimeout);
                turnCheckTimeout = setTimeout(checkTurnEnd, 500);
            }
        }

        function checkWinCondition() {
            if (pigsLeft <= 0) {
                gameState = 'won';
                score += birdsLeft * 1000;
                updateUI();
                showMessage('YOU WIN!');
            }
        }

        window.addEventListener('resize', () => {
            if (render) {
                render.canvas.width = window.innerWidth;
                render.canvas.height = window.innerHeight;
                Matter.Body.setPosition(ground, { x: window.innerWidth/2, y: window.innerHeight - 30 });
            }
        });

        window.onload = initGame;
    </script>
</body>
</html>
