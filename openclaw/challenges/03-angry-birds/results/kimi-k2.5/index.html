<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Birds - Kimi K2.5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #87CEEB; overflow: hidden; font-family: 'Comic Sans MS', cursive, sans-serif; }
canvas { display: block; }
#ui {
  position: absolute; top: 10px; left: 10px; z-index: 10;
  display: flex; gap: 15px; align-items: center;
}
#ui > div {
  background: rgba(0,0,0,0.5); color: #fff; padding: 8px 16px;
  border-radius: 20px; font-size: 18px; font-weight: bold;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}
#resetBtn {
  background: #e74c3c; color: white; border: none; padding: 8px 20px;
  border-radius: 20px; font-size: 16px; font-weight: bold; cursor: pointer;
  font-family: inherit; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  box-shadow: 0 3px 0 #c0392b;
}
#resetBtn:hover { background: #c0392b; }
#resetBtn:active { transform: translateY(2px); box-shadow: 0 1px 0 #c0392b; }
#message {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 48px; font-weight: bold; color: #fff; text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
  z-index: 20; display: none; pointer-events: none;
  animation: popIn 0.5s ease-out;
}
@keyframes popIn {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  70% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
</style>
</head>
<body>
<div id="ui">
  <div id="scoreDisplay">Score: 0</div>
  <div id="birdsLeft">Birds: 3</div>
  <button id="resetBtn" onclick="resetLevel()">↻ Reset</button>
</div>
<div id="message"></div>
<canvas id="game"></canvas>

<script>
const { Engine, Render, Runner, Bodies, Body, Composite, Events, Mouse, Constraint, Vector } = Matter;

const W = window.innerWidth, H = window.innerHeight;
let engine, render, runner, mouse;
let sling, bird, birds = [], birdCount = 3;
let pigs = [], blocks = [], ground;
let score = 0, launched = false, canLaunch = true, gameOver = false;
let particles = [];
const SLING_X = 180, SLING_Y = H - 170;
const BIRD_R = 18, PIG_R = 20;

function init() {
  engine = Engine.create({ gravity: { x: 0, y: 1.2 } });
  render = Render.create({
    canvas: document.getElementById('game'),
    engine, options: { width: W, height: H, wireframes: false, background: 'transparent' }
  });

  // Ground
  ground = Bodies.rectangle(W / 2, H - 30, W, 60, {
    isStatic: true, render: { fillStyle: '#5a8f3c' }, label: 'ground'
  });

  // Hills
  const hill1 = Bodies.circle(100, H - 55, 50, { isStatic: true, render: { fillStyle: '#4a7f2c' }, label: 'ground' });
  const hill2 = Bodies.circle(W - 200, H - 50, 40, { isStatic: true, render: { fillStyle: '#4a7f2c' }, label: 'ground' });

  Composite.add(engine.world, [ground, hill1, hill2]);
  buildLevel();
  createBird();

  Render.run(render);
  runner = Runner.create();
  Runner.run(runner, engine);

  // Custom rendering
  Events.on(render, 'afterRender', customDraw);
  Events.on(engine, 'collisionStart', onCollision);

  // Mouse interaction for slingshot
  const canvas = render.canvas;
  let dragging = false, dragStart = null;

  canvas.addEventListener('mousedown', e => {
    if (!canLaunch || launched || gameOver) return;
    const pos = { x: e.offsetX, y: e.offsetY };
    const dist = Vector.magnitude(Vector.sub(pos, { x: bird.position.x, y: bird.position.y }));
    if (dist < 40) { dragging = true; dragStart = pos; }
  });

  canvas.addEventListener('mousemove', e => {
    if (!dragging) return;
    const pos = { x: e.offsetX, y: e.offsetY };
    const offset = Vector.sub(pos, { x: SLING_X, y: SLING_Y });
    const mag = Vector.magnitude(offset);
    const maxStretch = 120;
    if (mag > maxStretch) {
      const norm = Vector.normalise(offset);
      Body.setPosition(bird, { x: SLING_X + norm.x * maxStretch, y: SLING_Y + norm.y * maxStretch });
    } else {
      Body.setPosition(bird, pos);
    }
  });

  canvas.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    launchBird();
  });

  // Touch support
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (!canLaunch || launched || gameOver) return;
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const pos = { x: t.clientX - rect.left, y: t.clientY - rect.top };
    const dist = Vector.magnitude(Vector.sub(pos, { x: bird.position.x, y: bird.position.y }));
    if (dist < 50) { dragging = true; }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!dragging) return;
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const pos = { x: t.clientX - rect.left, y: t.clientY - rect.top };
    const offset = Vector.sub(pos, { x: SLING_X, y: SLING_Y });
    const mag = Vector.magnitude(offset);
    const maxStretch = 120;
    if (mag > maxStretch) {
      const norm = Vector.normalise(offset);
      Body.setPosition(bird, { x: SLING_X + norm.x * maxStretch, y: SLING_Y + norm.y * maxStretch });
    } else {
      Body.setPosition(bird, pos);
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    launchBird();
  });
}

function buildLevel() {
  pigs = []; blocks = [];
  const baseX = W - 350, baseY = H - 60;

  // Platform blocks
  const blockDefs = [
    // Bottom layer - 3 vertical wood blocks
    { x: baseX - 60, y: baseY - 50, w: 20, h: 80, type: 'wood' },
    { x: baseX, y: baseY - 50, w: 20, h: 80, type: 'wood' },
    { x: baseX + 60, y: baseY - 50, w: 20, h: 80, type: 'wood' },
    // First platform
    { x: baseX - 30, y: baseY - 95, w: 80, h: 12, type: 'wood' },
    { x: baseX + 30, y: baseY - 95, w: 80, h: 12, type: 'wood' },
    // Second layer vertical
    { x: baseX - 30, y: baseY - 140, w: 20, h: 70, type: 'stone' },
    { x: baseX + 30, y: baseY - 140, w: 20, h: 70, type: 'stone' },
    // Second platform
    { x: baseX, y: baseY - 180, w: 100, h: 12, type: 'wood' },
    // Top - ice blocks
    { x: baseX - 20, y: baseY - 210, w: 15, h: 45, type: 'ice' },
    { x: baseX + 20, y: baseY - 210, w: 15, h: 45, type: 'ice' },
    // Roof
    { x: baseX, y: baseY - 238, w: 70, h: 10, type: 'wood' },
    // Extra side structure
    { x: baseX + 120, y: baseY - 40, w: 20, h: 60, type: 'stone' },
    { x: baseX + 160, y: baseY - 40, w: 20, h: 60, type: 'stone' },
    { x: baseX + 140, y: baseY - 75, w: 60, h: 12, type: 'wood' },
  ];

  const matProps = {
    wood: { density: 0.004, friction: 0.6, restitution: 0.2, hp: 80, color: '#b5651d', stroke: '#8B4513' },
    stone: { density: 0.008, friction: 0.8, restitution: 0.1, hp: 160, color: '#888', stroke: '#666' },
    ice: { density: 0.003, friction: 0.1, restitution: 0.3, hp: 40, color: '#add8e6', stroke: '#87CEEB' },
  };

  blockDefs.forEach(d => {
    const p = matProps[d.type];
    const block = Bodies.rectangle(d.x, d.y, d.w, d.h, {
      density: p.density, friction: p.friction, restitution: p.restitution,
      render: { fillStyle: p.color, strokeStyle: p.stroke, lineWidth: 2 },
      label: 'block', hp: p.hp, maxHp: p.hp, blockType: d.type
    });
    blocks.push(block);
    Composite.add(engine.world, block);
  });

  // Pigs
  const pigPositions = [
    { x: baseX - 30, y: baseY - 30 },
    { x: baseX + 30, y: baseY - 30 },
    { x: baseX, y: baseY - 200 },
    { x: baseX + 140, y: baseY - 30 },
  ];

  pigPositions.forEach(p => {
    const pig = Bodies.circle(p.x, p.y, PIG_R, {
      density: 0.003, friction: 0.5, restitution: 0.3,
      render: { fillStyle: '#4CAF50' }, label: 'pig', hp: 60, alive: true
    });
    pigs.push(pig);
    Composite.add(engine.world, pig);
  });
}

function createBird() {
  if (birdCount <= 0) return;
  bird = Bodies.circle(SLING_X, SLING_Y, BIRD_R, {
    density: 0.006, friction: 0.5, restitution: 0.4,
    render: { fillStyle: '#e74c3c' }, label: 'bird', isStatic: true
  });
  Composite.add(engine.world, bird);
  launched = false;
  canLaunch = true;
}

function launchBird() {
  const force = Vector.sub({ x: SLING_X, y: SLING_Y }, bird.position);
  const mag = Vector.magnitude(force);
  if (mag < 15) {
    Body.setPosition(bird, { x: SLING_X, y: SLING_Y });
    return;
  }
  const power = Math.min(mag, 120) * 0.06;
  const norm = Vector.normalise(force);

  Body.setStatic(bird, false);
  Body.applyForce(bird, bird.position, { x: norm.x * power, y: norm.y * power });

  launched = true;
  canLaunch = false;
  birdCount--;
  updateUI();

  // After 4 seconds, check state
  setTimeout(() => {
    if (gameOver) return;
    checkWinLose();
    if (!gameOver) {
      if (birdCount > 0) {
        createBird();
      } else {
        setTimeout(() => { if (!gameOver) checkWinLose(true); }, 1500);
      }
    }
  }, 4000);
}

function onCollision(event) {
  event.pairs.forEach(pair => {
    const { bodyA, bodyB } = pair;
    const speed = Vector.magnitude(Vector.sub(bodyA.velocity || {x:0,y:0}, bodyB.velocity || {x:0,y:0}));

    [bodyA, bodyB].forEach(b => {
      if (b.label === 'block' && speed > 3) {
        b.hp -= speed * 8;
        if (b.hp <= 0) destroyBlock(b);
        else {
          // Damage visual
          const ratio = b.hp / b.maxHp;
          if (ratio < 0.3) b.render.opacity = 0.5;
          else if (ratio < 0.6) b.render.opacity = 0.7;
        }
      }
      if (b.label === 'pig' && b.alive && speed > 2) {
        b.hp -= speed * 12;
        if (b.hp <= 0) destroyPig(b);
      }
    });
  });
}

function destroyBlock(block) {
  spawnParticles(block.position.x, block.position.y, block.render.fillStyle, 6);
  Composite.remove(engine.world, block);
  blocks = blocks.filter(b => b !== block);
  score += 50;
  updateUI();
}

function destroyPig(pig) {
  pig.alive = false;
  spawnParticles(pig.position.x, pig.position.y, '#4CAF50', 10);
  Composite.remove(engine.world, pig);
  score += 500;
  updateUI();
  // Check win
  if (pigs.every(p => !p.alive)) {
    score += birdCount * 1000;
    updateUI();
    showMessage('🎉 You Win! 🎉', '#2ecc3c');
    gameOver = true;
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8 - 3,
      r: Math.random() * 5 + 2, color, life: 1
    });
  }
}

function checkWinLose(force = false) {
  if (gameOver) return;
  const alivePigs = pigs.filter(p => p.alive);
  if (alivePigs.length === 0) return; // already won
  if (force || (birdCount <= 0 && launched)) {
    showMessage('💥 Try Again! 💥', '#e74c3c');
    gameOver = true;
  }
}

function showMessage(text, color) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.style.display = 'block';
  el.style.color = color || '#fff';
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = 'popIn 0.5s ease-out';
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = `Score: ${score}`;
  document.getElementById('birdsLeft').textContent = `Birds: ${birdCount}`;
}

function customDraw() {
  const ctx = render.context;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#1e90ff');
  skyGrad.addColorStop(0.5, '#87CEEB');
  skyGrad.addColorStop(0.85, '#b8e6b8');
  skyGrad.addColorStop(1, '#5a8f3c');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  drawCloud(ctx, 150, 80, 0.8);
  drawCloud(ctx, 500, 50, 1.0);
  drawCloud(ctx, W - 300, 100, 0.6);
  drawCloud(ctx, W - 500, 60, 0.9);

  // Sun
  ctx.save();
  ctx.beginPath();
  const sunGrad = ctx.createRadialGradient(W - 100, 80, 10, W - 100, 80, 60);
  sunGrad.addColorStop(0, '#fff176');
  sunGrad.addColorStop(1, 'rgba(255,241,118,0)');
  ctx.fillStyle = sunGrad;
  ctx.arc(W - 100, 80, 60, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.fillStyle = '#ffeb3b';
  ctx.arc(W - 100, 80, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Ground texture
  ctx.fillStyle = '#4a7f2c';
  ctx.fillRect(0, H - 60, W, 60);
  ctx.fillStyle = '#5a8f3c';
  ctx.fillRect(0, H - 60, W, 8);
  // Grass tufts
  ctx.fillStyle = '#6ab04c';
  for (let i = 0; i < W; i += 20) {
    ctx.beginPath();
    ctx.ellipse(i + Math.sin(i) * 5, H - 58, 6, 10, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Slingshot
  drawSlingshot(ctx);

  // Draw bodies with custom styles
  const allBodies = Composite.allBodies(engine.world);
  allBodies.forEach(b => {
    if (b.label === 'bird') drawBird(ctx, b);
    else if (b.label === 'pig') drawPig(ctx, b);
    else if (b.label === 'block') drawBlock(ctx, b);
    else if (b.label === 'ground') {} // drawn above
  });

  // Sling band front
  if (bird && !launched) {
    ctx.strokeStyle = '#4a3728';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(SLING_X + 12, SLING_Y - 30);
    ctx.lineTo(bird.position.x, bird.position.y);
    ctx.stroke();
  }

  // Particles
  particles.forEach((p, i) => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.025;
    if (p.life <= 0) { particles.splice(i, 1); return; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Trajectory dots when dragging
  if (bird && bird.isStatic && !launched) {
    const force = Vector.sub({ x: SLING_X, y: SLING_Y }, bird.position);
    const mag = Vector.magnitude(force);
    if (mag > 15) {
      const power = Math.min(mag, 120) * 0.06;
      const norm = Vector.normalise(force);
      const vx = norm.x * power * 180, vy = norm.y * power * 180;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      for (let t = 0.05; t < 0.8; t += 0.06) {
        const dx = bird.position.x + vx * t;
        const dy = bird.position.y + vy * t + 0.5 * 1.2 * 980 * t * t;
        ctx.beginPath();
        ctx.arc(dx, dy, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawCloud(ctx, x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(0, 0, 30, 0, Math.PI * 2);
  ctx.arc(30, -10, 25, 0, Math.PI * 2);
  ctx.arc(-25, 5, 20, 0, Math.PI * 2);
  ctx.arc(15, 10, 20, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawSlingshot(ctx) {
  ctx.save();
  // Back band
  if (bird && !launched) {
    ctx.strokeStyle = '#3d2b1f';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(SLING_X - 12, SLING_Y - 30);
    ctx.lineTo(bird.position.x, bird.position.y);
    ctx.stroke();
  }
  // Y-frame
  ctx.fillStyle = '#5c3a1e';
  ctx.strokeStyle = '#3d2b1f';
  ctx.lineWidth = 2;
  // Left prong
  ctx.beginPath();
  ctx.moveTo(SLING_X - 5, SLING_Y + 30);
  ctx.lineTo(SLING_X - 15, SLING_Y - 32);
  ctx.lineTo(SLING_X - 8, SLING_Y - 35);
  ctx.lineTo(SLING_X, SLING_Y + 30);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Right prong
  ctx.beginPath();
  ctx.moveTo(SLING_X, SLING_Y + 30);
  ctx.lineTo(SLING_X + 8, SLING_Y - 35);
  ctx.lineTo(SLING_X + 15, SLING_Y - 32);
  ctx.lineTo(SLING_X + 5, SLING_Y + 30);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawBird(ctx, b) {
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  // Body
  const grad = ctx.createRadialGradient(-3, -3, 2, 0, 0, BIRD_R);
  grad.addColorStop(0, '#ff6b6b');
  grad.addColorStop(1, '#c0392b');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#922b21';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Belly
  ctx.fillStyle = '#f5b7b1';
  ctx.beginPath();
  ctx.ellipse(0, 5, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-6, -4, 6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -4, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-4, -4, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -4, 3, 0, Math.PI * 2); ctx.fill();
  // Eyebrows (angry!)
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-12, -10); ctx.lineTo(-3, -8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12, -10); ctx.lineTo(3, -8); ctx.stroke();
  // Beak
  ctx.fillStyle = '#f39c12';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(8, 5);
  ctx.lineTo(0, 8);
  ctx.closePath();
  ctx.fill();
  // Top feathers
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(-3, -BIRD_R);
  ctx.lineTo(0, -BIRD_R - 10);
  ctx.lineTo(3, -BIRD_R);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPig(ctx, b) {
  if (!b.alive) return;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  // Body
  const grad = ctx.createRadialGradient(-3, -3, 2, 0, 0, PIG_R);
  grad.addColorStop(0, '#81c784');
  grad.addColorStop(1, '#388e3c');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, PIG_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#2e7d32';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Ears
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath(); ctx.ellipse(-14, -14, 7, 5, -0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14, -14, 7, 5, 0.5, 0, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-7, -4, 7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -4, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-5, -3, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(9, -3, 3.5, 0, Math.PI * 2); ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-4, -5, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -5, 1.5, 0, Math.PI * 2); ctx.fill();
  // Snout
  ctx.fillStyle = '#66bb6a';
  ctx.beginPath();
  ctx.ellipse(0, 6, 10, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#2e7d32';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Nostrils
  ctx.fillStyle = '#2e7d32';
  ctx.beginPath(); ctx.ellipse(-4, 6, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4, 6, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
  // Damage indicator
  const ratio = b.hp / 60;
  if (ratio < 0.5) {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-5, -12); ctx.lineTo(2, -8); ctx.lineTo(-2, -5); ctx.stroke();
  }
  ctx.restore();
}

function drawBlock(ctx, b) {
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  const verts = b.vertices;
  const center = b.position;

  ctx.beginPath();
  ctx.moveTo(verts[0].x - center.x, verts[0].y - center.y);
  for (let i = 1; i < verts.length; i++) {
    ctx.lineTo(verts[i].x - center.x, verts[i].y - center.y);
  }
  ctx.closePath();
  ctx.fillStyle = b.render.fillStyle;
  ctx.fill();
  ctx.strokeStyle = b.render.strokeStyle;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Wood grain / stone dots / ice shine
  if (b.blockType === 'wood') {
    ctx.strokeStyle = 'rgba(139,69,19,0.3)';
    ctx.lineWidth = 1;
    for (let i = -20; i < 20; i += 8) {
      ctx.beginPath(); ctx.moveTo(-30, i); ctx.lineTo(30, i); ctx.stroke();
    }
  } else if (b.blockType === 'ice') {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(-3, -3, 5, 0, Math.PI * 2); ctx.fill();
  }

  // Damage cracks
  const ratio = b.hp / b.maxHp;
  if (ratio < 0.6) {
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-5, -8); ctx.lineTo(3, 0); ctx.lineTo(-2, 8); ctx.stroke();
  }
  ctx.restore();
}

function resetLevel() {
  // Clear everything
  document.getElementById('message').style.display = 'none';
  Composite.clear(engine.world, false);
  particles = [];
  score = 0;
  birdCount = 3;
  gameOver = false;
  launched = false;
  canLaunch = true;
  updateUI();

  Composite.add(engine.world, [ground]);
  buildLevel();
  createBird();
}

window.resetLevel = resetLevel;
init();
</script>
