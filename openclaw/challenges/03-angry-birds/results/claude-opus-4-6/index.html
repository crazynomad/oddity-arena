<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Birds Clone</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #87CEEB; display: flex; flex-direction: column; align-items: center; font-family: 'Comic Sans MS', cursive, sans-serif; overflow: hidden; height: 100vh; }
canvas { display: block; cursor: crosshair; border-bottom: 4px solid #5a3a1a; }
#ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
#ui > div { background: rgba(0,0,0,0.5); color: #fff; padding: 8px 16px; border-radius: 12px; font-size: 18px; font-weight: bold; pointer-events: auto; }
#resetBtn { cursor: pointer; background: rgba(200,50,50,0.8); }
#resetBtn:hover { background: rgba(220,70,70,0.9); }
#message { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 48px; font-weight: bold; color: #fff; text-shadow: 3px 3px 6px rgba(0,0,0,0.7); pointer-events: none; z-index: 20; display: none; }
</style>
</head>
<body>
<div id="ui">
  <div id="score">Score: 0</div>
  <div id="birds">Birds: 3</div>
  <div id="resetBtn" onclick="resetGame()">Reset</div>
</div>
<div id="message"></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = window.innerWidth;
const H = canvas.height = window.innerHeight;
const GROUND = H - 60;
const GRAVITY = 0.3;
const SLING_X = 150, SLING_Y = GROUND - 100;
const DRAG_MAX = 120;

let score = 0, gameState = 'aiming', dragStart = null, dragCurrent = null;
let birds = [], activeBird = null, projectiles = [], blocks = [], pigs = [], particles = [];
let settleTimer = 0;

// Bird types
const BIRD_TYPES = [
  { color: '#e03030', name: 'Red', radius: 15, mass: 1 },
  { color: '#f0e020', name: 'Yellow', radius: 12, mass: 0.7 },
  { color: '#3030e0', name: 'Blue', radius: 18, mass: 1.4 },
];

function initBirds() {
  birds = [];
  for (let i = 0; i < 3; i++) {
    birds.push({ ...BIRD_TYPES[i % BIRD_TYPES.length], x: 60 - i * 35, y: GROUND - BIRD_TYPES[i % BIRD_TYPES.length].radius });
  }
  loadNextBird();
}

function loadNextBird() {
  if (birds.length === 0) { activeBird = null; return; }
  const b = birds.shift();
  activeBird = { ...b, x: SLING_X, y: SLING_Y, vx: 0, vy: 0, launched: false, alive: true };
  gameState = 'aiming';
}

function initBlocks() {
  blocks = [];
  const types = [
    { type: 'wood', color: '#b5651d', hp: 2, w: 60, h: 20 },
    { type: 'stone', color: '#888', hp: 4, w: 60, h: 20 },
    { type: 'ice', color: '#a0e0f0', hp: 1, w: 60, h: 20 },
  ];
  // Tower 1
  const tx = W - 400;
  addBlock(tx, GROUND - 20, 20, 80, 'wood', '#b5651d', 3);
  addBlock(tx + 80, GROUND - 20, 20, 80, 'wood', '#b5651d', 3);
  addBlock(tx, GROUND - 100, 100, 20, 'wood', '#b5651d', 2);
  addBlock(tx + 10, GROUND - 120, 20, 60, 'ice', '#a0e0f0', 1);
  addBlock(tx + 70, GROUND - 120, 20, 60, 'ice', '#a0e0f0', 1);
  addBlock(tx, GROUND - 180, 100, 20, 'stone', '#888', 4);

  // Tower 2
  const tx2 = W - 220;
  addBlock(tx2, GROUND - 20, 20, 100, 'stone', '#888', 4);
  addBlock(tx2 + 100, GROUND - 20, 20, 100, 'stone', '#888', 4);
  addBlock(tx2, GROUND - 120, 120, 20, 'wood', '#b5651d', 2);
  addBlock(tx2 + 20, GROUND - 140, 20, 60, 'wood', '#b5651d', 2);
  addBlock(tx2 + 80, GROUND - 140, 20, 60, 'wood', '#b5651d', 2);
  addBlock(tx2, GROUND - 200, 120, 20, 'ice', '#a0e0f0', 1);
}

function addBlock(x, y, w, h, type, color, hp) {
  blocks.push({ x, y: y - h, w, h, type, color, hp, maxHp: hp, vx: 0, vy: 0, settled: true });
}

function initPigs() {
  pigs = [];
  const tx = W - 400;
  pigs.push({ x: tx + 50, y: GROUND - 140, r: 18, hp: 2, maxHp: 2, vx: 0, vy: 0 });
  const tx2 = W - 220;
  pigs.push({ x: tx2 + 60, y: GROUND - 80, r: 18, hp: 2, maxHp: 2, vx: 0, vy: 0 });
  pigs.push({ x: tx2 + 60, y: GROUND - 230, r: 15, hp: 1, maxHp: 1, vx: 0, vy: 0 });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8 - 3,
      life: 30 + Math.random() * 20, color, r: 2 + Math.random() * 4
    });
  }
}

// Input
let mouseDown = false;
canvas.addEventListener('mousedown', e => {
  if (gameState !== 'aiming' || !activeBird) return;
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const dx = mx - SLING_X, dy = my - SLING_Y;
  if (Math.sqrt(dx * dx + dy * dy) < 60) {
    mouseDown = true;
    dragStart = { x: SLING_X, y: SLING_Y };
    dragCurrent = { x: mx, y: my };
  }
});
canvas.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const r = canvas.getBoundingClientRect();
  let mx = e.clientX - r.left, my = e.clientY - r.top;
  let dx = mx - SLING_X, dy = my - SLING_Y;
  let dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > DRAG_MAX) { mx = SLING_X + dx / dist * DRAG_MAX; my = SLING_Y + dy / dist * DRAG_MAX; }
  dragCurrent = { x: mx, y: my };
  activeBird.x = mx; activeBird.y = my;
});
canvas.addEventListener('mouseup', () => {
  if (!mouseDown || !activeBird) return;
  mouseDown = false;
  const dx = SLING_X - dragCurrent.x, dy = SLING_Y - dragCurrent.y;
  const power = Math.sqrt(dx * dx + dy * dy);
  if (power < 10) { activeBird.x = SLING_X; activeBird.y = SLING_Y; return; }
  const scale = 0.15;
  activeBird.vx = dx * scale;
  activeBird.vy = dy * scale;
  activeBird.launched = true;
  gameState = 'flying';
  settleTimer = 0;
  dragCurrent = null;
});

// Touch support
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); }, { passive: false });

function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx, dy = cy - ny;
  return dx * dx + dy * dy < cr * cr;
}

function circleCircle(x1, y1, r1, x2, y2, r2) {
  const dx = x1 - x2, dy = y1 - y2;
  return dx * dx + dy * dy < (r1 + r2) * (r1 + r2);
}

function update() {
  // Particles
  particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; return p.life > 0; });

  // Flying bird
  if (activeBird && activeBird.launched) {
    activeBird.vy += GRAVITY;
    activeBird.x += activeBird.vx;
    activeBird.y += activeBird.vy;

    // Ground
    if (activeBird.y + activeBird.radius > GROUND) {
      activeBird.y = GROUND - activeBird.radius;
      activeBird.vy *= -0.3; activeBird.vx *= 0.7;
      if (Math.abs(activeBird.vy) < 1) activeBird.vy = 0;
    }

    // Block collision
    blocks.forEach(b => {
      if (circleRect(activeBird.x, activeBird.y, activeBird.radius, b.x, b.y, b.w, b.h)) {
        const speed = Math.sqrt(activeBird.vx ** 2 + activeBird.vy ** 2);
        const dmg = Math.ceil(speed / 4 * activeBird.mass);
        b.hp -= dmg;
        if (b.hp <= 0) { score += (b.type === 'stone' ? 500 : b.type === 'wood' ? 300 : 200); spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 12); }
        b.vx += activeBird.vx * 0.3; b.vy += activeBird.vy * 0.3;
        activeBird.vx *= -0.4; activeBird.vy *= -0.4;
      }
    });

    // Pig collision
    pigs.forEach(p => {
      if (p.hp > 0 && circleCircle(activeBird.x, activeBird.y, activeBird.radius, p.x, p.y, p.r)) {
        const speed = Math.sqrt(activeBird.vx ** 2 + activeBird.vy ** 2);
        p.hp -= Math.ceil(speed / 3 * activeBird.mass);
        if (p.hp <= 0) { score += 1000; spawnParticles(p.x, p.y, '#4a4', 15); }
        p.vx += activeBird.vx * 0.5; p.vy += activeBird.vy * 0.5;
        activeBird.vx *= -0.3; activeBird.vy *= -0.3;
      }
    });

    // Out of bounds or settled
    const speed = Math.sqrt(activeBird.vx ** 2 + activeBird.vy ** 2);
    if (activeBird.x > W + 50 || activeBird.x < -50 || activeBird.y > H + 50 || speed < 0.5) {
      settleTimer++;
      if (settleTimer > 60) {
        activeBird = null;
        gameState = 'settling';
        setTimeout(() => {
          if (pigs.every(p => p.hp <= 0)) { showMessage('🎉 Level Clear!'); gameState = 'won'; }
          else if (birds.length === 0) { showMessage('💀 Try Again!'); gameState = 'lost'; }
          else loadNextBird();
        }, 500);
      }
    }
  }

  // Block physics (simple)
  blocks = blocks.filter(b => b.hp > 0);
  blocks.forEach(b => {
    if (!b.settled || Math.abs(b.vx) > 0.1 || Math.abs(b.vy) > 0.1) {
      b.vy += GRAVITY * 0.5;
      b.x += b.vx; b.y += b.vy;
      b.vx *= 0.95; b.vy *= 0.95;
      if (b.y + b.h > GROUND) { b.y = GROUND - b.h; b.vy = 0; b.vx *= 0.8; }
    }
    // Block-on-block
    blocks.forEach(b2 => {
      if (b === b2) return;
      if (b.x < b2.x + b2.w && b.x + b.w > b2.x && b.y < b2.y + b2.h && b.y + b.h > b2.y) {
        const overlapX = Math.min(b.x + b.w - b2.x, b2.x + b2.w - b.x);
        const overlapY = Math.min(b.y + b.h - b2.y, b2.y + b2.h - b.y);
        if (overlapY < overlapX) {
          if (b.y < b2.y) b.y = b2.y - b.h; else b.y = b2.y + b2.h;
          b.vy *= -0.3;
        }
      }
    });
  });

  // Pig physics
  pigs.forEach(p => {
    if (p.hp <= 0) return;
    p.vy = (p.vy || 0) + GRAVITY * 0.5;
    p.x += (p.vx || 0); p.y += (p.vy || 0);
    p.vx = (p.vx || 0) * 0.95; p.vy *= 0.95;
    if (p.y + p.r > GROUND) { p.y = GROUND - p.r; p.vy = 0; p.vx *= 0.8; }
    // Pig vs blocks
    blocks.forEach(b => {
      if (circleRect(p.x, p.y, p.r, b.x, b.y, b.w, b.h)) {
        p.y = b.y - p.r;
        if (p.vy > 2) { p.hp--; if (p.hp <= 0) { score += 1000; spawnParticles(p.x, p.y, '#4a4', 10); } }
        p.vy = 0;
      }
    });
  });

  document.getElementById('score').textContent = 'Score: ' + score;
  document.getElementById('birds').textContent = 'Birds: ' + (birds.length + (activeBird && !activeBird.launched ? 1 : 0));
}

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#4a90d9'); grad.addColorStop(0.6, '#87CEEB'); grad.addColorStop(1, '#b0e0ff');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  [[100, 80, 50], [300, 50, 40], [600, 90, 60], [900, 40, 35], [W - 200, 70, 45]].forEach(([x, y, r]) => {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.arc(x + r, y - 10, r * 0.8, 0, Math.PI * 2); ctx.arc(x - r * 0.6, y, r * 0.6, 0, Math.PI * 2); ctx.fill();
  });
  // Ground
  ctx.fillStyle = '#5a8f29'; ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = '#4a7a20'; ctx.fillRect(0, GROUND, W, 8);
}

function drawSlingshot() {
  // Back band
  ctx.strokeStyle = '#3a2a0a'; ctx.lineWidth = 4;
  // Posts
  ctx.fillStyle = '#6b3a10';
  ctx.fillRect(SLING_X - 18, SLING_Y - 10, 10, 60);
  ctx.fillRect(SLING_X + 8, SLING_Y - 10, 10, 60);
  ctx.fillStyle = '#4a2800';
  ctx.fillRect(SLING_X - 10, SLING_Y + 40, 20, 20);
  // Fork
  ctx.fillStyle = '#6b3a10';
  ctx.beginPath();
  ctx.arc(SLING_X - 13, SLING_Y - 10, 6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath();
  ctx.arc(SLING_X + 13, SLING_Y - 10, 6, 0, Math.PI * 2); ctx.fill();

  if (mouseDown && activeBird && dragCurrent) {
    // Rubber band back
    ctx.strokeStyle = '#4a2a0a'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(SLING_X - 13, SLING_Y - 8); ctx.lineTo(activeBird.x, activeBird.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(SLING_X + 13, SLING_Y - 8); ctx.lineTo(activeBird.x, activeBird.y); ctx.stroke();
  }
}

function drawTrajectory() {
  if (!mouseDown || !dragCurrent || !activeBird) return;
  const dx = SLING_X - dragCurrent.x, dy = SLING_Y - dragCurrent.y;
  const scale = 0.15;
  let vx = dx * scale, vy = dy * scale;
  let x = SLING_X, y = SLING_Y;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < 40; i++) {
    vy += GRAVITY;
    x += vx; y += vy;
    if (y > GROUND) break;
    if (i % 3 === 0) { ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill(); }
  }
}

function drawBird(b) {
  if (!b) return;
  ctx.save();
  // Body
  ctx.fillStyle = b.color;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
  // Eyes
  const er = b.radius * 0.25;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(b.x - er, b.y - er, er, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(b.x + er, b.y - er, er, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  const px = b.launched ? b.vx * 0.3 : 0;
  ctx.beginPath(); ctx.arc(b.x - er + px, b.y - er, er * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(b.x + er + px, b.y - er, er * 0.5, 0, Math.PI * 2); ctx.fill();
  // Beak
  ctx.fillStyle = '#f0a000';
  ctx.beginPath(); ctx.moveTo(b.x + b.radius * 0.6, b.y); ctx.lineTo(b.x + b.radius * 1.3, b.y + 2); ctx.lineTo(b.x + b.radius * 0.6, b.y + 5); ctx.fill();
  // Eyebrows (angry!)
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(b.x - er * 2, b.y - er * 2.5); ctx.lineTo(b.x, b.y - er * 1.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(b.x + er * 2, b.y - er * 2.5); ctx.lineTo(b.x, b.y - er * 1.5); ctx.stroke();
  ctx.restore();
}

function drawPig(p) {
  if (p.hp <= 0) return;
  ctx.save();
  // Body
  ctx.fillStyle = '#5a5';
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#383'; ctx.lineWidth = 2; ctx.stroke();
  // Snout
  ctx.fillStyle = '#6b6';
  ctx.beginPath(); ctx.ellipse(p.x, p.y + 3, p.r * 0.5, p.r * 0.35, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#484';
  ctx.beginPath(); ctx.arc(p.x - 3, p.y + 3, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.x + 3, p.y + 3, 2, 0, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(p.x - 5, p.y - 5, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.x + 5, p.y - 5, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(p.x - 4, p.y - 5, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.x + 6, p.y - 5, 2.5, 0, Math.PI * 2); ctx.fill();
  // Damage
  if (p.hp < p.maxHp) {
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(p.x - 3, p.y - p.r + 2); ctx.lineTo(p.x, p.y - 2); ctx.lineTo(p.x + 2, p.y - p.r + 5); ctx.stroke();
  }
  ctx.restore();
}

function drawBlock(b) {
  ctx.save();
  const alpha = b.hp / b.maxHp;
  ctx.globalAlpha = 0.5 + alpha * 0.5;
  ctx.fillStyle = b.color;
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
  ctx.strokeRect(b.x, b.y, b.w, b.h);
  // Cracks
  if (b.hp < b.maxHp) {
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(b.x + b.w * 0.3, b.y); ctx.lineTo(b.x + b.w * 0.5, b.y + b.h * 0.6);
    ctx.lineTo(b.x + b.w * 0.7, b.y + b.h); ctx.stroke();
  }
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawWaitingBirds() {
  birds.forEach((b, i) => {
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.radius * 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  });
}

function showMessage(text) {
  const el = document.getElementById('message');
  el.textContent = text; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawSlingshot();
  drawTrajectory();
  blocks.forEach(drawBlock);
  pigs.forEach(drawPig);
  drawWaitingBirds();
  if (activeBird) drawBird(activeBird);
  drawParticles();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function resetGame() {
  score = 0; particles = []; gameState = 'aiming'; settleTimer = 0;
  document.getElementById('message').style.display = 'none';
  initBlocks(); initPigs(); initBirds();
}

resetGame();
loop();
</script>
</body>
</html>
