<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Birds - GLM-5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #87CEEB; overflow: hidden; font-family: 'Comic Sans MS', cursive, sans-serif; }
canvas { display: block; }
#ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
#score { font-size: 28px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-weight: bold; }
#birds-left { font-size: 18px; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); margin-top: 4px; }
#reset-btn { position: absolute; top: 10px; right: 10px; z-index: 10; padding: 10px 20px; font-size: 18px; background: #e74c3c; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
#reset-btn:hover { background: #c0392b; }
#message { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 48px; color: #fff; text-shadow: 3px 3px 6px rgba(0,0,0,0.6); z-index: 20; display: none; pointer-events: none; }
</style>
</head>
<body>
<div id="ui">
  <div id="score">Score: 0</div>
  <div id="birds-left">Birds: 3</div>
</div>
<button id="reset-btn" onclick="resetGame()">↻ Reset</button>
<div id="message"></div>
<canvas id="game"></canvas>
<script>
const { Engine, Render, Runner, Bodies, Body, Composite, Constraint, Events, Mouse, Vector, Query } = Matter;

const W = window.innerWidth, H = window.innerHeight;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

let engine, runner, world;
let slingX = 160, slingY = H - 170;
let bird, slingConstraint;
let birds = [], pigs = [], blocks = [];
let score = 0, birdsLeft = 3, birdIndex = 0;
let dragging = false, launched = false, canLaunch = true;
let trajectoryPoints = [];
let gameOver = false;
let particles = [];
let cloudPositions = [];

// Generate clouds
for (let i = 0; i < 6; i++) {
  cloudPositions.push({ x: Math.random() * W, y: 30 + Math.random() * 100, s: 0.6 + Math.random() * 0.8 });
}

function init() {
  engine = Engine.create({ gravity: { x: 0, y: 1.2 } });
  world = engine.world;
  runner = Runner.create();

  // Ground
  const ground = Bodies.rectangle(W / 2, H - 30, W, 60, { isStatic: true, friction: 0.8, render: { fillStyle: '#4a7c2e' } });
  ground.label = 'ground';
  Composite.add(world, ground);

  // Left wall (invisible)
  Composite.add(world, Bodies.rectangle(-10, H/2, 20, H, { isStatic: true }));
  // Right wall
  Composite.add(world, Bodies.rectangle(W+10, H/2, 20, H, { isStatic: true }));

  createStructure();
  createBird();

  Events.on(engine, 'collisionStart', handleCollision);
  Runner.run(runner, engine);
  requestAnimationFrame(gameLoop);
}

function createBird() {
  if (birdIndex >= birdsLeft) { canLaunch = false; return; }
  bird = Bodies.circle(slingX, slingY, 18, { density: 0.004, friction: 0.5, restitution: 0.4 });
  bird.label = 'bird';
  bird.collisionFilter = { group: -1 };
  Composite.add(world, bird);

  slingConstraint = Constraint.create({
    pointA: { x: slingX, y: slingY },
    bodyB: bird,
    stiffness: 0.05,
    damping: 0.01,
    length: 0
  });
  Composite.add(world, slingConstraint);
  launched = false;
  canLaunch = true;
}

function createStructure() {
  const baseX = W * 0.65, baseY = H - 60;
  const bw = 30, bh = 80;

  const blockDefs = [
    // Bottom row - vertical pillars
    { x: baseX - 60, y: baseY - bh/2, w: bw, h: bh, type: 'wood' },
    { x: baseX + 60, y: baseY - bh/2, w: bw, h: bh, type: 'wood' },
    // Horizontal plank
    { x: baseX, y: baseY - bh - 10, w: 160, h: 18, type: 'wood' },
    // Second level pillars
    { x: baseX - 40, y: baseY - bh - 10 - bh/2 - 5, w: bw, h: bh * 0.7, type: 'stone' },
    { x: baseX + 40, y: baseY - bh - 10 - bh/2 - 5, w: bw, h: bh * 0.7, type: 'stone' },
    // Top plank
    { x: baseX, y: baseY - bh - 10 - bh * 0.7 - 15, w: 120, h: 18, type: 'wood' },
    // Top small block
    { x: baseX, y: baseY - bh - 10 - bh * 0.7 - 15 - 25, w: 40, h: 30, type: 'glass' },
    // Extra side tower
    { x: baseX + 150, y: baseY - bh/2, w: bw, h: bh, type: 'wood' },
    { x: baseX + 150, y: baseY - bh - 20, w: 50, h: 18, type: 'wood' },
  ];

  blockDefs.forEach(def => {
    const density = def.type === 'stone' ? 0.006 : def.type === 'glass' ? 0.002 : 0.003;
    const b = Bodies.rectangle(def.x, def.y, def.w, def.h, {
      density, friction: 0.6, restitution: 0.1,
      chamfer: { radius: 2 }
    });
    b.label = 'block';
    b.blockType = def.type;
    b.hp = def.type === 'stone' ? 3 : def.type === 'glass' ? 1 : 2;
    b.maxHp = b.hp;
    b.bw = def.w; b.bh = def.h;
    blocks.push(b);
    Composite.add(world, b);
  });

  // Pigs
  const pigDefs = [
    { x: baseX, y: baseY - 25, r: 22 },
    { x: baseX, y: baseY - bh - 10 - bh * 0.7 - 15 - 25 - 30, r: 18 },
    { x: baseX + 150, y: baseY - bh - 20 - 22, r: 18 },
  ];

  pigDefs.forEach(def => {
    const p = Bodies.circle(def.x, def.y, def.r, { density: 0.002, friction: 0.3, restitution: 0.2 });
    p.label = 'pig';
    p.pigR = def.r;
    p.hp = 2;
    p.hurt = false;
    pigs.push(p);
    Composite.add(world, p);
  });
}

function handleCollision(event) {
  event.pairs.forEach(pair => {
    const { bodyA, bodyB } = pair;
    const speed = Vector.magnitude(Vector.sub(bodyA.velocity, bodyB.velocity));

    [bodyA, bodyB].forEach(body => {
      if (body.label === 'block' && speed > 3) {
        body.hp -= 1;
        if (body.hp <= 0) {
          spawnParticles(body.position.x, body.position.y, body.blockType, 8);
          Composite.remove(world, body);
          blocks = blocks.filter(b => b !== body);
          score += body.blockType === 'stone' ? 300 : body.blockType === 'glass' ? 100 : 200;
        } else {
          spawnParticles(body.position.x, body.position.y, body.blockType, 3);
          score += 50;
        }
      }
      if (body.label === 'pig' && speed > 2) {
        body.hp -= 1;
        body.hurt = true;
        if (body.hp <= 0) {
          spawnParticles(body.position.x, body.position.y, 'pig', 10);
          Composite.remove(world, body);
          pigs = pigs.filter(p => p !== body);
          score += 500;
        } else {
          score += 100;
        }
      }
    });
    updateUI();
  });
}

function spawnParticles(x, y, type, count) {
  const colors = { wood: ['#8B6914', '#A0782C', '#6B4F1A'], stone: ['#888', '#aaa', '#666'], glass: ['#aef', '#8df', '#cff'], pig: ['#5a5', '#4b4', '#6c6'] };
  const c = colors[type] || ['#ccc'];
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: -Math.random() * 6 - 2,
      r: 2 + Math.random() * 4,
      color: c[Math.floor(Math.random() * c.length)],
      life: 1
    });
  }
}

function updateUI() {
  document.getElementById('score').textContent = `Score: ${score}`;
  document.getElementById('birds-left').textContent = `Birds: ${birdsLeft - birdIndex}`;
}

// Input handling
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousedown', e => {
  if (!canLaunch || launched || gameOver) return;
  const dx = e.clientX - bird.position.x, dy = e.clientY - bird.position.y;
  if (Math.sqrt(dx*dx + dy*dy) < 40) dragging = true;
});

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (dragging && bird) {
    const dx = e.clientX - slingX, dy = e.clientY - slingY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxDist = 100;
    if (dist > maxDist) {
      Body.setPosition(bird, { x: slingX + dx/dist*maxDist, y: slingY + dy/dist*maxDist });
    } else {
      Body.setPosition(bird, { x: e.clientX, y: e.clientY });
    }
    Body.setVelocity(bird, { x: 0, y: 0 });
    computeTrajectory();
  }
});

canvas.addEventListener('mouseup', () => {
  if (dragging && bird) {
    dragging = false;
    const dx = bird.position.x - slingX, dy = bird.position.y - slingY;
    if (Math.sqrt(dx*dx+dy*dy) < 15) return; // too small
    Composite.remove(world, slingConstraint);
    bird.collisionFilter = {};
    const power = 0.065;
    Body.setVelocity(bird, { x: -dx * power * 3, y: -dy * power * 3 });
    launched = true;
    birdIndex++;
    trajectoryPoints = [];
    setTimeout(() => {
      if (pigs.length === 0) return showMessage('🎉 You Win!');
      if (birdIndex >= birdsLeft) {
        if (pigs.length > 0) showMessage('💀 Game Over');
      } else {
        createBird();
      }
    }, 3000);
  }
});

// Touch support
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); }, { passive: false });

function computeTrajectory() {
  trajectoryPoints = [];
  const dx = bird.position.x - slingX, dy = bird.position.y - slingY;
  const power = 0.065;
  let vx = -dx * power * 3, vy = -dy * power * 3;
  let px = slingX, py = slingY;
  const g = engine.gravity.y * 0.001 * 60;
  for (let i = 0; i < 40; i++) {
    px += vx; py += vy; vy += g;
    if (py > H - 60) break;
    if (i % 2 === 0) trajectoryPoints.push({ x: px, y: py });
  }
}

function showMessage(text) {
  gameOver = true;
  const el = document.getElementById('message');
  el.textContent = text;
  el.style.display = 'block';
}

function drawSlingshot(ctx) {
  // Back band
  ctx.strokeStyle = '#3d2b1f';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(slingX + 12, slingY - 8);
  if (bird && !launched) {
    ctx.lineTo(bird.position.x, bird.position.y);
  }
  ctx.stroke();

  // Sling fork
  ctx.fillStyle = '#5c3a1e';
  ctx.fillRect(slingX - 8, slingY - 5, 16, 90);
  // Left prong
  ctx.beginPath();
  ctx.moveTo(slingX - 8, slingY); ctx.lineTo(slingX - 18, slingY - 30); ctx.lineTo(slingX - 8, slingY - 25);
  ctx.fill();
  // Right prong
  ctx.beginPath();
  ctx.moveTo(slingX + 8, slingY); ctx.lineTo(slingX + 18, slingY - 30); ctx.lineTo(slingX + 8, slingY - 25);
  ctx.fill();

  // Front band
  ctx.strokeStyle = '#3d2b1f';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(slingX - 12, slingY - 8);
  if (bird && !launched) {
    ctx.lineTo(bird.position.x, bird.position.y);
  }
  ctx.stroke();
}

function drawBird(ctx, b) {
  const x = b.position.x, y = b.position.y;
  ctx.save(); ctx.translate(x, y); ctx.rotate(b.angle);
  // Body
  const g = ctx.createRadialGradient(-3, -3, 2, 0, 0, 18);
  g.addColorStop(0, '#ff4444'); g.addColorStop(1, '#cc0000');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#990000'; ctx.lineWidth = 2; ctx.stroke();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-6, -4, 6, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -4, 6, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-5, -3, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -3, 3, 0, Math.PI*2); ctx.fill();
  // Eyebrows
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-12, -10); ctx.lineTo(-3, -8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12, -10); ctx.lineTo(3, -8); ctx.stroke();
  // Beak
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(-5, 8); ctx.lineTo(5, 8); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawPig(ctx, p) {
  const x = p.position.x, y = p.position.y, r = p.pigR;
  ctx.save(); ctx.translate(x, y); ctx.rotate(p.angle);
  // Body
  const g = ctx.createRadialGradient(-2, -2, 2, 0, 0, r);
  g.addColorStop(0, '#6abf4b'); g.addColorStop(1, '#3d8b2a');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#2d6b1a'; ctx.lineWidth = 2; ctx.stroke();
  // Snout
  ctx.fillStyle = '#4d9f3b';
  ctx.beginPath(); ctx.ellipse(0, 4, r*0.45, r*0.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2d6b1a';
  ctx.beginPath(); ctx.arc(-3, 4, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, 4, 2, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r*0.3, -r*0.2, r*0.22, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.3, -r*0.2, r*0.22, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  const ex = p.hurt ? 0 : 0;
  ctx.beginPath(); ctx.arc(-r*0.3+ex, -r*0.2, r*0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.3+ex, -r*0.2, r*0.1, 0, Math.PI*2); ctx.fill();
  if (p.hurt) {
    // X eyes
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    [-1,1].forEach(s => {
      const cx = s * r * 0.3, cy = -r*0.2;
      ctx.beginPath(); ctx.moveTo(cx-3, cy-3); ctx.lineTo(cx+3, cy+3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+3, cy-3); ctx.lineTo(cx-3, cy+3); ctx.stroke();
    });
  }
  ctx.restore();
}

function drawBlock(ctx, b) {
  const x = b.position.x, y = b.position.y;
  ctx.save(); ctx.translate(x, y); ctx.rotate(b.angle);
  const hw = b.bw/2, hh = b.bh/2;
  const colors = { wood: ['#C4923A', '#A0782C'], stone: ['#999', '#777'], glass: ['rgba(180,230,255,0.7)', 'rgba(140,200,240,0.6)'] };
  const [fill, stroke] = colors[b.blockType] || colors.wood;
  ctx.fillStyle = fill;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, b.bw, b.bh, 3);
  ctx.fill(); ctx.stroke();
  // Damage cracks
  if (b.hp < b.maxHp) {
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-hw*0.5, -hh*0.3); ctx.lineTo(0, hh*0.2); ctx.lineTo(hw*0.3, -hh*0.1);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBackground(ctx) {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#4A90D9'); skyGrad.addColorStop(0.6, '#87CEEB'); skyGrad.addColorStop(1, '#B0E0E6');
  ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  cloudPositions.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, 30*c.s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x+25*c.s, c.y+5, 22*c.s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x-20*c.s, c.y+5, 25*c.s, 0, Math.PI*2); ctx.fill();
    c.x += 0.15;
    if (c.x > W + 60) c.x = -60;
  });

  // Hills
  ctx.fillStyle = '#5a9e3e';
  ctx.beginPath(); ctx.moveTo(0, H-60);
  for (let x = 0; x <= W; x += 80) ctx.quadraticCurveTo(x+40, H-100-Math.sin(x*0.01)*30, x+80, H-60);
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

  // Ground
  const gGrad = ctx.createLinearGradient(0, H-60, 0, H);
  gGrad.addColorStop(0, '#4a7c2e'); gGrad.addColorStop(0.3, '#3d6b25'); gGrad.addColorStop(1, '#2d5a1a');
  ctx.fillStyle = gGrad; ctx.fillRect(0, H-60, W, 60);

  // Grass blades
  ctx.strokeStyle = '#5a9e3e'; ctx.lineWidth = 2;
  for (let x = 0; x < W; x += 15) {
    ctx.beginPath(); ctx.moveTo(x, H-60); ctx.lineTo(x + 3, H-68 - Math.random()*5); ctx.stroke();
  }
}

function gameLoop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground(ctx);

  // Trajectory dots
  if (dragging && trajectoryPoints.length) {
    trajectoryPoints.forEach((p, i) => {
      ctx.globalAlpha = 1 - i / trajectoryPoints.length;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // Draw sling back
  drawSlingshot(ctx);

  // Blocks
  blocks.forEach(b => drawBlock(ctx, b));

  // Pigs
  pigs.forEach(p => drawPig(ctx, p));

  // Bird
  if (bird && Composite.get(world, bird.id, 'body')) drawBird(ctx, bird);

  // Waiting birds
  for (let i = birdIndex + 1; i < birdsLeft; i++) {
    const bx = 60 - (i - birdIndex - 1) * 35, by = H - 75;
    ctx.save(); ctx.translate(bx, by);
    const g = ctx.createRadialGradient(-2, -2, 1, 0, 0, 14);
    g.addColorStop(0, '#ff4444'); g.addColorStop(1, '#cc0000');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02;
    if (p.life <= 0) return false;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.r/2, p.y - p.r/2, p.r, p.r);
    ctx.globalAlpha = 1;
    return true;
  });

  // Check win/loss
  if (!gameOver && pigs.length === 0) showMessage('🎉 You Win!');

  requestAnimationFrame(gameLoop);
}

function resetGame() {
  if (runner) Runner.stop(runner);
  if (engine) Engine.clear(engine);
  birds = []; pigs = []; blocks = []; particles = [];
  score = 0; birdIndex = 0; birdsLeft = 3;
  dragging = false; launched = false; canLaunch = true; gameOver = false;
  trajectoryPoints = [];
  document.getElementById('message').style.display = 'none';
  updateUI();
  init();
}

init();
</script>
</body>
</html>
