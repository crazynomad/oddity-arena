<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Challenge 03 - 愤怒的小鸟</title>
  <style>
    :root{
      --bg1:#bde8ff;
      --bg2:#e9f8ff;
      --ground:#8bc34a;
      --wood:#c98a3d;
      --wood-dark:#8a5a28;
      --ui:#1f2937;
      --ui-soft:#ffffffcc;
      --accent:#ef4444;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 20% 20%, #ffffff55 0 18%, transparent 19%),
        radial-gradient(circle at 80% 15%, #ffffff66 0 13%, transparent 14%),
        linear-gradient(180deg, #8fd5ff 0%, #e6fbff 70%, #d4f1c5 100%);
      font-family:"Trebuchet MS","Segoe UI",sans-serif;
      color:var(--ui);
    }
    .wrap{
      width:min(100vw,1000px);
      padding:12px;
    }
    .hud{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:8px;
    }
    .stats{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      background:var(--ui-soft);
      border:1px solid #ffffff80;
      border-radius:999px;
      padding:8px 12px;
      font-weight:700;
      box-shadow:0 4px 14px #00000010;
    }
    button{
      border:0;
      background:linear-gradient(180deg,#22c55e,#16a34a);
      color:white;
      font-weight:800;
      border-radius:10px;
      padding:9px 14px;
      cursor:pointer;
      box-shadow:0 5px 14px #00000022;
    }
    button:hover{filter:brightness(1.05)}
    canvas{
      width:100%;
      height:auto;
      display:block;
      border-radius:16px;
      border:2px solid #ffffffaa;
      box-shadow:0 14px 40px #00000022;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      touch-action:none;
      user-select:none;
    }
    .hint{
      margin-top:8px;
      font-size:14px;
      color:#0f172a;
      opacity:.9;
      font-weight:600;
      text-shadow:0 1px 0 #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div class="stats">
        <div class="chip" id="score">分数: 0</div>
        <div class="chip" id="left">剩余方块: 0</div>
        <div class="chip" id="state">拖拽小鸟瞄准并发射</div>
      </div>
      <button id="resetBtn">重置关卡 (R)</button>
    </div>
    <canvas id="game" width="960" height="540"></canvas>
    <div class="hint">操作: 鼠标/触摸拖拽弹弓拉弦，松开发射。击碎全部木块即可过关。</div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const leftEl = document.getElementById("left");
      const stateEl = document.getElementById("state");
      const resetBtn = document.getElementById("resetBtn");

      const W = canvas.width, H = canvas.height;
      const groundY = 485;
      const gravity = 920;
      const sling = { x: 180, y: 365, maxPull: 105 };
      const birdMass = 1;
      const launchMul = 5.2;

      let score = 0;
      let blocks = [];
      let particles = [];
      let dragging = false;
      let mouse = { x: 0, y: 0, down: false };
      let lastTime = performance.now();
      let acc = 0;
      const step = 1 / 120;

      const bird = {
        x: sling.x,
        y: sling.y,
        vx: 0,
        vy: 0,
        r: 15,
        launched: false,
        sleeping: 0
      };

      function makeLevel() {
        blocks = [];
        const baseX = 710;
        const baseY = groundY - 14;
        const bw = 56, bh = 26;
        let rows = 5;
        for (let r = 0; r < rows; r++) {
          const count = rows - r;
          const y = baseY - r * (bh + 4);
          for (let i = 0; i < count; i++) {
            const x = baseX + (i - (count - 1) / 2) * (bw + 4);
            blocks.push({
              x, y,
              w: bw,
              h: bh,
              vx: 0,
              vy: 0,
              mass: 2.2,
              hp: 100,
              maxHp: 100,
              dead: false
            });
          }
        }
        blocks.push({ x: baseX, y: baseY - rows * (bh + 4) - 12, w: 26, h: 60, vx: 0, vy: 0, mass: 2.6, hp: 120, maxHp: 120, dead: false });
      }

      function resetGame() {
        score = 0;
        particles.length = 0;
        makeLevel();
        resetBird();
        updateHud();
      }

      function resetBird() {
        bird.x = sling.x;
        bird.y = sling.y;
        bird.vx = 0;
        bird.vy = 0;
        bird.launched = false;
        bird.sleeping = 0;
        dragging = false;
      }

      function updateHud() {
        const left = blocks.filter(b => !b.dead).length;
        scoreEl.textContent = `分数: ${Math.max(0, Math.floor(score))}`;
        leftEl.textContent = `剩余方块: ${left}`;
        if (left === 0) stateEl.textContent = "通关! 按 R 再来一局";
        else if (!bird.launched && !dragging) stateEl.textContent = "拖拽小鸟瞄准并发射";
        else if (dragging) stateEl.textContent = "松开发射";
        else stateEl.textContent = "撞击木块造成破坏";
      }

      function toCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (W / rect.width);
        const y = (e.clientY - rect.top) * (H / rect.height);
        return { x, y };
      }

      function clampPull(px, py) {
        let dx = px - sling.x, dy = py - sling.y;
        const d = Math.hypot(dx, dy);
        if (d > sling.maxPull) {
          const k = sling.maxPull / d;
          dx *= k; dy *= k;
        }
        return { x: sling.x + dx, y: sling.y + dy };
      }

      canvas.addEventListener("pointerdown", (e) => {
        const p = toCanvasPos(e);
        mouse = { ...p, down: true };
        const d = Math.hypot(p.x - bird.x, p.y - bird.y);
        if (!bird.launched && d <= bird.r + 10) {
          dragging = true;
          canvas.setPointerCapture(e.pointerId);
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        const p = toCanvasPos(e);
        mouse.x = p.x; mouse.y = p.y;
        if (dragging && !bird.launched) {
          const c = clampPull(p.x, p.y);
          bird.x = c.x;
          bird.y = c.y;
        }
      });

      function releaseShot() {
        if (!dragging || bird.launched) return;
        dragging = false;
        const dx = sling.x - bird.x;
        const dy = sling.y - bird.y;
        const pull = Math.hypot(dx, dy);
        if (pull < 8) {
          resetBird();
          return;
        }
        bird.vx = dx * launchMul;
        bird.vy = dy * launchMul;
        bird.launched = true;
      }

      canvas.addEventListener("pointerup", releaseShot);
      canvas.addEventListener("pointercancel", releaseShot);

      resetBtn.addEventListener("click", resetGame);
      window.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "r") resetGame();
      });

      function spawnDebris(x, y, count = 16) {
        for (let i = 0; i < count; i++) {
          const a = Math.random() * Math.PI * 2;
          const s = 80 + Math.random() * 220;
          particles.push({
            x, y,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s - 40,
            life: 0.6 + Math.random() * 0.55,
            size: 3 + Math.random() * 4
          });
        }
      }

      function damageBlock(b, amount) {
        if (b.dead || amount <= 0) return;
        b.hp -= amount;
        if (b.hp <= 0) {
          b.dead = true;
          score += 120;
          spawnDebris(b.x, b.y, 18);
        }
      }

      function resolveRectRect(a, b) {
        if (a.dead || b.dead) return;
        const dx = b.x - a.x;
        const px = (a.w / 2 + b.w / 2) - Math.abs(dx);
        if (px <= 0) return;
        const dy = b.y - a.y;
        const py = (a.h / 2 + b.h / 2) - Math.abs(dy);
        if (py <= 0) return;

        let nx = 0, ny = 0, pen = 0;
        if (px < py) {
          nx = dx < 0 ? -1 : 1;
          pen = px;
        } else {
          ny = dy < 0 ? -1 : 1;
          pen = py;
        }

        const move = pen * 0.5;
        a.x -= nx * move; a.y -= ny * move;
        b.x += nx * move; b.y += ny * move;

        const rvx = b.vx - a.vx;
        const rvy = b.vy - a.vy;
        const vn = rvx * nx + rvy * ny;
        if (vn > 0) return;

        const e = 0.16;
        const j = -(1 + e) * vn / (1 / a.mass + 1 / b.mass);
        const ix = j * nx, iy = j * ny;
        a.vx -= ix / a.mass; a.vy -= iy / a.mass;
        b.vx += ix / b.mass; b.vy += iy / b.mass;

        const hit = Math.abs(j);
        if (hit > 65) {
          damageBlock(a, (hit - 60) * 0.22);
          damageBlock(b, (hit - 60) * 0.22);
          score += Math.min(8, hit * 0.03);
        }
      }

      function resolveBirdRect(b) {
        if (b.dead) return;
        const left = b.x - b.w / 2, right = b.x + b.w / 2;
        const top = b.y - b.h / 2, bottom = b.y + b.h / 2;
        const cx = Math.max(left, Math.min(bird.x, right));
        const cy = Math.max(top, Math.min(bird.y, bottom));
        let dx = bird.x - cx, dy = bird.y - cy;
        let dist = Math.hypot(dx, dy);

        if (dist >= bird.r) return;
        let nx = 0, ny = 0;
        if (dist === 0) {
          const ox = bird.x - b.x, oy = bird.y - b.y;
          if (Math.abs(ox) > Math.abs(oy)) nx = ox < 0 ? -1 : 1;
          else ny = oy < 0 ? -1 : 1;
          dist = 0.001;
        } else {
          nx = dx / dist; ny = dy / dist;
        }

        const pen = bird.r - dist;
        bird.x += nx * pen;
        bird.y += ny * pen;

        const rvx = bird.vx - b.vx;
        const rvy = bird.vy - b.vy;
        const vn = rvx * nx + rvy * ny;
        if (vn > 0) return;

        const e = 0.28;
        const j = -(1 + e) * vn / (1 / birdMass + 1 / b.mass);
        bird.vx += (j * nx) / birdMass;
        bird.vy += (j * ny) / birdMass;
        b.vx -= (j * nx) / b.mass;
        b.vy -= (j * ny) / b.mass;

        const hit = Math.abs(j);
        if (hit > 34) {
          damageBlock(b, (hit - 30) * 0.8);
          score += Math.min(25, (hit - 28) * 0.22);
          if (hit > 90) spawnDebris(cx, cy, 6);
        }
      }

      function integrateBird(dt) {
        if (!bird.launched) return;
        bird.vy += gravity * dt;
        bird.x += bird.vx * dt;
        bird.y += bird.vy * dt;

        if (bird.y + bird.r > groundY) {
          bird.y = groundY - bird.r;
          if (Math.abs(bird.vy) > 35) bird.vy *= -0.27;
          else bird.vy = 0;
          bird.vx *= 0.985;
        }
        if (bird.x - bird.r < 0) {
          bird.x = bird.r;
          bird.vx *= -0.33;
        }
        if (bird.x + bird.r > W) {
          bird.x = W - bird.r;
          bird.vx *= -0.33;
        }

        const speed = Math.hypot(bird.vx, bird.vy);
        if (speed < 18 && bird.y > groundY - bird.r - 1) bird.sleeping += dt;
        else bird.sleeping = 0;

        if (bird.sleeping > 1.3 && blocks.some(b => !b.dead)) {
          stateEl.textContent = "本回合结束，按 R 重置";
        }
      }

      function integrateBlocks(dt) {
        for (const b of blocks) {
          if (b.dead) continue;
          b.vy += gravity * dt;
          b.x += b.vx * dt;
          b.y += b.vy * dt;

          if (b.y + b.h / 2 > groundY) {
            b.y = groundY - b.h / 2;
            if (Math.abs(b.vy) > 38) b.vy *= -0.12;
            else b.vy = 0;
            b.vx *= 0.972;
          }
          if (b.x - b.w / 2 < 360) {
            b.x = 360 + b.w / 2;
            b.vx *= -0.08;
          }
          if (b.x + b.w / 2 > W - 10) {
            b.x = W - 10 - b.w / 2;
            b.vx *= -0.08;
          }
        }

        for (let i = 0; i < blocks.length; i++) {
          for (let j = i + 1; j < blocks.length; j++) {
            resolveRectRect(blocks[i], blocks[j]);
          }
        }

        if (bird.launched) {
          for (const b of blocks) resolveBirdRect(b);
        }

        for (const b of blocks) {
          if (!b.dead && b.hp < b.maxHp) {
            b.hp += 1.8 * dt;
            if (b.hp > b.maxHp) b.hp = b.maxHp;
          }
        }

        blocks = blocks.filter(b => !(b.dead && Math.random() < 0.02));
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.life -= dt;
          if (p.life <= 0) {
            particles.splice(i, 1);
            continue;
          }
          p.vy += gravity * 0.6 * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          if (p.y > groundY) {
            p.y = groundY;
            p.vy *= -0.2;
            p.vx *= 0.6;
          }
        }
      }

      function physics(dt) {
        integrateBird(dt);
        integrateBlocks(dt);
        updateParticles(dt);
      }

      function drawBackground() {
        ctx.clearRect(0, 0, W, H);

        const g = ctx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, "#a7e1ff");
        g.addColorStop(0.72, "#e5f8ff");
        g.addColorStop(1, "#d8efc9");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = "#8ecf68";
        ctx.beginPath();
        ctx.ellipse(220, 460, 190, 90, 0, 0, Math.PI * 2);
        ctx.ellipse(470, 470, 240, 80, 0, 0, Math.PI * 2);
        ctx.ellipse(770, 455, 220, 95, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#7fb853";
        ctx.fillRect(0, groundY, W, H - groundY);
      }

      function drawSlingBack() {
        ctx.strokeStyle = "#6b3f1a";
        ctx.lineWidth = 13;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sling.x - 16, groundY);
        ctx.lineTo(sling.x - 16, sling.y + 10);
        ctx.lineTo(sling.x - 6, sling.y - 32);
        ctx.stroke();

        if (!bird.launched || dragging) {
          ctx.strokeStyle = "#4b2e14";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(sling.x - 6, sling.y - 24);
          ctx.lineTo(bird.x - 2, bird.y);
          ctx.stroke();
        }
      }

      function drawSlingFront() {
        ctx.strokeStyle = "#6b3f1a";
        ctx.lineWidth = 13;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sling.x + 16, groundY);
        ctx.lineTo(sling.x + 16, sling.y + 10);
        ctx.lineTo(sling.x + 6, sling.y - 32);
        ctx.stroke();

        if (!bird.launched || dragging) {
          ctx.strokeStyle = "#4b2e14";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(sling.x + 6, sling.y - 24);
          ctx.lineTo(bird.x + 2, bird.y);
          ctx.stroke();
        }
      }

      function drawTrajectory() {
        if (!dragging || bird.launched) return;
        let x = bird.x, y = bird.y;
        let vx = (sling.x - bird.x) * launchMul;
        let vy = (sling.y - bird.y) * launchMul;

        ctx.fillStyle = "#ffffffcc";
        for (let t = 0; t < 1.6; t += 0.08) {
          x += vx * 0.08;
          vy += gravity * 0.08;
          y += vy * 0.08;
          if (y > groundY) break;
          const r = Math.max(2, 5 - t * 2.4);
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawBird() {
        ctx.fillStyle = "#d42828";
        ctx.beginPath();
        ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#2b1b14";
        ctx.beginPath();
        ctx.arc(bird.x + 5, bird.y - 2, 2.6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f7d34e";
        ctx.beginPath();
        ctx.moveTo(bird.x + 8, bird.y + 1);
        ctx.lineTo(bird.x + 19, bird.y + 5);
        ctx.lineTo(bird.x + 8, bird.y + 9);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "#7e1010";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(bird.x - 2, bird.y - 10, 5, Math.PI * 1.05, Math.PI * 1.85);
        ctx.stroke();
      }

      function drawBlocks() {
        for (const b of blocks) {
          if (b.dead) continue;
          const hpRatio = Math.max(0, b.hp / b.maxHp);
          const c = 160 + Math.floor(70 * hpRatio);

          ctx.fillStyle = `rgb(${c},${120 + Math.floor(40 * hpRatio)},${50})`;
          ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);

          ctx.strokeStyle = "#7a4b23";
          ctx.lineWidth = 2;
          ctx.strokeRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);

          ctx.strokeStyle = "#ffffff66";
          ctx.beginPath();
          ctx.moveTo(b.x - b.w / 2 + 5, b.y - b.h / 2 + 6);
          ctx.lineTo(b.x + b.w / 2 - 5, b.y - b.h / 2 + 6);
          ctx.stroke();

          if (hpRatio < 0.8) {
            ctx.strokeStyle = "#4b2a12aa";
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.moveTo(b.x - b.w * 0.2, b.y - b.h * 0.3);
            ctx.lineTo(b.x + b.w * 0.25, b.y + b.h * 0.34);
            ctx.moveTo(b.x - b.w * 0.3, b.y + b.h * 0.1);
            ctx.lineTo(b.x + b.w * 0.1, b.y - b.h * 0.25);
            ctx.stroke();
          }
        }
      }

      function drawParticles() {
        for (const p of particles) {
          const alpha = Math.max(0, Math.min(1, p.life * 1.3));
          ctx.fillStyle = `rgba(201,138,61,${alpha})`;
          ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
      }

      function render() {
        drawBackground();
        drawSlingBack();
        drawTrajectory();
        drawBlocks();
        drawBird();
        drawSlingFront();
        drawParticles();
      }

      function frame(now) {
        const dt = Math.min(0.033, (now - lastTime) / 1000);
        lastTime = now;
        acc += dt;
        while (acc >= step) {
          physics(step);
          acc -= step;
        }
        updateHud();
        render();
        requestAnimationFrame(frame);
      }

      resetGame();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
