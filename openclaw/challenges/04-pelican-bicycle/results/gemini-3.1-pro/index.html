<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelican on a Bicycle</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; font-family: sans-serif; }
        svg { max-width: 100%; max-height: 100vh; box-shadow: 0 10px 40px rgba(0,0,0,0.5); background-color: #87CEEB; border-radius: 12px; }
    </style>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
        <!-- Background Ground -->
        <path d="M0 450 H800 V600 H0 Z" fill="#8B4513" />
        <path d="M0 470 H800 V600 H0 Z" fill="#A0522D" />
        
        <!-- Scenery: Sun and Clouds -->
        <circle cx="100" cy="100" r="50" fill="#FFD700" />
        <path d="M150 150 Q180 120 220 140 Q260 110 300 140 Q340 130 360 160 Q380 190 340 200 H170 Q130 190 150 150" fill="#ffffff" opacity="0.9" />
        <path d="M550 100 Q580 70 620 90 Q660 60 700 90 Q740 80 760 110 Q780 140 740 150 H570 Q530 140 550 100" fill="#ffffff" opacity="0.9" />

        <!-- SPEED LINES (Background) -->
        <line x1="200" y1="360" x2="100" y2="360" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.4" />
        <line x1="150" y1="410" x2="80" y2="410" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.4" />

        <!-- BICYCLE BACK WHEEL -->
        <g id="back-wheel">
            <circle cx="220" cy="400" r="70" fill="none" stroke="#222" stroke-width="14" />
            <circle cx="220" cy="400" r="63" fill="none" stroke="#e0e0e0" stroke-width="2" />
            <!-- Spokes -->
            <line x1="220" y1="330" x2="220" y2="470" stroke="#aaa" stroke-width="2" />
            <line x1="150" y1="400" x2="290" y2="400" stroke="#aaa" stroke-width="2" />
            <line x1="171" y1="351" x2="269" y2="449" stroke="#aaa" stroke-width="2" />
            <line x1="171" y1="449" x2="269" y2="351" stroke="#aaa" stroke-width="2" />
            <line x1="195" y1="334" x2="245" y2="466" stroke="#aaa" stroke-width="2" />
            <line x1="195" y1="466" x2="245" y2="334" stroke="#aaa" stroke-width="2" />
            <circle cx="220" cy="400" r="12" fill="#444" />
        </g>

        <!-- BICYCLE FRONT WHEEL -->
        <g id="front-wheel">
            <circle cx="580" cy="400" r="70" fill="none" stroke="#222" stroke-width="14" />
            <circle cx="580" cy="400" r="63" fill="none" stroke="#e0e0e0" stroke-width="2" />
            <!-- Spokes -->
            <line x1="580" y1="330" x2="580" y2="470" stroke="#aaa" stroke-width="2" />
            <line x1="510" y1="400" x2="650" y2="400" stroke="#aaa" stroke-width="2" />
            <line x1="531" y1="351" x2="629" y2="449" stroke="#aaa" stroke-width="2" />
            <line x1="531" y1="449" x2="629" y2="351" stroke="#aaa" stroke-width="2" />
            <line x1="555" y1="334" x2="605" y2="466" stroke="#aaa" stroke-width="2" />
            <line x1="555" y1="466" x2="605" y2="334" stroke="#aaa" stroke-width="2" />
            <circle cx="580" cy="400" r="12" fill="#444" />
        </g>

        <!-- BICYCLE FRAME (Red) -->
        <!-- Chainstay -->
        <line x1="220" y1="400" x2="400" y2="400" stroke="#E63946" stroke-width="10" stroke-linecap="round" />
        <!-- Seatstay -->
        <line x1="220" y1="400" x2="330" y2="280" stroke="#E63946" stroke-width="10" stroke-linecap="round" />
        <!-- Seat tube -->
        <line x1="330" y1="280" x2="400" y2="400" stroke="#E63946" stroke-width="12" stroke-linecap="round" />
        <!-- Down tube -->
        <line x1="400" y1="400" x2="530" y2="280" stroke="#E63946" stroke-width="12" stroke-linecap="round" />
        <!-- Top tube -->
        <line x1="330" y1="280" x2="530" y2="280" stroke="#E63946" stroke-width="10" stroke-linecap="round" />
        <!-- Fork -->
        <line x1="580" y1="400" x2="510" y2="230" stroke="#E63946" stroke-width="10" stroke-linecap="round" />

        <!-- BACK PEDAL & CRANK (Right side, behind frame) -->
        <line x1="400" y1="400" x2="375" y2="355" stroke="#555" stroke-width="8" stroke-linecap="round" />
        <rect x="360" y="348" width="30" height="14" rx="4" fill="#222" />

        <!-- BICYCLE SEAT -->
        <!-- Seat post -->
        <line x1="330" y1="280" x2="310" y2="230" stroke="#ccc" stroke-width="8" stroke-linecap="round" />
        <!-- Saddle -->
        <path d="M280 230 Q310 215 340 230 Q360 240 330 245 H300 Z" fill="#111" />

        <!-- PELICAN (BACK LEG) -->
        <path d="M360 300 Q350 330 375 350 L380 350" fill="none" stroke="#FF8C00" stroke-width="12" stroke-linecap="round" />
        <path d="M370 350 L390 365 L375 350 L385 340" stroke="#FF8C00" stroke-width="6" stroke-linecap="round" />

        <!-- PELICAN BODY & WINGS -->
        <!-- Main Body -->
        <path d="M280 280 Q250 180 360 160 Q440 150 430 270 Q410 330 310 330 Q280 310 280 280 Z" fill="#FFFFFF" />
        <!-- Belly Shadow -->
        <path d="M280 280 Q250 180 360 160 Q440 150 430 270 Q410 330 310 330 Q280 310 280 280 Z" fill="none" stroke="#E0E0E0" stroke-width="4" />
        
        <!-- Tail Feathers -->
        <path d="M285 285 Q230 275 240 305 Q260 295 285 315 Z" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2" stroke-linejoin="round" />
        <path d="M285 275 Q240 260 245 285 Q260 280 280 295 Z" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2" stroke-linejoin="round" />
        
        <!-- NECK AND HEAD -->
        <!-- Neck stretching forward -->
        <path d="M390 190 Q430 110 470 120 Q500 130 430 220 Z" fill="#FFFFFF" />
        <path d="M390 190 Q430 110 470 120" fill="none" stroke="#E0E0E0" stroke-width="3" />
        <!-- Head -->
        <circle cx="480" cy="110" r="28" fill="#FFFFFF" />
        
        <!-- Eye -->
        <circle cx="490" cy="100" r="6" fill="#000" />
        <circle cx="492" cy="98" r="2" fill="#FFF" />
        
        <!-- Tuft of hair/feathers on head -->
        <path d="M465 90 Q445 70 450 60 Q465 75 475 85 Z" fill="#FFFFFF" />
        <path d="M475 85 Q460 60 475 50 Q485 70 485 85 Z" fill="#FFFFFF" />

        <!-- BEAK AND PELICAN POUCH -->
        <!-- Top Beak -->
        <path d="M500 100 Q600 110 650 130 Q580 125 505 115 Z" fill="#FFB703" stroke="#FB8500" stroke-width="2" />
        <!-- Pouch (Large, slightly filled with air/fish, sagging) -->
        <path d="M495 115 Q540 190 645 130 Q560 140 500 125 Z" fill="#FFD166" opacity="0.9" stroke="#FB8500" stroke-width="2" />

        <!-- PELICAN WING (Holding handlebars) -->
        <path d="M360 210 Q400 230 480 215 Q460 250 410 260 Q370 270 360 210 Z" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="4" stroke-linejoin="round" />
        <!-- Wing detail lines -->
        <path d="M390 235 Q430 245 460 230" fill="none" stroke="#DEE2E6" stroke-width="4" stroke-linecap="round" />
        <path d="M380 250 Q410 260 440 245" fill="none" stroke="#DEE2E6" stroke-width="4" stroke-linecap="round" />

        <!-- BICYCLE HANDLEBARS (Front layer) -->
        <line x1="510" y1="230" x2="490" y2="200" stroke="#ccc" stroke-width="10" stroke-linecap="round" />
        <path d="M490 200 Q510 180 540 200" fill="none" stroke="#222" stroke-width="12" stroke-linecap="round" />
        <path d="M480 200 Q460 180 490 200" fill="none" stroke="#222" stroke-width="12" stroke-linecap="round" /> <!-- Left grip -->

        <!-- CHAINRING & FRONT CRANK/PEDAL -->
        <circle cx="400" cy="400" r="28" fill="none" stroke="#666" stroke-width="6" />
        <circle cx="400" cy="400" r="15" fill="#444" />
        <!-- Front Crank -->
        <line x1="400" y1="400" x2="425" y2="445" stroke="#777" stroke-width="10" stroke-linecap="round" />
        <rect x="410" y="440" width="30" height="14" rx="4" fill="#222" />

        <!-- PELICAN (FRONT LEG) -->
        <path d="M375 310 Q410 370 425 440 L425 440" fill="none" stroke="#FF8C00" stroke-width="14" stroke-linecap="round" />
        <path d="M415 440 L435 455 L425 440 L440 435" stroke="#FF8C00" stroke-width="8" stroke-linecap="round" />

        <!-- FOREGROUND SPEED LINES / DIRT PARTICLES -->
        <line x1="250" y1="450" x2="180" y2="450" stroke="#FFF" stroke-width="3" stroke-linecap="round" opacity="0.6" />
        <line x1="120" y1="465" x2="50" y2="465" stroke="#FFF" stroke-width="3" stroke-linecap="round" opacity="0.6" />
        <line x1="600" y1="460" x2="520" y2="460" stroke="#FFF" stroke-width="3" stroke-linecap="round" opacity="0.6" />
        
        <circle cx="150" cy="440" r="3" fill="#8B4513" />
        <circle cx="130" cy="430" r="2" fill="#8B4513" />
        <circle cx="500" cy="445" r="4" fill="#8B4513" />
    </svg>
</body>
</html>
