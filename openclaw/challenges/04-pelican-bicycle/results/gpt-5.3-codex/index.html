<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge 04 - 鹈鹕骑自行车</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #eef7ff;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    svg {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="一只鹈鹕正在骑自行车">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#dff3ff"/>
        <stop offset="100%" stop-color="#f7fbff"/>
      </linearGradient>
      <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#b7e3a1"/>
        <stop offset="100%" stop-color="#8aca77"/>
      </linearGradient>
      <linearGradient id="beak" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ffbf4f"/>
        <stop offset="100%" stop-color="#f29a2e"/>
      </linearGradient>
      <radialGradient id="wheelShine" cx="50%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#5e6f84"/>
        <stop offset="100%" stop-color="#253241"/>
      </radialGradient>
      <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#29445f" flood-opacity="0.25"/>
      </filter>
    </defs>

    <rect width="900" height="560" fill="url(#sky)"/>
    <rect y="430" width="900" height="130" fill="url(#ground)"/>

    <g opacity="0.45" fill="#ffffff">
      <ellipse cx="170" cy="90" rx="58" ry="22"/>
      <ellipse cx="225" cy="95" rx="46" ry="18"/>
      <ellipse cx="680" cy="110" rx="62" ry="24"/>
      <ellipse cx="740" cy="102" rx="40" ry="16"/>
    </g>

    <g stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
      <g>
        <circle cx="260" cy="420" r="92" fill="none" stroke="url(#wheelShine)" stroke-width="14"/>
        <circle cx="540" cy="420" r="92" fill="none" stroke="url(#wheelShine)" stroke-width="14"/>
        <circle cx="260" cy="420" r="10" fill="#2d3a49"/>
        <circle cx="540" cy="420" r="10" fill="#2d3a49"/>

        <g stroke="#90a4b8" stroke-width="3" opacity="0.7">
          <line x1="260" y1="420" x2="260" y2="332"/>
          <line x1="260" y1="420" x2="320" y2="350"/>
          <line x1="260" y1="420" x2="350" y2="420"/>
          <line x1="260" y1="420" x2="320" y2="490"/>
          <line x1="260" y1="420" x2="260" y2="512"/>
          <line x1="260" y1="420" x2="200" y2="490"/>
          <line x1="260" y1="420" x2="170" y2="420"/>
          <line x1="260" y1="420" x2="200" y2="350"/>

          <line x1="540" y1="420" x2="540" y2="332"/>
          <line x1="540" y1="420" x2="600" y2="350"/>
          <line x1="540" y1="420" x2="630" y2="420"/>
          <line x1="540" y1="420" x2="600" y2="490"/>
          <line x1="540" y1="420" x2="540" y2="512"/>
          <line x1="540" y1="420" x2="480" y2="490"/>
          <line x1="540" y1="420" x2="450" y2="420"/>
          <line x1="540" y1="420" x2="480" y2="350"/>
        </g>
      </g>

      <g fill="none" stroke="#2f465e" stroke-width="10">
        <line x1="260" y1="420" x2="390" y2="312"/>
        <line x1="390" y1="312" x2="540" y2="420"/>
        <line x1="260" y1="420" x2="540" y2="420"/>
        <line x1="390" y1="312" x2="390" y2="420"/>
        <line x1="390" y1="312" x2="470" y2="312"/>
        <line x1="540" y1="420" x2="570" y2="332"/>
        <line x1="570" y1="332" x2="615" y2="332"/>
      </g>

      <rect x="370" y="292" width="56" height="12" rx="6" fill="#223444"/>
      <rect x="610" y="323" width="20" height="7" rx="3.5" fill="#223444"/>
      <rect x="596" y="319" width="16" height="7" rx="3.5" fill="#223444"/>

      <g>
        <circle cx="390" cy="420" r="22" fill="none" stroke="#223444" stroke-width="8"/>
        <line x1="390" y1="420" x2="430" y2="420" stroke="#223444" stroke-width="8"/>
        <line x1="390" y1="420" x2="355" y2="420" stroke="#223444" stroke-width="8"/>
        <rect x="430" y="414" width="28" height="12" rx="3" fill="#36556f"/>
        <rect x="327" y="414" width="28" height="12" rx="3" fill="#36556f"/>
      </g>

      <g>
        <ellipse cx="388" cy="258" rx="92" ry="66" fill="#f6f9fc" stroke="#6d7f90" stroke-width="4"/>
        <ellipse cx="340" cy="270" rx="36" ry="72" fill="#e7edf3" stroke="#6d7f90" stroke-width="4" transform="rotate(-20 340 270)"/>
        <path d="M345 218 C390 178, 435 176, 470 192 C440 210, 405 217, 345 218 Z" fill="#f6f9fc" stroke="#6d7f90" stroke-width="4"/>

        <path d="M410 205 C490 180, 585 186, 625 212 C580 234, 495 242, 412 232 Z" fill="url(#beak)" stroke="#8f5a16" stroke-width="4"/>
        <path d="M430 230 C504 236, 560 255, 585 280 C528 301, 457 296, 420 270 Z" fill="#f8d58a" stroke="#9d7b3a" stroke-width="4"/>

        <circle cx="385" cy="196" r="10" fill="#1f2a35"/>
        <circle cx="381" cy="192" r="3" fill="#ffffff"/>

        <path d="M332 319 C355 340, 365 365, 356 390" fill="none" stroke="#7d8fa1" stroke-width="9"/>
        <path d="M430 316 C423 344, 425 368, 437 390" fill="none" stroke="#7d8fa1" stroke-width="9"/>

        <path d="M349 388 C347 408, 344 418, 340 420" fill="none" stroke="#f29a2e" stroke-width="7"/>
        <path d="M438 390 C436 410, 433 418, 432 420" fill="none" stroke="#f29a2e" stroke-width="7"/>

        <ellipse cx="402" cy="302" rx="36" ry="14" fill="#eef4fa" stroke="#6d7f90" stroke-width="3"/>
      </g>
    </g>

    <g fill="#2f465e" opacity="0.8">
      <circle cx="105" cy="448" r="3"/>
      <circle cx="146" cy="452" r="2.5"/>
      <circle cx="736" cy="450" r="3"/>
      <circle cx="782" cy="447" r="2.5"/>
    </g>
  </svg>
</body>
</html>
