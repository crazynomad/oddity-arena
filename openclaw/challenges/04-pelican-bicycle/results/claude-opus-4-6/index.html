<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelican on a Bicycle</title>
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(180deg, #87CEEB 0%, #E0F0FF 60%, #90EE90 60%, #228B22 100%); }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Ground -->
  <rect x="0" y="400" width="500" height="100" fill="#8B7355"/>
  <line x1="0" y1="400" x2="500" y2="400" stroke="#6B5335" stroke-width="2"/>

  <!-- BICYCLE -->
  <!-- Back wheel -->
  <circle cx="170" cy="370" r="50" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="170" cy="370" r="3" fill="#666"/>
  <!-- Spokes back -->
  <g stroke="#999" stroke-width="1">
    <line x1="170" y1="320" x2="170" y2="420"/>
    <line x1="120" y1="370" x2="220" y2="370"/>
    <line x1="135" y1="335" x2="205" y2="405"/>
    <line x1="205" y1="335" x2="135" y2="405"/>
  </g>

  <!-- Front wheel -->
  <circle cx="330" cy="370" r="50" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="330" cy="370" r="3" fill="#666"/>
  <!-- Spokes front -->
  <g stroke="#999" stroke-width="1">
    <line x1="330" y1="320" x2="330" y2="420"/>
    <line x1="280" y1="370" x2="380" y2="370"/>
    <line x1="295" y1="335" x2="365" y2="405"/>
    <line x1="365" y1="335" x2="295" y2="405"/>
  </g>

  <!-- Frame -->
  <g stroke="#C41E3A" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Chain stay (bottom back) -->
    <line x1="170" y1="370" x2="250" y2="340"/>
    <!-- Seat tube -->
    <line x1="250" y1="340" x2="235" y2="280"/>
    <!-- Seat stay -->
    <line x1="170" y1="370" x2="235" y2="280"/>
    <!-- Top tube -->
    <line x1="235" y1="280" x2="310" y2="285"/>
    <!-- Down tube -->
    <line x1="250" y1="340" x2="310" y2="285"/>
    <!-- Head tube / fork -->
    <line x1="310" y1="285" x2="330" y2="370"/>
  </g>

  <!-- Seat -->
  <ellipse cx="232" cy="272" rx="18" ry="6" fill="#222"/>

  <!-- Handlebars -->
  <line x1="305" y1="270" x2="310" y2="285" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="290" y1="268" x2="320" y2="268" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <!-- Grips -->
  <line x1="288" y1="268" x2="293" y2="268" stroke="#8B4513" stroke-width="7" stroke-linecap="round"/>
  <line x1="317" y1="268" x2="322" y2="268" stroke="#8B4513" stroke-width="7" stroke-linecap="round"/>

  <!-- Pedal crank -->
  <circle cx="250" cy="340" r="8" fill="#666" stroke="#333" stroke-width="2"/>
  <!-- Pedal arms -->
  <line x1="250" y1="340" x2="235" y2="355" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <line x1="250" y1="340" x2="265" y2="325" stroke="#555" stroke-width="4" stroke-linecap="round"/>
  <!-- Pedals -->
  <rect x="225" y="352" width="20" height="6" rx="2" fill="#444" stroke="#333" stroke-width="1"/>
  <rect x="255" y="322" width="20" height="6" rx="2" fill="#444" stroke="#333" stroke-width="1"/>

  <!-- Chain -->
  <path d="M250,348 Q210,385 170,370" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- PELICAN -->
  <!-- Body -->
  <ellipse cx="240" cy="240" rx="40" ry="28" fill="#F5F0E0" stroke="#DDD5C0" stroke-width="1.5" transform="rotate(-5, 240, 240)"/>
  <!-- Belly highlight -->
  <ellipse cx="243" cy="248" rx="28" ry="18" fill="#FEFCF5" opacity="0.6" transform="rotate(-5, 243, 248)"/>

  <!-- Tail feathers -->
  <path d="M198,235 Q180,225 175,240 Q182,235 195,240Z" fill="#E8E0CC" stroke="#D5CCB5" stroke-width="1"/>
  <path d="M195,230 Q175,218 172,235 Q180,228 192,236Z" fill="#F0E8D5" stroke="#D5CCB5" stroke-width="1"/>

  <!-- Wing -->
  <path d="M215,225 Q235,210 270,220 Q260,235 235,245 Q220,240 215,225Z" fill="#E8E0CC" stroke="#D5CCB5" stroke-width="1.5"/>
  <!-- Wing feather details -->
  <path d="M225,230 Q240,218 255,223" fill="none" stroke="#D5CCB5" stroke-width="1"/>
  <path d="M220,235 Q235,225 250,228" fill="none" stroke="#D5CCB5" stroke-width="1"/>

  <!-- Neck -->
  <path d="M265,230 Q280,210 285,185 Q290,165 280,150" fill="#F5F0E0" stroke="#DDD5C0" stroke-width="1.5"/>
  <path d="M258,235 Q270,215 275,190 Q278,170 270,155" fill="#F5F0E0" stroke="#DDD5C0" stroke-width="1.5"/>
  <!-- Neck fill -->
  <path d="M265,230 Q280,210 285,185 Q290,165 280,150 L270,155 Q278,170 275,190 Q270,215 258,235Z" fill="#F5F0E0"/>

  <!-- Head -->
  <ellipse cx="275" cy="145" rx="18" ry="15" fill="#F5F0E0" stroke="#DDD5C0" stroke-width="1.5"/>

  <!-- Eye -->
  <circle cx="280" cy="140" r="4" fill="#222"/>
  <circle cx="281" cy="139" r="1.5" fill="white"/>

  <!-- Beak - upper -->
  <path d="M293,143 Q320,138 340,145 Q320,148 293,148Z" fill="#F4A833" stroke="#D4882A" stroke-width="1.5"/>
  <!-- Beak ridge -->
  <line x1="293" y1="145" x2="338" y2="144" stroke="#D4882A" stroke-width="1" opacity="0.5"/>
  <!-- Beak hook -->
  <path d="M338,144 Q342,146 340,150" fill="none" stroke="#D4882A" stroke-width="2" stroke-linecap="round"/>

  <!-- Pouch -->
  <path d="M293,148 Q310,150 325,148 Q320,170 305,175 Q290,170 293,148Z" fill="#F4A833" opacity="0.7" stroke="#D4882A" stroke-width="1"/>
  <!-- Pouch depth -->
  <path d="M298,155 Q305,168 312,155" fill="none" stroke="#D4882A" stroke-width="1" opacity="0.5"/>

  <!-- Crest feathers -->
  <path d="M262,133 Q258,120 265,115" fill="none" stroke="#E8E0CC" stroke-width="2" stroke-linecap="round"/>
  <path d="M267,131 Q265,118 270,112" fill="none" stroke="#DDD5C0" stroke-width="2" stroke-linecap="round"/>
  <path d="M272,132 Q272,119 277,114" fill="none" stroke="#E8E0CC" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Legs -->
  <!-- Left leg (on back pedal) -->
  <path d="M230,260 Q225,300 235,355" fill="none" stroke="#F4A833" stroke-width="4" stroke-linecap="round"/>
  <!-- Right leg (on front pedal) -->
  <path d="M250,258 Q260,290 265,325" fill="none" stroke="#F4A833" stroke-width="4" stroke-linecap="round"/>

  <!-- Feet on pedals -->
  <path d="M228,354 L243,354 L244,358 L227,358Z" fill="#F4A833" stroke="#D4882A" stroke-width="1"/>
  <path d="M258,324 L273,324 L274,328 L257,328Z" fill="#F4A833" stroke="#D4882A" stroke-width="1"/>

  <!-- Wing holding handlebar -->
  <path d="M268,228 Q285,245 295,268" fill="none" stroke="#E8E0CC" stroke-width="4" stroke-linecap="round"/>
  <circle cx="295" cy="268" r="4" fill="#E8E0CC" stroke="#D5CCB5" stroke-width="1"/>

  <!-- Sun -->
  <circle cx="430" cy="60" r="30" fill="#FFD700" opacity="0.9"/>
  <g stroke="#FFD700" stroke-width="2" opacity="0.6">
    <line x1="430" y1="20" x2="430" y2="10"/>
    <line x1="430" y1="100" x2="430" y2="110"/>
    <line x1="390" y1="60" x2="380" y2="60"/>
    <line x1="470" y1="60" x2="480" y2="60"/>
    <line x1="402" y1="32" x2="395" y2="25"/>
    <line x1="458" y1="88" x2="465" y2="95"/>
    <line x1="458" y1="32" x2="465" y2="25"/>
    <line x1="402" y1="88" x2="395" y2="95"/>
  </g>

  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <circle cx="80" cy="70" r="20"/>
    <circle cx="100" cy="55" r="25"/>
    <circle cx="125" cy="65" r="20"/>
    <circle cx="110" cy="75" r="18"/>
  </g>
  <g fill="white" opacity="0.6">
    <circle cx="300" cy="45" r="15"/>
    <circle cx="318" cy="35" r="20"/>
    <circle cx="338" cy="42" r="16"/>
  </g>
</svg>
</body>
</html>
