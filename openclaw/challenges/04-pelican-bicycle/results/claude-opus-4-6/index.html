<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelican on a Bicycle</title>
<style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(180deg,#87CEEB 0%,#E0F0FF 60%,#90EE90 60%,#228B22 100%)}</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <!-- Ground -->
  <rect x="0" y="380" width="500" height="70" fill="#8B7355"/>
  <line x1="0" y1="380" x2="500" y2="380" stroke="#6B5335" stroke-width="2"/>

  <!-- BICYCLE -->
  <!-- Rear wheel -->
  <circle cx="160" cy="340" r="50" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="160" cy="340" r="3" fill="#666"/>
  <!-- Rear spokes -->
  <g stroke="#999" stroke-width="1">
    <line x1="160" y1="290" x2="160" y2="390"/>
    <line x1="110" y1="340" x2="210" y2="340"/>
    <line x1="125" y1="305" x2="195" y2="375"/>
    <line x1="195" y1="305" x2="125" y2="375"/>
  </g>
  <!-- Front wheel -->
  <circle cx="340" cy="340" r="50" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="340" cy="340" r="3" fill="#666"/>
  <!-- Front spokes -->
  <g stroke="#999" stroke-width="1">
    <line x1="340" y1="290" x2="340" y2="390"/>
    <line x1="290" y1="340" x2="390" y2="340"/>
    <line x1="305" y1="305" x2="375" y2="375"/>
    <line x1="375" y1="305" x2="305" y2="375"/>
  </g>

  <!-- Frame -->
  <g stroke="#C41E3A" stroke-width="5" fill="none" stroke-linecap="round">
    <!-- Chain stay (rear axle to bottom bracket) -->
    <line x1="160" y1="340" x2="250" y2="310"/>
    <!-- Seat stay (rear axle to seat tube top) -->
    <line x1="160" y1="340" x2="240" y2="250"/>
    <!-- Seat tube -->
    <line x1="250" y1="310" x2="240" y2="250"/>
    <!-- Top tube -->
    <line x1="240" y1="250" x2="310" y2="255"/>
    <!-- Down tube -->
    <line x1="250" y1="310" x2="310" y2="255"/>
    <!-- Head tube / fork -->
    <line x1="310" y1="255" x2="340" y2="340"/>
  </g>

  <!-- Seat post and saddle -->
  <line x1="240" y1="250" x2="237" y2="230" stroke="#555" stroke-width="4"/>
  <ellipse cx="237" cy="225" rx="18" ry="6" fill="#222"/>

  <!-- Handlebars -->
  <line x1="310" y1="255" x2="315" y2="230" stroke="#555" stroke-width="4"/>
  <path d="M300,228 Q315,218 330,228" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Grips -->
  <circle cx="300" cy="229" r="4" fill="#444"/>
  <circle cx="330" cy="229" r="4" fill="#444"/>

  <!-- Pedal crank -->
  <circle cx="250" cy="310" r="8" fill="#666" stroke="#444" stroke-width="2"/>
  <line x1="250" y1="310" x2="235" y2="330" stroke="#555" stroke-width="4"/>
  <line x1="250" y1="310" x2="265" y2="290" stroke="#555" stroke-width="4"/>
  <!-- Pedals -->
  <rect x="225" y="327" width="20" height="6" rx="2" fill="#555" stroke="#333" stroke-width="1"/>
  <rect x="255" y="287" width="20" height="6" rx="2" fill="#555" stroke="#333" stroke-width="1"/>

  <!-- Chain (simplified) -->
  <path d="M250,318 Q200,360 160,348" stroke="#555" stroke-width="2" fill="none" stroke-dasharray="3,2"/>

  <!-- PELICAN -->
  <!-- Body -->
  <ellipse cx="240" cy="195" rx="40" ry="30" fill="#F5F5DC" stroke="#DDD5B0" stroke-width="1.5"/>
  <!-- Wing detail -->
  <path d="M210,185 Q240,170 270,190" stroke="#DDD5B0" stroke-width="1.5" fill="none"/>
  <path d="M215,195 Q240,180 265,198" stroke="#DDD5B0" stroke-width="1.5" fill="none"/>

  <!-- Tail feathers -->
  <path d="M200,195 L175,185 L180,200 L170,195 L178,208" fill="#E8E0C8" stroke="#CCC4A8" stroke-width="1"/>

  <!-- Neck -->
  <path d="M265,180 Q285,160 290,130 Q292,110 280,95" fill="#F5F5DC" stroke="#DDD5B0" stroke-width="2"/>
  <!-- Neck (other side for thickness) -->
  <path d="M258,175 Q275,155 280,130 Q282,112 272,98" fill="#F5F5DC" stroke="none"/>

  <!-- Head -->
  <ellipse cx="275" cy="85" rx="18" ry="15" fill="#F5F5DC" stroke="#DDD5B0" stroke-width="1.5"/>

  <!-- Eye -->
  <circle cx="282" cy="80" r="4" fill="white" stroke="#333" stroke-width="1"/>
  <circle cx="283" cy="79" r="2" fill="#333"/>
  <circle cx="284" cy="78" r="0.7" fill="white"/>

  <!-- Beak (large pelican beak with pouch) -->
  <path d="M290,85 L340,78 L338,88 Q320,105 295,95 Z" fill="#F4A460" stroke="#D2893A" stroke-width="1.5"/>
  <!-- Beak upper ridge -->
  <path d="M290,85 L340,78" stroke="#E8944A" stroke-width="2"/>
  <!-- Pouch -->
  <path d="M295,95 Q315,110 335,92 Q325,105 310,108 Q295,106 295,95" fill="#F0B878" stroke="#D2893A" stroke-width="1" opacity="0.8"/>
  <!-- Beak tip hook -->
  <circle cx="340" cy="80" r="2.5" fill="#E8944A"/>

  <!-- Feet/legs going to pedals -->
  <!-- Left leg (to lower pedal) -->
  <path d="M230,220 L232,260 Q233,290 235,325" stroke="#F4A460" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Foot on lower pedal -->
  <path d="M230,325 L242,332 L230,332 Z" fill="#F4A460"/>

  <!-- Right leg (to upper pedal) -->
  <path d="M252,218 L258,255 Q262,275 265,287" stroke="#F4A460" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Foot on upper pedal -->
  <path d="M260,285 L272,292 L260,292 Z" fill="#F4A460"/>

  <!-- Wing (arm) reaching toward handlebars -->
  <path d="M268,188 Q290,200 305,220 Q310,225 305,229" stroke="#DDD5B0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Wing tip / feathers on handlebar -->
  <path d="M302,226 L308,232 M304,225 L312,228 M300,228 L306,235" stroke="#CCC4A8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small head feather tuft -->
  <path d="M262,72 Q258,60 265,55 Q268,62 264,72" fill="#E8E0C8"/>

  <!-- Sun -->
  <circle cx="430" cy="50" r="25" fill="#FFD700" opacity="0.9"/>
  <g stroke="#FFD700" stroke-width="2" opacity="0.6">
    <line x1="430" y1="15" x2="430" y2="5"/>
    <line x1="430" y1="85" x2="430" y2="95"/>
    <line x1="395" y1="50" x2="385" y2="50"/>
    <line x1="465" y1="50" x2="475" y2="50"/>
    <line x1="405" y1="25" x2="398" y2="18"/>
    <line x1="455" y1="75" x2="462" y2="82"/>
    <line x1="455" y1="25" x2="462" y2="18"/>
    <line x1="405" y1="75" x2="398" y2="82"/>
  </g>

  <!-- Small clouds -->
  <g fill="white" opacity="0.7">
    <ellipse cx="80" cy="45" rx="30" ry="12"/>
    <ellipse cx="100" cy="38" rx="20" ry="10"/>
    <ellipse cx="65" cy="40" rx="18" ry="9"/>
  </g>
</svg>
</body>
</html>
