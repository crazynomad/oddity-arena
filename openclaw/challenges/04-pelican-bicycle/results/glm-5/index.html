<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelican on a Bicycle</title>
<style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(180deg,#87CEEB 0%,#E0F0FF 70%,#90EE90 70%,#228B22 100%)}</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <!-- Ground line -->
  <line x1="0" y1="380" x2="500" y2="380" stroke="#556B2F" stroke-width="3"/>

  <!-- BICYCLE -->
  <!-- Back wheel -->
  <circle cx="150" cy="350" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="150" cy="350" r="3" fill="#333"/>
  <!-- Spokes back -->
  <g stroke="#999" stroke-width="1">
    <line x1="150" y1="305" x2="150" y2="395"/>
    <line x1="105" y1="350" x2="195" y2="350"/>
    <line x1="118" y1="318" x2="182" y2="382"/>
    <line x1="182" y1="318" x2="118" y2="382"/>
  </g>

  <!-- Front wheel -->
  <circle cx="320" cy="350" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="320" cy="350" r="3" fill="#333"/>
  <!-- Spokes front -->
  <g stroke="#999" stroke-width="1">
    <line x1="320" y1="305" x2="320" y2="395"/>
    <line x1="275" y1="350" x2="365" y2="350"/>
    <line x1="288" y1="318" x2="352" y2="382"/>
    <line x1="352" y1="318" x2="288" y2="382"/>
  </g>

  <!-- Frame -->
  <g stroke="#E74C3C" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- seat tube: seat to bottom bracket -->
    <line x1="210" y1="255" x2="220" y2="320"/>
    <!-- down tube: head to bottom bracket -->
    <line x1="300" y1="280" x2="220" y2="320"/>
    <!-- top tube: seat to head -->
    <line x1="210" y1="255" x2="300" y2="280"/>
    <!-- chain stay: bottom bracket to rear axle -->
    <line x1="220" y1="320" x2="150" y2="350"/>
    <!-- seat stay: seat to rear axle -->
    <line x1="210" y1="255" x2="150" y2="350"/>
    <!-- fork: head to front axle -->
    <line x1="300" y1="280" x2="320" y2="350"/>
  </g>

  <!-- Handlebar stem -->
  <line x1="300" y1="280" x2="305" y2="255" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <!-- Handlebars -->
  <path d="M285,250 Q305,240 325,255" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>

  <!-- Seat -->
  <ellipse cx="210" cy="250" rx="18" ry="6" fill="#8B4513"/>

  <!-- Pedal crank -->
  <circle cx="220" cy="320" r="8" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Pedal arms -->
  <line x1="220" y1="320" x2="205" y2="340" stroke="#555" stroke-width="3"/>
  <line x1="220" y1="320" x2="235" y2="300" stroke="#555" stroke-width="3"/>
  <!-- Pedals -->
  <rect x="197" y="337" width="16" height="5" rx="2" fill="#555"/>
  <rect x="227" y="296" width="16" height="5" rx="2" fill="#555"/>

  <!-- Chain (simplified) -->
  <path d="M228,320 Q270,345 320,350" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- PELICAN -->
  <!-- Body -->
  <ellipse cx="210" cy="220" rx="40" ry="30" fill="#F5F5DC" stroke="#D2B48C" stroke-width="2"/>
  
  <!-- Tail feathers -->
  <path d="M170,225 L145,210 L150,230 Z" fill="#D2B48C"/>
  <path d="M170,220 L140,200 L148,222 Z" fill="#E8D8B8"/>

  <!-- Wing -->
  <path d="M185,205 Q175,230 195,245 Q220,240 230,215 Q215,200 185,205Z" fill="#E8D8B8" stroke="#D2B48C" stroke-width="1.5"/>
  <!-- Wing detail -->
  <path d="M190,215 Q200,230 210,225" fill="none" stroke="#D2B48C" stroke-width="1"/>
  <path d="M195,210 Q205,225 215,220" fill="none" stroke="#D2B48C" stroke-width="1"/>

  <!-- Neck -->
  <path d="M235,210 Q255,190 260,160 Q262,140 255,130" fill="#F5F5DC" stroke="#D2B48C" stroke-width="2"/>
  <!-- Neck (front edge for thickness) -->
  <path d="M240,215 Q260,195 265,165 Q267,145 260,132" fill="none" stroke="#F5F5DC" stroke-width="6"/>
  <path d="M240,215 Q260,195 265,165 Q267,145 260,132" fill="none" stroke="#D2B48C" stroke-width="1.5"/>

  <!-- Head -->
  <ellipse cx="252" cy="122" rx="18" ry="15" fill="#F5F5DC" stroke="#D2B48C" stroke-width="2"/>

  <!-- Eye -->
  <circle cx="258" cy="118" r="4" fill="white" stroke="#333" stroke-width="1"/>
  <circle cx="259.5" cy="117.5" r="2" fill="#333"/>
  <circle cx="260" cy="116.5" r="0.8" fill="white"/>

  <!-- Beak (upper) -->
  <path d="M268,120 L310,118 L308,125 Q290,128 268,126Z" fill="#F4A460" stroke="#D2691E" stroke-width="1.5"/>
  <!-- Beak hook tip -->
  <path d="M308,118 Q312,120 310,125" fill="none" stroke="#D2691E" stroke-width="2"/>

  <!-- Pouch (the defining pelican feature!) -->
  <path d="M268,126 Q285,150 270,148 Q260,145 268,126Z" fill="#FFB347" stroke="#E8922D" stroke-width="1" opacity="0.8"/>
  <!-- A tiny fish peeking out of the pouch! -->
  <path d="M272,140 L280,138 L278,142 Z" fill="#4682B4"/>
  <circle cx="279" cy="139" r="0.8" fill="#333"/>

  <!-- Pelican's little head tuft -->
  <path d="M242,108 Q238,95 245,100 Q240,90 248,98" fill="none" stroke="#D2B48C" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs going to pedals -->
  <!-- Left leg (to lower pedal) -->
  <path d="M200,240 Q195,280 205,340" fill="none" stroke="#F4A460" stroke-width="4" stroke-linecap="round"/>
  <!-- Right leg (to upper pedal) -->
  <path d="M215,242 Q230,275 235,298" fill="none" stroke="#F4A460" stroke-width="4" stroke-linecap="round"/>

  <!-- Feet on pedals -->
  <path d="M200,338 L210,342 L200,345Z" fill="#F4A460"/>
  <path d="M230,295 L240,299 L230,302Z" fill="#F4A460"/>

  <!-- Pelican "hands" on handlebars -->
  <path d="M240,215 Q260,235 290,250" fill="none" stroke="#F4A460" stroke-width="3" stroke-linecap="round"/>
  <circle cx="290" cy="250" r="4" fill="#F4A460"/>

  <!-- Little smile line -->
  <path d="M268,124 Q275,126 280,124" fill="none" stroke="#D2691E" stroke-width="0.8"/>

  <!-- Motion lines -->
  <g stroke="#AAA" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
    <line x1="90" y1="330" x2="70" y2="330"/>
    <line x1="85" y1="345" x2="60" y2="345"/>
    <line x1="90" y1="360" x2="65" y2="360"/>
  </g>

  <!-- Small dust clouds -->
  <g fill="#CCC" opacity="0.4">
    <circle cx="75" cy="375" r="6"/>
    <circle cx="65" cy="370" r="4"/>
    <circle cx="58" cy="377" r="5"/>
  </g>

  <!-- Sun -->
  <circle cx="430" cy="60" r="30" fill="#FFD700" opacity="0.8"/>
  <g stroke="#FFD700" stroke-width="2" opacity="0.5">
    <line x1="430" y1="20" x2="430" y2="10"/>
    <line x1="460" y1="35" x2="468" y2="28"/>
    <line x1="470" y1="60" x2="480" y2="60"/>
    <line x1="460" y1="85" x2="468" y2="92"/>
    <line x1="400" y1="35" x2="392" y2="28"/>
    <line x1="390" y1="60" x2="380" y2="60"/>
    <line x1="400" y1="85" x2="392" y2="92"/>
  </g>

  <!-- Caption -->
  <text x="250" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#556B2F" font-style="italic">"Just a pelican, riding a bicycle."</text>
</svg>
</body>
</html>
