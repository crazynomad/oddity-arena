<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelican Riding a Bicycle</title>
<style>
body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(180deg, #87CEEB 0%, #E0F0FF 60%, #90EE90 60%, #228B22 100%); }
svg { max-width: 90vw; max-height: 90vh; filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.2)); }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CB342"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <rect y="480" width="800" height="120" fill="url(#ground)"/>

  <!-- Sun -->
  <circle cx="680" cy="80" r="50" fill="#FFF176" opacity="0.9"/>
  <circle cx="680" cy="80" r="42" fill="#FFEE58"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <ellipse cx="150" cy="80" rx="60" ry="25"/>
    <ellipse cx="190" cy="70" rx="40" ry="20"/>
    <ellipse cx="120" cy="75" rx="35" ry="18"/>
    <ellipse cx="550" cy="110" rx="50" ry="20"/>
    <ellipse cx="580" cy="100" rx="35" ry="18"/>
  </g>

  <!-- Road -->
  <rect x="0" y="468" width="800" height="24" fill="#616161" rx="2"/>
  <g stroke="#FFF9C4" stroke-width="2" stroke-dasharray="20,15">
    <line x1="0" y1="480" x2="800" y2="480"/>
  </g>

  <!-- Bicycle -->
  <g filter="url(#shadow)">
    <!-- Back wheel -->
    <circle cx="310" cy="440" r="55" fill="none" stroke="#333" stroke-width="4"/>
    <circle cx="310" cy="440" r="52" fill="none" stroke="#555" stroke-width="1"/>
    <!-- Spokes back -->
    <g stroke="#888" stroke-width="1.2">
      <line x1="310" y1="385" x2="310" y2="495"/>
      <line x1="255" y1="440" x2="365" y2="440"/>
      <line x1="271" y1="401" x2="349" y2="479"/>
      <line x1="349" y1="401" x2="271" y2="479"/>
    </g>
    <circle cx="310" cy="440" r="6" fill="#333"/>

    <!-- Front wheel -->
    <circle cx="510" cy="440" r="55" fill="none" stroke="#333" stroke-width="4"/>
    <circle cx="510" cy="440" r="52" fill="none" stroke="#555" stroke-width="1"/>
    <!-- Spokes front -->
    <g stroke="#888" stroke-width="1.2">
      <line x1="510" y1="385" x2="510" y2="495"/>
      <line x1="455" y1="440" x2="565" y2="440"/>
      <line x1="471" y1="401" x2="549" y2="479"/>
      <line x1="549" y1="401" x2="471" y2="479"/>
    </g>
    <circle cx="510" cy="440" r="6" fill="#333"/>

    <!-- Frame -->
    <g stroke="url(#frameGrad)" stroke-width="5" stroke-linecap="round" fill="none">
      <!-- seat tube -->
      <line x1="370" y1="380" x2="390" y2="440"/>
      <!-- top tube -->
      <line x1="370" y1="380" x2="480" y2="375"/>
      <!-- down tube -->
      <line x1="390" y1="440" x2="480" y2="375"/>
      <!-- chain stay -->
      <line x1="390" y1="440" x2="310" y2="440"/>
      <!-- seat stay -->
      <line x1="370" y1="380" x2="310" y2="440"/>
      <!-- head tube + fork -->
      <line x1="480" y1="375" x2="510" y2="440"/>
    </g>

    <!-- Handlebars -->
    <g stroke="#333" stroke-width="4" stroke-linecap="round" fill="none">
      <line x1="480" y1="375" x2="475" y2="355"/>
      <path d="M462,355 Q475,345 488,355"/>
    </g>

    <!-- Seat -->
    <ellipse cx="368" cy="374" rx="22" ry="7" fill="#4E342E"/>
    <ellipse cx="368" cy="373" rx="20" ry="5" fill="#5D4037"/>

    <!-- Pedals + crank -->
    <circle cx="390" cy="440" r="10" fill="#555" stroke="#333" stroke-width="2"/>
    <line x1="390" y1="428" x2="390" y2="452" stroke="#333" stroke-width="3"/>
    <rect x="381" y="425" width="18" height="5" rx="2" fill="#666"/>
    <rect x="381" y="450" width="18" height="5" rx="2" fill="#666"/>

    <!-- Chain -->
    <path d="M398,440 Q410,455 330,445 Q300,443 310,440 Q320,437 390,438" fill="none" stroke="#444" stroke-width="2" stroke-dasharray="3,2"/>
  </g>

  <!-- Pelican body -->
  <g filter="url(#shadow)">
    <!-- Tail feathers -->
    <ellipse cx="320" cy="310" rx="30" ry="15" fill="#F5F5F5" transform="rotate(-20,320,310)"/>
    <ellipse cx="315" cy="315" rx="25" ry="10" fill="#E0E0E0" transform="rotate(-15,315,315)"/>

    <!-- Body -->
    <ellipse cx="380" cy="310" rx="65" ry="50" fill="#FAFAFA"/>
    <ellipse cx="380" cy="320" rx="58" ry="42" fill="#FFF"/>

    <!-- Wing -->
    <ellipse cx="370" cy="300" rx="50" ry="28" fill="#E8E8E8" transform="rotate(-5,370,300)"/>
    <ellipse cx="365" cy="305" rx="40" ry="20" fill="#F0F0F0" transform="rotate(-5,365,305)"/>
    <!-- Wing detail -->
    <path d="M330,300 Q340,285 355,290" fill="none" stroke="#CCC" stroke-width="1.5"/>
    <path d="M340,305 Q348,292 362,295" fill="none" stroke="#CCC" stroke-width="1.5"/>

    <!-- Neck -->
    <path d="M420,290 Q440,250 440,210 Q440,185 430,170" fill="#FAFAFA" stroke="#F5F5F5" stroke-width="18"/>
    <path d="M420,290 Q440,250 440,210 Q440,185 430,170" fill="none" stroke="#FFF" stroke-width="14"/>

    <!-- Head -->
    <ellipse cx="432" cy="165" rx="28" ry="25" fill="#FFF"/>

    <!-- Eye -->
    <circle cx="442" cy="158" r="7" fill="#FFF" stroke="#333" stroke-width="1.5"/>
    <circle cx="444" cy="157" r="4" fill="#1A1A1A"/>
    <circle cx="445" cy="155" r="1.5" fill="#FFF"/>

    <!-- Beak - upper mandible -->
    <path d="M455,162 L510,155 Q515,158 510,162 L458,170" fill="#FFB300" stroke="#F57F17" stroke-width="1"/>
    <!-- Beak hook at tip -->
    <path d="M510,155 Q515,152 512,148" fill="#FFB300" stroke="#F57F17" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Beak - lower mandible -->
    <path d="M455,168 L505,162" fill="none" stroke="#F57F17" stroke-width="1.5"/>

    <!-- Throat pouch -->
    <path d="M448,170 Q460,195 470,185 Q480,175 505,165" fill="none" stroke="#FFCC80" stroke-width="2"/>
    <path d="M448,170 Q455,200 470,190 Q485,178 505,165" fill="#FFE0B2" opacity="0.6"/>

    <!-- Crest feathers -->
    <path d="M418,148 Q412,130 420,120" fill="none" stroke="#E0E0E0" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M425,145 Q422,125 428,118" fill="none" stroke="#EEEEEE" stroke-width="2" stroke-linecap="round"/>

    <!-- Legs on pedals -->
    <!-- Left leg -->
    <path d="M370,355 Q375,390 388,425" fill="none" stroke="#FFB74D" stroke-width="6" stroke-linecap="round"/>
    <!-- Left foot on pedal -->
    <path d="M385,425 L398,428" stroke="#FFB74D" stroke-width="5" stroke-linecap="round"/>

    <!-- Right leg -->
    <path d="M395,355 Q398,400 392,450" fill="none" stroke="#FFB74D" stroke-width="6" stroke-linecap="round"/>
    <!-- Right foot on pedal -->
    <path d="M389,450 L398,453" stroke="#FFB74D" stroke-width="5" stroke-linecap="round"/>

    <!-- Wing tip holding handlebar -->
    <path d="M420,305 Q450,330 470,350 Q475,355 475,358" fill="none" stroke="#E0E0E0" stroke-width="5" stroke-linecap="round"/>
    <circle cx="475" cy="357" r="4" fill="#DDD"/>
  </g>

  <!-- Motion lines -->
  <g stroke="#90CAF9" stroke-width="1.5" opacity="0.4">
    <line x1="180" y1="430" x2="220" y2="430"/>
    <line x1="190" y1="445" x2="230" y2="445"/>
    <line x1="175" y1="460" x2="215" y2="460"/>
  </g>

  <!-- Little flowers on ground -->
  <g>
    <circle cx="100" cy="490" r="4" fill="#FF8A80"/>
    <circle cx="103" cy="487" r="3" fill="#FF5252"/>
    <circle cx="250" cy="495" r="3" fill="#FFD54F"/>
    <circle cx="600" cy="488" r="4" fill="#CE93D8"/>
    <circle cx="720" cy="492" r="3" fill="#FF8A80"/>
  </g>

  <!-- Signature -->
  <text x="780" y="590" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#558B2F" opacity="0.5">Claude Opus 4.6 — Pelican on a Bicycle 🦆🚲</text>
</svg>
</body>
</html>
