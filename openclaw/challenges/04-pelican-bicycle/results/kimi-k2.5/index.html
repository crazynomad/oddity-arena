<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pelican Riding a Bicycle - kimi-k2.5</title>
<style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#87CEEB;}</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <!-- Ground -->
  <rect x="0" y="380" width="500" height="70" fill="#90EE90"/>
  <line x1="0" y1="380" x2="500" y2="380" stroke="#228B22" stroke-width="2"/>

  <!-- BICYCLE -->
  <!-- Back wheel -->
  <circle cx="160" cy="340" r="50" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="160" cy="340" r="3" fill="#333"/>
  <!-- Spokes back -->
  <line x1="160" y1="290" x2="160" y2="390" stroke="#999" stroke-width="1"/>
  <line x1="110" y1="340" x2="210" y2="340" stroke="#999" stroke-width="1"/>
  <line x1="125" y1="305" x2="195" y2="375" stroke="#999" stroke-width="1"/>
  <line x1="195" y1="305" x2="125" y2="375" stroke="#999" stroke-width="1"/>
  <!-- Front wheel -->
  <circle cx="340" cy="340" r="50" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="340" cy="340" r="3" fill="#333"/>
  <!-- Spokes front -->
  <line x1="340" y1="290" x2="340" y2="390" stroke="#999" stroke-width="1"/>
  <line x1="290" y1="340" x2="390" y2="340" stroke="#999" stroke-width="1"/>
  <line x1="305" y1="305" x2="375" y2="375" stroke="#999" stroke-width="1"/>
  <line x1="375" y1="305" x2="305" y2="375" stroke="#999" stroke-width="1"/>
  <!-- Tire treads -->
  <circle cx="160" cy="340" r="50" fill="none" stroke="#555" stroke-width="6" stroke-dasharray="8 6"/>
  <circle cx="340" cy="340" r="50" fill="none" stroke="#555" stroke-width="6" stroke-dasharray="8 6"/>

  <!-- Frame -->
  <!-- Seat tube: seat post to bottom bracket -->
  <line x1="210" y1="240" x2="230" y2="310" stroke="#C41E3A" stroke-width="5"/>
  <!-- Down tube: head tube to bottom bracket -->
  <line x1="320" y1="260" x2="230" y2="310" stroke="#C41E3A" stroke-width="5"/>
  <!-- Top tube: seat to head -->
  <line x1="210" y1="240" x2="320" y2="260" stroke="#C41E3A" stroke-width="5"/>
  <!-- Chain stay: bottom bracket to rear axle -->
  <line x1="230" y1="310" x2="160" y2="340" stroke="#C41E3A" stroke-width="4"/>
  <!-- Seat stay: seat to rear axle -->
  <line x1="210" y1="240" x2="160" y2="340" stroke="#C41E3A" stroke-width="4"/>
  <!-- Fork: head tube to front axle -->
  <line x1="320" y1="260" x2="340" y2="340" stroke="#C41E3A" stroke-width="4"/>

  <!-- Seat -->
  <ellipse cx="205" cy="235" rx="20" ry="6" fill="#333"/>

  <!-- Handlebar stem -->
  <line x1="320" y1="260" x2="330" y2="230" stroke="#666" stroke-width="4"/>
  <!-- Handlebars -->
  <line x1="310" y1="225" x2="350" y2="225" stroke="#666" stroke-width="5"/>
  <circle cx="310" cy="225" r="4" fill="#444"/>
  <circle cx="350" cy="225" r="4" fill="#444"/>

  <!-- Pedal crank -->
  <circle cx="230" cy="310" r="8" fill="#666"/>
  <!-- Crank arms -->
  <line x1="230" y1="310" x2="215" y2="330" stroke="#666" stroke-width="4"/>
  <line x1="230" y1="310" x2="245" y2="290" stroke="#666" stroke-width="4"/>
  <!-- Pedals -->
  <rect x="205" y="327" width="20" height="6" rx="2" fill="#444"/>
  <rect x="235" y="287" width="20" height="6" rx="2" fill="#444"/>

  <!-- Chain (simple) -->
  <ellipse cx="230" cy="312" rx="15" ry="8" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="3 2"/>

  <!-- PELICAN -->
  <!-- Body -->
  <ellipse cx="210" cy="200" rx="45" ry="30" fill="#F5F0E0" stroke="#DAC9A0" stroke-width="2" transform="rotate(-10,210,200)"/>
  <!-- Belly highlight -->
  <ellipse cx="215" cy="208" rx="30" ry="18" fill="#FFF8EE" transform="rotate(-10,215,208)"/>

  <!-- Tail feathers -->
  <path d="M165,195 Q145,180 150,165 Q160,175 170,185Z" fill="#E8DCC8" stroke="#DAC9A0" stroke-width="1"/>
  <path d="M163,200 Q140,190 142,172 Q155,182 168,192Z" fill="#DDD0B8" stroke="#DAC9A0" stroke-width="1"/>

  <!-- Wing -->
  <path d="M190,185 Q170,170 175,155 Q200,165 220,180 Q210,190 195,190Z" fill="#E8DCC8" stroke="#DAC9A0" stroke-width="1.5"/>

  <!-- Neck -->
  <path d="M240,190 Q260,170 265,140 Q270,130 268,120" fill="none" stroke="#F5F0E0" stroke-width="18" stroke-linecap="round"/>
  <path d="M240,190 Q260,170 265,140 Q270,130 268,120" fill="none" stroke="#DAC9A0" stroke-width="18" stroke-linecap="round" opacity="0.15"/>

  <!-- Head -->
  <ellipse cx="270" cy="105" rx="22" ry="18" fill="#F5F0E0" stroke="#DAC9A0" stroke-width="1.5"/>

  <!-- Eye -->
  <circle cx="278" cy="98" r="5" fill="white" stroke="#333" stroke-width="1"/>
  <circle cx="280" cy="97" r="2.5" fill="#222"/>
  <circle cx="281" cy="96" r="1" fill="white"/>

  <!-- Beak upper -->
  <path d="M290,103 L330,108 L325,113 Q310,112 290,110Z" fill="#F4A430" stroke="#D4891A" stroke-width="1.5"/>
  <!-- Beak lower / pouch -->
  <path d="M290,110 Q310,115 325,113 Q320,130 305,135 Q290,130 285,120Z" fill="#F4A430" stroke="#D4891A" stroke-width="1.5" opacity="0.85"/>
  <!-- Pouch inner shading -->
  <path d="M292,114 Q308,118 320,116 Q316,128 304,132 Q293,128 288,120Z" fill="#E8932A" opacity="0.4"/>
  <!-- Beak tip -->
  <circle cx="330" cy="110" r="3" fill="#D4891A"/>

  <!-- Head tuft -->
  <path d="M258,90 Q255,75 260,70 Q262,80 265,88" fill="#E8DCC8" stroke="#DAC9A0" stroke-width="1"/>
  <path d="M263,88 Q262,72 268,68 Q268,78 268,86" fill="#E8DCC8" stroke="#DAC9A0" stroke-width="1"/>

  <!-- Legs -->
  <!-- Left leg (on back pedal) -->
  <path d="M195,220 Q190,260 200,290 L215,330" fill="none" stroke="#E8A040" stroke-width="5" stroke-linecap="round"/>
  <!-- Right leg (on front pedal) -->
  <path d="M220,218 Q235,260 240,285 L245,290" fill="none" stroke="#E8A040" stroke-width="5" stroke-linecap="round"/>

  <!-- Feet -->
  <!-- Left foot on pedal -->
  <path d="M210,328 L225,332 L228,328 L212,325Z" fill="#E8A040" stroke="#C88030" stroke-width="1"/>
  <!-- Right foot on pedal -->
  <path d="M240,288 L258,292 L260,288 L242,285Z" fill="#E8A040" stroke="#C88030" stroke-width="1"/>

  <!-- Wing gripping handlebar -->
  <path d="M240,195 Q280,210 320,228" fill="none" stroke="#E8DCC8" stroke-width="6" stroke-linecap="round"/>
  <path d="M315,224 Q325,222 335,225" fill="none" stroke="#E8DCC8" stroke-width="5" stroke-linecap="round"/>
</svg>
</body>
</html>
