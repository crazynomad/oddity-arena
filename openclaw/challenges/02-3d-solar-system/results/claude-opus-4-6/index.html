<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar System - N-Body Gravity Sandbox</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; color: #e0e0e0; }
canvas { display: block; }
#ui { position: absolute; top: 0; left: 0; width: 280px; max-height: 100vh; overflow-y: auto; background: rgba(10,10,30,0.85); backdrop-filter: blur(8px); padding: 14px; border-right: 1px solid rgba(100,140,255,0.2); }
#ui::-webkit-scrollbar { width: 4px; }
#ui::-webkit-scrollbar-thumb { background: rgba(100,140,255,0.4); border-radius: 2px; }
h2 { font-size: 16px; margin-bottom: 8px; color: #8ab4ff; letter-spacing: 1px; }
h3 { font-size: 13px; margin: 10px 0 6px; color: #6a9aff; border-bottom: 1px solid rgba(100,140,255,0.15); padding-bottom: 3px; }
label { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin: 4px 0; }
label span.val { color: #8ab4ff; min-width: 40px; text-align: right; }
input[type=range] { width: 110px; accent-color: #5588ff; }
input[type=number], input[type=text] { width: 60px; background: rgba(30,30,60,0.8); border: 1px solid rgba(100,140,255,0.3); color: #e0e0e0; border-radius: 3px; padding: 2px 4px; font-size: 11px; }
input[type=number].wide { width: 100%; }
button { background: linear-gradient(135deg, #3366cc, #2244aa); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin: 2px; transition: background 0.2s; }
button:hover { background: linear-gradient(135deg, #4477dd, #3355bb); }
button.danger { background: linear-gradient(135deg, #cc3333, #aa2222); }
button.danger:hover { background: linear-gradient(135deg, #dd4444, #bb3333); }
.btn-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 6px 0; }
#body-list { max-height: 180px; overflow-y: auto; margin: 6px 0; }
.body-item { display: flex; justify-content: space-between; align-items: center; padding: 3px 6px; margin: 2px 0; background: rgba(40,40,80,0.5); border-radius: 3px; font-size: 11px; cursor: pointer; }
.body-item:hover { background: rgba(60,60,120,0.6); }
.body-item.selected { border-left: 3px solid #5588ff; }
.body-item .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
.body-item .name { flex: 1; }
.body-item .del { color: #ff6666; cursor: pointer; font-weight: bold; padding: 0 4px; }
#info { position: absolute; bottom: 10px; right: 10px; font-size: 11px; color: rgba(200,200,255,0.6); }
#tooltip { position: absolute; pointer-events: none; background: rgba(10,10,30,0.9); border: 1px solid rgba(100,140,255,0.3); padding: 6px 10px; border-radius: 4px; font-size: 11px; display: none; }
.section { margin-bottom: 8px; }
select { background: rgba(30,30,60,0.8); border: 1px solid rgba(100,140,255,0.3); color: #e0e0e0; border-radius: 3px; padding: 2px 4px; font-size: 11px; width: 100%; }
</style>
</head>
<body>
<div id="ui">
  <h2>🪐 Solar System Sandbox</h2>
  <div class="section">
    <h3>Simulation</h3>
    <div class="btn-row">
      <button id="btn-pause">⏸ Pause</button>
      <button id="btn-reset">🔄 Reset</button>
    </div>
    <label>Gravity <span class="val" id="v-grav">1.0</span></label>
    <input type="range" id="sl-grav" min="0" max="5" step="0.1" value="1">
    <label>Speed <span class="val" id="v-speed">1.0</span></label>
    <input type="range" id="sl-speed" min="0.1" max="5" step="0.1" value="1">
    <label>Trail Length <span class="val" id="v-trail">100</span></label>
    <input type="range" id="sl-trail" min="0" max="500" step="10" value="100">
    <label>Curvature Grid <input type="checkbox" id="chk-curve" checked></label>
    <label>Integrator
      <select id="sel-integrator">
        <option value="verlet" selected>Velocity Verlet</option>
        <option value="rk4">RK4</option>
      </select>
    </label>
  </div>
  <div class="section">
    <h3>Bodies</h3>
    <div id="body-list"></div>
    <h3>Add Body</h3>
    <label>Preset
      <select id="sel-preset">
        <option value="custom">Custom</option>
        <option value="sun">Sun</option>
        <option value="planet">Planet</option>
        <option value="moon">Small Moon</option>
        <option value="asteroid">Asteroid</option>
      </select>
    </label>
    <label>Name <input type="text" id="inp-name" value="" style="width:100px"></label>
    <label>Mass <input type="number" id="inp-mass" value="5" min="0.1" step="0.5"></label>
    <label>X <input type="number" id="inp-x" value="0" step="1"></label>
    <label>Y <input type="number" id="inp-y" value="0" step="1"></label>
    <label>Z <input type="number" id="inp-z" value="0" step="1"></label>
    <label>Vx <input type="number" id="inp-vx" value="0" step="0.1"></label>
    <label>Vy <input type="number" id="inp-vy" value="0" step="0.1"></label>
    <label>Vz <input type="number" id="inp-vz" value="0" step="0.1"></label>
    <div class="btn-row">
      <button id="btn-add">➕ Add Body</button>
      <button id="btn-random">🎲 Random</button>
    </div>
  </div>
  <div class="section">
    <h3>Presets</h3>
    <div class="btn-row">
      <button id="btn-solar">☀️ Solar System</button>
      <button id="btn-binary">⭐ Binary Star</button>
      <button id="btn-chaos">💥 Chaos</button>
    </div>
  </div>
</div>
<div id="tooltip"></div>
<div id="info">Click body to select · Scroll to zoom · Drag to orbit · Right-drag to pan</div>
<script>
(function(){
const G_BASE = 40;
let paused = false, gravMul = 1, speedMul = 1, trailLen = 100, showCurvature = true;
let integrator = 'verlet';
let bodies = [], nextId = 0, selectedId = null;
let scene, camera, renderer, controls, raycaster, mouse, curvatureMesh;
const COLORS = ['#ffaa33','#3388ff','#33cc88','#ff5566','#aa66ff','#ffdd44','#44ddff','#ff8844','#88ff44','#ff44aa','#44ffaa','#aaaaff'];
const clock = new THREE.Clock();

// ---- Three.js Setup ----
scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 10000);
camera.position.set(0, 80, 120);
renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 2000;

// Lighting
scene.add(new THREE.AmbientLight(0x333355, 0.6));
const sunLight = new THREE.PointLight(0xffffff, 1.5, 1000);
scene.add(sunLight);
const dirLight = new THREE.DirectionalLight(0x8888cc, 0.3);
dirLight.position.set(50, 100, 50);
scene.add(dirLight);

// Starfield
const starGeo = new THREE.BufferGeometry();
const starVerts = new Float32Array(3000);
for(let i=0;i<3000;i++) starVerts[i] = (Math.random()-0.5)*2000;
starGeo.setAttribute('position', new THREE.BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.5})));

raycaster = new THREE.Raycaster();
mouse = new THREE.Vector2();

// ---- Curvature Grid ----
const GRID = 40, GRID_SPACE = 5;
function createCurvatureGrid(){
  const geo = new THREE.PlaneGeometry(GRID*GRID_SPACE, GRID*GRID_SPACE, GRID, GRID);
  geo.rotateX(-Math.PI/2);
  const mat = new THREE.MeshBasicMaterial({color:0x2244aa, wireframe:true, transparent:true, opacity:0.15});
  curvatureMesh = new THREE.Mesh(geo, mat);
  curvatureMesh.position.y = -20;
  scene.add(curvatureMesh);
}
createCurvatureGrid();

function updateCurvature(){
  if(!curvatureMesh) return;
  curvatureMesh.visible = showCurvature;
  if(!showCurvature) return;
  const pos = curvatureMesh.geometry.attributes.position;
  const baseY = -20;
  for(let i=0; i<pos.count; i++){
    const px = pos.getX(i), pz = pos.getZ(i);
    let disp = 0;
    for(const b of bodies){
      const dx = px - b.pos.x, dz = pz - b.pos.z;
      const r = Math.sqrt(dx*dx + dz*dz) + 1;
      disp -= (b.mass * gravMul * 3) / (r * 0.5 + 1);
    }
    pos.setY(i, baseY + Math.max(disp, -60));
  }
  pos.needsUpdate = true;
}

// ---- Body Management ----
function makeBody(name, mass, x, y, z, vx, vy, vz, color){
  const id = nextId++;
  const radius = Math.pow(mass, 1/3) * 0.8;
  const col = color || COLORS[id % COLORS.length];
  const geo = new THREE.SphereGeometry(radius, 24, 18);
  const mat = new THREE.MeshPhongMaterial({
    color: new THREE.Color(col),
    emissive: new THREE.Color(col).multiplyScalar(mass > 50 ? 0.6 : 0.1),
    shininess: 30
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  scene.add(mesh);

  // Glow for massive bodies
  let glow = null;
  if(mass > 30){
    const glowGeo = new THREE.SphereGeometry(radius * 1.8, 16, 12);
    const glowMat = new THREE.MeshBasicMaterial({color: new THREE.Color(col), transparent:true, opacity:0.12});
    glow = new THREE.Mesh(glowGeo, glowMat);
    mesh.add(glow);
  }

  // Trail
  const trailMax = 600;
  const trailGeo = new THREE.BufferGeometry();
  const trailArr = new Float32Array(trailMax * 3);
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailArr, 3));
  trailGeo.setDrawRange(0, 0);
  const trailMat = new THREE.LineBasicMaterial({color: new THREE.Color(col), transparent:true, opacity:0.5});
  const trailLine = new THREE.Line(trailGeo, trailMat);
  scene.add(trailLine);

  const body = {
    id, name, mass, radius,
    pos: new THREE.Vector3(x, y, z),
    vel: new THREE.Vector3(vx, vy, vz),
    acc: new THREE.Vector3(),
    mesh, glow, color: col,
    trail: [], trailLine, trailGeo, trailMax,
    initPos: new THREE.Vector3(x, y, z),
    initVel: new THREE.Vector3(vx, vy, vz),
    initMass: mass
  };
  mesh.userData.bodyId = id;
  bodies.push(body);
  updateBodyList();
  return body;
}

function removeBody(id){
  const idx = bodies.findIndex(b=>b.id===id);
  if(idx<0) return;
  const b = bodies[idx];
  scene.remove(b.mesh);
  scene.remove(b.trailLine);
  bodies.splice(idx, 1);
  if(selectedId === id) selectedId = null;
  updateBodyList();
}

function clearBodies(){
  while(bodies.length) removeBody(bodies[0].id);
  nextId = 0;
}

// ---- Physics ----
function computeAccelerations(bs, positions){
  const acc = positions ? positions.map(()=>new THREE.Vector3()) : bs.map(()=>new THREE.Vector3());
  const G = G_BASE * gravMul;
  const SOFTENING = 2.0;
  for(let i=0; i<bs.length; i++){
    for(let j=i+1; j<bs.length; j++){
      const pi = positions ? positions[i] : bs[i].pos;
      const pj = positions ? positions[j] : bs[j].pos;
      const dx = pj.x - pi.x, dy = pj.y - pi.y, dz = pj.z - pi.z;
      const r2 = dx*dx + dy*dy + dz*dz + SOFTENING*SOFTENING;
      const r = Math.sqrt(r2);
      const F = G / (r2 * r);
      acc[i].x += F * bs[j].mass * dx;
      acc[i].y += F * bs[j].mass * dy;
      acc[i].z += F * bs[j].mass * dz;
      acc[j].x -= F * bs[i].mass * dx;
      acc[j].y -= F * bs[i].mass * dy;
      acc[j].z -= F * bs[i].mass * dz;
    }
  }
  return acc;
}

function stepVerlet(dt){
  // Compute current accelerations
  const acc = computeAccelerations(bodies);
  // Update positions
  for(let i=0; i<bodies.length; i++){
    const b = bodies[i];
    b.pos.x += b.vel.x * dt + 0.5 * acc[i].x * dt * dt;
    b.pos.y += b.vel.y * dt + 0.5 * acc[i].y * dt * dt;
    b.pos.z += b.vel.z * dt + 0.5 * acc[i].z * dt * dt;
  }
  // Compute new accelerations
  const accNew = computeAccelerations(bodies);
  // Update velocities
  for(let i=0; i<bodies.length; i++){
    const b = bodies[i];
    b.vel.x += 0.5 * (acc[i].x + accNew[i].x) * dt;
    b.vel.y += 0.5 * (acc[i].y + accNew[i].y) * dt;
    b.vel.z += 0.5 * (acc[i].z + accNew[i].z) * dt;
  }
}

function stepRK4(dt){
  const n = bodies.length;
  const p0=[], v0=[];
  for(const b of bodies){ p0.push(b.pos.clone()); v0.push(b.vel.clone()); }

  function evalAcc(positions){ return computeAccelerations(bodies, positions); }

  // k1
  const k1a = evalAcc(p0);
  const k1v = v0.map(v=>v.clone());

  // k2
  const p1 = p0.map((p,i)=>new THREE.Vector3(p.x+k1v[i].x*dt*0.5, p.y+k1v[i].y*dt*0.5, p.z+k1v[i].z*dt*0.5));
  const v1 = v0.map((v,i)=>new THREE.Vector3(v.x+k1a[i].x*dt*0.5, v.y+k1a[i].y*dt*0.5, v.z+k1a[i].z*dt*0.5));
  const k2a = evalAcc(p1);
  const k2v = v1;

  // k3
  const p2 = p0.map((p,i)=>new THREE.Vector3(p.x+k2v[i].x*dt*0.5, p.y+k2v[i].y*dt*0.5, p.z+k2v[i].z*dt*0.5));
  const v2 = v0.map((v,i)=>new THREE.Vector3(v.x+k2a[i].x*dt*0.5, v.y+k2a[i].y*dt*0.5, v.z+k2a[i].z*dt*0.5));
  const k3a = evalAcc(p2);
  const k3v = v2;

  // k4
  const p3 = p0.map((p,i)=>new THREE.Vector3(p.x+k3v[i].x*dt, p.y+k3v[i].y*dt, p.z+k3v[i].z*dt));
  const v3 = v0.map((v,i)=>new THREE.Vector3(v.x+k3a[i].x*dt, v.y+k3a[i].y*dt, v.z+k3a[i].z*dt));
  const k4a = evalAcc(p3);
  const k4v = v3;

  for(let i=0; i<n; i++){
    const b = bodies[i];
    b.pos.x = p0[i].x + (dt/6)*(k1v[i].x + 2*k2v[i].x + 2*k3v[i].x + k4v[i].x);
    b.pos.y = p0[i].y + (dt/6)*(k1v[i].y + 2*k2v[i].y + 2*k3v[i].y + k4v[i].y);
    b.pos.z = p0[i].z + (dt/6)*(k1v[i].z + 2*k2v[i].z + 2*k3v[i].z + k4v[i].z);
    b.vel.x = v0[i].x + (dt/6)*(k1a[i].x + 2*k2a[i].x + 2*k3a[i].x + k4a[i].x);
    b.vel.y = v0[i].y + (dt/6)*(k1a[i].y + 2*k2a[i].y + 2*k3a[i].y + k4a[i].y);
    b.vel.z = v0[i].z + (dt/6)*(k1a[i].z + 2*k2a[i].z + 2*k3a[i].z + k4a[i].z);
  }
}

function checkCollisions(){
  const toRemove = new Set();
  for(let i=0; i<bodies.length; i++){
    if(toRemove.has(i)) continue;
    for(let j=i+1; j<bodies.length; j++){
      if(toRemove.has(j)) continue;
      const a = bodies[i], b = bodies[j];
      const dist = a.pos.distanceTo(b.pos);
      if(dist < a.radius + b.radius){
        // Merge into heavier body
        const [big, small] = a.mass >= b.mass ? [i,j] : [j,i];
        const B = bodies[big], S = bodies[small];
        const totalMass = B.mass + S.mass;
        // Conservation of momentum
        B.vel.x = (B.vel.x * B.mass + S.vel.x * S.mass) / totalMass;
        B.vel.y = (B.vel.y * B.mass + S.vel.y * S.mass) / totalMass;
        B.vel.z = (B.vel.z * B.mass + S.vel.z * S.mass) / totalMass;
        // Weighted position
        B.pos.x = (B.pos.x * B.mass + S.pos.x * S.mass) / totalMass;
        B.pos.y = (B.pos.y * B.mass + S.pos.y * S.mass) / totalMass;
        B.pos.z = (B.pos.z * B.mass + S.pos.z * S.mass) / totalMass;
        B.mass = totalMass;
        B.radius = Math.pow(totalMass, 1/3) * 0.8;
        // Update mesh
        scene.remove(B.mesh);
        const geo = new THREE.SphereGeometry(B.radius, 24, 18);
        const emissive = totalMass > 50 ? 0.6 : 0.1;
        const mat = new THREE.MeshPhongMaterial({
          color: new THREE.Color(B.color),
          emissive: new THREE.Color(B.color).multiplyScalar(emissive),
          shininess: 30
        });
        B.mesh = new THREE.Mesh(geo, mat);
        B.mesh.userData.bodyId = B.id;
        B.mesh.position.copy(B.pos);
        scene.add(B.mesh);
        if(totalMass > 30 && !B.glow){
          const gg = new THREE.SphereGeometry(B.radius*1.8, 16, 12);
          const gm = new THREE.MeshBasicMaterial({color: new THREE.Color(B.color), transparent:true, opacity:0.12});
          B.glow = new THREE.Mesh(gg, gm);
          B.mesh.add(B.glow);
        }
        B.name = B.name + '+' + S.name;
        toRemove.add(small);
      }
    }
  }
  if(toRemove.size){
    const ids = [...toRemove].sort((a,b)=>b-a).map(i=>bodies[i].id);
    ids.forEach(id=>removeBody(id));
  }
}

// ---- Trails ----
function updateTrails(){
  for(const b of bodies){
    if(trailLen > 0){
      b.trail.push(b.pos.clone());
      if(b.trail.length > trailLen) b.trail.splice(0, b.trail.length - trailLen);
    } else {
      b.trail.length = 0;
    }
    const arr = b.trailGeo.attributes.position.array;
    const len = Math.min(b.trail.length, b.trailMax);
    for(let i=0; i<len; i++){
      arr[i*3] = b.trail[i].x;
      arr[i*3+1] = b.trail[i].y;
      arr[i*3+2] = b.trail[i].z;
    }
    b.trailGeo.attributes.position.needsUpdate = true;
    b.trailGeo.setDrawRange(0, len);
  }
}

// ---- UI ----
function updateBodyList(){
  const el = document.getElementById('body-list');
  el.innerHTML = '';
  for(const b of bodies){
    const div = document.createElement('div');
    div.className = 'body-item' + (selectedId === b.id ? ' selected' : '');
    div.innerHTML = `<span class="dot" style="background:${b.color}"></span><span class="name">${b.name} (m=${b.mass.toFixed(1)})</span><span class="del" data-id="${b.id}">✕</span>`;
    div.addEventListener('click', ()=>{ selectedId = b.id; updateBodyList(); });
    el.appendChild(div);
  }
  el.querySelectorAll('.del').forEach(d=>{
    d.addEventListener('click', e=>{ e.stopPropagation(); removeBody(+d.dataset.id); });
  });
}

// Sliders
const slGrav = document.getElementById('sl-grav');
const slSpeed = document.getElementById('sl-speed');
const slTrail = document.getElementById('sl-trail');
slGrav.oninput = ()=>{ gravMul = +slGrav.value; document.getElementById('v-grav').textContent = gravMul.toFixed(1); };
slSpeed.oninput = ()=>{ speedMul = +slSpeed.value; document.getElementById('v-speed').textContent = speedMul.toFixed(1); };
slTrail.oninput = ()=>{ trailLen = +slTrail.value; document.getElementById('v-trail').textContent = trailLen; };
document.getElementById('chk-curve').onchange = e=>{ showCurvature = e.target.checked; };
document.getElementById('sel-integrator').onchange = e=>{ integrator = e.target.value; };

// Buttons
document.getElementById('btn-pause').onclick = ()=>{
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '▶ Resume' : '⏸ Pause';
};

let initialState = null;
function saveState(){ initialState = bodies.map(b=>({name:b.name, mass:b.initMass, x:b.initPos.x, y:b.initPos.y, z:b.initPos.z, vx:b.initVel.x, vy:b.initVel.y, vz:b.initVel.z, color:b.color})); }

document.getElementById('btn-reset').onclick = ()=>{
  if(initialState){
    clearBodies();
    initialState.forEach(s=>makeBody(s.name, s.mass, s.x, s.y, s.z, s.vx, s.vy, s.vz, s.color));
    saveState();
  }
};

// Presets
document.getElementById('sel-preset').onchange = e=>{
  const v = e.target.value;
  const inp = (id,val)=>document.getElementById(id).value = val;
  if(v==='sun'){ inp('inp-mass',100); inp('inp-name','Sun'); }
  else if(v==='planet'){ inp('inp-mass',5); inp('inp-name','Planet'); }
  else if(v==='moon'){ inp('inp-mass',0.5); inp('inp-name','Moon'); }
  else if(v==='asteroid'){ inp('inp-mass',0.1); inp('inp-name','Asteroid'); }
};

document.getElementById('btn-add').onclick = ()=>{
  const name = document.getElementById('inp-name').value || ('Body'+nextId);
  const mass = +document.getElementById('inp-mass').value || 1;
  makeBody(name, mass,
    +document.getElementById('inp-x').value, +document.getElementById('inp-y').value, +document.getElementById('inp-z').value,
    +document.getElementById('inp-vx').value, +document.getElementById('inp-vy').value, +document.getElementById('inp-vz').value
  );
  saveState();
};

document.getElementById('btn-random').onclick = ()=>{
  const mass = 0.5 + Math.random() * 20;
  const r = 20 + Math.random() * 60;
  const theta = Math.random() * Math.PI * 2;
  const x = Math.cos(theta) * r, z = Math.sin(theta) * r, y = (Math.random()-0.5)*10;
  const speed = Math.sqrt(G_BASE * 100 / r) * (0.5 + Math.random()*0.5);
  makeBody('Rnd'+nextId, mass, x, y, z, -Math.sin(theta)*speed*0.4, 0, Math.cos(theta)*speed*0.4);
  saveState();
};

function loadSolarSystem(){
  clearBodies();
  makeBody('Sun', 100, 0,0,0, 0,0,0, '#ffcc33');
  const planets = [
    {n:'Mercury',m:0.3,r:12,c:'#aaaaaa'},
    {n:'Venus',m:0.8,r:18,c:'#ffcc88'},
    {n:'Earth',m:1,r:25,c:'#3388ff'},
    {n:'Mars',m:0.5,r:32,c:'#cc4422'},
    {n:'Jupiter',m:20,r:52,c:'#ddaa66'},
    {n:'Saturn',m:15,r:68,c:'#ccbb77'},
    {n:'Uranus',m:8,r:82,c:'#88ccdd'},
    {n:'Neptune',m:7,r:95,c:'#3355bb'}
  ];
  planets.forEach(p=>{
    const angle = Math.random()*Math.PI*2;
    const x = Math.cos(angle)*p.r, z = Math.sin(angle)*p.r;
    const v = Math.sqrt(G_BASE * 100 / p.r);
    makeBody(p.n, p.m, x, (Math.random()-0.5)*3, z, -Math.sin(angle)*v*0.4, 0, Math.cos(angle)*v*0.4, p.c);
  });
  sunLight.position.set(0,0,0);
  saveState();
}

document.getElementById('btn-solar').onclick = loadSolarSystem;

document.getElementById('btn-binary').onclick = ()=>{
  clearBodies();
  makeBody('Star A', 80, -15,0,0, 0,0,1.5, '#ffaa44');
  makeBody('Star B', 60, 15,0,0, 0,0,-1.5, '#4488ff');
  for(let i=0;i<6;i++){
    const r = 40+Math.random()*40, a=Math.random()*Math.PI*2;
    const v = Math.sqrt(G_BASE*140/r)*0.35;
    makeBody('P'+(i+1), 0.5+Math.random()*3, Math.cos(a)*r, (Math.random()-0.5)*5, Math.sin(a)*r, -Math.sin(a)*v, 0, Math.cos(a)*v);
  }
  saveState();
};

document.getElementById('btn-chaos').onclick = ()=>{
  clearBodies();
  for(let i=0;i<15;i++){
    const mass = 1+Math.random()*25;
    const r = Math.random()*60;
    const a = Math.random()*Math.PI*2;
    const y = (Math.random()-0.5)*20;
    makeBody('C'+i, mass, Math.cos(a)*r, y, Math.sin(a)*r, (Math.random()-0.5)*2, (Math.random()-0.5)*0.5, (Math.random()-0.5)*2);
  }
  saveState();
};

// Click to select
renderer.domElement.addEventListener('click', e=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = bodies.map(b=>b.mesh);
  const hits = raycaster.intersectObjects(meshes);
  if(hits.length){
    selectedId = hits[0].object.userData.bodyId;
  } else {
    selectedId = null;
  }
  updateBodyList();
});

// Tooltip
const tooltip = document.getElementById('tooltip');
renderer.domElement.addEventListener('mousemove', e=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(bodies.map(b=>b.mesh));
  if(hits.length){
    const b = bodies.find(b=>b.id===hits[0].object.userData.bodyId);
    if(b){
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX+12)+'px';
      tooltip.style.top = (e.clientY+12)+'px';
      const spd = b.vel.length().toFixed(2);
      tooltip.innerHTML = `<b>${b.name}</b><br>Mass: ${b.mass.toFixed(1)}<br>Speed: ${spd}<br>Pos: (${b.pos.x.toFixed(1)}, ${b.pos.y.toFixed(1)}, ${b.pos.z.toFixed(1)})`;
    }
  } else {
    tooltip.style.display = 'none';
  }
});

// Resize
window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---- Main Loop ----
let frameCount = 0;
function animate(){
  requestAnimationFrame(animate);
  const rawDt = clock.getDelta();
  const dt = Math.min(rawDt, 0.05) * speedMul;

  if(!paused && bodies.length > 0){
    const subSteps = 4;
    const subDt = dt / subSteps;
    for(let s=0; s<subSteps; s++){
      if(integrator === 'rk4') stepRK4(subDt);
      else stepVerlet(subDt);
      checkCollisions();
    }
    // Sync mesh positions
    for(const b of bodies) b.mesh.position.copy(b.pos);
    // Update sun light to largest body
    let biggest = bodies.reduce((a,b)=>a.mass>b.mass?a:b, bodies[0]);
    if(biggest) sunLight.position.copy(biggest.pos);
    if(frameCount % 2 === 0) updateTrails();
    if(frameCount % 3 === 0) updateCurvature();
  }

  controls.update();
  renderer.render(scene, camera);
  frameCount++;
}

// Start with solar system
loadSolarSystem();
animate();
})();
</script>
