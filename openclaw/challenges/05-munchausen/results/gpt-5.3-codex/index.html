<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge 05 - Baron Munchausen</title>
  <style>
    :root{
      --ink:#1e1a17;
      --gold:#f3d27a;
      --mud:#4f3b2b;
      --mud2:#6b4b32;
      --fog:#d5e0d0;
    }
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#0f1718;
      font-family: Georgia, "Palatino Linotype", "Book Antiqua", serif;
      color:#f6ecd5;
      user-select:none;
      -webkit-user-select:none;
      touch-action:manipulation;
    }
    canvas{
      display:block;
      width:100%;
      height:100%;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });

  let w = 0, h = 0, dpr = Math.min(2, window.devicePixelRatio || 1);
  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  const scenes = [
    { name: "Walk and Sink", start: 0, end: 6, line: "Baron: Nothing can ruin this heroic stroll." },
    { name: "Panic", start: 6, end: 10, line: "Swamp: slurp. Baron: THIS WAS NOT IN MY PLAN!" },
    { name: "Eureka", start: 10, end: 13, line: "A terrible idea appears." },
    { name: "Grab Hair", start: 13, end: 18, line: "He grabs his own hair and pulls upward." },
    { name: "Impossible Rise", start: 18, end: 25, line: "Physics files a formal complaint." },
    { name: "Triumph", start: 25, end: 30, line: "Baron and horse emerge victorious." }
  ];
  const totalDuration = scenes[scenes.length - 1].end;

  let t = 0;
  let prev = performance.now();
  let ended = false;

  const particles = [];
  const maxParticles = 1100;

  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, p) => a + (b - a) * p;
  const norm = (x, a, b) => clamp((x - a) / (b - a), 0, 1);
  const easeIn = p => p * p * p;
  const easeOut = p => 1 - Math.pow(1 - p, 3);
  const easeInOut = p => p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2;
  const easeBack = p => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2);
  };

  function currentSceneIndex() {
    for (let i = 0; i < scenes.length; i++) {
      if (t < scenes[i].end) return i;
    }
    return scenes.length - 1;
  }

  function spawn(x, y, vx, vy, life, size, color, kind) {
    if (particles.length > maxParticles) particles.shift();
    particles.push({ x, y, vx, vy, life, max: life, size, color, kind, rot: Math.random() * 6.283, spin: (Math.random() - 0.5) * 6 });
  }

  function mudBurst(x, y, n, power = 1) {
    for (let i = 0; i < n; i++) {
      const a = -Math.PI + Math.random() * Math.PI;
      const s = (40 + Math.random() * 120) * power;
      spawn(x + (Math.random() - 0.5) * 26, y + (Math.random() - 0.5) * 10, Math.cos(a) * s, Math.sin(a) * s * 0.8 - 30, 0.5 + Math.random() * 0.7, 2 + Math.random() * 6, Math.random() < 0.5 ? "#6b4b32" : "#3f2f25", "mud");
    }
  }

  function bubble(x, y, n) {
    for (let i = 0; i < n; i++) {
      const dx = (Math.random() - 0.5) * 160;
      spawn(x + dx, y + Math.random() * 20, (Math.random() - 0.5) * 8, -15 - Math.random() * 20, 1.4 + Math.random() * 1.2, 2 + Math.random() * 4, "rgba(202,230,217,0.7)", "bubble");
    }
  }

  function sparkle(x, y, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * 6.283;
      const s = 20 + Math.random() * 120;
      spawn(x, y, Math.cos(a) * s, Math.sin(a) * s, 0.6 + Math.random() * 0.9, 1 + Math.random() * 3, Math.random() < 0.5 ? "#ffe6a0" : "#fff8d4", "spark");
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      if (p.kind === "mud") {
        p.vy += 280 * dt;
        p.vx *= 0.995;
      } else if (p.kind === "bubble") {
        p.vx *= 0.985;
      } else {
        p.vy += 25 * dt;
      }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rot += p.spin * dt;
    }
  }

  function drawParticles(swampY) {
    for (const p of particles) {
      const a = clamp(p.life / p.max, 0, 1);
      ctx.save();
      ctx.globalAlpha = a;
      if (p.kind === "mud") {
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size, -p.size * 0.6, p.size * 2.2, p.size * 1.2);
      } else if (p.kind === "bubble") {
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.stroke();
        if (p.y < swampY - 8) {
          ctx.fillStyle = "rgba(220,235,224,0.32)";
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.45, 0, Math.PI * 2);
          ctx.fill();
        }
      } else {
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size * 0.5, -p.size * 2.2, p.size, p.size * 4.4);
        ctx.fillRect(-p.size * 2.2, -p.size * 0.5, p.size * 4.4, p.size);
      }
      ctx.restore();
    }
  }

  function roundRect(x, y, rw, rh, r) {
    const rr = Math.min(r, rw * 0.5, rh * 0.5);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + rw, y, x + rw, y + rh, rr);
    ctx.arcTo(x + rw, y + rh, x, y + rh, rr);
    ctx.arcTo(x, y + rh, x, y, rr);
    ctx.arcTo(x, y, x + rw, y, rr);
    ctx.closePath();
  }

  function drawBackground(time, swampY) {
    const sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, "#2a4b51");
    sky.addColorStop(0.45, "#4f6f65");
    sky.addColorStop(1, "#2f352f");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    for (let i = 0; i < 5; i++) {
      const px = ((time * (8 + i * 2) + i * 220) % (w + 280)) - 180;
      const py = h * 0.14 + i * 26;
      ctx.fillStyle = `rgba(220,228,210,${0.06 - i * 0.008})`;
      ctx.beginPath();
      ctx.ellipse(px, py, 150 + i * 40, 28 + i * 7, 0.1, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = "rgba(27,37,34,0.6)";
    ctx.beginPath();
    ctx.moveTo(0, swampY - 140);
    ctx.quadraticCurveTo(w * 0.22, swampY - 210, w * 0.4, swampY - 130);
    ctx.quadraticCurveTo(w * 0.68, swampY - 220, w, swampY - 150);
    ctx.lineTo(w, swampY + 15);
    ctx.lineTo(0, swampY + 15);
    ctx.closePath();
    ctx.fill();

    const fog = ctx.createLinearGradient(0, swampY - 80, 0, swampY + 130);
    fog.addColorStop(0, "rgba(210,224,206,0.09)");
    fog.addColorStop(1, "rgba(210,224,206,0.0)");
    ctx.fillStyle = fog;
    ctx.fillRect(0, swampY - 90, w, 180);
  }

  function drawSwamp(swampY, intensity) {
    const mud = ctx.createLinearGradient(0, swampY - 40, 0, h);
    mud.addColorStop(0, "#5e452f");
    mud.addColorStop(1, "#2d231b");
    ctx.fillStyle = mud;
    ctx.fillRect(0, swampY - 10, w, h - swampY + 10);

    for (let i = 0; i < 4; i++) {
      const y = swampY + i * 18 + Math.sin(t * 2 + i) * (2 + intensity * 3);
      ctx.strokeStyle = `rgba(128,99,74,${0.22 - i * 0.04})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, y);
      for (let x = 0; x <= w; x += 50) {
        ctx.quadraticCurveTo(x + 25, y + Math.sin((x * 0.02) + t * 3 + i) * (4 + intensity * 4), x + 50, y);
      }
      ctx.stroke();
    }

    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.fillRect(0, swampY + 40, w, h - swampY);
  }

  function drawGroundPatch(swampY, emerge) {
    if (emerge <= 0) return;
    const x = w * 0.68;
    const y = swampY + 18 - emerge * 45;
    ctx.fillStyle = `rgba(94,120,76,${0.2 + emerge * 0.6})`;
    ctx.beginPath();
    ctx.ellipse(x, y, 170 + emerge * 90, 32 + emerge * 18, -0.05, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawHorse(x, y, opt) {
    const { sink, panic, rise, triumph } = opt;
    const bob = Math.sin(t * (panic > 0 ? 18 : 7)) * (panic > 0 ? 4 : 2);
    const yy = y + sink * 0.75 - rise * 0.85 + bob;
    ctx.save();
    ctx.translate(x, yy);

    ctx.fillStyle = "#6c4f37";
    ctx.beginPath();
    ctx.ellipse(0, -18, 52, 28, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#7c5a3e";
    ctx.fillRect(20, -56, 17, 40);
    ctx.beginPath();
    ctx.ellipse(28, -60, 16, 12, 0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#4b3525";
    ctx.lineWidth = 6;
    const legLift = panic > 0 ? Math.sin(t * 16) * 5 : (triumph > 0 ? Math.sin(t * 6) * 2 : 0);
    for (let i = -1; i <= 1; i += 2) {
      ctx.beginPath();
      ctx.moveTo(-18 * i, 8);
      ctx.lineTo(-18 * i + legLift * i, 30 + (i === 1 ? 2 : -2));
      ctx.stroke();
    }

    ctx.strokeStyle = "#3c2a1f";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-54, -18);
    ctx.quadraticCurveTo(-70, -26, -76, -8 + Math.sin(t * 8) * 3);
    ctx.stroke();

    if (panic > 0.2) {
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(34, -62, 3.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#1a1512";
      ctx.beginPath();
      ctx.arc(35.5, -61.5, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawBaron(x, y, opt) {
    const { sink, panic, eureka, pull, rise, triumph } = opt;
    const panicShake = panic > 0 ? Math.sin(t * 30) * panic * 3 : 0;
    const yy = y + sink - rise + panicShake;
    ctx.save();
    ctx.translate(x, yy);

    const torsoTilt = panic > 0 ? Math.sin(t * 16) * 0.12 * panic : (triumph > 0 ? -0.08 : 0);
    ctx.rotate(torsoTilt);

    ctx.fillStyle = "#9d2f2f";
    ctx.beginPath();
    ctx.moveTo(-22, -54);
    ctx.lineTo(24, -54);
    ctx.lineTo(34, 12);
    ctx.lineTo(-28, 12);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#f0e3c7";
    const neckStretch = pull * 12;
    const headY = -74 - neckStretch;
    ctx.fillRect(-4, -58 - neckStretch * 0.4, 8, 10 + neckStretch * 0.7);
    ctx.beginPath();
    ctx.ellipse(0, headY, 19, 20, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#c68e5a";
    ctx.beginPath();
    ctx.moveTo(-8, headY + 4);
    ctx.quadraticCurveTo(0, headY + 11 + (panic * 3), 8, headY + 4);
    ctx.quadraticCurveTo(0, headY + 10, -8, headY + 4);
    ctx.fill();

    ctx.strokeStyle = "#2b221d";
    ctx.lineWidth = 2.2;
    const brow = panic > 0.3 ? -6 : 0;
    ctx.beginPath();
    ctx.moveTo(-9, headY - 6 + brow);
    ctx.lineTo(-3, headY - 8 + brow);
    ctx.moveTo(3, headY - 8 + brow);
    ctx.lineTo(9, headY - 6 + brow);
    ctx.stroke();

    ctx.fillStyle = "#1a1512";
    ctx.beginPath();
    ctx.arc(-5.8, headY - 2.4, 1.8, 0, Math.PI * 2);
    ctx.arc(5.8, headY - 2.4, 1.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#2f2018";
    ctx.beginPath();
    ctx.moveTo(-14, headY - 13);
    ctx.quadraticCurveTo(0, headY - 26 - pull * 8, 14, headY - 13);
    ctx.lineTo(12, headY - 3);
    ctx.quadraticCurveTo(0, headY - 9, -12, headY - 3);
    ctx.closePath();
    ctx.fill();

    const hairX = 0, hairY = headY - 24;
    if (pull > 0.02) {
      const handY = hairY - 26 - pull * 18 + Math.sin(t * 18) * 2;
      ctx.strokeStyle = "#5a3b2a";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(hairX, hairY + 2);
      ctx.lineTo(hairX, handY + 6);
      ctx.stroke();

      ctx.strokeStyle = "#f0d4b5";
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(-20, -36);
      ctx.lineTo(-6, handY + 8);
      ctx.moveTo(20, -36);
      ctx.lineTo(6, handY + 8);
      ctx.stroke();

      ctx.fillStyle = "#f0d4b5";
      ctx.beginPath();
      ctx.arc(0, handY + 8, 8, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.strokeStyle = "#f0d4b5";
      ctx.lineWidth = 7;
      const wave = panic > 0 ? Math.sin(t * 18) * 8 : Math.sin(t * 7) * 2;
      ctx.beginPath();
      ctx.moveTo(-24, -34);
      ctx.lineTo(-38 - wave, -10);
      ctx.moveTo(24, -34);
      ctx.lineTo(38 + wave, -10);
      ctx.stroke();
    }

    ctx.fillStyle = "#1f1a16";
    ctx.fillRect(-18, 12, 12, 28);
    ctx.fillRect(8, 12, 12, 28);

    ctx.fillStyle = "#111";
    ctx.fillRect(-24, 40, 18, 6);
    ctx.fillRect(6, 40, 18, 6);

    if (eureka > 0.02) {
      const by = headY - 62 - Math.sin(t * 8) * 3;
      ctx.globalAlpha = 0.2 + eureka * 0.8;
      ctx.fillStyle = "#ffef9c";
      ctx.beginPath();
      ctx.arc(0, by, 15 + eureka * 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1;
      ctx.strokeStyle = "#ffe9a1";
      ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + t * 0.8;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * 16, by + Math.sin(a) * 16);
        ctx.lineTo(Math.cos(a) * 24, by + Math.sin(a) * 24);
        ctx.stroke();
      }
    }

    if (triumph > 0.2) {
      ctx.strokeStyle = "#f0d4b5";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-18, -34);
      ctx.lineTo(-44, -62);
      ctx.moveTo(18, -34);
      ctx.lineTo(44, -62);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawCaption(scene, progress, done) {
    const bw = Math.min(860, w * 0.88);
    const bh = 66;
    const x = (w - bw) * 0.5;
    const y = 20;
    ctx.fillStyle = "rgba(15,13,11,0.58)";
    roundRect(x, y, bw, bh, 14);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,230,170,0.28)";
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.fillStyle = "#f6e6be";
    ctx.font = `700 ${Math.max(16, Math.min(26, w * 0.025))}px Georgia, serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const typeCount = Math.floor(scene.line.length * clamp(progress * 1.25, 0, 1));
    const line = done ? scene.line : scene.line.slice(0, Math.max(1, typeCount));
    ctx.fillText(line, w * 0.5, y + bh * 0.55);

    ctx.font = `600 ${Math.max(12, Math.min(16, w * 0.014))}px Georgia, serif`;
    ctx.fillStyle = "rgba(246,230,190,0.85)";
    const hint = ended ? "Click to replay" : "Click to skip to next scene";
    ctx.fillText(hint, w * 0.5, h - 24);
  }

  function drawVignette() {
    const g = ctx.createRadialGradient(w * 0.5, h * 0.48, h * 0.24, w * 0.5, h * 0.5, h * 0.78);
    g.addColorStop(0, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(0,0,0,0.5)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }

  function render() {
    const swampY = h * 0.68;

    const walk = norm(t, 0, 4.2);
    const slip = norm(t, 3.8, 5.7);
    const panic = norm(t, 6, 10);
    const eureka = norm(t, 10.7, 12.3);
    const pull = norm(t, 13, 18);
    const riseP = norm(t, 18, 25);
    const triumph = norm(t, 25, 30);
    const settle = norm(t, 24.5, 27.5);

    const baronXBase = lerp(-120, w * 0.45, easeOut(walk));
    const horseXBase = baronXBase - 132;

    const sink1 = lerp(0, 48, easeIn(slip));
    const sink2 = lerp(48, 132, easeInOut(panic));
    const sink = t < 6 ? sink1 : (t < 10 ? sink2 : lerp(132, 10, easeOut(riseP)));
    const extraPanic = panic * (8 + Math.sin(t * 17) * 8);

    const rise = riseP > 0 ? lerp(0, 220, easeBack(riseP)) : 0;
    const escapeX = settle * 95;
    const escapeY = settle * 44;

    const baronX = baronXBase + escapeX;
    const horseX = horseXBase + escapeX;
    const groundY = swampY - 6;
    const baronY = groundY + (slip > 0 ? 20 : 0) + sink + (t >= 6 && t < 11 ? extraPanic : 0) - rise - escapeY;
    const horseY = groundY + (slip > 0 ? 24 : 0) + sink * 0.86 + (t >= 6 && t < 11 ? extraPanic * 0.8 : 0) - rise * 0.84 - escapeY * 0.9;

    drawBackground(t, swampY);
    drawSwamp(swampY, clamp(panic + pull * 0.7, 0, 1));
    drawGroundPatch(swampY, settle);
    drawParticles(swampY);

    drawHorse(horseX, horseY, { sink: 0, panic: clamp(panic, 0, 1), rise, triumph });
    drawBaron(baronX, baronY, {
      sink: 0,
      panic: clamp(panic, 0, 1),
      eureka: clamp(eureka, 0, 1),
      pull: clamp(pull, 0, 1),
      rise,
      triumph
    });

    if (t >= 18 && Math.random() < 0.2) sparkle(baronX + (Math.random() - 0.5) * 16, baronY - 90, 1);

    const si = currentSceneIndex();
    const sc = scenes[si];
    const localP = norm(t, sc.start, sc.end);
    drawCaption(sc, localP, ended);

    drawVignette();
  }

  function tick(now) {
    const dt = Math.min(0.033, (now - prev) / 1000);
    prev = now;

    if (!ended) t += dt;
    if (t >= totalDuration) {
      t = totalDuration;
      ended = true;
    }

    const swampY = h * 0.68;
    if (Math.random() < 0.2) bubble(w * (0.25 + Math.random() * 0.5), swampY + 10, 1);

    if ((t > 4 && t < 10 && Math.random() < 0.45) || (t > 13 && t < 19 && Math.random() < 0.35)) {
      const walk = norm(t, 0, 4.2);
      const baronX = lerp(-120, w * 0.45, easeOut(walk));
      mudBurst(baronX + (Math.random() - 0.5) * 90, swampY + 8, 2 + Math.floor(Math.random() * 3), 0.7 + Math.random() * 0.6);
    }

    if (t > 10.8 && t < 12.9 && Math.random() < 0.7) {
      const walk = norm(t, 0, 4.2);
      const baronX = lerp(-120, w * 0.45, easeOut(walk));
      const sink = t < 10 ? lerp(48, 132, easeInOut(norm(t, 6, 10))) : 132;
      sparkle(baronX, h * 0.68 + 20 + sink - 84, 2);
    }

    updateParticles(dt);
    render();
    requestAnimationFrame(tick);
  }

  function jumpSceneOrReplay() {
    if (ended) {
      t = 0;
      ended = false;
      particles.length = 0;
      return;
    }
    const i = currentSceneIndex();
    if (i < scenes.length - 1) {
      t = scenes[i + 1].start + 0.02;
      mudBurst(w * 0.45, h * 0.68 + 8, 8, 1.2);
    } else {
      t = totalDuration;
      ended = true;
    }
  }

  window.addEventListener("pointerdown", jumpSceneOrReplay, { passive: true });
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "Enter") jumpSceneOrReplay();
  });

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
