<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baron Munchausen - The Swamp Escape</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: pointer; }
canvas { display: block; }
#hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.5); font: 14px Georgia, serif;
  pointer-events: none; transition: opacity 0.5s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Click to advance</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

// Scene management
const SCENES = ['walking','sinking','panic','eureka','pulling','rising','triumph'];
let sceneIndex = 0, sceneTime = 0, globalTime = 0;
let autoAdvance = true;
const SCENE_DURATIONS = [3000, 3000, 2500, 2000, 3500, 3000, 4000];

// Particles
let particles = [];
class Particle {
  constructor(x, y, type) {
    this.x = x; this.y = y; this.type = type;
    this.life = 1; this.maxLife = 1;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = -Math.random() * 3 - 1;
    this.size = Math.random() * 4 + 2;
    if (type === 'mud') { this.vy = -Math.random() * 5 - 2; this.vx = (Math.random()-0.5)*4; this.size = Math.random()*6+3; this.maxLife = 0.8; }
    if (type === 'bubble') { this.vy = -Math.random()*1.5-0.5; this.size = Math.random()*5+2; this.maxLife = 1.5; this.wobble = Math.random()*Math.PI*2; }
    if (type === 'sparkle') { this.vy = (Math.random()-0.5)*3; this.vx = (Math.random()-0.5)*3; this.size = Math.random()*3+1; this.maxLife = 0.6; }
    if (type === 'sweat') { this.vy = -Math.random()*2-1; this.size = 3; this.maxLife = 0.5; }
    this.life = this.maxLife;
  }
  update(dt) {
    this.life -= dt;
    this.x += this.vx; this.y += this.vy;
    if (this.type === 'mud') this.vy += 0.15;
    if (this.type === 'bubble') { this.x += Math.sin(this.wobble + globalTime*3)*0.3; }
    if (this.type === 'sparkle') this.vy -= 0.02;
  }
  draw() {
    let a = Math.max(0, this.life / this.maxLife);
    ctx.save();
    if (this.type === 'mud') {
      ctx.fillStyle = `rgba(60,40,20,${a})`;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
    } else if (this.type === 'bubble') {
      ctx.strokeStyle = `rgba(180,200,180,${a*0.6})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = `rgba(220,255,220,${a*0.15})`;
      ctx.fill();
    } else if (this.type === 'sparkle') {
      ctx.fillStyle = `rgba(255,255,100,${a})`;
      drawStar(this.x, this.y, this.size, 4);
    } else if (this.type === 'sweat') {
      ctx.fillStyle = `rgba(100,180,255,${a})`;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawStar(x, y, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    let ang = (i * Math.PI) / points - Math.PI/2;
    let rad = i % 2 === 0 ? r : r * 0.4;
    if (i === 0) ctx.moveTo(x + Math.cos(ang)*rad, y + Math.sin(ang)*rad);
    else ctx.lineTo(x + Math.cos(ang)*rad, y + Math.sin(ang)*rad);
  }
  ctx.closePath(); ctx.fill();
}

function emit(x, y, type, count) {
  for (let i = 0; i < count; i++) particles.push(new Particle(x + (Math.random()-0.5)*20, y + (Math.random()-0.5)*10, type));
}

// Character
const Baron = {
  x: 0, y: 0, bodyY: 0,
  hatAngle: 0, armAngle: 0, armAngleL: 0,
  mouthOpen: 0, eyeSize: 1, eyebrowAngle: 0,
  legAngle: 0, hairPull: 0, squash: 1, stretch: 1,
  faceRed: 0, mustacheWiggle: 0
};

function drawBaron(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.scale(b.squash, b.stretch);

  const sinkY = b.bodyY;

  // Legs (if visible)
  if (sinkY < 40) {
    ctx.save();
    ctx.fillStyle = '#1a1a4a';
    // Left leg
    ctx.save(); ctx.translate(-12, 30 + sinkY);
    ctx.rotate(Math.sin(b.legAngle) * 0.3);
    ctx.fillRect(-5, 0, 10, 40); 
    ctx.fillStyle = '#222';
    ctx.fillRect(-6, 35, 12, 8);
    ctx.restore();
    // Right leg
    ctx.save(); ctx.translate(12, 30 + sinkY);
    ctx.rotate(Math.sin(b.legAngle + Math.PI) * 0.3);
    ctx.fillRect(-5, 0, 10, 40);
    ctx.fillStyle = '#222';
    ctx.fillRect(-6, 35, 12, 8);
    ctx.restore();
    ctx.restore();
  }

  // Body - fancy coat
  ctx.fillStyle = '#8B0000';
  ctx.beginPath();
  ctx.ellipse(0, 10 + sinkY, 22, 30, 0, 0, Math.PI * 2);
  ctx.fill();
  // Coat details
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -15 + sinkY); ctx.lineTo(0, 35 + sinkY);
  ctx.stroke();
  // Buttons
  ctx.fillStyle = '#FFD700';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.arc(0, -5 + i*10 + sinkY, 2.5, 0, Math.PI*2); ctx.fill();
  }

  // Arms
  ctx.strokeStyle = '#8B0000'; ctx.lineWidth = 10; ctx.lineCap = 'round';
  // Right arm
  ctx.save(); ctx.translate(20, -5 + sinkY);
  ctx.rotate(b.armAngle);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(25, 15); ctx.stroke();
  // Hand
  ctx.fillStyle = '#F5D0A0';
  ctx.beginPath(); ctx.arc(25, 15, 5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Left arm
  ctx.save(); ctx.translate(-20, -5 + sinkY);
  ctx.rotate(b.armAngleL);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-25, 15); ctx.stroke();
  ctx.fillStyle = '#F5D0A0';
  ctx.beginPath(); ctx.arc(-25, 15, 5, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Hair (behind head) - long flowing hair
  ctx.fillStyle = '#D4A030';
  ctx.save(); ctx.translate(0, -35 + sinkY);
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    let hx = i * 6;
    let hy = 0;
    let pullY = -b.hairPull * 30;
    ctx.moveTo(hx - 3, hy);
    ctx.quadraticCurveTo(hx + Math.sin(globalTime*3+i)*5, hy + pullY*0.5 - 15, hx + Math.sin(globalTime*2+i)*3, hy + pullY - 30);
    ctx.quadraticCurveTo(hx + 5 + Math.sin(globalTime*3+i)*5, hy + pullY*0.5 - 15, hx + 3, hy);
    ctx.fill();
  }
  ctx.restore();

  // Head
  let faceR = Math.floor(245 - b.faceRed * 50);
  let faceG = Math.floor(208 - b.faceRed * 80);
  let faceB = Math.floor(160 - b.faceRed * 60);
  ctx.fillStyle = `rgb(${faceR},${faceG},${faceB})`;
  ctx.beginPath(); ctx.ellipse(0, -30 + sinkY, 18, 20, 0, 0, Math.PI*2); ctx.fill();

  // Eyes
  let ey = -35 + sinkY;
  let eSize = 4 * b.eyeSize;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-7, ey, eSize+2, eSize+1, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7, ey, eSize+2, eSize+1, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-7, ey, eSize*0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, ey, eSize*0.5, 0, Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-6, ey-1, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, ey-1, 1.5, 0, Math.PI*2); ctx.fill();

  // Eyebrows
  ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-12, ey - 7); ctx.lineTo(-3, ey - 7 + b.eyebrowAngle * 5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(12, ey - 7); ctx.lineTo(3, ey - 7 + b.eyebrowAngle * 5);
  ctx.stroke();

  // Nose
  ctx.fillStyle = '#E8B888';
  ctx.beginPath(); ctx.ellipse(0, -28 + sinkY, 4, 5, 0, 0, Math.PI*2); ctx.fill();

  // Mustache (magnificent!)
  ctx.fillStyle = '#5a3a10';
  ctx.save(); ctx.translate(0, -24 + sinkY);
  let mw = Math.sin(b.mustacheWiggle) * 3;
  // Left curl
  ctx.beginPath();
  ctx.moveTo(-2, 0);
  ctx.quadraticCurveTo(-12 + mw, -3, -18 + mw, -6);
  ctx.quadraticCurveTo(-15 + mw, 2, -2, 3);
  ctx.fill();
  // Right curl
  ctx.beginPath();
  ctx.moveTo(2, 0);
  ctx.quadraticCurveTo(12 - mw, -3, 18 - mw, -6);
  ctx.quadraticCurveTo(15 - mw, 2, 2, 3);
  ctx.fill();
  ctx.restore();

  // Mouth
  ctx.strokeStyle = '#5a2010'; ctx.lineWidth = 2;
  if (b.mouthOpen > 0.3) {
    ctx.fillStyle = '#300';
    ctx.beginPath();
    ctx.ellipse(0, -20 + sinkY, 6, b.mouthOpen * 8, 0, 0, Math.PI*2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(0, -20 + sinkY, 6, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }

  // Hat - tricorn style
  ctx.save(); ctx.translate(0, -50 + sinkY);
  ctx.rotate(b.hatAngle);
  ctx.fillStyle = '#1a1a4a';
  ctx.beginPath();
  ctx.moveTo(-22, 5); ctx.lineTo(22, 5);
  ctx.lineTo(18, 0); ctx.lineTo(0, -20);
  ctx.lineTo(-18, 0);
  ctx.closePath(); ctx.fill();
  // Hat brim
  ctx.fillStyle = '#1a1a4a';
  ctx.beginPath(); ctx.ellipse(0, 5, 25, 6, 0, 0, Math.PI*2); ctx.fill();
  // Feather
  ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(10, -15);
  ctx.quadraticCurveTo(25 + Math.sin(globalTime*4)*3, -30, 15, -40);
  ctx.stroke();
  // Hat band
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(-18, 1, 36, 4);
  ctx.restore();

  ctx.restore();
}

// Speech bubble
function drawSpeech(x, y, text, size) {
  ctx.save();
  ctx.font = `bold ${size || 16}px Georgia`;
  let m = ctx.measureText(text);
  let pw = m.width + 20, ph = 30;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.roundRect(x - pw/2, y - ph - 10, pw, ph, 8);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x - 5, y - 10); ctx.lineTo(x, y); ctx.lineTo(x + 5, y - 10);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y - ph/2 - 10);
  ctx.restore();
}

// Draw swamp
function drawSwamp(level) {
  // Gradient swamp
  let g = ctx.createLinearGradient(0, H * 0.6, 0, H);
  g.addColorStop(0, '#3a5a20');
  g.addColorStop(0.3, '#2a4a15');
  g.addColorStop(1, '#1a2a08');
  ctx.fillStyle = g;
  ctx.fillRect(0, H * 0.6, W, H * 0.4);

  // Swamp surface with ripples
  ctx.strokeStyle = 'rgba(80,120,40,0.4)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    for (let x = 0; x < W; x += 5) {
      let y = H * 0.6 + Math.sin(x * 0.02 + globalTime * 2 + i) * 3 + i * 4;
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Bubbles from swamp
  if (Math.random() < 0.05) {
    emit(Math.random() * W, H * 0.6, 'bubble', 1);
  }
}

// Sky and background
function drawBackground(scene) {
  // Sky gradient based on scene mood
  let g;
  if (scene === 'triumph') {
    let t = Math.min(1, sceneTime / 2000);
    g = ctx.createLinearGradient(0, 0, 0, H * 0.6);
    g.addColorStop(0, lerpColor('#2a1a3a', '#4488cc', t));
    g.addColorStop(1, lerpColor('#4a3a2a', '#88bbdd', t));
  } else {
    g = ctx.createLinearGradient(0, 0, 0, H * 0.6);
    g.addColorStop(0, '#2a1a3a');
    g.addColorStop(1, '#4a3a2a');
  }
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H * 0.6);

  // Moon
  ctx.fillStyle = scene === 'triumph' ? 'rgba(255,255,200,0.9)' : 'rgba(255,255,200,0.4)';
  ctx.beginPath(); ctx.arc(W * 0.8, H * 0.15, 30, 0, Math.PI*2); ctx.fill();

  // Dead trees
  ctx.strokeStyle = '#1a1a0a'; ctx.lineWidth = 4;
  drawTree(W * 0.1, H * 0.6, 80, -0.2);
  drawTree(W * 0.85, H * 0.6, 100, 0.15);
  drawTree(W * 0.25, H * 0.6, 60, -0.1);

  // Fog
  ctx.fillStyle = `rgba(100,120,80,${0.08 + Math.sin(globalTime)*0.03})`;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.ellipse(W * (0.3 + i * 0.2) + Math.sin(globalTime + i) * 30, H * 0.55, 150, 20, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawTree(x, y, h, lean) {
  ctx.save(); ctx.translate(x, y);
  ctx.strokeStyle = '#1a1a0a'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(lean * h, -h);
  ctx.stroke();
  // Branches
  ctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    let by = -h * (0.4 + i * 0.2);
    let bx = lean * (-by);
    ctx.beginPath(); ctx.moveTo(bx, by);
    ctx.lineTo(bx + (i%2?1:-1) * 25, by - 15 + Math.sin(globalTime+i)*3);
    ctx.stroke();
  }
  ctx.restore();
}

function lerpColor(a, b, t) {
  let ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
  let br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
  let r = Math.round(ar + (br-ar)*t), gg = Math.round(ag + (bg-ag)*t), bl = Math.round(ab + (bb-ab)*t);
  return `rgb(${r},${gg},${bl})`;
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }
function easeOut(t) { return 1 - Math.pow(1-t, 3); }

// Scene logic
function updateScene(dt) {
  let scene = SCENES[sceneIndex];
  let t = sceneTime / SCENE_DURATIONS[sceneIndex]; // 0-1 progress
  t = Math.min(t, 1);

  Baron.mustacheWiggle = globalTime * 3;

  switch(scene) {
    case 'walking':
      Baron.x = W * 0.3 + t * W * 0.2;
      Baron.y = H * 0.55;
      Baron.bodyY = 0;
      Baron.legAngle = globalTime * 8;
      Baron.hatAngle = Math.sin(globalTime * 8) * 0.05;
      Baron.armAngle = Math.sin(globalTime * 8) * 0.3;
      Baron.armAngleL = Math.sin(globalTime * 8 + Math.PI) * 0.3;
      Baron.eyeSize = 1;
      Baron.eyebrowAngle = 0;
      Baron.mouthOpen = 0;
      Baron.squash = 1; Baron.stretch = 1;
      Baron.hairPull = 0; Baron.faceRed = 0;
      break;

    case 'sinking':
      Baron.x = W * 0.5;
      Baron.y = H * 0.55;
      Baron.bodyY = easeInOut(t) * 60;
      Baron.legAngle = globalTime * 2;
      Baron.hatAngle = Math.sin(globalTime * 2) * 0.1;
      Baron.armAngle = -0.5 + Math.sin(globalTime * 3) * 0.2;
      Baron.armAngleL = -0.5 + Math.sin(globalTime * 3 + 1) * 0.2;
      Baron.eyeSize = 1 + t * 0.5;
      Baron.eyebrowAngle = t * 0.5;
      Baron.mouthOpen = t * 0.3;
      Baron.squash = 1; Baron.stretch = 1;
      Baron.hairPull = 0; Baron.faceRed = 0;
      if (Math.random() < 0.1) emit(Baron.x + (Math.random()-0.5)*30, H*0.6, 'bubble', 1);
      if (Math.random() < 0.05) emit(Baron.x + (Math.random()-0.5)*40, H*0.6, 'mud', 2);
      break;

    case 'panic':
      Baron.x = W * 0.5;
      Baron.y = H * 0.55;
      Baron.bodyY = 60 + Math.sin(globalTime*10)*3;
      Baron.legAngle = globalTime * 15;
      Baron.hatAngle = Math.sin(globalTime * 12) * 0.2;
      Baron.armAngle = -1 + Math.sin(globalTime * 10) * 0.5;
      Baron.armAngleL = -1 + Math.sin(globalTime * 10 + 2) * 0.5;
      Baron.eyeSize = 1.8;
      Baron.eyebrowAngle = 1;
      Baron.mouthOpen = 0.5 + Math.sin(globalTime*8)*0.3;
      Baron.squash = 1 + Math.sin(globalTime*10)*0.05;
      Baron.stretch = 1 - Math.sin(globalTime*10)*0.05;
      Baron.faceRed = 0.5;
      if (Math.random() < 0.15) emit(Baron.x + (Math.random()-0.5)*20, Baron.y - 50, 'sweat', 1);
      if (Math.random() < 0.1) emit(Baron.x + (Math.random()-0.5)*30, H*0.6, 'mud', 1);
      break;

    case 'eureka':
      Baron.x = W * 0.5;
      Baron.y = H * 0.55;
      Baron.bodyY = 60;
      Baron.legAngle = 0;
      let flash = t < 0.3 ? easeOut(t/0.3) : 1;
      Baron.hatAngle = 0;
      Baron.armAngle = -0.3;
      Baron.armAngleL = -0.3;
      Baron.eyeSize = 1.5 + flash * 0.5;
      Baron.eyebrowAngle = -0.8;
      Baron.mouthOpen = flash * 0.6;
      Baron.faceRed = 0.2;
      if (t < 0.3 && Math.random() < 0.3) emit(Baron.x + (Math.random()-0.5)*40, Baron.y - 70, 'sparkle', 2);
      break;

    case 'pulling':
      Baron.x = W * 0.5;
      Baron.y = H * 0.55;
      let pullT = easeInOut(Math.min(1, t * 1.5));
      Baron.bodyY = 60 - pullT * 10;
      Baron.hairPull = 0.3 + pullT * 0.7;
      Baron.armAngle = -2.2 + Math.sin(globalTime*6)*0.1;
      Baron.armAngleL = -2.2 + Math.sin(globalTime*6+1)*0.1;
      Baron.eyeSize = 1.2;
      Baron.eyebrowAngle = 0.5;
      Baron.mouthOpen = 0.3 + Math.abs(Math.sin(globalTime*4))*0.3;
      Baron.hatAngle = -0.15;
      Baron.faceRed = 0.7 + Math.sin(globalTime*5)*0.2;
      Baron.squash = 1 + Math.sin(globalTime*8)*0.03;
      Baron.stretch = 1 - Math.sin(globalTime*8)*0.03;
      if (Math.random() < 0.08) emit(Baron.x, H*0.6, 'mud', 2);
      if (Math.random() < 0.05) emit(Baron.x, Baron.y - 60, 'sweat', 1);
      break;

    case 'rising':
      Baron.x = W * 0.5;
      Baron.y = H * 0.55;
      let riseT = easeOut(t);
      Baron.bodyY = 50 - riseT * 70;
      Baron.hairPull = 1 - riseT * 0.5;
      Baron.armAngle = -2.2 + riseT;
      Baron.armAngleL = -2.2 + riseT;
      Baron.eyeSize = 1.3;
      Baron.eyebrowAngle = -0.3;
      Baron.mouthOpen = 0.4;
      Baron.hatAngle = Math.sin(globalTime*3)*0.1;
      Baron.faceRed = 0.5 - riseT * 0.3;
      Baron.legAngle = globalTime * 3;
      if (Math.random() < 0.15) emit(Baron.x + (Math.random()-0.5)*30, H*0.6, 'mud', 3);
      if (riseT > 0.5 && Math.random() < 0.1) emit(Baron.x + (Math.random()-0.5)*40, Baron.y - 30, 'sparkle', 1);
      break;

    case 'triumph':
      Baron.x = W * 0.5;
      Baron.y = H * 0.55;
      Baron.bodyY = -20 + Math.sin(globalTime * 3) * 5;
      Baron.hairPull = 0;
      Baron.armAngle = -1.5 + Math.sin(globalTime*2)*0.3;
      Baron.armAngleL = -1.5 + Math.sin(globalTime*2+Math.PI)*0.3;
      Baron.eyeSize = 1;
      Baron.eyebrowAngle = -0.5;
      Baron.mouthOpen = 0.5 + Math.sin(globalTime*2)*0.2;
      Baron.hatAngle = Math.sin(globalTime*2)*0.15;
      Baron.faceRed = 0;
      Baron.legAngle = globalTime * 4;
      Baron.squash = 1; Baron.stretch = 1;
      if (Math.random() < 0.15) emit(Baron.x + (Math.random()-0.5)*80, Baron.y - 40 + Math.random()*60, 'sparkle', 1);
      break;
  }
}

// Scene captions
function drawCaption(scene) {
  let t = sceneTime / SCENE_DURATIONS[sceneIndex];
  switch(scene) {
    case 'walking':
      if (t > 0.2) drawSpeech(Baron.x, Baron.y - 90, "What a fine evening for a stroll!", 14);
      break;
    case 'sinking':
      if (t > 0.4) drawSpeech(Baron.x, Baron.y - 90 + Baron.bodyY, "Hmm... why is the ground so... soft?", 13);
      break;
    case 'panic':
      if (t > 0.1) drawSpeech(Baron.x, Baron.y - 90 + Baron.bodyY, "HELP! QUICKSAND!", 18);
      break;
    case 'eureka':
      if (t > 0.15) drawSpeech(Baron.x, Baron.y - 90 + Baron.bodyY, "💡 WAIT... My hair!", 16);
      break;
    case 'pulling':
      if (t > 0.1) {
        let msgs = ["HNNNNGH!", "Almost... there!", "*grunt*"];
        let mi = Math.floor(t * msgs.length) % msgs.length;
        drawSpeech(Baron.x, Baron.y - 100 + Baron.bodyY, msgs[mi], 15);
      }
      break;
    case 'rising':
      if (t > 0.3) drawSpeech(Baron.x, Baron.y - 90 + Baron.bodyY, "IT'S WORKING!", 16);
      break;
    case 'triumph':
      if (t > 0.2) drawSpeech(Baron.x, Baron.y - 100 + Baron.bodyY, "And THAT is how it's done! 🎩", 15);
      break;
  }
}

// Title
function drawTitle() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 10, W, 50);
  ctx.font = 'bold 24px Georgia';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center';
  ctx.fillText('The Adventures of Baron Munchausen', W/2, 42);
  ctx.font = '14px Georgia';
  ctx.fillStyle = '#ccc';
  let sceneName = SCENES[sceneIndex].charAt(0).toUpperCase() + SCENES[sceneIndex].slice(1);
  ctx.fillText(`Scene ${sceneIndex+1}/7: ${sceneName}`, W/2, 58);
  ctx.restore();
}

// Main loop
let lastTime = 0;
function loop(time) {
  let dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  globalTime += dt;
  sceneTime += dt * 1000;

  // Auto-advance
  if (autoAdvance && sceneTime > SCENE_DURATIONS[sceneIndex]) {
    if (sceneIndex < SCENES.length - 1) {
      sceneIndex++;
      sceneTime = 0;
    } else {
      autoAdvance = false;
    }
  }

  // Update
  updateScene(dt);

  // Update particles
  particles.forEach(p => p.update(dt));
  particles = particles.filter(p => p.life > 0);

  // Draw
  ctx.clearRect(0, 0, W, H);
  drawBackground(SCENES[sceneIndex]);
  drawSwamp();
  drawBaron(Baron);
  particles.forEach(p => p.draw());
  drawCaption(SCENES[sceneIndex]);
  drawTitle();

  // Hint fade
  if (globalTime > 3) document.getElementById('hint').style.opacity = '0';

  requestAnimationFrame(loop);
}

// Click to advance/replay
canvas.addEventListener('click', () => {
  if (sceneIndex < SCENES.length - 1) {
    sceneIndex++;
    sceneTime = 0;
    autoAdvance = false;
  } else {
    sceneIndex = 0;
    sceneTime = 0;
    autoAdvance = true;
    particles = [];
  }
});

requestAnimationFrame(loop);
</script>
</body>
