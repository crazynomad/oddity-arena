<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baron Munchausen — The Swamp Incident</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; }
canvas { border-radius: 8px; cursor: pointer; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
#ui { position: absolute; bottom: 30px; color: #fff; font-size: 14px; opacity: 0.6; text-align: center; pointer-events: none; }
#title { position: absolute; top: 20px; color: #f0e6d3; font-size: 20px; font-style: italic; opacity: 0.8; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div id="title">The Extraordinary Adventures of Baron Munchausen</div>
<canvas id="c"></canvas>
<div id="ui">Click anywhere to advance scene</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = 800;
const H = canvas.height = 600;

let scene = 0, sceneTime = 0, lastTime = 0, particles = [], bubbles = [];
const SCENE_DURATION = [4000, 3500, 3000, 2500, 4000, 5000];
const SCENE_NAMES = ['A Pleasant Stroll', 'Oh Dear...', 'PANIC!', 'Eureka!', 'The Impossible Pull', 'TRIUMPH!'];
const TOTAL_SCENES = 6;

// Particle system
class Particle {
  constructor(x, y, color, vx, vy, life, size) {
    this.x = x; this.y = y; this.color = color;
    this.vx = vx || (Math.random()-0.5)*3;
    this.vy = vy || -Math.random()*4-1;
    this.life = life || 1; this.maxLife = this.life;
    this.size = size || 3+Math.random()*3;
  }
  update(dt) {
    this.x += this.vx * dt/16; this.y += this.vy * dt/16;
    this.vy += 0.05 * dt/16; this.life -= dt/1000;
  }
  draw() {
    let a = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * a, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class Bubble {
  constructor(x, y) {
    this.x = x + (Math.random()-0.5)*40;
    this.y = y; this.size = 3+Math.random()*8;
    this.vy = -0.5-Math.random()*1.5; this.life = 1.5+Math.random();
    this.maxLife = this.life; this.wobble = Math.random()*Math.PI*2;
  }
  update(dt) {
    this.y += this.vy * dt/16;
    this.x += Math.sin(this.wobble + sceneTime/300)*0.3;
    this.life -= dt/1000;
  }
  draw() {
    let a = Math.max(0, this.life/this.maxLife)*0.5;
    ctx.strokeStyle = `rgba(200,220,180,${a})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.stroke();
  }
}

// Sky gradient based on scene
function drawSky() {
  let g = ctx.createLinearGradient(0, 0, 0, H*0.6);
  if (scene <= 1) { g.addColorStop(0, '#87CEEB'); g.addColorStop(1, '#c9e8f5'); }
  else if (scene <= 3) { g.addColorStop(0, '#5a7a8a'); g.addColorStop(1, '#8aaa9a'); }
  else { g.addColorStop(0, '#FFD700'); g.addColorStop(1, '#87CEEB'); }
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// Sun/moon
function drawSun() {
  let sunY = scene >= 4 ? 80 : 100;
  let sunX = 650;
  ctx.fillStyle = scene >= 4 ? '#FFD700' : '#FFF4C1';
  ctx.beginPath(); ctx.arc(sunX, sunY, 40, 0, Math.PI*2); ctx.fill();
  if (scene >= 4) {
    ctx.strokeStyle = 'rgba(255,215,0,0.3)';
    ctx.lineWidth = 3;
    for (let i = 0; i < 8; i++) {
      let a = i*Math.PI/4 + sceneTime/1000;
      ctx.beginPath();
      ctx.moveTo(sunX+Math.cos(a)*50, sunY+Math.sin(a)*50);
      ctx.lineTo(sunX+Math.cos(a)*70, sunY+Math.sin(a)*70);
      ctx.stroke();
    }
  }
}

// Clouds
function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  let off = sceneTime/50;
  [[100+off%900-100, 60], [400+(off*0.7)%900-100, 90], [600+(off*0.5)%900-100, 50]].forEach(([x,y]) => {
    ctx.beginPath();
    ctx.arc(x, y, 25, 0, Math.PI*2); ctx.arc(x+20, y-10, 20, 0, Math.PI*2);
    ctx.arc(x+40, y, 25, 0, Math.PI*2); ctx.arc(x+20, y+5, 22, 0, Math.PI*2);
    ctx.fill();
  });
}

// Ground and swamp
function drawGround() {
  // Grass
  ctx.fillStyle = '#4a7a3a';
  ctx.fillRect(0, H*0.65, W, H*0.35);
  // Swamp area
  let swampG = ctx.createRadialGradient(W/2, H*0.7, 20, W/2, H*0.7, 200);
  swampG.addColorStop(0, '#3a5a2a');
  swampG.addColorStop(0.5, '#2a4a1a');
  swampG.addColorStop(1, '#4a7a3a');
  ctx.fillStyle = swampG;
  ctx.beginPath();
  ctx.ellipse(W/2, H*0.72, 180, 60, 0, 0, Math.PI*2);
  ctx.fill();
  // Swamp water surface
  ctx.fillStyle = '#1a3a0a';
  ctx.beginPath();
  ctx.ellipse(W/2, H*0.72, 170, 40, 0, 0, Math.PI*2);
  ctx.fill();
  // Swamp shimmer
  ctx.fillStyle = 'rgba(100,150,80,0.3)';
  for (let i = 0; i < 8; i++) {
    let sx = W/2 - 140 + i*40 + Math.sin(sceneTime/500+i)*10;
    let sy = H*0.71 + Math.cos(sceneTime/400+i)*3;
    ctx.beginPath(); ctx.ellipse(sx, sy, 15, 4, 0.2, 0, Math.PI*2); ctx.fill();
  }
}

// Trees
function drawTrees() {
  [80, 700, 160, 640].forEach((x, i) => {
    let th = 80 + i*15;
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(x-8, H*0.65-th, 16, th);
    ctx.fillStyle = i%2 ? '#2d5a1a' : '#3a6a2a';
    ctx.beginPath(); ctx.arc(x, H*0.65-th-15, 35, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x-15, H*0.65-th+5, 25, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+15, H*0.65-th+5, 25, 0, Math.PI*2); ctx.fill();
  });
}

// The Baron character
function drawBaron(x, y, sinkDepth, armAngle, legAngle, expression, hairPull, scale) {
  scale = scale || 1;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  let bodyTop = -60 + sinkDepth;
  let headY = bodyTop - 35;

  // Clip below swamp surface if sinking
  if (sinkDepth > 0 && scene >= 1 && scene <= 4) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(-100, -200, 200, 200 + (-60 + sinkDepth + 40));
    ctx.clip();
  }

  // Legs
  if (sinkDepth < 30) {
    ctx.strokeStyle = '#2a1a0a'; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(-8, 0); ctx.lineTo(-12 + Math.sin(legAngle)*10, 35);
    ctx.moveTo(8, 0); ctx.lineTo(12 - Math.sin(legAngle)*10, 35);
    ctx.stroke();
    // Boots
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-18 + Math.sin(legAngle)*10, 32, 14, 8);
    ctx.fillRect(6 - Math.sin(legAngle)*10, 32, 14, 8);
  }

  // Body (coat)
  ctx.fillStyle = '#8B0000';
  ctx.beginPath();
  ctx.moveTo(-15, bodyTop); ctx.lineTo(15, bodyTop);
  ctx.lineTo(18, bodyTop+55); ctx.lineTo(-18, bodyTop+55);
  ctx.closePath(); ctx.fill();
  // Coat details
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, bodyTop+5); ctx.lineTo(0, bodyTop+50);
  ctx.stroke();
  // Buttons
  ctx.fillStyle = '#FFD700';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.arc(0, bodyTop+12+i*10, 2, 0, Math.PI*2); ctx.fill();
  }

  // Arms
  ctx.strokeStyle = '#8B0000'; ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  let la = armAngle, ra = -armAngle;
  if (hairPull) { la = -2.5; ra = -2.5; }
  // Left arm
  ctx.beginPath();
  ctx.moveTo(-15, bodyTop+15);
  ctx.lineTo(-15 + Math.cos(la)*30, bodyTop+15 + Math.sin(la)*30);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(15, bodyTop+15);
  ctx.lineTo(15 + Math.cos(ra)*30, bodyTop+15 + Math.sin(ra)*30);
  ctx.stroke();
  // Hands
  ctx.fillStyle = '#F5DEB3';
  ctx.beginPath(); ctx.arc(-15+Math.cos(la)*32, bodyTop+15+Math.sin(la)*32, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(15+Math.cos(ra)*32, bodyTop+15+Math.sin(ra)*32, 5, 0, Math.PI*2); ctx.fill();

  if (sinkDepth > 0 && scene >= 1 && scene <= 4) ctx.restore();

  // Head
  ctx.fillStyle = '#F5DEB3';
  ctx.beginPath(); ctx.arc(0, headY, 18, 0, Math.PI*2); ctx.fill();

  // Hair (magnificent!)
  ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 2;
  let hairWave = Math.sin(sceneTime/200)*0.1;
  for (let i = -4; i <= 4; i++) {
    ctx.beginPath();
    ctx.moveTo(i*3, headY-16);
    if (hairPull) {
      let pullH = hairPull * 30;
      ctx.quadraticCurveTo(i*2+Math.sin(sceneTime/100+i)*3, headY-30-pullH, i*1.5, headY-45-pullH);
    } else {
      ctx.quadraticCurveTo(i*4+hairWave*10, headY-25, i*5, headY-20);
    }
    ctx.stroke();
  }

  // If hair-pulling, draw hands on hair
  if (hairPull) {
    ctx.fillStyle = '#F5DEB3';
    ctx.beginPath(); ctx.arc(-4, headY-30-hairPull*20, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, headY-30-hairPull*20, 5, 0, Math.PI*2); ctx.fill();
  }

  // Mustache
  ctx.strokeStyle = '#5a3010'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-3, headY+3);
  ctx.quadraticCurveTo(-12, headY + (expression==='panic'?10:5), -16, headY+2);
  ctx.moveTo(3, headY+3);
  ctx.quadraticCurveTo(12, headY + (expression==='panic'?10:5), 16, headY+2);
  ctx.stroke();

  // Eyes
  ctx.fillStyle = '#fff';
  let eyeSize = expression === 'panic' ? 7 : expression === 'eureka' ? 6 : 5;
  ctx.beginPath(); ctx.arc(-7, headY-5, eyeSize, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, headY-5, eyeSize, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  let pupilOff = expression === 'panic' ? Math.sin(sceneTime/100)*2 : 0;
  ctx.beginPath(); ctx.arc(-7+pupilOff, headY-5, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7+pupilOff, headY-5, 2.5, 0, Math.PI*2); ctx.fill();

  // Eyebrows
  ctx.strokeStyle = '#5a3010'; ctx.lineWidth = 2;
  if (expression === 'panic') {
    ctx.beginPath(); ctx.moveTo(-12, headY-14); ctx.lineTo(-3, headY-16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, headY-14); ctx.lineTo(3, headY-16); ctx.stroke();
  } else if (expression === 'eureka') {
    ctx.beginPath(); ctx.moveTo(-12, headY-16); ctx.lineTo(-3, headY-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, headY-16); ctx.lineTo(3, headY-14); ctx.stroke();
  } else if (expression === 'triumph') {
    ctx.beginPath(); ctx.moveTo(-12, headY-13); ctx.lineTo(-3, headY-15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, headY-13); ctx.lineTo(3, headY-15); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-12, headY-14); ctx.lineTo(-2, headY-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, headY-14); ctx.lineTo(2, headY-14); ctx.stroke();
  }

  // Mouth
  ctx.strokeStyle = '#8B0000'; ctx.lineWidth = 2;
  if (expression === 'panic') {
    ctx.beginPath(); ctx.arc(0, headY+8, 6, 0, Math.PI); ctx.stroke(); // open mouth scream
  } else if (expression === 'eureka') {
    ctx.beginPath(); ctx.arc(0, headY+10, 4, Math.PI, 0); ctx.stroke(); // big smile
  } else if (expression === 'triumph') {
    ctx.beginPath(); ctx.arc(0, headY+8, 7, Math.PI+0.3, -0.3); ctx.stroke();
  } else if (expression === 'worried') {
    ctx.beginPath(); ctx.moveTo(-5, headY+10); ctx.quadraticCurveTo(0, headY+7, 5, headY+10); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(0, headY+10, 5, Math.PI+0.5, -0.5); ctx.stroke(); // mild smile
  }

  // Hat (tricorn!)
  ctx.fillStyle = '#1a1a4a';
  ctx.beginPath();
  ctx.moveTo(-22, headY-14);
  ctx.lineTo(22, headY-14);
  ctx.lineTo(0, headY-40);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(-24, headY-13); ctx.lineTo(24, headY-13);
  ctx.lineTo(22, headY-10); ctx.lineTo(-22, headY-10);
  ctx.closePath(); ctx.fill();
  // Feather
  ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(5, headY-38);
  ctx.quadraticCurveTo(25+Math.sin(sceneTime/300)*5, headY-55, 15, headY-65);
  ctx.stroke();

  // Eureka lightbulb
  if (expression === 'eureka') {
    let bulbAlpha = (Math.sin(sceneTime/150)*0.3+0.7);
    ctx.globalAlpha = bulbAlpha;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(30, headY-50, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(30, headY-50, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.font = '16px Georgia';
    ctx.fillText('!', 27, headY-45);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// Speech bubble
function drawSpeech(x, y, text, width) {
  width = width || 160;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  let h = 35, bx = x - width/2, by = y - h/2;
  ctx.beginPath();
  ctx.roundRect(bx, by, width, h, 8);
  ctx.fill(); ctx.stroke();
  // Tail
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.moveTo(x-5, by+h); ctx.lineTo(x+5, by+h); ctx.lineTo(x, by+h+12);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x-5, by+h); ctx.lineTo(x, by+h+12); ctx.lineTo(x+5, by+h); ctx.stroke();
  // Text
  ctx.fillStyle = '#333';
  ctx.font = 'italic 14px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y+5);
  ctx.textAlign = 'left';
}

// Scene label
function drawSceneLabel() {
  let name = SCENE_NAMES[scene];
  let progress = Math.min(1, sceneTime / SCENE_DURATION[scene]);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, H-45, W, 45);
  ctx.fillStyle = '#f0e6d3';
  ctx.font = 'italic 18px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText(`Scene ${scene+1}: ${name}`, W/2, H-18);
  // Progress bar
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(50, H-42, W-100, 4);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(50, H-42, (W-100)*progress, 4);
  ctx.textAlign = 'left';
}

function spawnSwampBubbles(x) {
  if (Math.random() < 0.05) bubbles.push(new Bubble(x, H*0.68));
}

function spawnParticles(x, y, count, color, spread) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color,
      (Math.random()-0.5)*spread, -Math.random()*spread,
      0.5+Math.random()*1, 2+Math.random()*4));
  }
}

function drawStars() {
  if (scene < 5) return;
  ctx.fillStyle = '#FFD700';
  let count = 12;
  for (let i = 0; i < count; i++) {
    let a = (i/count)*Math.PI*2 + sceneTime/500;
    let r = 80 + Math.sin(sceneTime/300+i)*20;
    let sx = W/2 + Math.cos(a)*r;
    let sy = 150 + Math.sin(a)*r*0.5;
    let s = 3 + Math.sin(sceneTime/200+i*2)*2;
    ctx.globalAlpha = 0.5 + Math.sin(sceneTime/150+i)*0.3;
    ctx.beginPath();
    // 5-point star
    for (let j = 0; j < 5; j++) {
      let sa = j*Math.PI*2/5 - Math.PI/2;
      let method = j === 0 ? 'moveTo' : 'lineTo';
      ctx[method](sx+Math.cos(sa)*s, sy+Math.sin(sa)*s);
      ctx.lineTo(sx+Math.cos(sa+Math.PI/5)*s*0.4, sy+Math.sin(sa+Math.PI/5)*s*0.4);
    }
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Main render
function render(timestamp) {
  let dt = timestamp - lastTime || 16;
  lastTime = timestamp;
  sceneTime += dt;

  let progress = Math.min(1, sceneTime / SCENE_DURATION[scene]);

  // Auto-advance
  if (sceneTime >= SCENE_DURATION[scene] && scene < TOTAL_SCENES - 1) {
    advanceScene();
  }

  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawSun();
  drawClouds();
  drawTrees();
  drawGround();

  // Scene-specific rendering
  let baronX = W/2, baronY = H*0.62;
  let sink = 0, armA = 0.5, legA = 0, expr = 'normal', hairP = 0, sc = 1;

  switch (scene) {
    case 0: // Walk
      baronX = 150 + progress * 250;
      legA = sceneTime / 200;
      armA = 0.3 + Math.sin(sceneTime/200)*0.3;
      drawSpeech(baronX, baronY-130, '"What a fine day for a stroll!"', 200);
      break;

    case 1: // Sink
      baronX = 400;
      sink = progress * 50;
      baronY = H*0.62;
      expr = 'worried';
      armA = 0.3 + Math.sin(sceneTime/300)*0.5;
      spawnSwampBubbles(baronX);
      if (progress > 0.5) drawSpeech(baronX, baronY-130-sink*0.3, '"This is... not ideal."', 180);
      break;

    case 2: // Panic
      baronX = 400;
      sink = 50 + progress * 20;
      expr = 'panic';
      armA = Math.sin(sceneTime/80)*1.5;
      spawnSwampBubbles(baronX);
      spawnSwampBubbles(baronX);
      if (Math.random() < 0.1) spawnParticles(baronX+(Math.random()-0.5)*30, H*0.65, 2, '#5a8a3a', 2);
      drawSpeech(baronX, baronY-140, '"HELP! SOMEBODY! ANYBODY!"', 220);
      break;

    case 3: // Eureka
      baronX = 400;
      sink = 70;
      expr = 'eureka';
      armA = -1;
      spawnSwampBubbles(baronX);
      drawSpeech(baronX+40, baronY-160, '"My hair... OF COURSE!"', 190);
      break;

    case 4: // Hair-pull rise
      baronX = 400;
      let riseP = Math.pow(progress, 0.5);
      sink = 70 - riseP * 70;
      hairP = 0.3 + riseP * 0.7;
      expr = progress < 0.7 ? 'panic' : 'eureka';
      if (Math.random() < 0.15) spawnParticles(baronX, H*0.65, 3, '#8a6a2a', 4);
      if (Math.random() < 0.1) spawnParticles(baronX, H*0.65, 2, '#FFD700', 3);
      spawnSwampBubbles(baronX);
      if (progress < 0.5) drawSpeech(baronX, baronY-160, '"NNNGGHH...!!"', 140);
      else drawSpeech(baronX, baronY-140, '"IT\'S WORKING!!"', 150);
      break;

    case 5: // Triumph
      baronX = 400;
      sink = 0;
      expr = 'triumph';
      armA = -1.2 + Math.sin(sceneTime/300)*0.3;
      sc = 1 + Math.sin(sceneTime/500)*0.03;
      drawStars();
      if (Math.random() < 0.08) spawnParticles(baronX+(Math.random()-0.5)*100, H*0.4, 3, ['#FFD700','#ff6b6b','#87CEEB'][Math.floor(Math.random()*3)], 5);
      drawSpeech(baronX, baronY-155, '"And THAT is how it\'s done!"', 220);
      // Confetti
      if (sceneTime < 1500 && Math.random() < 0.3) {
        let colors = ['#FFD700','#ff6b6b','#87CEEB','#98FB98','#DDA0DD'];
        spawnParticles(Math.random()*W, 50, 2, colors[Math.floor(Math.random()*5)], 3);
      }
      break;
  }

  drawBaron(baronX, baronY, sink, armA, legA, expr, hairP > 0 ? hairP : 0, sc);

  // Update and draw particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(dt); p.draw(); });
  bubbles = bubbles.filter(b => b.life > 0);
  bubbles.forEach(b => { b.update(dt); b.draw(); });

  drawSceneLabel();

  requestAnimationFrame(render);
}

function advanceScene() {
  scene = (scene + 1) % TOTAL_SCENES;
  sceneTime = 0;
  particles = [];
  bubbles = [];
}

canvas.addEventListener('click', () => advanceScene());

requestAnimationFrame(render);
</script>
</body>
</html>
