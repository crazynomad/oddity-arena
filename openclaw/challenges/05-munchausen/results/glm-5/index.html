<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baron Munchausen — The Swamp Incident</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; cursor: pointer; }
canvas { display: block; border-radius: 8px; }
#hint { position: fixed; bottom: 20px; color: rgba(255,255,255,0.5); font: 14px monospace; text-align: center; width: 100%; pointer-events: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click to advance</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H;
function resize() { W = C.width = Math.min(800, innerWidth); H = C.height = Math.min(600, innerHeight); }
resize(); addEventListener('resize', resize);

// State
let scene = 0, sceneT = 0, totalT = 0;
const SCENES = 6;
let particles = [];
let bubbles = [];
let sparkles = [];

// Baron state
let baron = { x: -80, y: 0, sinkDepth: 0, pullProgress: 0, armAngle: 0, legAngle: 0, eyeSize: 1, mouthOpen: 0, hatAngle: 0, walkCycle: 0 };

// Colors
const SKY_TOP = '#2d1b69';
const SKY_BOT = '#8b4513';
const SWAMP = '#3d5c1e';
const MUD = '#5c4033';
const SKIN = '#f5d0a9';
const COAT_BLUE = '#1e3a7b';
const COAT_RED = '#8b1a1a';
const HAIR_COLOR = '#4a3728';
const BOOT_COLOR = '#2a1a0a';
const HAT_COLOR = '#1a1a3a';

// Subtitle
let subtitle = '';
let subtitleAlpha = 0;

function setSubtitle(text) { subtitle = text; subtitleAlpha = 1; }

// Particles
class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    Object.assign(this, { x, y, vx, vy, color, life, maxLife: life, size: size || 4 });
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.vy += 200 * dt; this.life -= dt;
  }
  draw() {
    let a = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size * a, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class Bubble {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 40;
    this.y = y; this.size = 2 + Math.random() * 5;
    this.life = 1 + Math.random(); this.maxLife = this.life;
    this.wobble = Math.random() * Math.PI * 2;
  }
  update(dt) {
    this.y -= 30 * dt; this.x += Math.sin(this.wobble + totalT * 3) * 0.5;
    this.life -= dt;
  }
  draw() {
    let a = Math.max(0, this.life / this.maxLife) * 0.6;
    ctx.globalAlpha = a;
    ctx.strokeStyle = '#7ab648';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

class Sparkle {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 60;
    this.y = y + (Math.random() - 0.5) * 60;
    this.life = 0.5 + Math.random() * 0.5; this.maxLife = this.life;
    this.size = 2 + Math.random() * 3;
    this.angle = Math.random() * Math.PI * 2;
  }
  update(dt) { this.life -= dt; this.angle += dt * 3; }
  draw() {
    let a = Math.max(0, this.life / this.maxLife);
    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(-this.size, -0.5, this.size * 2, 1);
    ctx.fillRect(-0.5, -this.size, 1, this.size * 2);
    ctx.restore(); ctx.globalAlpha = 1;
  }
}

// Drawing helpers
function drawSky() {
  let grad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  grad.addColorStop(0, SKY_TOP); grad.addColorStop(1, '#4a2c6e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H * 0.55);
  // Moon
  ctx.fillStyle = '#ffe8b0';
  ctx.beginPath(); ctx.arc(W * 0.8, H * 0.15, 30, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = SKY_TOP;
  ctx.beginPath(); ctx.arc(W * 0.8 + 10, H * 0.15 - 5, 26, 0, Math.PI * 2); ctx.fill();
  // Stars
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 30; i++) {
    let sx = (i * 137.5) % W, sy = (i * 97.3) % (H * 0.4);
    let twinkle = 0.3 + 0.7 * Math.abs(Math.sin(totalT * 2 + i));
    ctx.globalAlpha = twinkle * 0.7;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;
}

function drawSwamp() {
  let swampY = H * 0.55;
  // Murky water
  let grad = ctx.createLinearGradient(0, swampY, 0, H);
  grad.addColorStop(0, '#4a6b2a'); grad.addColorStop(0.3, '#3d5c1e'); grad.addColorStop(1, '#2a3d12');
  ctx.fillStyle = grad; ctx.fillRect(0, swampY, W, H);
  // Surface ripples
  ctx.strokeStyle = 'rgba(100,160,60,0.3)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    for (let x = 0; x < W; x += 5) {
      let y = swampY + 5 + Math.sin(x * 0.02 + totalT * 1.5 + i * 2) * 3 + i * 8;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  // Lily pads
  for (let i = 0; i < 4; i++) {
    let lx = 100 + i * 180 + Math.sin(totalT + i) * 5;
    let ly = swampY + 15 + i * 12;
    ctx.fillStyle = '#2d6b1e';
    ctx.beginPath(); ctx.ellipse(lx, ly, 18, 8, 0, 0.2, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a4a12';
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 18, ly - 2); ctx.lineTo(lx + 15, ly + 5); ctx.fill();
  }
  // Dead trees in bg
  ctx.strokeStyle = '#2a1a0a';
  ctx.lineWidth = 4;
  for (let i = 0; i < 3; i++) {
    let tx = 60 + i * 300, ty = swampY;
    ctx.beginPath(); ctx.moveTo(tx, ty + 20); ctx.lineTo(tx + 3, ty - 60); ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(tx + 3, ty - 40); ctx.lineTo(tx + 20, ty - 65); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx + 2, ty - 50); ctx.lineTo(tx - 15, ty - 70); ctx.stroke();
    ctx.lineWidth = 4;
  }
}

function drawGround(startX, endX) {
  let groundY = H * 0.55;
  ctx.fillStyle = '#6b4c30';
  ctx.fillRect(startX, groundY - 5, endX - startX, 15);
  ctx.fillStyle = '#4a8b2a';
  for (let x = startX; x < endX; x += 8) {
    let gh = 5 + Math.sin(x * 0.3) * 3;
    ctx.fillRect(x, groundY - 5 - gh, 3, gh);
  }
}

function drawBaron(x, baseY, opts = {}) {
  let { sink = 0, walk = 0, panic = 0, pull = 0, triumph = 0, eureka = 0 } = opts;
  let bodyY = baseY - 80 + sink;
  
  // Clip if sinking (hide below swamp surface)
  if (sink > 0) {
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, W, baseY + 5);
    ctx.clip();
  }

  let legSwing = Math.sin(walk * 8) * 0.4;
  let armSwing = Math.sin(walk * 8 + Math.PI) * 0.3;
  let breathe = Math.sin(totalT * 3) * 1;
  let panicShake = panic * Math.sin(totalT * 20) * 3;
  
  x += panicShake;

  // LEGS
  ctx.strokeStyle = '#1a1a3a';
  ctx.lineWidth = 8;
  // Left leg
  ctx.beginPath();
  ctx.moveTo(x - 5, bodyY + 35);
  ctx.lineTo(x - 10 + Math.sin(legSwing) * 15, bodyY + 70);
  ctx.stroke();
  // Right leg
  ctx.beginPath();
  ctx.moveTo(x + 5, bodyY + 35);
  ctx.lineTo(x + 10 - Math.sin(legSwing) * 15, bodyY + 70);
  ctx.stroke();
  // Boots
  ctx.fillStyle = BOOT_COLOR;
  ctx.fillRect(x - 18 + Math.sin(legSwing) * 15, bodyY + 65, 16, 8);
  ctx.fillRect(x + 2 - Math.sin(legSwing) * 15, bodyY + 65, 16, 8);

  // BODY (coat)
  ctx.fillStyle = COAT_BLUE;
  ctx.beginPath();
  ctx.moveTo(x - 18, bodyY - 5 + breathe);
  ctx.lineTo(x + 18, bodyY - 5 + breathe);
  ctx.lineTo(x + 22, bodyY + 40);
  ctx.lineTo(x - 22, bodyY + 40);
  ctx.fill();
  // Coat details
  ctx.fillStyle = COAT_RED;
  ctx.fillRect(x - 3, bodyY - 5 + breathe, 6, 45);
  // Buttons
  ctx.fillStyle = '#ffd700';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.arc(x, bodyY + 5 + i * 10 + breathe, 2, 0, Math.PI * 2); ctx.fill();
  }

  // ARMS
  ctx.strokeStyle = COAT_BLUE;
  ctx.lineWidth = 8;
  if (pull > 0) {
    // Both arms reaching up to grab hair
    let pullAnim = Math.sin(totalT * 4) * 0.1;
    ctx.beginPath();
    ctx.moveTo(x - 15, bodyY + 5);
    ctx.quadraticCurveTo(x - 20, bodyY - 30, x - 5, bodyY - 55 - pull * 10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 15, bodyY + 5);
    ctx.quadraticCurveTo(x + 20, bodyY - 30, x + 5, bodyY - 55 - pull * 10);
    ctx.stroke();
    // Hands gripping hair
    ctx.fillStyle = SKIN;
    ctx.beginPath(); ctx.arc(x - 5, bodyY - 55 - pull * 10, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 5, bodyY - 55 - pull * 10, 5, 0, Math.PI * 2); ctx.fill();
  } else if (eureka > 0) {
    // One arm raised with pointing finger
    ctx.beginPath();
    ctx.moveTo(x + 15, bodyY + 5);
    ctx.lineTo(x + 35, bodyY - 40);
    ctx.stroke();
    ctx.fillStyle = SKIN;
    ctx.beginPath(); ctx.arc(x + 35, bodyY - 43, 4, 0, Math.PI * 2); ctx.fill();
    // Other arm
    ctx.beginPath();
    ctx.moveTo(x - 15, bodyY + 5);
    ctx.lineTo(x - 25, bodyY + 20);
    ctx.stroke();
    // Lightbulb!
    ctx.fillStyle = '#fff8b0';
    ctx.globalAlpha = 0.5 + Math.sin(totalT * 8) * 0.5;
    ctx.beginPath(); ctx.arc(x + 40, bodyY - 60, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(x + 40, bodyY - 60, 8, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    // Bulb base
    ctx.fillStyle = '#aaa';
    ctx.fillRect(x + 37, bodyY - 49, 6, 5);
  } else if (triumph > 0) {
    // Both arms up in V
    ctx.beginPath(); ctx.moveTo(x - 15, bodyY + 5); ctx.lineTo(x - 35, bodyY - 45); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 15, bodyY + 5); ctx.lineTo(x + 35, bodyY - 45); ctx.stroke();
    ctx.fillStyle = SKIN;
    ctx.beginPath(); ctx.arc(x - 35, bodyY - 48, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 35, bodyY - 48, 5, 0, Math.PI * 2); ctx.fill();
  } else if (panic > 0) {
    // Flailing arms
    let flail = totalT * 12;
    ctx.beginPath();
    ctx.moveTo(x - 15, bodyY + 5);
    ctx.lineTo(x - 30 + Math.sin(flail) * 20, bodyY - 20 + Math.cos(flail) * 15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 15, bodyY + 5);
    ctx.lineTo(x + 30 + Math.cos(flail) * 20, bodyY - 15 + Math.sin(flail + 1) * 15);
    ctx.stroke();
  } else {
    // Walking arms
    ctx.beginPath();
    ctx.moveTo(x - 15, bodyY + 5);
    ctx.lineTo(x - 25 + armSwing * 20, bodyY + 25);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 15, bodyY + 5);
    ctx.lineTo(x + 25 - armSwing * 20, bodyY + 25);
    ctx.stroke();
    // Walking stick in right hand
    ctx.strokeStyle = '#8b6914';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x + 25 - armSwing * 20, bodyY + 25);
    ctx.lineTo(x + 30 - armSwing * 15, bodyY + 70);
    ctx.stroke();
  }

  // HEAD
  ctx.fillStyle = SKIN;
  ctx.beginPath(); ctx.arc(x, bodyY - 20 + breathe, 18, 0, Math.PI * 2); ctx.fill();

  // HAIR (big curly 18th century style)
  ctx.fillStyle = HAIR_COLOR;
  // Side curls
  ctx.beginPath(); ctx.arc(x - 20, bodyY - 20, 10, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 20, bodyY - 20, 10, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x - 18, bodyY - 10, 8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 18, bodyY - 10, 8, 0, Math.PI * 2); ctx.fill();
  // Top
  ctx.beginPath();
  ctx.ellipse(x, bodyY - 35, 16, 8, 0, 0, Math.PI * 2); ctx.fill();
  // If pulling, hair extends upward
  if (pull > 0) {
    ctx.strokeStyle = HAIR_COLOR;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(x, bodyY - 38);
    ctx.quadraticCurveTo(x + Math.sin(totalT * 5) * 5, bodyY - 55, x, bodyY - 60 - pull * 8);
    ctx.stroke();
    // Hair strands
    ctx.lineWidth = 2;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * 4, bodyY - 36);
      ctx.quadraticCurveTo(x + i * 3 + Math.sin(totalT * 4 + i) * 3, bodyY - 50, x + i * 2, bodyY - 58 - pull * 8);
      ctx.stroke();
    }
  }

  // MUSTACHE
  ctx.strokeStyle = HAIR_COLOR;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x - 3, bodyY - 14);
  ctx.quadraticCurveTo(x - 15, bodyY - 18, x - 18, bodyY - 12);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 3, bodyY - 14);
  ctx.quadraticCurveTo(x + 15, bodyY - 18, x + 18, bodyY - 12);
  ctx.stroke();

  // EYES
  let eyeScale = panic > 0 ? 1.5 : (eureka > 0 ? 1.8 : 1);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(x - 7, bodyY - 22, 5 * eyeScale, 6 * eyeScale, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 7, bodyY - 22, 5 * eyeScale, 6 * eyeScale, 0, 0, Math.PI * 2); ctx.fill();
  // Pupils
  ctx.fillStyle = '#222';
  let pupilOff = panic > 0 ? Math.sin(totalT * 15) * 2 : 0;
  ctx.beginPath(); ctx.arc(x - 6 + pupilOff, bodyY - 22, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 8 + pupilOff, bodyY - 22, 2.5, 0, Math.PI * 2); ctx.fill();
  // Eyebrows
  ctx.strokeStyle = HAIR_COLOR;
  ctx.lineWidth = 2;
  if (panic > 0) {
    // Worried brows
    ctx.beginPath(); ctx.moveTo(x - 13, bodyY - 32); ctx.lineTo(x - 3, bodyY - 29); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 13, bodyY - 32); ctx.lineTo(x + 3, bodyY - 29); ctx.stroke();
  } else if (triumph > 0) {
    // Happy raised brows
    ctx.beginPath(); ctx.moveTo(x - 13, bodyY - 33); ctx.lineTo(x - 3, bodyY - 33); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 3, bodyY - 33); ctx.lineTo(x + 13, bodyY - 33); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(x - 13, bodyY - 30); ctx.lineTo(x - 2, bodyY - 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 2, bodyY - 30); ctx.lineTo(x + 13, bodyY - 30); ctx.stroke();
  }

  // MOUTH
  ctx.strokeStyle = '#8b3030';
  ctx.lineWidth = 2;
  if (panic > 0) {
    // Open mouth O
    ctx.fillStyle = '#5a1010';
    ctx.beginPath(); ctx.ellipse(x, bodyY - 10, 5, 7 * panic, 0, 0, Math.PI * 2); ctx.fill();
  } else if (triumph > 0) {
    // Big smile
    ctx.beginPath(); ctx.arc(x, bodyY - 14, 8, 0.1, Math.PI - 0.1); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, bodyY - 14, 7, 0.2, Math.PI - 0.2); ctx.fill();
  } else if (eureka > 0) {
    ctx.fillStyle = '#5a1010';
    ctx.beginPath(); ctx.ellipse(x + 2, bodyY - 10, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
  } else {
    // Confident smirk
    ctx.beginPath(); ctx.arc(x, bodyY - 13, 6, 0.2, Math.PI - 0.5); ctx.stroke();
  }

  // TRICORN HAT
  ctx.fillStyle = HAT_COLOR;
  ctx.save();
  ctx.translate(x, bodyY - 35);
  let hatTilt = panic > 0 ? Math.sin(totalT * 10) * 0.15 : (triumph > 0 ? -0.1 : 0);
  ctx.rotate(hatTilt);
  ctx.beginPath();
  ctx.moveTo(-25, 5);
  ctx.lineTo(-15, -15);
  ctx.lineTo(0, -20);
  ctx.lineTo(15, -15);
  ctx.lineTo(25, 5);
  ctx.lineTo(15, 2);
  ctx.lineTo(0, 5);
  ctx.lineTo(-15, 2);
  ctx.closePath();
  ctx.fill();
  // Hat brim
  ctx.fillStyle = '#2a2a4a';
  ctx.fillRect(-20, 2, 40, 4);
  // Feather
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(10, -12);
  ctx.quadraticCurveTo(25, -30, 20 + Math.sin(totalT * 3) * 5, -35);
  ctx.stroke();
  ctx.restore();

  if (sink > 0) {
    ctx.restore();
    // Mud overlay at surface
    ctx.fillStyle = 'rgba(61,92,30,0.7)';
    ctx.beginPath();
    for (let mx = x - 30; mx < x + 30; mx += 5) {
      let my = baseY + Math.sin(mx * 0.1 + totalT * 2) * 3;
      mx === x - 30 ? ctx.moveTo(mx, my) : ctx.lineTo(mx, my);
    }
    ctx.lineTo(x + 30, baseY + 20);
    ctx.lineTo(x - 30, baseY + 20);
    ctx.fill();
  }
}

function drawHorse(x, baseY, sink) {
  let bodyY = baseY - 40 + sink;
  if (sink > 0) {
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, W, baseY + 5); ctx.clip();
  }
  // Body
  ctx.fillStyle = '#8b6b3d';
  ctx.beginPath();
  ctx.ellipse(x, bodyY, 40, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  // Neck & Head
  ctx.fillStyle = '#7a5c30';
  ctx.beginPath();
  ctx.moveTo(x + 30, bodyY - 15);
  ctx.quadraticCurveTo(x + 50, bodyY - 50, x + 55, bodyY - 55);
  ctx.lineTo(x + 40, bodyY - 55);
  ctx.quadraticCurveTo(x + 35, bodyY - 45, x + 25, bodyY - 10);
  ctx.fill();
  // Head
  ctx.fillStyle = '#8b6b3d';
  ctx.beginPath(); ctx.ellipse(x + 52, bodyY - 58, 15, 10, 0.3, 0, Math.PI * 2); ctx.fill();
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x + 56, bodyY - 61, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x + 57, bodyY - 61, 2, 0, Math.PI * 2); ctx.fill();
  // Legs
  ctx.strokeStyle = '#7a5c30';
  ctx.lineWidth = 6;
  let lk = Math.sin(totalT * 3) * 3 * (sink > 10 ? 1 : 0);
  ctx.beginPath(); ctx.moveTo(x - 25, bodyY + 15); ctx.lineTo(x - 28 + lk, bodyY + 55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - 15, bodyY + 18); ctx.lineTo(x - 12 - lk, bodyY + 55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 15, bodyY + 18); ctx.lineTo(x + 12 + lk, bodyY + 55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 25, bodyY + 15); ctx.lineTo(x + 28 - lk, bodyY + 55); ctx.stroke();
  // Mane
  ctx.fillStyle = '#3a2810';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(x + 28 + i * 3, bodyY - 20 - i * 6 + Math.sin(totalT * 2 + i) * 2, 5, 0, Math.PI * 2);
    ctx.fill();
  }
  // Tail
  ctx.strokeStyle = '#3a2810';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x - 38, bodyY - 5);
  ctx.quadraticCurveTo(x - 55 + Math.sin(totalT * 2) * 8, bodyY + 10, x - 50, bodyY + 30);
  ctx.stroke();

  if (sink > 0) {
    ctx.restore();
  }
}

// Narration text by scene
const narrations = [
  '"I, Baron Munchausen, fear NOTHING!"\n...especially not this shortcut through the swamp.',
  '"GLUB! This is most undignified!"\nThe swamp disagreed with his confidence.',
  '"Wait... I have an IDEA!"\n(The laws of physics looked away nervously.)',
  '"If I pull my own hair hard enough..."\nNewton is rolling in his grave.',
  '"UP WE GO!"\n🎵 Defying Gravity 🎵',
  '"And THAT is how it\'s done!"\nThe horse is still not sure what happened.'
];

function drawNarration() {
  if (!subtitle) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, subtitleAlpha);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  let boxY = H - 90;
  ctx.fillRect(40, boxY, W - 80, 75);
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 2;
  ctx.strokeRect(40, boxY, W - 80, 75);
  ctx.fillStyle = '#f0e6c8';
  ctx.font = 'italic 14px Georgia, serif';
  ctx.textAlign = 'center';
  let lines = subtitle.split('\n');
  lines.forEach((line, i) => {
    ctx.fillText(line, W / 2, boxY + 25 + i * 22);
  });
  ctx.restore();
}

// Scene logic
function updateScene(dt) {
  sceneT += dt;
  let swampY = H * 0.55;
  let baronX = W * 0.45;

  switch (scene) {
    case 0: // Walking confidently
      baron.x = -80 + sceneT * 80;
      baron.walkCycle = sceneT;
      setSubtitle(narrations[0]);
      if (sceneT > 0.5 && baron.x > baronX) baron.x = baronX;
      if (sceneT > 4) nextScene();
      break;

    case 1: // Sinking!
      baron.x = baronX;
      baron.walkCycle = 0;
      baron.sinkDepth = Math.min(55, sceneT * 18);
      baron.panic = Math.min(1, sceneT * 0.5);
      setSubtitle(narrations[1]);
      // Mud bubbles
      if (Math.random() < 0.15) {
        bubbles.push(new Bubble(baronX, swampY));
      }
      if (Math.random() < 0.08) {
        particles.push(new Particle(
          baronX + (Math.random() - 0.5) * 40, swampY,
          (Math.random() - 0.5) * 30, -Math.random() * 60,
          '#5c4033', 0.8, 3
        ));
      }
      if (sceneT > 4) nextScene();
      break;

    case 2: // Eureka
      baron.x = baronX;
      baron.sinkDepth = 55;
      baron.panic = Math.max(0, 1 - sceneT * 0.5);
      baron.eureka = Math.min(1, sceneT * 0.8);
      setSubtitle(narrations[2]);
      if (sceneT > 3.5) nextScene();
      break;

    case 3: // Grabbing hair
      baron.x = baronX;
      baron.sinkDepth = 55;
      baron.eureka = Math.max(0, 1 - sceneT * 2);
      baron.pull = Math.min(1, sceneT * 0.4);
      baron.panic = 0;
      setSubtitle(narrations[3]);
      // Strain effect
      if (Math.random() < 0.05) {
        particles.push(new Particle(
          baronX + (Math.random() - 0.5) * 20, swampY - 60,
          (Math.random() - 0.5) * 20, -Math.random() * 30,
          '#ffd700', 0.5, 2
        ));
      }
      if (sceneT > 3.5) nextScene();
      break;

    case 4: // Rising out!
      baron.x = baronX;
      baron.pull = 1;
      baron.eureka = 0;
      baron.sinkDepth = Math.max(0, 55 - sceneT * 16);
      setSubtitle(narrations[4]);
      // Mud dripping
      if (Math.random() < 0.2) {
        particles.push(new Particle(
          baronX + (Math.random() - 0.5) * 30, swampY - 10,
          (Math.random() - 0.5) * 15, Math.random() * 20,
          '#5c4033', 1, 3
        ));
      }
      // Sparkles as he rises
      if (Math.random() < 0.1) {
        sparkles.push(new Sparkle(baronX, swampY - 50));
      }
      if (baron.sinkDepth <= 0 && sceneT > 4) nextScene();
      break;

    case 5: // Triumph!
      baron.x = baronX;
      baron.sinkDepth = 0;
      baron.pull = Math.max(0, 1 - sceneT);
      baron.triumph = Math.min(1, sceneT * 0.5);
      baron.panic = 0;
      baron.eureka = 0;
      setSubtitle(narrations[5]);
      // Victory sparkles
      if (Math.random() < 0.15) {
        sparkles.push(new Sparkle(baronX, swampY - 80));
      }
      break;
  }
}

function nextScene() {
  scene++;
  sceneT = 0;
  if (scene >= SCENES) scene = SCENES - 1;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawSwamp();

  let swampY = H * 0.55;

  // Ground patches on sides
  if (scene === 0) drawGround(0, W);
  if (scene >= 5) drawGround(baron.x - 80, baron.x + 80);

  // Horse (appears in scene 4+)
  if (scene >= 4) {
    let horseSink = scene === 4 ? Math.max(0, 40 - sceneT * 10) : 0;
    drawHorse(baron.x + 70, swampY, horseSink);
  }

  // Baron
  drawBaron(baron.x, swampY, {
    sink: baron.sinkDepth || 0,
    walk: baron.walkCycle || 0,
    panic: baron.panic || 0,
    pull: baron.pull || 0,
    triumph: baron.triumph || 0,
    eureka: baron.eureka || 0
  });

  // Particles
  particles.forEach(p => p.draw());
  bubbles.forEach(b => b.draw());
  sparkles.forEach(s => s.draw());

  // Narration
  drawNarration();

  // Scene indicator
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`Scene ${scene + 1}/${SCENES}`, 10, 20);
}

let lastTime = 0;
function loop(time) {
  let dt = Math.min(0.05, (time - lastTime) / 1000);
  lastTime = time;
  totalT += dt;

  updateScene(dt);

  // Update particles
  particles.forEach(p => p.update(dt));
  bubbles.forEach(b => b.update(dt));
  sparkles.forEach(s => s.update(dt));
  particles = particles.filter(p => p.life > 0);
  bubbles = bubbles.filter(b => b.life > 0);
  sparkles = sparkles.filter(s => s.life > 0);

  subtitleAlpha = Math.max(0, subtitleAlpha - dt * 0.1);

  draw();
  requestAnimationFrame(loop);
}

// Click to advance/replay
C.addEventListener('click', () => {
  if (scene >= SCENES - 1) {
    // Reset
    scene = 0; sceneT = 0; totalT = 0;
    baron = { x: -80, y: 0, sinkDepth: 0, pullProgress: 0, armAngle: 0, legAngle: 0, eyeSize: 1, mouthOpen: 0, hatAngle: 0, walkCycle: 0 };
    particles = []; bubbles = []; sparkles = [];
  } else {
    nextScene();
  }
});

requestAnimationFrame(loop);
</script>
