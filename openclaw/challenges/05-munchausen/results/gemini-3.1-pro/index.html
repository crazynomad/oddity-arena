<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baron Munchausen's Swamp Escape</title>
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a2e; font-family: sans-serif; }
    canvas { display: block; }
    #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 1px 1px 2px black; pointer-events: none; }
    h1 { margin: 0 0 5px 0; font-size: 24px; color: #e94560; }
    p { margin: 0; font-size: 16px; color: #a2a2d0; }
</style>
</head>
<body>
<div id="ui">
    <h1>The Amazing Baron Munchausen</h1>
    <p id="scene-desc">Walking...</p>
    <p style="font-size: 12px; margin-top: 10px; color: #888;">(Click to advance/replay)</p>
</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const descEl = document.getElementById('scene-desc');

let cw, ch;
function resize() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// 0: walk, 1: sink, 2: panic, 3: eureka, 4: rise, 5: triumph
let scene = 0;
let sceneTime = 0;
let particles = [];

const descriptions = [
    "A casual stroll through the countryside...",
    "Oh no! A treacherous swamp!",
    "Panic! Flailing! Doom is imminent!",
    "Wait... a brilliant, physically impossible idea!",
    "HUUURGH! Pulling oneself up by one's own ponytail!",
    "Physics? Never heard of her. Triumphant return!"
];

const baron = {
    x: -100, y: 0, targetY: 0,
    armAngle: 0, legAngle: 0,
    sweat: 0, expression: 'neutral',
    hairStretch: 0, pulling: false
};

function initScene(s) {
    scene = s;
    sceneTime = 0;
    descEl.innerText = descriptions[s];
    
    if (s === 0) {
        baron.x = -100;
        baron.y = ch - 250;
        baron.targetY = ch - 250;
        baron.expression = 'neutral';
        baron.hairStretch = 0;
        baron.pulling = false;
        particles = [];
    } else if (s === 1) {
        baron.targetY = ch - 120;
        baron.expression = 'shock';
    } else if (s === 2) {
        baron.expression = 'panic';
    } else if (s === 3) {
        baron.expression = 'eureka';
    } else if (s === 4) {
        baron.expression = 'strain';
        baron.pulling = true;
        baron.targetY = ch - 350; // Pulling up
    } else if (s === 5) {
        baron.expression = 'triumph';
        baron.pulling = false;
        baron.targetY = ch - 250; // Land on solid ground
        for(let i=0; i<100; i++) createConfetti();
    }
}

function nextScene() {
    let next = scene + 1;
    if (next > 5) next = 0;
    initScene(next);
}

window.addEventListener('click', nextScene);

function createBubble() {
    particles.push({
        type: 'bubble',
        x: cw/2 - 150 + Math.random()*300,
        y: ch - 50 + Math.random()*50,
        r: Math.random()*5 + 2,
        vy: -Math.random()*1 - 0.5,
        life: 1
    });
}

function createSweat() {
    particles.push({
        type: 'sweat',
        x: baron.x + (Math.random() > 0.5 ? 20 : -20),
        y: baron.y - 80,
        vy: Math.random()*2 + 1,
        life: 1
    });
}

function createConfetti() {
    particles.push({
        type: 'confetti',
        x: cw/2,
        y: ch/2,
        vx: (Math.random()-0.5)*15,
        vy: (Math.random()-1.0)*15,
        color: `hsl(${Math.random()*360}, 100%, 50%)`,
        life: 1
    });
}

function drawBaron(ctx) {
    ctx.save();
    ctx.translate(baron.x, baron.y);
    
    // Body
    ctx.fillStyle = '#e94560';
    ctx.fillRect(-15, -60, 30, 60);
    
    // Legs
    ctx.strokeStyle = '#0f3460';
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    
    let legSwing = Math.sin(baron.legAngle) * 20;
    if (scene === 1 || scene === 2) legSwing = Math.sin(sceneTime*10)*10;
    if (scene === 4) legSwing = 0;
    if (scene === 5) legSwing = 0;

    // Left leg
    ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(-10 + legSwing, 40); ctx.stroke();
    // Right leg
    ctx.beginPath(); ctx.moveTo(5, 0); ctx.lineTo(10 - legSwing, 40); ctx.stroke();
    
    // Arms
    ctx.strokeStyle = '#e94560';
    let armSwing = Math.sin(baron.armAngle) * 30;
    
    if (scene === 2) { // Panic
        armSwing = Math.sin(sceneTime*15)*40;
        ctx.beginPath(); ctx.moveTo(-15, -50); ctx.lineTo(-40, -80 + armSwing); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(15, -50); ctx.lineTo(40, -80 - armSwing); ctx.stroke();
    } else if (baron.pulling) { // Pulling hair
        let pullCycle = Math.sin(sceneTime*5)*10;
        ctx.beginPath(); ctx.moveTo(-15, -50); ctx.lineTo(-10, -120 + pullCycle); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(15, -50); ctx.lineTo(10, -120 + pullCycle); ctx.stroke();
    } else if (scene === 5) { // Triumph
        ctx.beginPath(); ctx.moveTo(-15, -50); ctx.lineTo(-40, -90); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(15, -50); ctx.lineTo(40, -90); ctx.stroke();
    } else { // Walk/Sink/Eureka
        ctx.beginPath(); ctx.moveTo(-15, -50); ctx.lineTo(-20 + armSwing, -10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(15, -50); ctx.lineTo(20 - armSwing, -10); ctx.stroke();
    }
    
    // Head
    ctx.fillStyle = '#fbc5b5';
    ctx.beginPath(); ctx.arc(0, -80, 20, 0, Math.PI*2); ctx.fill();
    
    // Ponytail (Hair)
    ctx.strokeStyle = '#4a3b32';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(0, -100);
    if (baron.pulling) {
        let pullCycle = Math.sin(sceneTime*5)*10;
        ctx.lineTo(0, -130 + pullCycle); // Stretched up
    } else {
        ctx.quadraticCurveTo(20, -110, 25, -70); // Drooping down
    }
    ctx.stroke();

    // Mustache
    ctx.fillStyle = '#4a3b32';
    ctx.beginPath(); ctx.ellipse(0, -75, 15, 5, 0, 0, Math.PI, true); ctx.fill();
    
    // Eyes
    ctx.fillStyle = 'black';
    if (baron.expression === 'neutral') {
        ctx.fillRect(-8, -85, 4, 4); ctx.fillRect(4, -85, 4, 4);
    } else if (baron.expression === 'shock' || baron.expression === 'panic') {
        ctx.beginPath(); ctx.arc(-6, -85, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -85, 3, 0, Math.PI*2); ctx.fill();
    } else if (baron.expression === 'eureka') {
        ctx.fillRect(-8, -87, 4, 6); ctx.fillRect(4, -87, 4, 6);
    } else if (baron.expression === 'strain') {
        ctx.beginPath(); ctx.moveTo(-10, -85); ctx.lineTo(-5, -83); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(10, -85); ctx.lineTo(5, -83); ctx.stroke();
    } else if (baron.expression === 'triumph') {
        ctx.beginPath(); ctx.arc(-6, -85, 3, Math.PI, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(6, -85, 3, Math.PI, Math.PI*2); ctx.stroke();
    }

    // Mouth
    if (baron.expression === 'shock' || baron.expression === 'panic') {
        ctx.beginPath(); ctx.arc(0, -70, 4, 0, Math.PI*2); ctx.fill();
    } else if (baron.expression === 'eureka') {
        ctx.beginPath(); ctx.arc(0, -72, 6, 0, Math.PI, false); ctx.stroke();
    } else if (baron.expression === 'strain') {
        ctx.beginPath(); ctx.moveTo(-5, -70); ctx.lineTo(5, -70); ctx.stroke();
    }
    
    ctx.restore();
}

function drawSwamp() {
    // Solid ground left and right
    ctx.fillStyle = '#2d4a22';
    if(scene !== 5) {
        ctx.fillRect(0, ch - 200, cw/2 - 150, 200);
        ctx.fillRect(cw/2 + 150, ch - 200, cw/2, 200);
    } else {
        ctx.fillRect(0, ch - 200, cw, 200); // Swamp closed up/moved past
    }
    
    if(scene !== 5) {
        // Swamp water
        ctx.fillStyle = '#3a4a12';
        let waveY = Math.sin(Date.now() / 300) * 5;
        ctx.fillRect(cw/2 - 150, ch - 150 + waveY, 300, 150 - waveY);
    }
}

function update(dt) {
    sceneTime += dt;
    
    // Auto-advance
    const durations = [4, 3, 4, 3, 5, 5];
    if (sceneTime > durations[scene]) {
        nextScene();
    }
    
    // Baron movement logic
    baron.y += (baron.targetY - baron.y) * 0.05;
    
    if (scene === 0) {
        baron.x += 100 * dt;
        baron.legAngle += 10 * dt;
        baron.armAngle += 10 * dt;
        if (baron.x > cw/2) {
            baron.x = cw/2;
            nextScene();
        }
    } else if (scene === 1 || scene === 2) {
        if (Math.random() < 0.1) createBubble();
    }
    
    if (scene === 2 && Math.random() < 0.2) createSweat();
    
    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.life -= dt * 0.5;
        if (p.type === 'bubble') {
            p.y += p.vy;
            p.x += Math.sin(p.y*0.1)*0.5;
        } else if (p.type === 'sweat') {
            p.y += p.vy;
            p.vy += 0.1;
        } else if (p.type === 'confetti') {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.5; // gravity
        }
        if (p.life <= 0 || p.y > ch) particles.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, cw, ch);
    
    drawSwamp();
    
    // Draw Particles
    for (let p of particles) {
        if (p.type === 'bubble') {
            ctx.strokeStyle = 'rgba(150, 200, 100, ' + p.life + ')';
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
        } else if (p.type === 'sweat') {
            ctx.fillStyle = 'rgba(100, 200, 255, ' + p.life + ')';
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
        } else if (p.type === 'confetti') {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 6, 6);
        }
    }
    
    drawBaron(ctx);
    
    if (scene === 3) { // Eureka lightbulb
        ctx.fillStyle = 'yellow';
        ctx.beginPath(); ctx.arc(baron.x, baron.y - 150, 15, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'orange';
        ctx.fillRect(baron.x - 5, baron.y - 135, 10, 10);
        // rays
        ctx.strokeStyle = 'yellow';
        ctx.lineWidth = 2;
        let t = Date.now() / 100;
        for(let i=0; i<8; i++) {
            let angle = (i/8)*Math.PI*2 + t;
            ctx.beginPath();
            ctx.moveTo(baron.x + Math.cos(angle)*20, baron.y - 150 + Math.sin(angle)*20);
            ctx.lineTo(baron.x + Math.cos(angle)*30, baron.y - 150 + Math.sin(angle)*30);
            ctx.stroke();
        }
    }
}

let lastTime = performance.now();
function loop(time) {
    let dt = (time - lastTime) / 1000;
    lastTime = time;
    if (dt > 0.1) dt = 0.1;
    
    update(dt);
    draw();
    
    requestAnimationFrame(loop);
}

initScene(0);
requestAnimationFrame(loop);
</script>
</body>
</html>
