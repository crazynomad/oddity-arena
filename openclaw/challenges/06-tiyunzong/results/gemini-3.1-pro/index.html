<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梯云纵 (Ti Yun Zong) - Ink Canvas</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #eaddcf; /* Rice paper base */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 0, 0, 0.5);
            font-size: 14px;
            letter-spacing: 2px;
            pointer-events: none;
            text-align: center;
        }
        h1 {
            position: absolute;
            top: 20px;
            right: 30px;
            writing-mode: vertical-rl;
            font-family: 'STKaiti', 'Kaiti SC', serif;
            color: #1a1a1a;
            font-size: 48px;
            margin: 0;
            opacity: 0.8;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            pointer-events: none;
        }
        .seal {
            position: absolute;
            top: 250px;
            right: 35px;
            width: 30px;
            height: 30px;
            border: 2px solid #b32d2d;
            color: #b32d2d;
            writing-mode: vertical-rl;
            font-family: 'STSong', 'Songti SC', serif;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>梯云纵</h1>
    <div class="seal">武当</div>
    <canvas id="canvas"></canvas>
    <div id="ui">CLICK TO REPLAY</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Utils ---
        const rand = (min, max) => Math.random() * (max - min) + min;
        const easeOutCubic = x => 1 - Math.pow(1 - x, 3);

        // --- Camera ---
        const camera = {
            y: 0,
            targetY: 0,
            update() {
                this.y += (this.targetY - this.y) * 0.1;
            }
        };

        // --- Particles ---
        let particles = [];
        let shockwaves = [];
        let afterimages = [];

        class InkSplash {
            constructor(x, y, vx, vy, size, life, color = '#1a1a1a') {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.size = size;
                this.life = life;
                this.maxLife = life;
                this.color = color;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.92;
                this.vy *= 0.92;
                this.size *= 0.95;
                this.life--;
            }
            draw(ctx) {
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y - camera.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Shockwave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                this.life = 30;
                this.maxLife = 30;
            }
            update() {
                this.radius += 8;
                this.life--;
            }
            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 2 * alpha;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y - camera.y, this.radius, this.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        // --- Environment / Parallax ---
        function drawMountains() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.beginPath();
            ctx.moveTo(0, height);
            let offset = camera.y * 0.2;
            ctx.lineTo(0, height - 300 + offset);
            ctx.quadraticCurveTo(width * 0.25, height - 500 + offset, width * 0.5, height - 200 + offset);
            ctx.quadraticCurveTo(width * 0.75, height + 100 + offset, width, height - 400 + offset);
            ctx.lineTo(width, height);
            ctx.fill();
        }

        function drawBamboo() {
            ctx.strokeStyle = 'rgba(20, 30, 20, 0.15)';
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            let offset = camera.y * 0.5;
            for(let i=0; i<10; i++) {
                let x = (i * 150 + (offset * 0.1)) % (width + 200) - 100;
                ctx.beginPath();
                ctx.moveTo(x, height + 100);
                ctx.lineTo(x + 20, height - 800 + offset);
                ctx.stroke();
            }
        }

        function drawMoon() {
            ctx.fillStyle = 'rgba(255, 255, 240, 0.8)';
            ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
            ctx.shadowBlur = 50;
            ctx.beginPath();
            ctx.arc(width * 0.2, 200 + camera.y * 0.05, 60, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // --- Warrior ---
        const STATES = { SETUP:0, CROUCH:1, LEAP:2, ASCEND:3, PEAK:4, DESCENT:5, LANDING:6 };
        let warrior = {
            x: width / 2,
            y: 0, // 0 is ground, negative is up
            vx: 0,
            vy: 0,
            state: STATES.SETUP,
            stateTimer: 0,
            stepCount: 0,
            maxSteps: 5,
            pose: 0, // 0 to 1 for animation

            reset() {
                this.x = width / 2;
                this.y = 0;
                this.vx = 0;
                this.vy = 0;
                this.state = STATES.SETUP;
                this.stateTimer = 0;
                this.stepCount = 0;
                particles = [];
                shockwaves = [];
                afterimages = [];
                camera.y = 0;
                camera.targetY = 0;
            },

            spawnQi() {
                shockwaves.push(new Shockwave(this.x, this.y));
                for(let i=0; i<30; i++) {
                    let angle = rand(0, Math.PI*2);
                    let speed = rand(2, 8);
                    particles.push(new InkSplash(
                        this.x + rand(-20, 20), 
                        this.y + rand(-10, 10), 
                        Math.cos(angle)*speed, 
                        Math.sin(angle)*speed + (this.vy > 0 ? -2 : 2), 
                        rand(2, 8), 
                        rand(20, 40)
                    ));
                }
            },

            update() {
                this.stateTimer++;

                switch(this.state) {
                    case STATES.SETUP:
                        if(this.stateTimer > 60) {
                            this.state = STATES.CROUCH;
                            this.stateTimer = 0;
                        }
                        break;
                    case STATES.CROUCH:
                        this.pose = Math.min(1, this.stateTimer / 20);
                        if(this.stateTimer > 30) {
                            this.state = STATES.LEAP;
                            this.vy = -20;
                            this.spawnQi();
                        }
                        break;
                    case STATES.LEAP:
                    case STATES.ASCEND:
                        this.vy += 0.5; // Gravity
                        this.y += this.vy;
                        
                        // Afterimage tracking
                        if(this.stateTimer % 3 === 0) {
                            afterimages.push({x: this.x, y: this.y, life: 15, maxLife: 15});
                        }

                        // Trigger next step when velocity approaches 0
                        if(this.vy > -2 && this.stepCount < this.maxSteps) {
                            this.stepCount++;
                            this.vy = -22 - (this.stepCount * 1.5); // Stepping harder
                            this.state = STATES.ASCEND;
                            this.spawnQi();
                            
                            // Visual flair for step
                            let side = this.stepCount % 2 === 0 ? -1 : 1;
                            this.x += side * 20; // Shift slightly
                        } else if (this.vy > 0 && this.stepCount >= this.maxSteps) {
                            this.state = STATES.PEAK;
                            this.stateTimer = 0;
                        }
                        break;
                    case STATES.PEAK:
                        this.vy += 0.4;
                        this.y += this.vy;
                        if(this.vy > 5) this.state = STATES.DESCENT;
                        break;
                    case STATES.DESCENT:
                        this.vy += 0.6; // Falling faster
                        this.y += this.vy;
                        if(this.stateTimer % 4 === 0) {
                            afterimages.push({x: this.x, y: this.y, life: 10, maxLife: 10, fade: true});
                        }
                        if(this.y >= 0) {
                            this.y = 0;
                            this.state = STATES.LANDING;
                            this.stateTimer = 0;
                            this.spawnQi();
                            // Dust
                            for(let i=0; i<20; i++) {
                                particles.push(new InkSplash(this.x, this.y, rand(-10, 10), rand(-5, 0), rand(5, 15), 50, '#555'));
                            }
                        }
                        break;
                    case STATES.LANDING:
                        this.pose = Math.max(0, 1 - (this.stateTimer / 30));
                        if(this.stateTimer > 60) {
                            this.state = STATES.SETUP;
                            this.stateTimer = 0;
                        }
                        break;
                }

                // Smooth camera follow
                let targetCamY = this.y - height * 0.3; // keep warrior in bottom third
                if(targetCamY > 0) targetCamY = 0; // Don't go below ground
                camera.targetY = targetCamY;
                camera.update();
            },

            draw(ctx) {
                let drawY = this.y - camera.y;
                let drawX = this.x;

                // Ink Style setup
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#0f0f0f';
                ctx.fillStyle = '#0f0f0f';

                ctx.save();
                ctx.translate(drawX, drawY);

                // Draw abstract ink warrior
                // Body
                ctx.lineWidth = 14;
                ctx.beginPath();
                
                let crouchAmount = (this.state === STATES.CROUCH || this.state === STATES.LANDING) ? this.pose * 20 : 0;
                let stretchAmount = (this.state === STATES.LEAP || this.state === STATES.ASCEND) ? -this.vy * 1.5 : 0;

                ctx.moveTo(0, -50 + crouchAmount - stretchAmount); // Head base
                ctx.quadraticCurveTo(10, -25 + crouchAmount, 0, 0); // Spine
                ctx.stroke();

                // Head
                ctx.beginPath();
                ctx.arc(0, -60 + crouchAmount - stretchAmount, 10, 0, Math.PI*2);
                ctx.fill();

                // Sash / Ribbon (Red accent)
                ctx.strokeStyle = '#b32d2d';
                ctx.lineWidth = 4;
                ctx.beginPath();
                let wind = Math.sin(Date.now() * 0.01) * 10;
                let trailY = (this.vy < 0) ? 40 : 10;
                ctx.moveTo(-5, -20 + crouchAmount);
                ctx.quadraticCurveTo(-30 + wind, -10 + trailY, -40 + wind, -30 + trailY);
                ctx.stroke();

                // Legs
                ctx.strokeStyle = '#0f0f0f';
                ctx.lineWidth = 10;
                ctx.beginPath();
                if(this.state === STATES.ASCEND) {
                    // One leg stepping on the other
                    let side = this.stepCount % 2 === 0 ? 1 : -1;
                    ctx.moveTo(0, 0);
                    ctx.lineTo(side * 15, 20); // Stepping leg
                    ctx.moveTo(0, 0);
                    ctx.lineTo(-side * 10, 10);
                    ctx.lineTo(0, 25); // Stepped leg
                } else if (this.state === STATES.CROUCH) {
                    ctx.moveTo(0, 0);
                    ctx.lineTo(-20, 20);
                    ctx.moveTo(0, 0);
                    ctx.lineTo(20, 20);
                } else {
                    ctx.moveTo(0, 0);
                    ctx.lineTo(-10, 30 + stretchAmount * 0.5);
                    ctx.moveTo(0, 0);
                    ctx.lineTo(10, 25 + stretchAmount * 0.5);
                }
                ctx.stroke();

                ctx.restore();
            }
        };

        // --- Main Loop ---
        function loop() {
            // Clear canvas (simulate paper texture by just clearing, CSS handles texture)
            ctx.clearRect(0, 0, width, height);

            drawMoon();
            drawMountains();
            drawBamboo();

            // Ground
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.rect(0, height - camera.y, width, height);
            ctx.fill();

            // Update & Draw
            warrior.update();

            // Afterimages
            for(let i = afterimages.length - 1; i >= 0; i--) {
                let ai = afterimages[i];
                ai.life--;
                if(ai.life <= 0) {
                    afterimages.splice(i, 1);
                    continue;
                }
                ctx.globalAlpha = (ai.life / ai.maxLife) * 0.3;
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(ai.x, ai.y - camera.y - 30, 15, 0, Math.PI*2); // Ghost blob
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            warrior.draw(ctx);

            for(let i = shockwaves.length - 1; i >= 0; i--) {
                shockwaves[i].update();
                shockwaves[i].draw(ctx);
                if(shockwaves[i].life <= 0) shockwaves.splice(i, 1);
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if(particles[i].life <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(loop);
        }

        // --- Input ---
        window.addEventListener('click', () => {
            if(warrior.state === STATES.SETUP || warrior.state === STATES.LANDING) {
                warrior.reset();
                warrior.stateTimer = 61; // Force start
            } else {
                warrior.reset(); // Interrupt
            }
        });

        // Start
        resize();
        warrior.reset();
        loop();

    </script>
</body>
</html>
