<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梯云纵 — Tī Yún Zòng</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: pointer; }
canvas { display: block; }
#hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(80,60,40,0.6); font: 16px serif; pointer-events: none;
  opacity: 0; transition: opacity 1s;
}
#hint.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">点击重放 · Click to Replay</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

// --- Colors & Style ---
const RICE = '#f5f0e8';
const INK = '#2a1f14';
const INK_LIGHT = 'rgba(42,31,20,0.3)';
const INK_MED = 'rgba(42,31,20,0.55)';
const MOON_COLOR = '#fffbe6';

// --- State ---
let time = 0, phase = 'setup', phaseTime = 0, cameraY = 0, targetCameraY = 0;
let warrior = { x: 0, y: 0, vy: 0, crouchT: 0, frame: 0, stepCount: 0 };
let particles = [], afterimages = [], shockwaves = [];
let animDone = false;

// --- Background layers ---
function drawMoon(cy) {
  const mx = W * 0.75, my = 120 - cy * 0.05;
  ctx.save();
  ctx.globalAlpha = 0.85;
  const g = ctx.createRadialGradient(mx, my, 0, mx, my, 60);
  g.addColorStop(0, MOON_COLOR);
  g.addColorStop(0.7, 'rgba(255,251,230,0.4)');
  g.addColorStop(1, 'rgba(255,251,230,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(mx, my, 60, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = MOON_COLOR;
  ctx.beginPath(); ctx.arc(mx, my, 28, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawMountains(cy) {
  ctx.save();
  // far mountains
  ctx.fillStyle = 'rgba(42,31,20,0.12)';
  ctx.beginPath(); ctx.moveTo(-50, H);
  const pts = [[0,0.45],[0.15,0.32],[0.3,0.38],[0.45,0.22],[0.55,0.28],[0.7,0.18],[0.85,0.3],[1,0.35],[1.05,0.5]];
  for (const [px,py] of pts) ctx.lineTo(px * W, py * H - cy * 0.1);
  ctx.lineTo(W + 50, H); ctx.fill();
  // near mountains
  ctx.fillStyle = 'rgba(42,31,20,0.2)';
  ctx.beginPath(); ctx.moveTo(-50, H);
  const pts2 = [[0,0.55],[0.12,0.42],[0.25,0.48],[0.4,0.35],[0.55,0.45],[0.65,0.38],[0.8,0.42],[0.95,0.5],[1.05,0.6]];
  for (const [px,py] of pts2) ctx.lineTo(px * W, py * H - cy * 0.15);
  ctx.lineTo(W + 50, H); ctx.fill();
  ctx.restore();
}

function drawClouds(cy, t) {
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = INK;
  for (let i = 0; i < 5; i++) {
    const bx = ((i * 300 + t * 0.3 * (i % 2 ? 1 : -1)) % (W + 400)) - 200;
    const by = 100 + i * 80 - cy * (0.08 + i * 0.02);
    for (let j = 0; j < 4; j++) {
      ctx.beginPath();
      ctx.ellipse(bx + j * 35, by + Math.sin(j) * 10, 50, 20, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawBamboo(cy) {
  ctx.save();
  const bamboos = [
    { x: W * 0.08, parallax: 0.3, alpha: 0.15, w: 4 },
    { x: W * 0.15, parallax: 0.35, alpha: 0.18, w: 3 },
    { x: W * 0.88, parallax: 0.25, alpha: 0.13, w: 5 },
    { x: W * 0.92, parallax: 0.3, alpha: 0.16, w: 3 },
    { x: W * 0.05, parallax: 0.4, alpha: 0.22, w: 4 },
    { x: W * 0.95, parallax: 0.38, alpha: 0.2, w: 3 },
  ];
  for (const b of bamboos) {
    ctx.strokeStyle = INK;
    ctx.globalAlpha = b.alpha;
    ctx.lineWidth = b.w;
    const baseY = H + 50 - cy * b.parallax;
    ctx.beginPath();
    ctx.moveTo(b.x, baseY);
    ctx.lineTo(b.x - 3, baseY - 600);
    ctx.stroke();
    // nodes
    for (let n = 0; n < 5; n++) {
      const ny = baseY - 80 - n * 100;
      ctx.beginPath();
      ctx.ellipse(b.x, ny, b.w + 2, 3, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    // leaves
    ctx.lineWidth = 1.5;
    for (let n = 0; n < 4; n++) {
      const ny = baseY - 120 - n * 110;
      const dir = n % 2 ? 1 : -1;
      ctx.beginPath();
      ctx.moveTo(b.x, ny);
      ctx.quadraticCurveTo(b.x + dir * 30, ny - 15, b.x + dir * 50, ny - 5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(b.x, ny - 15);
      ctx.quadraticCurveTo(b.x + dir * 25, ny - 35, b.x + dir * 45, ny - 28);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawGround(cy) {
  const gy = H * 0.82 - cy * 0.5;
  ctx.save();
  ctx.strokeStyle = INK_MED;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, gy);
  for (let x = 0; x <= W; x += 5) {
    ctx.lineTo(x, gy + Math.sin(x * 0.02) * 3 + Math.sin(x * 0.007) * 5);
  }
  ctx.stroke();
  // grass hints
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.25;
  for (let i = 0; i < 30; i++) {
    const gx = (i / 30) * W;
    const gby = gy + Math.sin(gx * 0.02) * 3 + Math.sin(gx * 0.007) * 5;
    ctx.beginPath();
    ctx.moveTo(gx, gby);
    ctx.quadraticCurveTo(gx + 5, gby - 15, gx + 2, gby - 25);
    ctx.stroke();
  }
  ctx.restore();
  return gy;
}

// --- Warrior (stick figure, ink style) ---
function drawWarrior(x, y, cy, crouchFactor, stepAnim) {
  const sy = y - cy * 0.5;
  const sx = x;
  const h = 50 * (1 - crouchFactor * 0.3);
  ctx.save();
  ctx.strokeStyle = INK;
  ctx.fillStyle = INK;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // body
  const headY = sy - h;
  const hipY = sy - h * 0.35;
  const shoulderY = sy - h * 0.7;
  // head
  ctx.beginPath();
  ctx.arc(sx, headY, 8, 0, Math.PI * 2);
  ctx.stroke();
  // hair ribbon
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(sx + 5, headY - 5);
  ctx.quadraticCurveTo(sx + 20, headY - 15, sx + 25, headY - 5);
  ctx.stroke();
  ctx.lineWidth = 3;
  // torso
  ctx.beginPath();
  ctx.moveTo(sx, headY + 8);
  ctx.lineTo(sx, hipY);
  ctx.stroke();
  // arms - flowing robes
  const armWave = Math.sin(stepAnim * 3) * 10;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx, shoulderY);
  ctx.quadraticCurveTo(sx - 20, shoulderY + 10 + armWave, sx - 35, shoulderY + 5 + armWave);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(sx, shoulderY);
  ctx.quadraticCurveTo(sx + 20, shoulderY + 10 - armWave, sx + 35, shoulderY + 5 - armWave);
  ctx.stroke();
  // robe/skirt
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx - 15, sy + 5);
  ctx.lineTo(sx, hipY);
  ctx.lineTo(sx + 15, sy + 5);
  ctx.stroke();
  // legs
  const legSpread = crouchFactor * 10 + Math.abs(Math.sin(stepAnim * 4)) * 8;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(sx, hipY);
  ctx.lineTo(sx - legSpread, sy);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(sx, hipY);
  ctx.lineTo(sx + legSpread, sy);
  ctx.stroke();
  ctx.restore();
}

// --- Particles ---
function spawnInkSplash(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      life: 1, decay: 0.01 + Math.random() * 0.02,
      size: 2 + Math.random() * 5,
    });
  }
}

function spawnShockwave(x, y) {
  shockwaves.push({ x, y, r: 5, maxR: 60 + Math.random() * 30, life: 1 });
}

function spawnAfterimage(x, y, crouchF, stepA) {
  afterimages.push({ x, y, crouchF, stepA, life: 1 });
}

// --- Animation Phases ---
const GROUND_Y_BASE = 0.82;
const STEP_HEIGHTS = [100, 190, 270, 340, 400, 440, 460];
const TOTAL_STEPS = STEP_HEIGHTS.length;

function resetAnim() {
  time = 0; phase = 'setup'; phaseTime = 0;
  cameraY = 0; targetCameraY = 0;
  warrior = { x: W * 0.45, y: H * GROUND_Y_BASE, vy: 0, crouchT: 0, frame: 0, stepCount: 0 };
  particles = []; afterimages = []; shockwaves = [];
  animDone = false;
  document.getElementById('hint').classList.remove('show');
}

function updatePhase(dt) {
  phaseTime += dt;
  const groundY = H * GROUND_Y_BASE;

  switch (phase) {
    case 'setup':
      if (phaseTime > 1.2) { phase = 'crouch'; phaseTime = 0; }
      break;
    case 'crouch':
      warrior.crouchT = Math.min(1, phaseTime / 0.6);
      if (phaseTime > 0.8) {
        phase = 'leap'; phaseTime = 0;
        warrior.vy = -8;
        spawnInkSplash(warrior.x, warrior.y, 15);
        spawnShockwave(warrior.x, warrior.y);
      }
      break;
    case 'leap':
      warrior.crouchT = Math.max(0, warrior.crouchT - dt * 3);
      warrior.y += warrior.vy;
      warrior.vy += 0.15;
      if (phaseTime > 0.5) {
        phase = 'steps'; phaseTime = 0; warrior.stepCount = 0;
        warrior.vy = 0;
      }
      break;
    case 'steps': {
      const stepDuration = 0.35;
      const stepIndex = Math.floor(phaseTime / stepDuration);
      const stepT = (phaseTime % stepDuration) / stepDuration;

      if (stepIndex < TOTAL_STEPS) {
        if (stepIndex !== warrior.stepCount) {
          warrior.stepCount = stepIndex;
          spawnInkSplash(warrior.x, warrior.y, 20);
          spawnShockwave(warrior.x, warrior.y);
          spawnAfterimage(warrior.x, warrior.y, 0, warrior.frame);
        }
        const targetY = groundY - STEP_HEIGHTS[stepIndex];
        const prevY = stepIndex > 0 ? groundY - STEP_HEIGHTS[stepIndex - 1] : warrior.y;
        warrior.y = prevY + (targetY - prevY) * easeOutCubic(stepT);
        warrior.x = W * 0.45 + Math.sin(stepIndex * 0.7) * 20;
        targetCameraY = STEP_HEIGHTS[stepIndex] - H * 0.3;
      } else {
        phase = 'peak'; phaseTime = 0;
      }
      break;
    }
    case 'peak':
      warrior.y -= 0.3 * Math.max(0, 1 - phaseTime);
      if (phaseTime > 1.5) { phase = 'descent'; phaseTime = 0; warrior.vy = 0; }
      break;
    case 'descent':
      warrior.vy += 0.25;
      warrior.y += warrior.vy;
      targetCameraY = Math.max(0, targetCameraY - 3);
      if (warrior.y >= groundY) {
        warrior.y = groundY;
        phase = 'landing'; phaseTime = 0;
        spawnInkSplash(warrior.x, warrior.y, 30);
        spawnShockwave(warrior.x, warrior.y);
      }
      break;
    case 'landing':
      warrior.crouchT = Math.max(0, 0.5 - phaseTime);
      targetCameraY = Math.max(0, targetCameraY - 2);
      if (phaseTime > 2) {
        animDone = true;
        document.getElementById('hint').classList.add('show');
      }
      break;
  }

  cameraY += (targetCameraY - cameraY) * 0.06;
  warrior.frame += dt;
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.r += 3; s.life -= 0.04;
    if (s.life <= 0) shockwaves.splice(i, 1);
  }
  for (let i = afterimages.length - 1; i >= 0; i--) {
    afterimages[i].life -= 0.02;
    if (afterimages[i].life <= 0) afterimages.splice(i, 1);
  }
}

// --- Render ---
function render() {
  // Rice paper background
  ctx.fillStyle = RICE;
  ctx.fillRect(0, 0, W, H);
  // subtle paper texture
  ctx.save();
  ctx.globalAlpha = 0.03;
  for (let i = 0; i < 800; i++) {
    ctx.fillStyle = Math.random() > 0.5 ? '#c8b89a' : '#d4c8b0';
    ctx.fillRect(Math.random() * W, Math.random() * H, Math.random() * 3, Math.random() * 3);
  }
  ctx.restore();

  drawMoon(cameraY);
  drawClouds(cameraY, time * 60);
  drawMountains(cameraY);
  drawBamboo(cameraY);
  const gy = drawGround(cameraY);

  // Title text
  if (phase === 'setup') {
    ctx.save();
    ctx.globalAlpha = Math.min(1, phaseTime * 2);
    ctx.fillStyle = INK;
    ctx.font = 'bold 48px serif';
    ctx.textAlign = 'center';
    ctx.fillText('梯云纵', W / 2, H * 0.2 - cameraY * 0.1);
    ctx.font = '18px serif';
    ctx.globalAlpha *= 0.5;
    ctx.fillText('Tī Yún Zòng — Stairway to the Clouds', W / 2, H * 0.2 + 40 - cameraY * 0.1);
    ctx.restore();
  }

  // Afterimages
  for (const a of afterimages) {
    ctx.save();
    ctx.globalAlpha = a.life * 0.3;
    drawWarrior(a.x, a.y, cameraY * 0.5, a.crouchF, a.stepA);
    ctx.restore();
  }

  // Shockwaves
  for (const s of shockwaves) {
    ctx.save();
    ctx.globalAlpha = s.life * 0.4;
    ctx.strokeStyle = INK;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(s.x, s.y - cameraY * 0.5, s.r, 0, Math.PI * 2);
    ctx.stroke();
    // qi energy ring
    ctx.globalAlpha = s.life * 0.15;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(s.x, s.y - cameraY * 0.5, s.r * 0.7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // Particles
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha = p.life * 0.6;
    ctx.fillStyle = INK;
    ctx.beginPath();
    ctx.arc(p.x, p.y - cameraY * 0.5, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Warrior
  drawWarrior(warrior.x, warrior.y, cameraY * 0.5, warrior.crouchT, warrior.frame);

  // Step counter during steps phase
  if (phase === 'steps' || phase === 'peak') {
    ctx.save();
    ctx.fillStyle = INK;
    ctx.globalAlpha = 0.4;
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    const label = `第 ${warrior.stepCount + 1} 步`;
    ctx.fillText(label, warrior.x, warrior.y - cameraY * 0.5 - 70);
    ctx.restore();
  }
}

// --- Loop ---
let lastT = 0;
function loop(ts) {
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  time += dt;

  if (!animDone) {
    updatePhase(dt);
    updateParticles(dt);
  }
  render();
  requestAnimationFrame(loop);
}

// --- Init ---
resetAnim();
requestAnimationFrame(loop);

canvas.addEventListener('click', () => {
  if (animDone) resetAnim();
});
</script>
</body>
</html>
