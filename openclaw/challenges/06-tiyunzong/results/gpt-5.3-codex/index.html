<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梯云纵 · Oddity Arena Challenge 06</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 15%, #1e2735, #0a0d12 60%, #05070a);
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      color: rgba(230, 235, 245, 0.75);
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(255,255,255,0.15);
      pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">点击重演 · 梯云纵</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let w = 0, h = 0, dpr = Math.max(1, Math.min(2, devicePixelRatio || 1));
  const gravity = 1700;

  const state = {
    t0: performance.now(),
    replayFade: 1,
    cameraY: 0,
    peakY: -1200,
    phase: 'setup',
    fighter: {
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      pose: 'stand',
      facing: 1
    },
    stepPlatforms: [],
    particles: [],
    waves: [],
    afterimages: [],
    moon: { x: 0, y: 0, r: 0 }
  };

  const timeline = {
    setupEnd: 1.4,
    leapEnd: 2.5,
    stepsStart: 2.5,
    stepsEnd: 6.4,
    peakEnd: 7.4,
    landingEnd: 9.8,
    total: 11.2
  };

  const stepTimes = [2.65, 3.1, 3.55, 4.0, 4.45, 4.9, 5.35, 5.8, 6.15];

  function resize() {
    w = innerWidth;
    h = innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    state.fighter.x = w * 0.5;
    state.fighter.y = h * 0.75;
    state.moon.x = w * 0.78;
    state.moon.y = h * 0.2;
    state.moon.r = Math.min(w, h) * 0.095;
    buildParallax();
  }

  const parallax = {
    mountainsFar: [],
    mountainsNear: [],
    bamboos: [],
    clouds: []
  };

  function rand(min, max) { return min + Math.random() * (max - min); }

  function buildParallax() {
    parallax.mountainsFar = [];
    parallax.mountainsNear = [];
    parallax.bamboos = [];
    parallax.clouds = [];

    for (let i = 0; i < 8; i++) {
      parallax.mountainsFar.push({
        x: (i / 7) * w + rand(-50, 50),
        y: h * rand(0.58, 0.73),
        bw: rand(220, 360),
        bh: rand(110, 220)
      });
    }
    for (let i = 0; i < 7; i++) {
      parallax.mountainsNear.push({
        x: (i / 6) * w + rand(-60, 60),
        y: h * rand(0.64, 0.8),
        bw: rand(200, 300),
        bh: rand(140, 280)
      });
    }
    for (let i = 0; i < 24; i++) {
      parallax.bamboos.push({
        x: rand(-40, w + 40),
        y: h * rand(0.55, 1.1),
        h: rand(150, 380),
        sw: rand(1.5, 4),
        tilt: rand(-0.08, 0.08),
        layer: Math.random() < 0.55 ? 0 : 1
      });
    }
    for (let i = 0; i < 16; i++) {
      parallax.clouds.push({
        x: rand(-100, w + 100),
        y: rand(-2200, h * 0.5),
        r: rand(28, 72),
        speed: rand(4, 16),
        alpha: rand(0.08, 0.22)
      });
    }
  }

  function resetScene() {
    state.t0 = performance.now();
    state.cameraY = 0;
    state.peakY = -1400;
    state.phase = 'setup';
    state.fighter.x = w * 0.5;
    state.fighter.y = h * 0.75;
    state.fighter.vx = 0;
    state.fighter.vy = 0;
    state.fighter.pose = 'stand';
    state.stepPlatforms = [];
    state.particles = [];
    state.waves = [];
    state.afterimages = [];
    stepTimes.forEach((t, idx) => {
      state.stepPlatforms.push({
        trigger: t,
        done: false,
        x: w * 0.5 + (idx % 2 === 0 ? -1 : 1) * (24 + idx * 2.5),
        y: h * 0.69 - idx * 130,
        foot: idx % 2 === 0 ? 'L' : 'R',
        life: 1,
        born: 0
      });
    });
  }

  function qiBurst(x, y, scale = 1) {
    for (let i = 0; i < 2; i++) {
      state.waves.push({ x, y, r: 10 * scale, a: 0.45, grow: rand(220, 360) * scale });
    }
    for (let i = 0; i < 70; i++) {
      const ang = rand(0, Math.PI * 2);
      const sp = rand(90, 580) * scale;
      state.particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        r: rand(1, 3.4) * scale,
        a: rand(0.25, 0.9),
        ink: Math.random() < 0.7,
        life: rand(0.35, 1.05)
      });
    }
  }

  function update(dt, t) {
    const f = state.fighter;

    if (t < timeline.setupEnd) {
      state.phase = 'setup';
      f.pose = 'prepare';
      f.y = h * 0.75 + Math.sin(t * 7) * 3;
    } else if (t < timeline.leapEnd) {
      if (state.phase !== 'leap') {
        state.phase = 'leap';
        f.vy = -740;
        qiBurst(f.x, f.y + 48, 1.1);
      }
      f.pose = 'leap';
      f.vy += gravity * dt * 0.65;
      f.y += f.vy * dt;
    } else if (t < timeline.stepsEnd) {
      state.phase = 'steps';
      f.pose = 'step';
      for (const st of state.stepPlatforms) {
        if (!st.done && t >= st.trigger) {
          st.done = true;
          st.born = t;
          f.y = st.y - 56;
          f.vy = -620 - (st.trigger - timeline.stepsStart) * 24;
          qiBurst(st.x, st.y + 8, 0.95 + (st.trigger - timeline.stepsStart) * 0.06);
          state.afterimages.push({ x: f.x, y: f.y, life: 0.65, pose: f.pose });
        }
      }
      f.vy += gravity * dt * 0.72;
      f.y += f.vy * dt;
    } else if (t < timeline.peakEnd) {
      if (state.phase !== 'peak') {
        state.phase = 'peak';
        qiBurst(f.x, f.y, 1.3);
      }
      f.pose = 'peak';
      f.vy += gravity * dt * 0.35;
      f.y += f.vy * dt;
    } else if (t < timeline.landingEnd) {
      state.phase = 'landing';
      f.pose = 'fall';
      f.vy += gravity * dt;
      f.y += f.vy * dt;
      const ground = h * 0.75;
      if (f.y >= ground) {
        f.y = ground;
        if (f.vy > 220) {
          qiBurst(f.x, ground + 52, 1.15);
          f.vy = -f.vy * 0.18;
        } else {
          f.vy = 0;
          f.pose = 'land';
        }
      }
    } else {
      state.phase = 'end';
      f.pose = 'still';
      f.vy = 0;
      f.y = h * 0.75;
    }

    const targetCam = Math.min(0, -((h * 0.75 - f.y) - h * 0.25));
    state.cameraY += (targetCam - state.cameraY) * Math.min(1, dt * 3.8);

    for (const p of state.particles) {
      p.vy += gravity * dt * (p.ink ? 0.4 : 0.2);
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.a -= dt * (p.ink ? 0.6 : 1.1);
      p.life -= dt;
    }
    state.particles = state.particles.filter(p => p.life > 0 && p.a > 0.02);

    for (const wv of state.waves) {
      wv.r += wv.grow * dt;
      wv.a -= dt * 0.55;
    }
    state.waves = state.waves.filter(wv => wv.a > 0.01);

    for (const a of state.afterimages) a.life -= dt;
    state.afterimages = state.afterimages.filter(a => a.life > 0);

    for (const cl of parallax.clouds) {
      cl.x += cl.speed * dt;
      if (cl.x > w + 130) cl.x = -130;
    }
  }

  function inkStroke(pathFn, alpha = 1) {
    ctx.save();
    ctx.globalAlpha *= alpha;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    pathFn();
    ctx.restore();
  }

  function drawBackground() {
    const gy = state.cameraY;
    ctx.save();
    const grd = ctx.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, '#182230');
    grd.addColorStop(0.55, '#0f1722');
    grd.addColorStop(1, '#080b10');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, w, h);

    const moonY = state.moon.y - gy * 0.08;
    const moonGrad = ctx.createRadialGradient(state.moon.x, moonY, 0, state.moon.x, moonY, state.moon.r * 1.8);
    moonGrad.addColorStop(0, 'rgba(240,245,255,0.24)');
    moonGrad.addColorStop(0.55, 'rgba(220,230,245,0.10)');
    moonGrad.addColorStop(1, 'rgba(220,230,245,0.00)');
    ctx.fillStyle = moonGrad;
    ctx.beginPath();
    ctx.arc(state.moon.x, moonY, state.moon.r * 1.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(220,228,240,0.14)';
    ctx.beginPath();
    ctx.arc(state.moon.x, moonY, state.moon.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.translate(0, -gy * 0.12);
    for (const m of parallax.mountainsFar) {
      ctx.fillStyle = 'rgba(30,38,48,0.55)';
      ctx.beginPath();
      ctx.moveTo(m.x - m.bw * 0.5, m.y);
      ctx.quadraticCurveTo(m.x, m.y - m.bh, m.x + m.bw * 0.5, m.y);
      ctx.lineTo(m.x + m.bw * 0.5, h + 3000);
      ctx.lineTo(m.x - m.bw * 0.5, h + 3000);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    ctx.save();
    ctx.translate(0, -gy * 0.23);
    for (const m of parallax.mountainsNear) {
      ctx.fillStyle = 'rgba(22,30,38,0.72)';
      ctx.beginPath();
      ctx.moveTo(m.x - m.bw * 0.5, m.y);
      ctx.quadraticCurveTo(m.x, m.y - m.bh, m.x + m.bw * 0.5, m.y);
      ctx.lineTo(m.x + m.bw * 0.5, h + 3000);
      ctx.lineTo(m.x - m.bw * 0.5, h + 3000);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    ctx.save();
    ctx.translate(0, -gy * 0.35);
    for (const cl of parallax.clouds) {
      ctx.fillStyle = `rgba(212,222,238,${cl.alpha})`;
      ctx.beginPath();
      ctx.ellipse(cl.x, cl.y, cl.r * 1.35, cl.r * 0.58, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    ctx.save();
    ctx.translate(0, -gy * 0.4);
    for (const b of parallax.bamboos) {
      const dep = b.layer === 0 ? 0.5 : 1;
      ctx.strokeStyle = b.layer === 0 ? 'rgba(46,74,58,0.32)' : 'rgba(58,96,70,0.45)';
      ctx.lineWidth = b.sw * dep;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x + b.tilt * b.h, b.y - b.h);
      ctx.stroke();
      const seg = 5;
      for (let i = 1; i <= seg; i++) {
        const yy = b.y - (b.h / seg) * i;
        ctx.strokeStyle = 'rgba(70,110,82,0.35)';
        ctx.lineWidth = Math.max(1, b.sw * 0.7);
        ctx.beginPath();
        ctx.moveTo(b.x + b.tilt * (b.h * i / seg) - 5, yy);
        ctx.lineTo(b.x + b.tilt * (b.h * i / seg) + 5, yy);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawFighter(x, y, pose, alpha = 1, stepLeg = 'R') {
    ctx.save();
    ctx.translate(x, y + state.cameraY);
    ctx.globalAlpha *= alpha;

    const brush = '#e8ecf4';
    const ink = '#0b0f14';
    const robe = '#131923';

    ctx.strokeStyle = brush;
    ctx.fillStyle = robe;
    ctx.lineWidth = 3.2;

    const sway = pose === 'prepare' ? Math.sin(performance.now() * 0.01) * 2 : 0;

    // Head
    ctx.fillStyle = brush;
    ctx.beginPath();
    ctx.arc(0, -44 + sway, 8.2, 0, Math.PI * 2);
    ctx.fill();

    // Torso robe
    ctx.fillStyle = robe;
    ctx.beginPath();
    ctx.moveTo(-9, -34 + sway);
    ctx.lineTo(9, -34 + sway);
    ctx.lineTo(13, -4 + sway);
    ctx.lineTo(0, 8 + sway);
    ctx.lineTo(-13, -4 + sway);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = brush;
    ctx.beginPath();
    ctx.moveTo(0, -34 + sway);
    ctx.lineTo(0, 6 + sway);
    ctx.stroke();

    // Arms
    ctx.lineWidth = 2.8;
    const armSwing = pose === 'leap' ? -16 : pose === 'fall' ? 10 : pose === 'step' ? -8 : 0;
    ctx.beginPath();
    ctx.moveTo(-3, -24 + sway);
    ctx.quadraticCurveTo(-18, -15 + armSwing + sway, -26, -4 + armSwing * 0.3 + sway);
    ctx.moveTo(3, -24 + sway);
    ctx.quadraticCurveTo(18, -15 - armSwing + sway, 26, -2 - armSwing * 0.3 + sway);
    ctx.stroke();

    // Legs with clear foot-on-foot articulation
    ctx.lineWidth = 3.4;
    let l1 = { x: -5, y: 5 + sway }, l2 = { x: -14, y: 26 + sway }, l3 = { x: -4, y: 39 + sway };
    let r1 = { x: 5, y: 5 + sway }, r2 = { x: 14, y: 26 + sway }, r3 = { x: 8, y: 42 + sway };

    if (pose === 'step') {
      const phase = (performance.now() * 0.008) % 1;
      if (stepLeg === 'L') {
        l2 = { x: -20, y: 14 + sway - phase * 7 };
        l3 = { x: -8, y: 2 + sway - phase * 12 }; // stepping up
        r2 = { x: 12, y: 28 + sway };
        r3 = { x: 5, y: 44 + sway };
      } else {
        r2 = { x: 21, y: 14 + sway - phase * 7 };
        r3 = { x: 8, y: 1 + sway - phase * 12 };
        l2 = { x: -11, y: 29 + sway };
        l3 = { x: -3, y: 44 + sway };
      }
    }
    if (pose === 'leap') {
      l2 = { x: -16, y: 19 + sway }; l3 = { x: -6, y: 36 + sway };
      r2 = { x: 18, y: 11 + sway };  r3 = { x: 15, y: 28 + sway };
    }
    if (pose === 'peak') {
      l2 = { x: -14, y: 17 + sway }; l3 = { x: -2, y: 30 + sway };
      r2 = { x: 15, y: 17 + sway };  r3 = { x: 2, y: 30 + sway };
    }
    if (pose === 'fall') {
      l2 = { x: -8, y: 28 + sway }; l3 = { x: -2, y: 44 + sway };
      r2 = { x: 10, y: 30 + sway }; r3 = { x: 4, y: 46 + sway };
    }

    ctx.beginPath();
    ctx.moveTo(l1.x, l1.y); ctx.lineTo(l2.x, l2.y); ctx.lineTo(l3.x, l3.y);
    ctx.moveTo(r1.x, r1.y); ctx.lineTo(r2.x, r2.y); ctx.lineTo(r3.x, r3.y);
    ctx.stroke();

    // Feet
    ctx.lineWidth = 2.6;
    ctx.beginPath();
    ctx.moveTo(l3.x - 4, l3.y); ctx.lineTo(l3.x + 5, l3.y);
    ctx.moveTo(r3.x - 4, r3.y); ctx.lineTo(r3.x + 5, r3.y);
    ctx.stroke();

    // Belt stroke
    ctx.strokeStyle = ink;
    ctx.globalAlpha *= 0.45;
    ctx.beginPath();
    ctx.moveTo(-8, -4 + sway); ctx.lineTo(8, -4 + sway);
    ctx.stroke();

    ctx.restore();
  }

  function drawEffects(t) {
    // Step footholds (ink footprints in air)
    for (const st of state.stepPlatforms) {
      if (!st.done) continue;
      const age = Math.max(0, t - st.born);
      const a = Math.max(0, 0.85 - age * 0.24);
      if (a <= 0) continue;
      const yy = st.y + state.cameraY;

      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(st.x, yy);
      ctx.rotate(st.foot === 'L' ? -0.2 : 0.2);
      ctx.fillStyle = 'rgba(230,236,246,0.65)';
      ctx.beginPath();
      ctx.ellipse(0, 0, 13, 5.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(245,250,255,0.35)';
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.ellipse(0, 0, 17 + age * 12, 7 + age * 4, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Shockwaves
    for (const wv of state.waves) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, wv.a);
      ctx.strokeStyle = 'rgba(226,238,255,0.7)';
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.ellipse(wv.x, wv.y + state.cameraY, wv.r * 1.3, wv.r * 0.45, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Particles / ink splash
    for (const p of state.particles) {
      ctx.save();
      ctx.globalAlpha = p.a;
      ctx.fillStyle = p.ink ? 'rgba(14,18,24,0.9)' : 'rgba(220,235,255,0.85)';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y + state.cameraY, p.r * (p.ink ? 1.5 : 1), p.r, Math.atan2(p.vy, p.vx), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Afterimages
    for (const a of state.afterimages) {
      drawFighter(a.x, a.y, a.pose, a.life * 0.35);
    }
  }

  function drawForeground() {
    // Ground ink mist
    const gy = h * 0.78 + state.cameraY * 0.05;
    const g = ctx.createLinearGradient(0, gy - 80, 0, gy + 140);
    g.addColorStop(0, 'rgba(35,45,58,0.0)');
    g.addColorStop(0.5, 'rgba(25,32,42,0.5)');
    g.addColorStop(1, 'rgba(16,20,28,0.9)');
    ctx.fillStyle = g;
    ctx.fillRect(0, gy - 80, w, h - gy + 180);

    // Ink brush vignette
    const vignette = ctx.createRadialGradient(w * 0.5, h * 0.55, h * 0.2, w * 0.5, h * 0.5, h * 0.85);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, w, h);
  }

  function drawPoem(t) {
    if (t < timeline.landingEnd - 0.1) return;
    const p = Math.min(1, (t - (timeline.landingEnd - 0.2)) / 1.6);
    ctx.save();
    ctx.globalAlpha = p * 0.9;
    ctx.fillStyle = 'rgba(235,240,248,0.92)';
    ctx.font = `${Math.max(20, Math.min(34, w * 0.035))}px "Kaiti SC", "STKaiti", serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(220,230,255,0.25)';
    ctx.shadowBlur = 12;
    ctx.fillText('踏虚蹈空上九天，一步一生一念间', w * 0.5, h * 0.16);
    ctx.restore();
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    const t = (now - state.t0) / 1000;

    if (t > timeline.total) {
      // hold final frame
    }

    update(dt, Math.min(t, timeline.total));

    ctx.clearRect(0, 0, w, h);
    drawBackground();
    drawEffects(Math.min(t, timeline.total));

    // Determine stepping leg by closest step
    let stepLeg = 'R';
    if (state.phase === 'steps') {
      let nearest = state.stepPlatforms[0];
      let nd = Infinity;
      for (const st of state.stepPlatforms) {
        const d = Math.abs(((now - state.t0) / 1000) - st.trigger);
        if (d < nd) { nd = d; nearest = st; }
      }
      stepLeg = nearest.foot;
    }

    drawFighter(state.fighter.x, state.fighter.y, state.fighter.pose, 1, stepLeg);
    drawForeground();
    drawPoem(Math.min(t, timeline.total));

    requestAnimationFrame(frame);
  }

  addEventListener('resize', resize);
  addEventListener('click', () => resetScene());

  resize();
  resetScene();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
