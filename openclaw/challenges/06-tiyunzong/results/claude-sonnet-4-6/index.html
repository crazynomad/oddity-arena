<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梯云纵 · Tiyunzong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'STKaiti', 'KaiTi', serif;
  }
  canvas {
    display: block;
    cursor: pointer;
  }
  #ui {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: rgba(220,200,160,0.6);
    font-size: 14px;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">点击重播 · Click to Replay</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = Math.min(window.innerWidth, 600);
  H = canvas.height = Math.min(window.innerHeight, 900);
}
resize();
window.addEventListener('resize', () => { resize(); if (!animating) draw(); });

// ─── State ───────────────────────────────────────────────────────────────────
let t = 0;           // global time
let animating = false;
let camY = 0;        // camera offset (world Y)
let particles = [];
let afterimages = [];
let shockwaves = [];
let inkSplashes = [];

// Scene phases (in seconds)
const PHASES = {
  SETUP:   { start: 0,    end: 1.5 },
  LEAP:    { start: 1.5,  end: 2.8 },
  STEPS:   { start: 2.8,  end: 6.0 },
  PEAK:    { start: 6.0,  end: 7.5 },
  LANDING: { start: 7.5,  end: 10.0 },
  POEM:    { start: 9.0,  end: 11.0 },
};
const TOTAL = 11.5;

// Foot-on-foot steps
const STEP_TIMES = [3.0, 3.6, 4.2, 4.8, 5.4];
// World Y positions for each step (negative = higher up)
const STEP_Y = [300, 200, 100, 0, -100];

// Figure world-Y trajectory
function getFigureY(time) {
  if (time < PHASES.SETUP.end) return 600; // standing
  if (time < PHASES.LEAP.end) {
    const p = (time - PHASES.LEAP.start) / (PHASES.LEAP.end - PHASES.LEAP.start);
    return 600 - easeOut(p) * 200; // initial leap
  }
  if (time < PHASES.STEPS.end) {
    const p = (time - PHASES.STEPS.start) / (PHASES.STEPS.end - PHASES.STEPS.start);
    return 400 - easeInOut(p) * 600; // ascending
  }
  if (time < PHASES.PEAK.end) {
    const p = (time - PHASES.PEAK.start) / (PHASES.PEAK.end - PHASES.PEAK.start);
    return -200 - Math.sin(p * Math.PI * 0.5) * 50; // at peak, gentle float
  }
  if (time < PHASES.LANDING.end) {
    const p = (time - PHASES.LANDING.start) / (PHASES.LANDING.end - PHASES.LANDING.start);
    return -250 + easeIn(p) * 850; // descending
  }
  return 600;
}

function easeOut(t) { return 1 - (1-t)*(1-t); }
function easeIn(t) { return t*t; }
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

// ─── Particle System ─────────────────────────────────────────────────────────
class Particle {
  constructor(wx, wy, vx, vy, life, size, color, type) {
    this.wx = wx; this.wy = wy;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.size = size; this.color = color;
    this.type = type || 'ink'; // ink | qi | spark
    this.alpha = 1;
  }
  update(dt) {
    this.wx += this.vx * dt;
    this.wy += this.vy * dt;
    this.vy += 80 * dt; // gravity
    this.life -= dt;
    this.alpha = Math.max(0, this.life / this.maxLife);
    if (this.type === 'qi') this.vy -= 160 * dt; // qi floats up
  }
  draw(camY) {
    const sx = this.wx;
    const sy = this.wy - camY;
    if (sy < -50 || sy > H + 50) return;
    ctx.save();
    ctx.globalAlpha = this.alpha * 0.85;
    if (this.type === 'ink') {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      // Ink blob shape
      ctx.ellipse(sx, sy, this.size * 1.2, this.size * 0.8, Math.random() * Math.PI, 0, Math.PI*2);
      ctx.fill();
    } else if (this.type === 'qi') {
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, this.size);
      grad.addColorStop(0, 'rgba(180,230,255,0.9)');
      grad.addColorStop(1, 'rgba(100,180,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(sx, sy, this.size, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx - this.vx * 0.03, sy - this.vy * 0.03);
      ctx.stroke();
    }
    ctx.restore();
  }
}

class Shockwave {
  constructor(wx, wy) {
    this.wx = wx; this.wy = wy;
    this.r = 0; this.maxR = 120;
    this.life = 0.7; this.maxLife = 0.7;
  }
  update(dt) {
    this.life -= dt;
    this.r = this.maxR * (1 - this.life / this.maxLife);
  }
  draw(camY) {
    const sx = this.wx;
    const sy = this.wy - camY;
    if (sy < -200 || sy > H + 200) return;
    const alpha = (this.life / this.maxLife) * 0.7;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = 'rgba(180,220,255,0.9)';
    ctx.lineWidth = 3 * (this.life / this.maxLife);
    ctx.beginPath();
    ctx.ellipse(sx, sy, this.r, this.r * 0.4, 0, 0, Math.PI*2);
    ctx.stroke();
    // Inner ring
    ctx.globalAlpha = alpha * 0.5;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(sx, sy, this.r * 0.6, this.r * 0.24, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
}

class Afterimage {
  constructor(wx, wy, phase) {
    this.wx = wx; this.wy = wy;
    this.life = 0.5; this.maxLife = 0.5;
    this.phase = phase;
  }
  update(dt) { this.life -= dt; }
  draw(camY) {
    const sx = this.wx;
    const sy = this.wy - camY;
    if (sy < -100 || sy > H + 100) return;
    const alpha = (this.life / this.maxLife) * 0.3;
    ctx.save();
    ctx.globalAlpha = alpha;
    drawFigure(sx, sy, this.phase, 0.7, true);
    ctx.restore();
  }
}

// ─── Drawing Helpers ─────────────────────────────────────────────────────────
function drawInkBackground(camY) {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  const nightProgress = Math.min(1, t / 3);
  skyGrad.addColorStop(0, `rgba(5,5,20,1)`);
  skyGrad.addColorStop(0.4, `rgba(15,15,35,1)`);
  skyGrad.addColorStop(1, `rgba(30,20,15,1)`);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Moon (parallax slow)
  const moonY = 100 - camY * 0.05;
  drawMoon(W * 0.75, moonY);

  // Distant mountains (parallax)
  drawMountains(camY);

  // Bamboo (parallax fast)
  drawBamboo(camY);

  // Clouds
  drawClouds(camY);

  // Ground
  const groundY = 700 - camY;
  if (groundY < H + 50 && groundY > -50) {
    ctx.save();
    ctx.fillStyle = 'rgba(20,15,10,0.95)';
    ctx.beginPath();
    ctx.rect(0, groundY, W, H - groundY + 10);
    ctx.fill();
    // Ground texture line
    ctx.strokeStyle = 'rgba(80,60,40,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();
    // Ground ink strokes
    ctx.strokeStyle = 'rgba(40,30,20,0.8)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      ctx.beginPath();
      ctx.moveTo(W * i / 8 + 10, groundY + 5);
      ctx.lineTo(W * i / 8 + 30, groundY + 15);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawMoon(x, y) {
  if (y > H + 80) return;
  ctx.save();
  // Glow
  const glow = ctx.createRadialGradient(x, y, 10, x, y, 80);
  glow.addColorStop(0, 'rgba(255,245,200,0.15)');
  glow.addColorStop(1, 'rgba(255,245,200,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, 80, 0, Math.PI*2);
  ctx.fill();
  // Moon body
  ctx.fillStyle = 'rgba(245,235,200,0.9)';
  ctx.beginPath();
  ctx.arc(x, y, 32, 0, Math.PI*2);
  ctx.fill();
  // Ink wash texture
  ctx.fillStyle = 'rgba(180,160,120,0.3)';
  ctx.beginPath();
  ctx.ellipse(x + 8, y - 5, 12, 8, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawMountains(camY) {
  const offsetY = camY * 0.15;
  ctx.save();
  // Far mountains
  ctx.fillStyle = 'rgba(25,20,30,0.8)';
  ctx.beginPath();
  ctx.moveTo(0, H);
  const mpts = [
    [0, 500], [80, 280], [160, 350], [240, 200], [320, 320],
    [400, 160], [480, 260], [560, 180], [W, 300], [W, H]
  ];
  mpts.forEach(([mx, my]) => ctx.lineTo(mx, my - offsetY));
  ctx.closePath();
  ctx.fill();
  // Mid mountains - ink strokes
  ctx.strokeStyle = 'rgba(40,35,50,0.6)';
  ctx.lineWidth = 1.5;
  // Ink brushstroke mountain outlines
  for (let i = 0; i < 5; i++) {
    const bx = i * (W/4) + 20;
    const by = 350 + Math.sin(i * 1.3) * 80 - offsetY * 1.1;
    ctx.beginPath();
    ctx.moveTo(bx, by + 100);
    ctx.quadraticCurveTo(bx + 40, by - 30, bx + 80, by + 80);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBamboo(camY) {
  const offsetY = camY * 0.4;
  ctx.save();
  const bambooPositions = [30, 55, W - 40, W - 65, W - 20, 15];
  bambooPositions.forEach((bx, i) => {
    const baseY = 700 - offsetY + (i % 2) * 10;
    const height = 300 + (i % 3) * 60;
    drawBambooStalk(bx, baseY, height, i);
  });
  ctx.restore();
}

function drawBambooStalk(x, baseY, height, seed) {
  const segments = Math.floor(height / 35);
  ctx.save();
  ctx.strokeStyle = 'rgba(40,60,30,0.7)';
  ctx.lineWidth = 4 - (seed % 2);
  // Stalk
  for (let i = 0; i < segments; i++) {
    const y1 = baseY - i * 35;
    const y2 = baseY - (i + 1) * 35;
    const sway = Math.sin(seed * 2.3 + i * 0.5 + t * 0.3) * 3;
    ctx.beginPath();
    ctx.moveTo(x + sway, y1);
    ctx.lineTo(x + sway, y2);
    ctx.stroke();
    // Node
    ctx.beginPath();
    ctx.moveTo(x + sway - 5, y2 + 3);
    ctx.lineTo(x + sway + 5, y2 + 3);
    ctx.stroke();
    // Leaf
    if (i % 2 === 0 && i > 0) {
      const leafDir = (i % 4 === 0) ? 1 : -1;
      ctx.save();
      ctx.strokeStyle = 'rgba(50,80,35,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x + sway, y2);
      ctx.quadraticCurveTo(
        x + sway + leafDir * 30, y2 - 10,
        x + sway + leafDir * 50, y2 - 5
      );
      ctx.stroke();
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawClouds(camY) {
  const clouds = [
    { wx: W*0.2, wy: 150, w: 120, h: 30 },
    { wx: W*0.6, wy: 200, w: 90, h: 25 },
    { wx: W*0.4, wy: -100, w: 150, h: 35 },
    { wx: W*0.8, wy: -300, w: 100, h: 28 },
    { wx: W*0.1, wy: -500, w: 130, h: 32 },
  ];
  ctx.save();
  clouds.forEach(c => {
    const sx = c.wx + Math.sin(t * 0.1 + c.wy * 0.01) * 5;
    const sy = c.wy - camY * 0.3;
    if (sy < -60 || sy > H + 60) return;
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = 'rgba(200,195,210,1)';
    // Ink wash cloud — horizontal strokes
    for (let k = 0; k < 3; k++) {
      ctx.beginPath();
      ctx.ellipse(sx + k * 15, sy + k * 6, c.w * (0.6 - k*0.1), c.h * (0.5 + k*0.2), 0, 0, Math.PI*2);
      ctx.fill();
    }
  });
  ctx.restore();
}

// ─── Figure Drawing ───────────────────────────────────────────────────────────
function drawFigure(cx, cy, phase, scale=1, ghost=false) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  const inkColor = ghost ? 'rgba(100,120,150,0.5)' : 'rgba(20,15,10,1)';
  const robeColor = ghost ? 'rgba(60,80,100,0.3)' : 'rgba(30,25,20,0.95)';
  ctx.strokeStyle = inkColor;
  ctx.fillStyle = robeColor;
  ctx.lineWidth = ghost ? 1.5 : 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Phase determines pose
  const isFlying = phase > 0.3 && phase < 0.92;
  const isLanding = phase >= 0.85;
  const stepPhase = isFlying ? (phase - 0.3) / 0.6 : 0;

  // Body proportions
  const headR = 14;
  const bodyH = 40;
  const legLen = 35;

  if (!isFlying) {
    // Standing / landing pose
    // Head
    ctx.beginPath();
    ctx.arc(0, -bodyH - headR - 5, headR, 0, Math.PI*2);
    ctx.fillStyle = ghost ? 'rgba(80,70,60,0.3)' : 'rgba(200,180,150,0.9)';
    ctx.fill();
    ctx.stroke();

    // Body / Robe
    ctx.fillStyle = robeColor;
    ctx.beginPath();
    ctx.moveTo(-12, -bodyH);
    ctx.lineTo(12, -bodyH);
    ctx.lineTo(18, 0);
    ctx.lineTo(-18, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Legs
    ctx.lineWidth = ghost ? 1.5 : 3;
    ctx.beginPath();
    ctx.moveTo(-6, 0);
    ctx.lineTo(-8, legLen);
    ctx.moveTo(6, 0);
    ctx.lineTo(8, legLen);
    ctx.stroke();

    // Arms
    ctx.lineWidth = ghost ? 1.5 : 2.5;
    ctx.beginPath();
    ctx.moveTo(-12, -bodyH + 8);
    ctx.lineTo(-28, -bodyH + 25);
    ctx.moveTo(12, -bodyH + 8);
    ctx.lineTo(28, -bodyH + 25);
    ctx.stroke();

  } else {
    // Flying pose — dynamic
    const bodyTilt = -0.3 + stepPhase * 0.1;
    ctx.rotate(bodyTilt);

    // Head
    ctx.beginPath();
    ctx.arc(0, -bodyH - headR - 5, headR, 0, Math.PI*2);
    ctx.fillStyle = ghost ? 'rgba(80,70,60,0.3)' : 'rgba(200,180,150,0.9)';
    ctx.fill();
    ctx.stroke();

    // Robe flowing
    ctx.fillStyle = robeColor;
    ctx.beginPath();
    ctx.moveTo(-10, -bodyH);
    ctx.lineTo(10, -bodyH);
    ctx.bezierCurveTo(20, -10, 30, 10, 20, 20);
    ctx.lineTo(-20, 20);
    ctx.bezierCurveTo(-30, 10, -20, -10, -10, -bodyH);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // The key move: foot-on-foot
    // Left leg raised, right foot below
    const kick = Math.sin(stepPhase * Math.PI * 4) * 20;
    ctx.lineWidth = ghost ? 1.5 : 3;
    ctx.beginPath();
    // Right leg (stepping foot)
    ctx.moveTo(5, 20);
    ctx.lineTo(10 + kick * 0.5, 50);
    ctx.lineTo(20 + kick, 60); // stepping foot
    ctx.stroke();

    // Left leg (raised, stepping ON right foot)
    ctx.beginPath();
    ctx.moveTo(-5, 20);
    ctx.lineTo(-5 + kick * 0.8, 50);
    ctx.lineTo(10 + kick, 55); // left foot lands on right foot position
    ctx.stroke();

    // Foot impact glow
    if (!ghost && Math.abs(Math.sin(stepPhase * Math.PI * 4)) > 0.8) {
      ctx.save();
      ctx.globalAlpha = 0.6;
      const fx = 15 + kick;
      const fy = 58;
      const fg = ctx.createRadialGradient(fx, fy, 0, fx, fy, 20);
      fg.addColorStop(0, 'rgba(150,200,255,0.8)');
      fg.addColorStop(1, 'rgba(100,160,255,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(fx, fy, 20, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // Arms outstretched for balance
    ctx.lineWidth = ghost ? 1.5 : 2.5;
    ctx.beginPath();
    ctx.moveTo(-10, -bodyH + 8);
    ctx.bezierCurveTo(-40, -bodyH + 5, -55, -10, -50, 0);
    ctx.moveTo(10, -bodyH + 8);
    ctx.bezierCurveTo(40, -bodyH + 5, 55, -10, 50, 0);
    ctx.stroke();

    // Flowing robe sleeves
    ctx.lineWidth = 8;
    ctx.strokeStyle = ghost ? 'rgba(60,80,100,0.2)' : 'rgba(40,35,30,0.4)';
    ctx.beginPath();
    ctx.moveTo(-10, -bodyH + 8);
    ctx.bezierCurveTo(-50, -20, -70, 20, -60, 35);
    ctx.moveTo(10, -bodyH + 8);
    ctx.bezierCurveTo(50, -20, 70, 20, 60, 35);
    ctx.stroke();
  }

  // Hair top-knot
  if (!ghost) {
    ctx.strokeStyle = inkColor;
    ctx.lineWidth = 2;
    ctx.fillStyle = 'rgba(20,15,10,0.9)';
    const headTop = -bodyH - headR * 2 - 5;
    ctx.beginPath();
    ctx.ellipse(0, headTop - 5, 5, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
  }

  ctx.restore();
}

// ─── Spawn Effects ────────────────────────────────────────────────────────────
let lastStepSpawn = -1;

function spawnStepEffects(wx, wy) {
  // Qi burst shockwave
  shockwaves.push(new Shockwave(wx, wy));

  // Qi particles
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 150;
    particles.push(new Particle(
      wx + Math.random()*10 - 5,
      wy + Math.random()*10 - 5,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - 80,
      0.6 + Math.random() * 0.4,
      3 + Math.random() * 5,
      'rgba(150,210,255,0.8)',
      'qi'
    ));
  }

  // Ink splash
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 100;
    particles.push(new Particle(
      wx + Math.random()*6 - 3,
      wy + Math.random()*6 - 3,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      0.5 + Math.random() * 0.5,
      2 + Math.random() * 4,
      'rgba(10,8,5,0.9)',
      'ink'
    ));
  }
}

function spawnLeapEffects(wx, wy) {
  for (let i = 0; i < 30; i++) {
    const angle = -Math.PI * 0.5 + (Math.random() - 0.5) * 1.5;
    const speed = 100 + Math.random() * 200;
    particles.push(new Particle(
      wx, wy,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      0.8 + Math.random() * 0.5,
      4 + Math.random() * 6,
      'rgba(200,220,255,0.7)',
      'qi'
    ));
  }
  shockwaves.push(new Shockwave(wx, wy));
  shockwaves.push(new Shockwave(wx, wy));
}

function spawnLandingEffects(wx, wy) {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI;
    const speed = 50 + Math.random() * 150;
    particles.push(new Particle(
      wx, wy,
      Math.cos(angle) * speed - speed*0.5,
      -Math.abs(Math.sin(angle)) * speed * 0.5,
      0.8 + Math.random() * 0.6,
      2 + Math.random() * 5,
      Math.random() > 0.5 ? 'rgba(10,8,5,0.9)' : 'rgba(40,30,20,0.7)',
      'ink'
    ));
  }
  shockwaves.push(new Shockwave(wx, wy));
}

// ─── HUD / Poem ───────────────────────────────────────────────────────────────
let leapEffectDone = false;
let landEffectDone = false;

function drawPoem(alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';

  // Poem box
  const bw = 340, bh = 100;
  const bx = W/2 - bw/2, by = H/2 - bh/2 - 20;
  ctx.fillStyle = 'rgba(5,5,15,0.7)';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = 'rgba(180,160,100,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx + 4, by + 4, bw - 8, bh - 8);

  ctx.fillStyle = 'rgba(230,210,160,1)';
  ctx.font = '24px "STKaiti","KaiTi","SimSun",serif';
  ctx.fillText('踏虚蹈空上九天', W/2, by + 40);
  ctx.fillText('一步一生一念间', W/2, by + 75);
  ctx.restore();
}

function drawPhaseLabel(phase) {
  const labels = {
    SETUP: '凝气蓄势',
    LEAP: '纵身一跃',
    STEPS: '梯云纵！',
    PEAK: '凌绝巅峰',
    LANDING: '御风归来',
  };
  let label = '';
  let labelAlpha = 0;

  if (t < PHASES.SETUP.end) {
    label = labels.SETUP;
    labelAlpha = Math.min(1, t / 0.5) * Math.min(1, (PHASES.SETUP.end - t) / 0.3);
  } else if (t < PHASES.LEAP.end) {
    label = labels.LEAP;
    const lt = t - PHASES.LEAP.start;
    labelAlpha = Math.min(1, lt / 0.3) * Math.min(1, (PHASES.LEAP.end - t) / 0.3);
  } else if (t < PHASES.STEPS.end) {
    label = labels.STEPS;
    const lt = t - PHASES.STEPS.start;
    labelAlpha = Math.min(1, lt / 0.3) * Math.min(1, (PHASES.STEPS.end - t) / 0.5);
  } else if (t < PHASES.PEAK.end) {
    label = labels.PEAK;
    const lt = t - PHASES.PEAK.start;
    labelAlpha = Math.min(1, lt / 0.3) * Math.min(1, (PHASES.PEAK.end - t) / 0.5);
  } else if (t < PHASES.LANDING.end) {
    label = labels.LANDING;
    const lt = t - PHASES.LANDING.start;
    labelAlpha = Math.min(1, lt / 0.3) * Math.min(1, (PHASES.LANDING.end - t) / 0.5);
  }

  if (labelAlpha > 0 && label) {
    ctx.save();
    ctx.globalAlpha = labelAlpha;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(200,180,120,0.9)';
    ctx.font = `bold ${label === '梯云纵！' ? 32 : 22}px "STKaiti","KaiTi","SimSun",serif`;
    ctx.fillText(label, W/2, 60);
    ctx.restore();
  }
}

// ─── Main Draw ────────────────────────────────────────────────────────────────
let lastTime = null;

function draw(ts) {
  if (!animating) return;
  const now = ts || performance.now();
  if (lastTime === null) lastTime = now;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  t += dt;

  // Figure world position
  const figWY = getFigureY(t);
  const figWX = W / 2;

  // Smooth camera follow
  const targetCam = figWY - H * 0.45;
  camY += (targetCam - camY) * Math.min(1, dt * 3);

  // Afterimage spawning during steps phase
  if (t >= PHASES.STEPS.start && t <= PHASES.STEPS.end) {
    if (Math.floor(t * 12) !== Math.floor((t - dt) * 12)) {
      const phase = (t - PHASES.LEAP.start) / (PHASES.LANDING.end - PHASES.LEAP.start);
      afterimages.push(new Afterimage(figWX, figWY, phase));
    }
  }

  // Leap effects
  if (t >= PHASES.LEAP.start + 0.3 && !leapEffectDone) {
    spawnLeapEffects(figWX, figWY);
    leapEffectDone = true;
  }

  // Step effects
  STEP_TIMES.forEach((st, i) => {
    if (t >= st && t - dt < st) {
      spawnStepEffects(figWX, figWY);
    }
  });

  // Landing effects
  if (t >= PHASES.LANDING.start + 0.8 && !landEffectDone) {
    spawnLandingEffects(figWX, 700);
    landEffectDone = true;
  }

  // Update particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => p.update(dt));
  shockwaves = shockwaves.filter(s => s.life > 0);
  shockwaves.forEach(s => s.update(dt));
  afterimages = afterimages.filter(a => a.life > 0);
  afterimages.forEach(a => a.update(dt));

  // ── Render ──
  drawInkBackground(camY);

  // Afterimages
  afterimages.forEach(a => a.draw(camY));

  // Particles
  particles.forEach(p => p.draw(camY));
  shockwaves.forEach(s => s.draw(camY));

  // Figure
  const screenX = figWX;
  const screenY = figWY - camY;
  const totalDur = PHASES.LANDING.end - PHASES.LEAP.start;
  const figPhase = t < PHASES.LEAP.start ? 0 :
                   t > PHASES.LANDING.end ? 1 :
                   (t - PHASES.LEAP.start) / totalDur;
  ctx.save();
  ctx.globalAlpha = 1;
  drawFigure(screenX, screenY, figPhase);
  ctx.restore();

  // Qi aura during steps
  if (t >= PHASES.STEPS.start && t <= PHASES.PEAK.end) {
    const auraPhase = (t - PHASES.STEPS.start) / (PHASES.PEAK.end - PHASES.STEPS.start);
    const auraR = 40 + Math.sin(t * 8) * 10;
    ctx.save();
    ctx.globalAlpha = 0.15 + Math.sin(t * 6) * 0.08;
    const aGrad = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, auraR);
    aGrad.addColorStop(0, 'rgba(150,210,255,0.8)');
    aGrad.addColorStop(0.6, 'rgba(80,150,220,0.3)');
    aGrad.addColorStop(1, 'rgba(50,100,200,0)');
    ctx.fillStyle = aGrad;
    ctx.beginPath();
    ctx.arc(screenX, screenY, auraR, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Phase label
  drawPhaseLabel();

  // Poem
  if (t >= PHASES.POEM.start) {
    const pAlpha = Math.min(1, (t - PHASES.POEM.start) / 0.8) *
                   Math.min(1, (PHASES.POEM.end - t) / 0.5);
    drawPoem(Math.max(0, pAlpha));
  }

  // End screen
  if (t >= TOTAL) {
    ctx.save();
    const endAlpha = Math.min(1, (t - TOTAL) / 0.5);
    ctx.globalAlpha = endAlpha * 0.5;
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = endAlpha;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(200,180,120,0.9)';
    ctx.font = '18px "STKaiti","KaiTi","SimSun",serif';
    ctx.fillText('点击重播', W/2, H/2 + 20);
    ctx.restore();
    animating = false;
    return;
  }

  requestAnimationFrame(draw);
}

function startAnimation() {
  t = 0;
  camY = 0;
  particles = [];
  shockwaves = [];
  afterimages = [];
  leapEffectDone = false;
  landEffectDone = false;
  lastTime = null;
  animating = true;
  requestAnimationFrame(draw);
}

canvas.addEventListener('click', startAnimation);
startAnimation();
</script>
</body>
