<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梯云纵 · Tī Yún Zòng</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;cursor:pointer;font-family:'SimSun','STSong',serif}
canvas{display:block}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(200,180,150,0.6);font-size:14px;letter-spacing:4px;pointer-events:none;transition:opacity 1s}
#title{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10;opacity:0;transition:opacity 2s}
#title h1{font-size:72px;color:rgba(200,180,150,0.9);letter-spacing:20px;text-shadow:0 0 40px rgba(200,180,150,0.3)}
#title p{font-size:18px;color:rgba(200,180,150,0.5);letter-spacing:8px;margin-top:20px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">点击重播 · Click to Replay</div>
<div id="title"><h1>梯云纵</h1><p>踏雪无痕 · 凌空虚渡</p></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);

// --- Palette ---
const INK='rgba(20,18,15,',RICE='rgba(235,225,205,',GOLD='rgba(200,170,100,',RED='rgba(180,60,40,';

// --- Utility ---
function lerp(a,b,t){return a+(b-a)*t}
function rand(a,b){return Math.random()*(b-a)+a}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

// --- State ---
let time=0, phase='idle', phaseTime=0, cameraY=0, targetCamY=0;
let particles=[], afterimages=[], shockwaves=[], inkSplashes=[];
let heroX, heroY, heroVY, heroScale, stepCount, maxSteps=6;
let stepFlash=0, landed=false, showTitle=false, titleOpacity=0;
let groundY;

// --- Phases timeline ---
const PHASES={
  setup:{dur:1.5},
  crouch:{dur:0.6},
  leap:{dur:0.4},
  tiyunzong:{dur:3.6}, // 6 steps, 0.6s each
  peak:{dur:1.5},
  fall:{dur:1.2},
  land:{dur:2.0},
  title:{dur:4.0}
};

function startAnimation(){
  time=0;phase='setup';phaseTime=0;
  heroX=W*0.5;groundY=H*0.75;heroY=groundY;heroVY=0;heroScale=1;
  stepCount=0;cameraY=0;targetCamY=0;
  particles=[];afterimages=[];shockwaves=[];inkSplashes=[];
  stepFlash=0;landed=false;showTitle=false;titleOpacity=0;
  document.getElementById('title').style.opacity=0;
  document.getElementById('hint').style.opacity=0;
}

// --- Background layers ---
function drawMoon(camY){
  const my=H*0.15-camY*0.05;
  const grd=ctx.createRadialGradient(W*0.75,my,0,W*0.75,my,80);
  grd.addColorStop(0,'rgba(255,250,230,0.9)');
  grd.addColorStop(0.5,'rgba(255,245,210,0.3)');
  grd.addColorStop(1,'rgba(255,245,210,0)');
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.arc(W*0.75,my,120,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,250,230,0.85)';
  ctx.beginPath();ctx.arc(W*0.75,my,40,0,Math.PI*2);ctx.fill();
}

function drawMountains(camY){
  ctx.save();
  // Far mountains
  ctx.fillStyle='rgba(60,55,50,0.4)';
  ctx.beginPath();ctx.moveTo(-50,H-camY*0.1);
  for(let x=-50;x<=W+50;x+=80){
    ctx.lineTo(x,H*0.35-Math.sin(x*0.003)*120-Math.cos(x*0.007)*60-camY*0.1);
  }
  ctx.lineTo(W+50,H);ctx.lineTo(-50,H);ctx.fill();
  // Near mountains
  ctx.fillStyle='rgba(45,40,35,0.6)';
  ctx.beginPath();ctx.moveTo(-50,H-camY*0.2);
  for(let x=-50;x<=W+50;x+=60){
    ctx.lineTo(x,H*0.5-Math.sin(x*0.005+2)*100-Math.cos(x*0.01)*40-camY*0.2);
  }
  ctx.lineTo(W+50,H);ctx.lineTo(-50,H);ctx.fill();
  ctx.restore();
}

function drawClouds(camY,t){
  ctx.save();
  for(let i=0;i<8;i++){
    const cx=((i*200+t*15*(0.5+i*0.1))%(W+400))-200;
    const cy=H*0.1+i*50-camY*(0.08+i*0.02);
    const alpha=0.08+Math.sin(t*0.5+i)*0.03;
    ctx.fillStyle=`rgba(200,190,170,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(cx,cy,120+i*10,25+i*5,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawBamboo(camY){
  ctx.save();
  const parallax=0.35;
  for(let i=0;i<12;i++){
    const bx=W*0.05+i*(W/11);
    const baseY=groundY+50-camY*parallax;
    const h=300+i*30+Math.sin(i*7)*80;
    const sway=Math.sin(time*1.5+i*2)*3;
    ctx.strokeStyle=`rgba(80,90,60,${0.3+Math.sin(i)*0.1})`;
    ctx.lineWidth=3+Math.sin(i*3)*1;
    ctx.beginPath();
    ctx.moveTo(bx,baseY);
    ctx.quadraticCurveTo(bx+sway,baseY-h*0.5,bx+sway*1.5,baseY-h);
    ctx.stroke();
    // nodes
    for(let j=1;j<5;j++){
      const ny=baseY-h*j/5;
      const nx=bx+sway*j/5;
      ctx.strokeStyle=`rgba(60,70,45,0.4)`;
      ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(nx-4,ny);ctx.lineTo(nx+4,ny);ctx.stroke();
    }
    // leaves
    ctx.fillStyle=`rgba(70,85,50,0.25)`;
    const lx=bx+sway*1.5, ly=baseY-h;
    for(let l=0;l<3;l++){
      ctx.save();ctx.translate(lx,ly-l*15);ctx.rotate((-0.5+l*0.5)+Math.sin(time+i)*0.1);
      ctx.beginPath();ctx.ellipse(15,0,20,4,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawGround(camY){
  const gy=groundY-camY;
  if(gy>H+50)return;
  ctx.fillStyle='rgba(50,45,35,0.8)';
  ctx.fillRect(0,gy,W,H-gy+500);
  // ink wash edge
  ctx.strokeStyle='rgba(30,25,20,0.6)';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,gy);
  for(let x=0;x<=W;x+=20){
    ctx.lineTo(x,gy+Math.sin(x*0.02)*5+Math.cos(x*0.05)*3);
  }
  ctx.stroke();
}

// --- Hero (ink figure) ---
function drawHero(x,y,camY,scale,pose,alpha=1){
  const sy=y-camY;
  ctx.save();
  ctx.translate(x,sy);
  ctx.scale(scale,scale);
  ctx.globalAlpha=alpha;
  
  const s=30; // base size
  
  if(pose==='stand'){
    // Head
    ctx.fillStyle=INK+'0.85)';
    ctx.beginPath();ctx.arc(0,-s*3.2,s*0.45,0,Math.PI*2);ctx.fill();
    // Body robe
    ctx.beginPath();ctx.moveTo(0,-s*2.8);
    ctx.quadraticCurveTo(-s*0.8,-s*1.5,-s*0.6,0);
    ctx.lineTo(s*0.6,0);
    ctx.quadraticCurveTo(s*0.8,-s*1.5,0,-s*2.8);
    ctx.fillStyle=INK+'0.7)';ctx.fill();
    // Legs
    ctx.strokeStyle=INK+'0.8)';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(-s*0.2,0);ctx.lineTo(-s*0.3,s*1.2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*0.2,0);ctx.lineTo(s*0.3,s*1.2);ctx.stroke();
    // Hair ribbon
    ctx.strokeStyle=RED+'0.7)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-s*3.2);
    ctx.quadraticCurveTo(s*0.8,-s*3,s*1.2,-s*2.5+Math.sin(time*3)*5);
    ctx.stroke();
  } else if(pose==='crouch'){
    ctx.fillStyle=INK+'0.85)';
    ctx.beginPath();ctx.arc(0,-s*2.2,s*0.45,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-s*1.8);
    ctx.quadraticCurveTo(-s*0.9,-s*0.8,-s*0.8,s*0.3);
    ctx.lineTo(s*0.8,s*0.3);
    ctx.quadraticCurveTo(s*0.9,-s*0.8,0,-s*1.8);
    ctx.fillStyle=INK+'0.7)';ctx.fill();
    ctx.strokeStyle=INK+'0.8)';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(-s*0.3,s*0.3);ctx.lineTo(-s*0.6,s*0.7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*0.3,s*0.3);ctx.lineTo(s*0.6,s*0.7);ctx.stroke();
  } else if(pose==='leap'||pose==='step'){
    const kick=pose==='step'?Math.sin(phaseTime*8)*0.3:0;
    // Head
    ctx.fillStyle=INK+'0.85)';
    ctx.beginPath();ctx.arc(0,-s*3.5,s*0.45,0,Math.PI*2);ctx.fill();
    // Arms spread
    ctx.strokeStyle=INK+'0.7)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-s*0.3,-s*2.5);
    ctx.quadraticCurveTo(-s*1.5,-s*2.8-kick*20,-s*1.8,-s*2+kick*10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*0.3,-s*2.5);
    ctx.quadraticCurveTo(s*1.5,-s*2.8+kick*20,s*1.8,-s*2-kick*10);ctx.stroke();
    // Robe flowing
    ctx.beginPath();ctx.moveTo(0,-s*3);
    ctx.quadraticCurveTo(-s*1,-s*1.5,-s*0.7+kick*5,s*0.2);
    ctx.lineTo(s*0.7-kick*5,s*0.2);
    ctx.quadraticCurveTo(s*1,-s*1.5,0,-s*3);
    ctx.fillStyle=INK+'0.7)';ctx.fill();
    // Robe tail
    ctx.fillStyle=INK+'0.4)';
    ctx.beginPath();ctx.moveTo(-s*0.5,s*0.1);
    ctx.quadraticCurveTo(-s*0.2,s*1.2,s*0.3,s*1.5+Math.sin(time*5)*10);
    ctx.lineTo(s*0.6,s*0.8);ctx.fill();
    // Legs - one tucked, one kicking down for step
    ctx.strokeStyle=INK+'0.8)';ctx.lineWidth=4;
    if(pose==='step'){
      const lt=stepCount%2===0?-1:1;
      ctx.beginPath();ctx.moveTo(lt*-s*0.2,s*0.1);ctx.lineTo(lt*-s*0.5,s*0.8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(lt*s*0.2,s*0.1);ctx.lineTo(lt*s*0.1,s*1.5);ctx.stroke();
      // Foot stomp effect
      ctx.fillStyle=GOLD+'0.6)';
      ctx.beginPath();ctx.arc(lt*s*0.1,s*1.5,5,0,Math.PI*2);ctx.fill();
    } else {
      ctx.beginPath();ctx.moveTo(-s*0.2,s*0.1);ctx.lineTo(-s*0.4,s*1);ctx.stroke();
      ctx.beginPath();ctx.moveTo(s*0.2,s*0.1);ctx.lineTo(s*0.1,s*1.2);ctx.stroke();
    }
    // Hair ribbon flowing
    ctx.strokeStyle=RED+'0.8)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(0,-s*3.5);
    ctx.bezierCurveTo(s*0.5,-s*3.8,s*1.2,-s*3,s*1.8,-s*2.8+Math.sin(time*4)*8);
    ctx.stroke();
    // Sleeve detail
    ctx.strokeStyle=RICE+'0.15)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-s*1.2,-s*2.3);ctx.lineTo(-s*1.5,-s*1.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*1.2,-s*2.3);ctx.lineTo(s*1.5,-s*1.5);ctx.stroke();
  } else if(pose==='land'){
    ctx.fillStyle=INK+'0.85)';
    ctx.beginPath();ctx.arc(0,-s*2.5,s*0.45,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-s*2.1);
    ctx.quadraticCurveTo(-s*1,-s*1,-s*0.8,s*0.2);
    ctx.lineTo(s*0.8,s*0.2);
    ctx.quadraticCurveTo(s*1,-s*1,0,-s*2.1);
    ctx.fillStyle=INK+'0.7)';ctx.fill();
    ctx.strokeStyle=INK+'0.8)';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(-s*0.3,s*0.2);ctx.lineTo(-s*0.8,s*0.9);ctx.stroke();
    ctx.beginPath();ctx.moveTo(s*0.3,s*0.2);ctx.lineTo(s*0.8,s*0.9);ctx.stroke();
    ctx.strokeStyle=RED+'0.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,-s*2.5);
    ctx.quadraticCurveTo(s*0.5,-s*2.8,s*0.8,-s*2.3);ctx.stroke();
  }
  
  ctx.restore();
}

// --- Particles ---
function spawnQiBurst(x,y,count=20){
  for(let i=0;i<count;i++){
    const angle=rand(0,Math.PI*2);
    const speed=rand(2,8);
    particles.push({
      x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-rand(1,3),
      life:1,decay:rand(0.01,0.03),size:rand(2,6),
      color:Math.random()>0.5?GOLD:RICE,type:'qi'
    });
  }
}

function spawnInkSplash(x,y,count=15){
  for(let i=0;i<count;i++){
    const angle=rand(0,Math.PI*2);
    const speed=rand(1,5);
    inkSplashes.push({
      x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1,decay:rand(0.005,0.02),size:rand(3,12),
      rotation:rand(0,Math.PI*2)
    });
  }
}

function addShockwave(x,y,maxR=100){
  shockwaves.push({x,y,r:5,maxR,life:1,decay:0.025});
}

function addAfterimage(x,y,scale,pose){
  afterimages.push({x,y,scale,pose,life:0.6,decay:0.015});
}

// --- Update ---
function updatePhase(dt){
  phaseTime+=dt;
  const p=PHASES[phase];
  if(!p)return;
  
  if(phase==='setup'){
    if(phaseTime>=p.dur){phase='crouch';phaseTime=0;}
  } else if(phase==='crouch'){
    heroScale=1-phaseTime/p.dur*0.15;
    if(phaseTime>=p.dur){
      phase='leap';phaseTime=0;
      heroVY=-18;
      spawnQiBurst(heroX,heroY,30);
      addShockwave(heroX,heroY,150);
    }
  } else if(phase==='leap'){
    heroY+=heroVY;heroVY+=0.3;
    if(phaseTime>=p.dur){
      phase='tiyunzong';phaseTime=0;stepCount=0;
      heroVY=-6;
    }
  } else if(phase==='tiyunzong'){
    const stepInterval=p.dur/maxSteps;
    const currentStep=Math.floor(phaseTime/stepInterval);
    if(currentStep>stepCount && stepCount<maxSteps){
      stepCount=currentStep;
      // STEP! Kick off own foot
      heroVY=-14-stepCount*1.5;
      stepFlash=1;
      spawnQiBurst(heroX,heroY+40,25+stepCount*5);
      spawnInkSplash(heroX,heroY+40,10+stepCount*3);
      addShockwave(heroX,heroY+40,80+stepCount*20);
      addAfterimage(heroX,heroY,heroScale,'step');
      // Chinese step text
      const chars=['一','二','三','四','五','六'];
      particles.push({
        x:heroX+rand(-30,30),y:heroY,vx:0,vy:-1,
        life:1,decay:0.008,size:20+stepCount*2,
        color:GOLD,type:'text',text:'第'+chars[Math.min(stepCount-1,5)]+'踏'
      });
    }
    heroY+=heroVY;heroVY+=0.5;
    if(phaseTime>=p.dur){phase='peak';phaseTime=0;heroVY=0;}
  } else if(phase==='peak'){
    // Hang at peak
    heroVY=Math.sin(phaseTime*3)*0.5;
    heroY+=heroVY;
    if(phaseTime>0.3&&phaseTime<0.5){
      spawnQiBurst(heroX,heroY,5);
    }
    if(phaseTime>=p.dur){phase='fall';phaseTime=0;heroVY=2;}
  } else if(phase==='fall'){
    heroVY+=0.8;
    heroY+=heroVY;
    if(heroY>=groundY){
      heroY=groundY;phase='land';phaseTime=0;
      landed=true;
      spawnQiBurst(heroX,groundY,40);
      spawnInkSplash(heroX,groundY,30);
      addShockwave(heroX,groundY,200);
    }
  } else if(phase==='land'){
    if(phaseTime>=1.0&&!showTitle){
      showTitle=true;
    }
    if(phaseTime>=p.dur){
      phase='title';phaseTime=0;
    }
  } else if(phase==='title'){
    titleOpacity=Math.min(1,phaseTime/2);
    document.getElementById('title').style.opacity=titleOpacity;
    if(phaseTime>=2){
      document.getElementById('hint').style.opacity=1;
    }
  }
  
  // Camera
  if(phase==='tiyunzong'||phase==='peak'||phase==='leap'){
    targetCamY=heroY-H*0.4;
  } else if(phase==='fall'){
    targetCamY=Math.max(0,heroY-H*0.5);
  } else {
    targetCamY=0;
  }
  cameraY=lerp(cameraY,targetCamY,0.05);
  
  // Step flash
  stepFlash*=0.9;
}

function updateParticles(dt){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.05;p.vx*=0.99;
    p.life-=p.decay;
    return p.life>0;
  });
  inkSplashes=inkSplashes.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.03;p.vx*=0.98;
    p.life-=p.decay;
    return p.life>0;
  });
  shockwaves=shockwaves.filter(s=>{
    s.r+=3;s.life-=s.decay;
    return s.life>0;
  });
  afterimages=afterimages.filter(a=>{
    a.life-=a.decay;
    return a.life>0;
  });
}

// --- Render ---
function render(){
  // Ink wash background
  const bgGrd=ctx.createLinearGradient(0,0,0,H);
  bgGrd.addColorStop(0,'#1a1816');
  bgGrd.addColorStop(0.4,'#2a2520');
  bgGrd.addColorStop(1,'#1e1a16');
  ctx.fillStyle=bgGrd;
  ctx.fillRect(0,0,W,H);
  
  // Rice paper texture
  ctx.fillStyle='rgba(235,225,205,0.03)';
  ctx.fillRect(0,0,W,H);
  
  drawMoon(cameraY);
  drawClouds(cameraY,time);
  drawMountains(cameraY);
  drawBamboo(cameraY);
  drawGround(cameraY);
  
  // Shockwaves
  shockwaves.forEach(s=>{
    ctx.strokeStyle=`rgba(200,170,100,${s.life*0.5})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(s.x,s.y-cameraY,s.r,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(235,225,205,${s.life*0.3})`;
    ctx.beginPath();ctx.arc(s.x,s.y-cameraY,s.r*0.7,0,Math.PI*2);ctx.stroke();
  });
  
  // Ink splashes
  inkSplashes.forEach(p=>{
    ctx.save();
    ctx.translate(p.x,p.y-cameraY);
    ctx.rotate(p.rotation);
    ctx.fillStyle=`rgba(20,18,15,${p.life*0.6})`;
    ctx.beginPath();
    ctx.ellipse(0,0,p.size,p.size*0.6,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  
  // Afterimages
  afterimages.forEach(a=>{
    drawHero(a.x,a.y,cameraY,a.scale,a.pose,a.life*0.4);
  });
  
  // Hero
  let pose='stand';
  if(phase==='crouch')pose='crouch';
  else if(phase==='leap')pose='leap';
  else if(phase==='tiyunzong')pose='step';
  else if(phase==='peak')pose='leap';
  else if(phase==='fall')pose='leap';
  else if(phase==='land'||phase==='title')pose='land';
  
  drawHero(heroX,heroY,cameraY,heroScale,pose);
  
  // Qi particles
  particles.forEach(p=>{
    if(p.type==='text'){
      ctx.fillStyle=p.color+p.life+')';
      ctx.font=`${p.size}px 'SimSun','STSong',serif`;
      ctx.textAlign='center';
      ctx.fillText(p.text,p.x,p.y-cameraY);
    } else {
      ctx.fillStyle=p.color+p.life*0.8+')';
      ctx.beginPath();ctx.arc(p.x,p.y-cameraY,p.size*p.life,0,Math.PI*2);ctx.fill();
    }
  });
  
  // Step flash overlay
  if(stepFlash>0.01){
    ctx.fillStyle=`rgba(255,250,230,${stepFlash*0.15})`;
    ctx.fillRect(0,0,W,H);
  }
  
  // Vignette
  const vgrd=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
  vgrd.addColorStop(0,'rgba(0,0,0,0)');
  vgrd.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=vgrd;ctx.fillRect(0,0,W,H);
  
  // Calligraphy flourish during ascent
  if((phase==='tiyunzong'||phase==='peak')&&stepCount>2){
    ctx.save();
    ctx.globalAlpha=0.08;
    ctx.font='200px "SimSun","STSong",serif';
    ctx.fillStyle=RICE+'1)';
    ctx.textAlign='center';
    ctx.fillText('纵',W*0.5,H*0.5);
    ctx.restore();
  }
}

// --- Loop ---
let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  time+=dt;
  
  updatePhase(dt);
  updateParticles(dt);
  render();
  
  requestAnimationFrame(loop);
}

// --- Init ---
startAnimation();
requestAnimationFrame(loop);
