<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梯云纵 · Tiyunzong</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; cursor: pointer; }
canvas { display: block; }
#poem {
  position: fixed; bottom: 0; left: 0; right: 0;
  text-align: center; font-family: 'STKaiti', 'KaiTi', serif;
  color: rgba(220, 200, 170, 0); font-size: clamp(18px, 3vw, 32px);
  padding: 40px 20px; letter-spacing: 0.3em;
  transition: color 2s ease; pointer-events: none;
  text-shadow: 0 0 20px rgba(180, 150, 100, 0.3);
}
#poem.show { color: rgba(220, 200, 170, 0.9); }
#hint {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: 'STKaiti', 'KaiTi', serif; color: rgba(200, 180, 150, 0.6);
  font-size: 20px; pointer-events: none; transition: opacity 1s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="poem">踏虚蹈空上九天，一步一生一念间</div>
<div id="hint" style="display:none">点击重新开始</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

// --- State ---
let time = 0, phase = 'setup', phaseTime = 0, cameraY = 0, targetCameraY = 0;
let particles = [], afterimages = [], shockwaves = [], inkSplashes = [];
let heroX, heroY, heroVY = 0, heroFrame = 0, stepCount = 0;
const TOTAL_STEPS = 7;
const STEP_HEIGHT = 120;
let groundY, startY;
let finished = false, started = false;

// --- Parallax layers ---
const mountains = [];
const bamboos = [];
const clouds = [];
let moonX, moonY;

function init() {
  time = 0; phase = 'setup'; phaseTime = 0; cameraY = 0; targetCameraY = 0;
  particles = []; afterimages = []; shockwaves = []; inkSplashes = [];
  stepCount = 0; heroFrame = 0; finished = false;
  groundY = H * 0.78; startY = groundY;
  heroX = W * 0.5; heroY = groundY; heroVY = 0;
  moonX = W * 0.75; moonY = H * 0.15;
  document.getElementById('poem').classList.remove('show');
  document.getElementById('hint').style.display = 'none';

  mountains.length = 0;
  for (let i = 0; i < 8; i++) {
    mountains.push({ x: W * (i / 7 - 0.05), h: 150 + Math.random() * 200, w: 200 + Math.random() * 300 });
  }
  bamboos.length = 0;
  for (let i = 0; i < 20; i++) {
    bamboos.push({ x: Math.random() * W * 1.4 - W * 0.2, h: 200 + Math.random() * 400, sway: Math.random() * Math.PI * 2 });
  }
  clouds.length = 0;
  for (let i = 0; i < 12; i++) {
    clouds.push({ x: Math.random() * W * 1.5 - W * 0.25, y: -200 + Math.random() * H * 2, w: 100 + Math.random() * 200, speed: 0.1 + Math.random() * 0.3, depth: 0.1 + Math.random() * 0.5 });
  }
}

// --- Drawing helpers ---
function inkColor(a = 1) { return `rgba(30, 25, 20, ${a})`; }
function paperColor(a = 1) { return `rgba(235, 220, 195, ${a})`; }

function drawMoon(cx, cy, camY) {
  const y = cy - camY * 0.05;
  const g = ctx.createRadialGradient(cx, y, 0, cx, y, 60);
  g.addColorStop(0, 'rgba(255, 245, 220, 0.9)');
  g.addColorStop(0.5, 'rgba(255, 240, 200, 0.4)');
  g.addColorStop(1, 'rgba(255, 240, 200, 0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, y, 60, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255, 248, 230, 0.95)';
  ctx.beginPath(); ctx.arc(cx, y, 28, 0, Math.PI * 2); ctx.fill();
}

function drawMountains(camY) {
  mountains.forEach((m, i) => {
    const depth = 0.1 + (i % 3) * 0.05;
    const y = groundY + 50 - camY * depth;
    const alpha = 0.15 + (i % 3) * 0.08;
    ctx.fillStyle = `rgba(40, 35, 30, ${alpha})`;
    ctx.beginPath();
    ctx.moveTo(m.x, y);
    ctx.quadraticCurveTo(m.x + m.w * 0.3, y - m.h * 0.8, m.x + m.w * 0.5, y - m.h);
    ctx.quadraticCurveTo(m.x + m.w * 0.7, y - m.h * 0.7, m.x + m.w, y);
    ctx.fill();
  });
}

function drawBamboo(camY) {
  bamboos.forEach(b => {
    const depth = 0.3;
    const baseY = groundY + 20 - camY * depth;
    const sway = Math.sin(time * 0.001 + b.sway) * 8;
    ctx.strokeStyle = 'rgba(50, 60, 40, 0.3)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(b.x, baseY);
    ctx.quadraticCurveTo(b.x + sway * 0.5, baseY - b.h * 0.5, b.x + sway, baseY - b.h);
    ctx.stroke();
    // leaves
    for (let j = 0.3; j < 1; j += 0.15) {
      const lx = b.x + sway * j;
      const ly = baseY - b.h * j;
      ctx.fillStyle = 'rgba(50, 65, 40, 0.2)';
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(Math.sin(time * 0.002 + j * 5) * 0.3);
      ctx.beginPath();
      ctx.ellipse(0, 0, 15, 4, 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  });
}

function drawClouds(camY) {
  clouds.forEach(c => {
    const x = (c.x + time * c.speed * 0.02) % (W + c.w * 2) - c.w;
    const y = c.y - camY * c.depth;
    ctx.fillStyle = `rgba(200, 190, 170, ${0.08 + c.depth * 0.06})`;
    ctx.beginPath();
    ctx.ellipse(x, y, c.w, c.w * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawGround(camY) {
  const y = groundY - camY;
  if (y > H + 50) return;
  ctx.fillStyle = 'rgba(60, 50, 40, 0.4)';
  ctx.fillRect(0, y, W, H - y + 500);
  // ink wash edge
  ctx.strokeStyle = 'rgba(40, 30, 25, 0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, y);
  for (let x = 0; x <= W; x += 20) {
    ctx.lineTo(x, y + Math.sin(x * 0.02 + time * 0.001) * 3);
  }
  ctx.stroke();
}

// --- Hero (ink figure) ---
function drawHero(x, y, camY, frame, alpha = 1) {
  const sy = y - camY;
  if (sy < -100 || sy > H + 100) return;
  ctx.save();
  ctx.translate(x, sy);
  ctx.globalAlpha = alpha;

  // Body - simple ink brush figure
  const breathe = Math.sin(time * 0.005) * 2;
  const lean = phase === 'step' ? Math.sin(phaseTime * 0.1) * 0.1 : 0;
  ctx.rotate(lean);

  // Robe / body
  ctx.fillStyle = inkColor(0.85);
  ctx.beginPath();
  ctx.moveTo(0, -45 + breathe);
  ctx.quadraticCurveTo(-18, -20, -22, 15);
  ctx.lineTo(-15, 25);
  ctx.lineTo(15, 25);
  ctx.lineTo(22, 15);
  ctx.quadraticCurveTo(18, -20, 0, -45 + breathe);
  ctx.fill();

  // Robe flowing
  ctx.fillStyle = inkColor(0.6);
  ctx.beginPath();
  ctx.moveTo(-15, 25);
  ctx.quadraticCurveTo(-25, 35 + breathe, -20 + (phase === 'step' ? -10 : 0), 50);
  ctx.lineTo(20 + (phase === 'step' ? 10 : 0), 50);
  ctx.quadraticCurveTo(25, 35 + breathe, 15, 25);
  ctx.fill();

  // Head
  ctx.fillStyle = inkColor(0.9);
  ctx.beginPath();
  ctx.arc(0, -55, 12, 0, Math.PI * 2);
  ctx.fill();

  // Hair ribbon
  ctx.strokeStyle = inkColor(0.7);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-5, -65);
  ctx.quadraticCurveTo(-20, -70 + breathe, -30 + (phase === 'step' ? -15 : 0), -60);
  ctx.stroke();

  // Arms
  const armAngle = phase === 'step' ? Math.sin(phaseTime * 0.15) * 0.5 : 0;
  ctx.strokeStyle = inkColor(0.8);
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-12, -25);
  ctx.quadraticCurveTo(-30, -10 + armAngle * 20, -35, 5 + armAngle * 15);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(12, -25);
  ctx.quadraticCurveTo(30, -10 - armAngle * 20, 35, 5 - armAngle * 15);
  ctx.stroke();

  // Legs / feet
  if (phase === 'step' || phase === 'leap') {
    // Dynamic leg pose
    const legPhase = Math.sin(phaseTime * 0.2);
    ctx.strokeStyle = inkColor(0.7);
    ctx.lineWidth = 3;
    // left leg
    ctx.beginPath();
    ctx.moveTo(-8, 45);
    ctx.quadraticCurveTo(-12, 60 + legPhase * 10, -5, 75);
    ctx.stroke();
    // right leg (stepping)
    ctx.beginPath();
    ctx.moveTo(8, 45);
    ctx.quadraticCurveTo(12, 55 - legPhase * 10, 10, 70);
    ctx.stroke();
  } else {
    ctx.strokeStyle = inkColor(0.7);
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-8, 45); ctx.lineTo(-10, 75); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8, 45); ctx.lineTo(10, 75); ctx.stroke();
  }

  ctx.restore();
}

// --- Particles ---
function spawnQiBurst(x, y, count = 20) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      life: 1, decay: 0.01 + Math.random() * 0.02,
      size: 2 + Math.random() * 4, type: 'qi'
    });
  }
}

function spawnInkSplash(x, y, count = 15) {
  for (let i = 0; i < count; i++) {
    const angle = -Math.PI * 0.5 + (Math.random() - 0.5) * Math.PI;
    const speed = 2 + Math.random() * 6;
    inkSplashes.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1, decay: 0.008 + Math.random() * 0.015,
      size: 3 + Math.random() * 8
    });
  }
}

function spawnShockwave(x, y) {
  shockwaves.push({ x, y, radius: 5, maxRadius: 80 + Math.random() * 40, life: 1 });
}

function addAfterimage(x, y) {
  afterimages.push({ x, y, life: 1, frame: heroFrame });
}

function updateParticles(dt) {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= p.decay;
    return p.life > 0;
  });
  inkSplashes = inkSplashes.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.vx *= 0.98; p.life -= p.decay;
    return p.life > 0;
  });
  shockwaves = shockwaves.filter(s => {
    s.radius += 3; s.life = 1 - s.radius / s.maxRadius;
    return s.life > 0;
  });
  afterimages = afterimages.filter(a => { a.life -= 0.02; return a.life > 0; });
}

function drawParticles(camY) {
  // Qi particles
  particles.forEach(p => {
    const sy = p.y - camY;
    ctx.fillStyle = `rgba(200, 180, 140, ${p.life * 0.8})`;
    ctx.beginPath(); ctx.arc(p.x, sy, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  });
  // Ink splashes
  inkSplashes.forEach(p => {
    const sy = p.y - camY;
    ctx.fillStyle = `rgba(30, 25, 20, ${p.life * 0.6})`;
    ctx.beginPath(); ctx.arc(p.x, sy, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  });
  // Shockwaves
  shockwaves.forEach(s => {
    const sy = s.y - camY;
    ctx.strokeStyle = `rgba(200, 180, 140, ${s.life * 0.5})`;
    ctx.lineWidth = 2 * s.life;
    ctx.beginPath(); ctx.arc(s.x, sy, s.radius, 0, Math.PI * 2); ctx.stroke();
  });
  // Afterimages
  afterimages.forEach(a => {
    drawHero(a.x, a.y, camY, a.frame, a.life * 0.3);
  });
}

// --- Step marker (foot platform) ---
function drawStepMarker(x, y, camY, alpha) {
  const sy = y - camY;
  if (sy < -50 || sy > H + 50) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  // Ink ring
  ctx.strokeStyle = 'rgba(180, 160, 120, 0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(x, sy, 25, 8, 0, 0, Math.PI * 2);
  ctx.stroke();
  // Qi glow
  const g = ctx.createRadialGradient(x, sy, 0, x, sy, 30);
  g.addColorStop(0, 'rgba(220, 200, 160, 0.3)');
  g.addColorStop(1, 'rgba(220, 200, 160, 0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, sy, 30, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

const stepMarkers = [];

// --- Animation phases ---
function updatePhase(dt) {
  phaseTime += dt;

  switch (phase) {
    case 'setup':
      if (phaseTime > 1500) {
        phase = 'leap'; phaseTime = 0;
        heroVY = -8;
        spawnQiBurst(heroX, heroY + 50, 30);
        spawnInkSplash(heroX, heroY + 50, 20);
        shockwaves.push({ x: heroX, y: heroY + 50, radius: 5, maxRadius: 100, life: 1 });
      }
      break;

    case 'leap':
      heroY += heroVY;
      heroVY += 0.15;
      targetCameraY = Math.min(0, heroY - groundY + 200);
      if (phaseTime > 600) {
        phase = 'step'; phaseTime = 0; stepCount = 0;
        heroVY = 0;
      }
      break;

    case 'step':
      if (stepCount < TOTAL_STEPS) {
        const stepDuration = 400 - stepCount * 20;
        if (phaseTime > stepDuration) {
          // Execute step
          const offsetX = (Math.random() - 0.5) * 30;
          addAfterimage(heroX, heroY);
          heroY -= STEP_HEIGHT;
          heroX += offsetX;
          heroX = Math.max(W * 0.3, Math.min(W * 0.7, heroX));
          stepCount++;

          // Effects
          spawnQiBurst(heroX, heroY + 60, 25);
          spawnInkSplash(heroX, heroY + 60, 12);
          spawnShockwave(heroX, heroY + 60);
          stepMarkers.push({ x: heroX, y: heroY + 60, life: 1 });

          phaseTime = 0;
        }
        // Slight hover between steps
        heroY += Math.sin(phaseTime * 0.01) * 0.3;
      } else {
        phase = 'peak'; phaseTime = 0;
        // Big burst at peak
        spawnQiBurst(heroX, heroY, 50);
        spawnInkSplash(heroX, heroY, 30);
        spawnShockwave(heroX, heroY);
        spawnShockwave(heroX, heroY);
      }
      targetCameraY = heroY - H * 0.5;
      break;

    case 'peak':
      heroY += Math.sin(phaseTime * 0.003) * 0.5;
      if (phaseTime > 2000) {
        phase = 'descend'; phaseTime = 0;
        heroVY = 2;
      }
      break;

    case 'descend':
      heroVY += 0.12;
      heroY += heroVY;
      targetCameraY = heroY - H * 0.5;
      if (phaseTime % 100 < 16) addAfterimage(heroX, heroY);
      if (heroY >= groundY) {
        heroY = groundY;
        phase = 'landing'; phaseTime = 0;
        spawnQiBurst(heroX, heroY + 50, 40);
        spawnInkSplash(heroX, heroY + 50, 25);
        spawnShockwave(heroX, heroY + 50);
        targetCameraY = 0;
      }
      break;

    case 'landing':
      if (phaseTime > 1000) {
        document.getElementById('poem').classList.add('show');
      }
      if (phaseTime > 3000 && !finished) {
        finished = true;
        setTimeout(() => {
          document.getElementById('hint').style.display = 'block';
          document.getElementById('hint').style.opacity = '1';
        }, 500);
      }
      break;
  }

  // Smooth camera
  cameraY += (targetCameraY - cameraY) * 0.06;

  // Decay step markers
  stepMarkers.forEach(s => s.life -= 0.003);
}

// --- Main loop ---
let lastTime = 0;
function loop(ts) {
  const dt = lastTime ? ts - lastTime : 16;
  lastTime = ts;
  time = ts;

  if (started) updatePhase(dt);
  updateParticles(dt);

  // -- Draw --
  // Background gradient (parchment)
  const bgG = ctx.createLinearGradient(0, 0, 0, H);
  bgG.addColorStop(0, '#1a1812');
  bgG.addColorStop(0.3, '#2a2418');
  bgG.addColorStop(0.7, '#1e1a14');
  bgG.addColorStop(1, '#151210');
  ctx.fillStyle = bgG;
  ctx.fillRect(0, 0, W, H);

  // Parchment texture overlay
  ctx.fillStyle = 'rgba(200, 185, 160, 0.03)';
  ctx.fillRect(0, 0, W, H);

  drawMoon(moonX, moonY, cameraY);
  drawClouds(cameraY);
  drawMountains(cameraY);
  drawBamboo(cameraY);
  drawGround(cameraY);

  // Step markers
  stepMarkers.forEach(s => {
    if (s.life > 0) drawStepMarker(s.x, s.y, cameraY, s.life);
  });

  drawParticles(cameraY);
  drawHero(heroX, heroY, cameraY, heroFrame);

  // Vignette
  const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.8);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(loop);
}

// --- Start ---
init();
started = true;
requestAnimationFrame(loop);

addEventListener('click', () => {
  if (phase !== 'setup' && phase !== 'leap') {
    stepMarkers.length = 0;
    init();
    started = true;
    lastTime = 0;
  }
});
</script>
</body>
</html>
