<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梯云纵 - Tiyunzong</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; cursor: pointer; }
canvas { display: block; }
#hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(200,180,150,0.6); font-family: 'STKaiti','KaiTi',serif; font-size: 16px; pointer-events: none; opacity: 0; transition: opacity 1s; }
#hint.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">点击重放</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

// --- State ---
let time = 0, phase = 'setup', phaseTime = 0, cameraY = 0, targetCameraY = 0;
let running = true, showHint = false;

// --- Character ---
const char = { x: 0, y: 0, vy: 0, stepCount: 0, maxSteps: 7, landed: false };
const GROUND_Y = 200; // from bottom
let stepEvents = []; // {time, x, y} for shockwaves
let afterimages = []; // {x, y, alpha, pose}
let particles = []; // ink splashes
let qiBursts = []; // {x, y, radius, alpha}

// --- Background layers ---
const mountains = [];
const bamboos = [];
const clouds = [];
let moon = { x: 0, y: 0 };

function initScene() {
  time = 0; phase = 'setup'; phaseTime = 0; cameraY = 0; targetCameraY = 0;
  char.x = W * 0.5; char.y = H - GROUND_Y; char.vy = 0; char.stepCount = 0; char.landed = false;
  stepEvents = []; afterimages = []; particles = []; qiBursts = [];
  showHint = false;
  document.getElementById('hint').classList.remove('show');

  mountains.length = 0;
  for (let i = 0; i < 5; i++) {
    mountains.push({ x: W * (i / 4 - 0.1), h: 200 + Math.random() * 300, w: 300 + Math.random() * 200 });
  }
  bamboos.length = 0;
  for (let i = 0; i < 20; i++) {
    bamboos.push({ x: Math.random() * W * 1.5 - W * 0.25, h: 300 + Math.random() * 500, depth: 0.3 + Math.random() * 0.7 });
  }
  clouds.length = 0;
  for (let i = 0; i < 12; i++) {
    clouds.push({ x: Math.random() * W * 2 - W * 0.5, y: -500 - Math.random() * 3000, w: 100 + Math.random() * 200, speed: 0.1 + Math.random() * 0.3 });
  }
  moon.x = W * 0.75; moon.y = -800;
}

// --- Drawing helpers ---
function inkColor(a = 1) { return `rgba(30,25,20,${a})`; }
function parchment(a = 1) { return `rgba(235,220,195,${a})`; }

function drawMoon(cy) {
  const sy = moon.y - cy * 0.05;
  const gradient = ctx.createRadialGradient(moon.x, sy, 0, moon.x, sy, 80);
  gradient.addColorStop(0, 'rgba(255,250,230,0.9)');
  gradient.addColorStop(0.5, 'rgba(255,240,200,0.3)');
  gradient.addColorStop(1, 'rgba(255,240,200,0)');
  ctx.fillStyle = gradient;
  ctx.beginPath(); ctx.arc(moon.x, sy, 80, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,248,230,0.85)';
  ctx.beginPath(); ctx.arc(moon.x, sy, 35, 0, Math.PI * 2); ctx.fill();
}

function drawMountains(cy) {
  mountains.forEach((m, i) => {
    const parallax = 0.1 + i * 0.05;
    const sy = H - cy * parallax;
    const alpha = 0.15 + i * 0.05;
    ctx.fillStyle = `rgba(40,35,30,${alpha})`;
    ctx.beginPath();
    ctx.moveTo(m.x - m.w / 2, sy);
    ctx.quadraticCurveTo(m.x, sy - m.h, m.x + m.w / 2, sy);
    ctx.fill();
  });
}

function drawBamboo(cy) {
  bamboos.forEach(b => {
    const parallax = b.depth * 0.4;
    const bx = b.x;
    const by = H - cy * parallax;
    const sway = Math.sin(time * 0.5 + b.x * 0.01) * 5 * b.depth;
    ctx.strokeStyle = `rgba(60,80,50,${0.2 + b.depth * 0.3})`;
    ctx.lineWidth = 2 + b.depth * 2;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(bx + sway, by - b.h / 2, bx + sway * 1.5, by - b.h);
    ctx.stroke();
    // nodes
    for (let n = 0; n < 5; n++) {
      const ny = by - b.h * (n + 1) / 6;
      const nx = bx + sway * (n + 1) / 6;
      ctx.strokeStyle = `rgba(50,70,40,${0.3 + b.depth * 0.2})`;
      ctx.lineWidth = 3 + b.depth * 2;
      ctx.beginPath(); ctx.moveTo(nx - 3, ny); ctx.lineTo(nx + 3, ny); ctx.stroke();
    }
    // leaves
    ctx.fillStyle = `rgba(60,90,45,${0.15 + b.depth * 0.15})`;
    for (let l = 0; l < 3; l++) {
      const ly = by - b.h * (0.6 + l * 0.15);
      const lx = bx + sway * (0.6 + l * 0.15);
      ctx.save(); ctx.translate(lx, ly); ctx.rotate(Math.sin(time + l) * 0.3);
      ctx.beginPath(); ctx.ellipse(10, 0, 20, 3, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  });
}

function drawClouds(cy) {
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > W + 200) c.x = -300;
    const sy = c.y - cy * 0.15;
    if (sy < -200 || sy > H + 200) return;
    ctx.fillStyle = 'rgba(200,190,175,0.08)';
    ctx.beginPath();
    ctx.ellipse(c.x, sy, c.w, c.w * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawGround(cy) {
  const gy = H - GROUND_Y - cy;
  if (gy > H + 50) return;
  ctx.fillStyle = 'rgba(60,50,40,0.3)';
  ctx.fillRect(0, gy, W, H - gy + 500);
  ctx.strokeStyle = 'rgba(40,30,20,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  // ink wash ground texture
  for (let i = 0; i < 8; i++) {
    ctx.strokeStyle = `rgba(40,30,20,${0.1 - i * 0.01})`;
    ctx.beginPath();
    ctx.moveTo(0, gy + i * 8);
    for (let x = 0; x < W; x += 30) {
      ctx.lineTo(x, gy + i * 8 + Math.sin(x * 0.02 + i) * 3);
    }
    ctx.stroke();
  }
}

// --- Character drawing ---
function drawCharacter(x, y, cy, posePhase, alpha = 1) {
  const sy = y - cy;
  if (sy < -100 || sy > H + 100) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, sy);

  // Robe body
  ctx.fillStyle = inkColor(0.85 * alpha);
  ctx.strokeStyle = inkColor(0.9 * alpha);
  ctx.lineWidth = 2;

  const legSpread = Math.sin(posePhase * 3) * 15;
  const armAngle = Math.sin(posePhase * 2) * 0.5;

  // Flowing robe
  ctx.beginPath();
  ctx.moveTo(0, -40);
  ctx.quadraticCurveTo(-15, -20, -12 - legSpread, 20);
  ctx.lineTo(-5, 20);
  ctx.lineTo(0, 5);
  ctx.lineTo(5, 20);
  ctx.lineTo(12 + legSpread, 20);
  ctx.quadraticCurveTo(15, -20, 0, -40);
  ctx.fill();

  // Head
  ctx.beginPath(); ctx.arc(0, -50, 10, 0, Math.PI * 2); ctx.fill();

  // Hair ribbon flowing
  ctx.strokeStyle = `rgba(80,20,20,${0.7 * alpha})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -55);
  ctx.quadraticCurveTo(-20 + Math.sin(posePhase) * 10, -65, -35 + Math.sin(posePhase * 1.5) * 15, -60);
  ctx.stroke();

  // Arms
  ctx.strokeStyle = inkColor(0.8 * alpha);
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-8, -30);
  ctx.quadraticCurveTo(-25, -20 + Math.sin(armAngle) * 10, -30, -35 + Math.sin(posePhase) * 8);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(8, -30);
  ctx.quadraticCurveTo(25, -20 - Math.cos(armAngle) * 10, 30, -35 - Math.cos(posePhase) * 8);
  ctx.stroke();

  // Robe trailing wisps
  ctx.strokeStyle = `rgba(30,25,20,${0.3 * alpha})`;
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-5 + i * 5, 20);
    ctx.quadraticCurveTo(-10 + i * 5 + Math.sin(posePhase + i) * 10, 35, -15 + i * 5 + Math.sin(posePhase * 0.7 + i) * 15, 45);
    ctx.stroke();
  }

  ctx.restore();
}

function drawFoot(x, y, cy, side) {
  const sy = y - cy;
  ctx.save();
  ctx.translate(x + side * 8, sy + 20);
  ctx.fillStyle = inkColor(0.7);
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 4, side * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// --- Effects ---
function spawnInkSplash(x, y, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const v = speed * (0.5 + Math.random());
    particles.push({
      x, y, vx: Math.cos(angle) * v, vy: Math.sin(angle) * v - 2,
      life: 1, decay: 0.01 + Math.random() * 0.02,
      size: 2 + Math.random() * 4
    });
  }
}

function spawnQiBurst(x, y) {
  qiBursts.push({ x, y, radius: 5, alpha: 0.8, speed: 3 + Math.random() * 2 });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 0.05 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(cy) {
  particles.forEach(p => {
    const sy = p.y - cy;
    ctx.fillStyle = `rgba(30,25,20,${p.life * 0.7})`;
    ctx.beginPath(); ctx.arc(p.x, sy, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  });
}

function updateQiBursts(dt) {
  for (let i = qiBursts.length - 1; i >= 0; i--) {
    const q = qiBursts[i];
    q.radius += q.speed * dt;
    q.alpha -= 0.015 * dt;
    if (q.alpha <= 0) qiBursts.splice(i, 1);
  }
}

function drawQiBursts(cy) {
  qiBursts.forEach(q => {
    const sy = q.y - cy;
    ctx.strokeStyle = `rgba(180,160,120,${q.alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(q.x, sy, q.radius, 0, Math.PI * 2); ctx.stroke();
    // inner ring
    ctx.strokeStyle = `rgba(220,200,160,${q.alpha * 0.5})`;
    ctx.beginPath(); ctx.arc(q.x, sy, q.radius * 0.6, 0, Math.PI * 2); ctx.stroke();
  });
}

function drawAfterimages(cy) {
  afterimages.forEach(a => {
    a.alpha -= 0.008;
    if (a.alpha > 0) drawCharacter(a.x, a.y, cy, a.pose, a.alpha * 0.4);
  });
  afterimages = afterimages.filter(a => a.alpha > 0);
}

// --- Poem ---
function drawPoem(alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = parchment(1);
  ctx.font = '28px "STKaiti","KaiTi","Noto Serif SC",serif';
  ctx.textAlign = 'center';
  ctx.fillText('踏虚蹈空上九天', W / 2, H / 2 - 20);
  ctx.fillText('一步一生一念间', W / 2, H / 2 + 25);
  ctx.restore();
}

// --- Animation phases ---
const SETUP_DUR = 60;    // frames for setup
const LEAP_DUR = 30;
const STEP_DUR = 25;     // per step
const PEAK_DUR = 80;
const FALL_DUR = 120;
const POEM_DUR = 180;

let totalStepHeight = 0;
let poemAlpha = 0;
let stepTimer = 0;
let currentStep = 0;

function update(dt) {
  phaseTime += dt;

  if (phase === 'setup') {
    // Character stands, slight breathing
    char.x = W * 0.5;
    char.y = H - GROUND_Y;
    targetCameraY = 0;
    if (phaseTime > SETUP_DUR) { phase = 'leap'; phaseTime = 0; }
  }
  else if (phase === 'leap') {
    // Initial leap
    const t = phaseTime / LEAP_DUR;
    char.vy = -18;
    char.y += char.vy * dt;
    char.x += Math.sin(phaseTime * 0.1) * 0.5;
    targetCameraY = -(char.y - (H - GROUND_Y)) * 0.6;

    if (phaseTime === 1) {
      spawnInkSplash(char.x, H - GROUND_Y, 20, 4);
      spawnQiBurst(char.x, H - GROUND_Y);
    }
    if (phaseTime > LEAP_DUR) {
      phase = 'steps'; phaseTime = 0; currentStep = 0; stepTimer = 0;
    }
  }
  else if (phase === 'steps') {
    stepTimer += dt;
    if (stepTimer >= STEP_DUR && currentStep < char.maxSteps) {
      // Perform a 梯云纵 step!
      currentStep++;
      stepTimer = 0;

      // Step effect: foot appears, character gets another boost
      const side = currentStep % 2 === 0 ? 1 : -1;
      stepEvents.push({ time: time, x: char.x + side * 8, y: char.y + 20, side });

      // Boost upward
      char.vy = -14 - currentStep * 1.5;

      // Visual effects
      spawnInkSplash(char.x, char.y + 15, 15 + currentStep * 3, 3 + currentStep * 0.5);
      spawnQiBurst(char.x, char.y + 15);
      spawnQiBurst(char.x, char.y + 10);

      // Afterimage
      afterimages.push({ x: char.x, y: char.y, alpha: 0.8, pose: time });
    }

    char.y += char.vy * dt;
    char.vy += 0.3 * dt; // gravity, reduced during steps
    char.x += Math.sin(phaseTime * 0.15) * 1.5;

    targetCameraY = -(char.y - (H - GROUND_Y)) * 0.7;

    if (currentStep >= char.maxSteps && stepTimer > STEP_DUR) {
      phase = 'peak'; phaseTime = 0;
      char.vy = -5;
    }
  }
  else if (phase === 'peak') {
    char.y += char.vy * dt;
    char.vy += 0.05 * dt;
    char.x += Math.sin(phaseTime * 0.05) * 0.5;

    targetCameraY = -(char.y - (H - GROUND_Y)) * 0.7;

    if (phaseTime === 1) {
      // Big burst at peak
      spawnInkSplash(char.x, char.y, 40, 6);
      for (let i = 0; i < 3; i++) spawnQiBurst(char.x, char.y);
      afterimages.push({ x: char.x, y: char.y, alpha: 1, pose: time });
    }

    if (phaseTime > PEAK_DUR) {
      phase = 'fall'; phaseTime = 0;
      char.vy = 2;
    }
  }
  else if (phase === 'fall') {
    char.y += char.vy * dt;
    char.vy += 0.4 * dt;
    char.x += Math.sin(phaseTime * 0.08) * 0.8;

    if (phaseTime % 8 < 1) {
      afterimages.push({ x: char.x, y: char.y, alpha: 0.5, pose: time });
    }

    const groundY = H - GROUND_Y;
    if (char.y >= groundY) {
      char.y = groundY;
      char.vy = 0;
      if (!char.landed) {
        char.landed = true;
        spawnInkSplash(char.x, groundY, 30, 5);
        spawnQiBurst(char.x, groundY);
      }
    }

    targetCameraY = -(char.y - (H - GROUND_Y)) * 0.5;
    if (targetCameraY > 0) targetCameraY = 0;

    if (phaseTime > FALL_DUR) { phase = 'poem'; phaseTime = 0; poemAlpha = 0; }
  }
  else if (phase === 'poem') {
    poemAlpha = Math.min(1, phaseTime / 60);
    targetCameraY = 0;
    if (phaseTime > POEM_DUR) {
      running = false;
      showHint = true;
      document.getElementById('hint').classList.add('show');
    }
  }

  // Smooth camera
  cameraY += (targetCameraY - cameraY) * 0.05 * dt;

  updateParticles(dt);
  updateQiBursts(dt);

  // Clean old step events
  stepEvents = stepEvents.filter(s => time - s.time < 60);
}

function draw() {
  // Background - parchment
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#1a1815');
  bgGrad.addColorStop(0.5, '#2a2520');
  bgGrad.addColorStop(1, '#1f1c18');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle paper texture
  ctx.fillStyle = 'rgba(200,185,160,0.03)';
  for (let i = 0; i < 30; i++) {
    const tx = (i * 137 + time * 0.01) % (W + 100) - 50;
    const ty = (i * 211) % H;
    ctx.fillRect(tx, ty, 100, 1);
  }

  const cy = cameraY;

  drawMoon(cy);
  drawClouds(cy);
  drawMountains(cy);
  drawBamboo(cy);
  drawGround(cy);

  // Step footprints
  stepEvents.forEach(s => {
    const age = time - s.time;
    const alpha = Math.max(0, 1 - age / 60);
    const sy = s.y - cy;
    ctx.fillStyle = `rgba(150,130,100,${alpha * 0.5})`;
    ctx.beginPath();
    ctx.ellipse(s.x, sy, 10, 5, s.side * 0.2, 0, Math.PI * 2);
    ctx.fill();
    // Qi circle
    ctx.strokeStyle = `rgba(200,180,140,${alpha * 0.3})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(s.x, sy, 10 + age * 0.8, 0, Math.PI * 2);
    ctx.stroke();
  });

  drawAfterimages(cy);
  drawQiBursts(cy);
  drawParticles(cy);

  // Draw character
  drawCharacter(char.x, char.y, cy, time * 0.1);

  // Step label during steps
  if (phase === 'steps' && currentStep > 0) {
    const sy = char.y - cy;
    ctx.fillStyle = `rgba(200,180,150,${0.6 + Math.sin(time * 0.3) * 0.3})`;
    ctx.font = '16px "STKaiti","KaiTi",serif';
    ctx.textAlign = 'center';
    const stepNames = ['一','二','三','四','五','六','七'];
    ctx.fillText(`第${stepNames[currentStep-1] || currentStep}步`, char.x, sy - 70);
  }

  // Draw poem
  if (phase === 'poem') drawPoem(poemAlpha);

  // Vignette
  const vg = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.8);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function loop() {
  if (!running) { draw(); return; }
  time++;
  update(1);
  draw();
  requestAnimationFrame(loop);
}

// Click to replay
addEventListener('click', () => {
  initScene();
  running = true;
  loop();
});

initScene();
loop();
</script>
</body>
</html>
