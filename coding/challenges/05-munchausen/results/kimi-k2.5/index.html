<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Adventures of Baron Munchausen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Roboto+Slab:wght@700&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a; /* Slate 900 */
            font-family: 'Roboto Slab', serif;
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        .comic-text {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #000;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .click-hint {
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .click-hint:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="stage"></canvas>
    
    <div id="ui-layer">
        <div class="text-center mt-4">
            <h1 class="text-4xl md:text-6xl text-yellow-400 comic-text drop-shadow-lg">BARON MUNCHAUSEN</h1>
            <p id="scene-caption" class="text-xl md:text-3xl text-white comic-text mt-2 opacity-0 transition-opacity duration-500">The Impossible Escape</p>
        </div>
        
        <div class="text-center mb-8">
            <button id="replay-btn" class="click-hint hidden bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-8 rounded-full border-4 border-yellow-400 shadow-xl comic-text text-2xl">
                REPLAY STORY
            </button>
            <p id="start-hint" class="text-gray-400 text-sm animate-pulse mt-4">Click to Skip/Restart</p>
        </div>
    </div>
</div>

<script>
/**
 * Interactive Canvas Animation: Baron Munchausen
 * Fully self-contained, procedural drawing, particle system.
 */

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const captionEl = document.getElementById('scene-caption');
const replayBtn = document.getElementById('replay-btn');
const startHint = document.getElementById('start-hint');

// --- State Management ---
let width, height;
let frame = 0;
let scene = 0; // 0:Walk, 1:Sink, 2:Panic, 3:Eureka, 4:Pull, 5:Victory
let sceneTimer = 0;
let particles = [];
let cameraY = 0;

// --- Assets & Constants ---
const COLORS = {
    sky: '#1e293b',
    swamp: '#3f2e18',
    swampLight: '#574226',
    baronSkin: '#fca5a5',
    baronCoat: '#dc2626', // Red
    baronPants: '#fbbf24', // Gold/Yellow
    horseBody: '#ffffff',
    horseMane: '#e2e8f0',
    hair: '#fcd34d',
    boot: '#451a03'
};

// --- Resize Handling ---
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}
window.addEventListener('resize', resize);
resize();

// --- Helper Functions ---
function random(min, max) { return Math.random() * (max - min) + min; }
function drawCircle(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
}
function drawRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
}

// --- Particle System ---
class Particle {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'bubble', 'splash', 'sweat', 'star'
        this.life = 1.0;
        this.decay = random(0.01, 0.03);
        
        if (type === 'bubble') {
            this.vx = random(-0.5, 0.5);
            this.vy = random(-1, -3);
            this.size = random(2, 6);
            this.color = 'rgba(200, 230, 255, 0.5)';
        } else if (type === 'splash') {
            this.vx = random(-3, 3);
            this.vy = random(-5, -10);
            this.size = random(3, 8);
            this.color = COLORS.swampLight;
            this.gravity = 0.5;
        } else if (type === 'sweat') {
            this.vx = random(-1, 1);
            this.vy = random(-2, 0);
            this.size = 3;
            this.color = '#60a5fa';
        } else if (type === 'star') {
            this.vx = random(-2, 2);
            this.vy = random(-2, 2);
            this.size = random(5, 15);
            this.color = '#fbbf24';
            this.decay = 0.02;
        }
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;

        if (this.type === 'splash' || this.type === 'star') {
            this.vy += (this.gravity || 0.05);
        }
        if (this.type === 'bubble') {
            this.x += Math.sin(frame * 0.1) * 0.5;
        }
    }

    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        if (this.type === 'star') {
            // Draw star shape
            for(let i=0; i<5; i++){
                ctx.lineTo(Math.cos((18+i*72)/180*Math.PI)*this.size + this.x,
                           -Math.sin((18+i*72)/180*Math.PI)*this.size + this.y);
                ctx.lineTo(Math.cos((54+i*72)/180*Math.PI)*(this.size/2) + this.x,
                           -Math.sin((54+i*72)/180*Math.PI)*(this.size/2) + this.y);
            }
            ctx.fill();
        } else {
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1.0;
    }
}

// --- Character Drawing Classes ---

class Baron {
    constructor() {
        this.x = width / 2;
        this.y = height - 150;
        this.targetY = height - 150;
        this.scale = 1;
        this.rotation = 0;
        this.animFrame = 0;
        this.isSinking = false;
        this.panicLevel = 0;
        this.pulling = false;
        this.hairGrabbed = false;
    }

    update() {
        // Smooth movement
        this.y += (this.targetY - this.y) * 0.1;
        
        // Walking bob
        if (scene === 0) {
            this.y += Math.sin(frame * 0.2) * 2;
            this.x += Math.sin(frame * 0.05) * 0.5; // Slight wander
        }

        // Sinking Logic
        if (scene === 1) {
            this.targetY += 0.5;
            if (frame % 10 === 0) {
                particles.push(new Particle(this.x + random(-30, 30), this.y + 40, 'bubble'));
            }
        }

        // Panic Shake
        if (scene === 2) {
            this.x += random(-2, 2);
            this.panicLevel += 0.1;
            if (frame % 20 === 0) {
                particles.push(new Particle(this.x + 20, this.y - 80, 'sweat'));
            }
        }

        // Pulling Up
        if (scene === 4) {
            this.rotation = -0.2; // Lean back
            // Elastic effect
            this.y = (height/2) - Math.sin(frame * 0.2) * 20 - (frame - sceneTimer)*2;
        }

        // Victory
        if (scene === 5) {
            this.rotation = Math.sin(frame * 0.1) * 0.1;
            this.y += Math.sin(frame * 0.2) * 1;
            if (frame % 5 === 0) {
                particles.push(new Particle(random(width), random(height), 'star'));
            }
        }

        this.animFrame++;
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.scale(this.scale, this.scale);

        // Legs (Boots)
        ctx.fillStyle = COLORS.boot;
        ctx.beginPath();
        ctx.moveTo(-15, 40);
        ctx.lineTo(-25, 80); // Left leg down
        ctx.lineTo(-10, 85);
        ctx.lineTo(-5, 40);
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(15, 40);
        ctx.lineTo(25, 75); // Right leg down
        ctx.lineTo(40, 80);
        ctx.lineTo(20, 40);
        ctx.fill();

        // Coat (Red Triangle)
        ctx.fillStyle = COLORS.baronCoat;
        ctx.beginPath();
        ctx.moveTo(0, -40); // Neck
        ctx.lineTo(-35, 50); // Left hem
        ctx.lineTo(0, 40); // Center split
        ctx.lineTo(35, 50); // Right hem
        ctx.fill();

        // Gold Trim
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -40);
        ctx.lineTo(-35, 50);
        ctx.moveTo(0, -40);
        ctx.lineTo(35, 50);
        ctx.stroke();

        // Head
        ctx.fillStyle = COLORS.baronSkin;
        ctx.beginPath();
        ctx.arc(0, -55, 18, 0, Math.PI * 2);
        ctx.fill();
        // Outline
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Nose (The Munchausen Signature)
        ctx.fillStyle = '#fca5a5';
        ctx.beginPath();
        ctx.moveTo(5, -55);
        ctx.lineTo(35, -50); // Long nose
        ctx.lineTo(5, -45);
        ctx.fill();
        ctx.stroke();

        // Mustache
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.moveTo(5, -45);
        ctx.quadraticCurveTo(20, -35, 30, -50); // Upwards curl
        ctx.lineTo(5, -40);
        ctx.fill();
        ctx.stroke();

        // Eyes
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(8, -60, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(10, -60, 2, 0, Math.PI*2);
        ctx.fill();

        // Hat (Tricorn)
        ctx.fillStyle = '#1e293b';
        ctx.beginPath();
        ctx.moveTo(-25, -65);
        ctx.lineTo(25, -65);
        ctx.lineTo(30, -85);
        ctx.lineTo(-30, -85);
        ctx.fill();
        ctx.stroke();
        // Feather
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(20, -75);
        ctx.quadraticCurveTo(30, -95, 40, -85);
        ctx.stroke();

        // Hair (Only visible if grabbing)
        if (scene >= 4) {
            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = 4;
            ctx.beginPath();
            // Hair flowing up
            ctx.moveTo(0, -75);
            ctx.quadraticCurveTo(10, -120, 5, -150);
            ctx.stroke();
            
            // Hand grabbing hair
            ctx.fillStyle = COLORS.baronSkin;
            ctx.beginPath();
            ctx.arc(5, -75, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
        } else {
            // Normal hand (Waving in panic)
            if (scene === 2) {
                let handY = -70 + Math.sin(frame * 0.5) * 20;
                ctx.strokeStyle = COLORS.baronSkin;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(10, -40);
                ctx.lineTo(25, -60);
                ctx.lineTo(20, handY);
                ctx.stroke();
            }
        }

        // Horse (Simplified)
        this.drawHorse(ctx);

        ctx.restore();
    }

    drawHorse(ctx) {
        ctx.save();
        // Horse position relative to Baron (underneath/behind usually, but here he is riding it)
        // Wait, story says he pulls HIMSELF and HIS HORSE.
        // So the horse is beneath him.
        
        let horseOffset = 0;
        if (scene === 0) horseOffset = Math.sin(frame * 0.2 + 1) * 2; // Walking bob

        ctx.translate(0, 40 + horseOffset); 

        // Horse Body
        ctx.fillStyle = COLORS.horseBody;
        ctx.beginPath();
        ctx.ellipse(0, 20, 40, 25, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // Horse Head
        ctx.beginPath();
        ctx.ellipse(30, -10, 15, 25, -0.5, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();

        // Horse Legs (Sticking out if sinking, running if walking)
        ctx.strokeStyle = COLORS.horseBody;
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        
        let legRun = 0;
        if (scene === 0) legRun = Math.sin(frame * 0.5) * 20;

        // Front Legs
        ctx.beginPath();
        ctx.moveTo(30, 30);
        ctx.lineTo(40 + legRun, 60);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(20, 30);
        ctx.lineTo(10 - legRun, 60);
        ctx.stroke();

        // Back Legs
        ctx.beginPath();
        ctx.moveTo(-30, 30);
        ctx.lineTo(-40 - legRun, 60);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-20, 30);
        ctx.lineTo(-10 + legRun, 60);
        ctx.stroke();

        ctx.restore();
    }
}

// --- Environment ---
function drawBackground() {
    // Sky
    let grad = ctx.createLinearGradient(0, 0, 0, height);
    grad.addColorStop(0, '#0f172a');
    grad.addColorStop(1, '#334155');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);

    // Moon
    ctx.fillStyle = '#fef3c7';
    ctx.beginPath();
    ctx.arc(width - 100, 100, 40, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#fef3c7';
    ctx.fill();
    ctx.shadowBlur = 0;

    // Trees (Silhouettes)
    ctx.fillStyle = '#020617';
    ctx.beginPath();
    ctx.moveTo(0, height);
    ctx.lineTo(50, height - 150);
    ctx.lineTo(100, height - 50);
    ctx.lineTo(150, height - 200);
    ctx.lineTo(200, height);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(width, height);
    ctx.lineTo(width - 80, height - 180);
    ctx.lineTo(width - 150, height - 80);
    ctx.lineTo(width - 200, height);
    ctx.fill();
}

function drawSwamp() {
    // The swamp liquid
    let surfaceY = height - 100;
    
    // Adjust surface based on scene
    if (scene === 0) surfaceY = height - 50; // Walking on edge
    if (scene >= 1) surfaceY = height - 20; // Deep swamp

    ctx.fillStyle = COLORS.swamp;
    
    ctx.beginPath();
    ctx.moveTo(0, height);
    ctx.lineTo(0, surfaceY);
    
    // Wavy surface
    for (let i = 0; i <= width; i+= 50) {
        ctx.lineTo(i, surfaceY + Math.sin(i * 0.01 + frame * 0.05) * 10);
    }
    
    ctx.lineTo(width, height);
    ctx.fill();

    // Bubbles
    if (scene >= 1 && frame % 30 === 0) {
        particles.push(new Particle(random(width), height - 20, 'bubble'));
    }
}

// --- Scene Management ---

const baron = new Baron();

const SCENES = [
    { name: "A Leisurely Stroll", dur: 200, action: () => {} },
    { name: "Quicksand!", dur: 150, action: () => {
        baron.isSinking = true;
        if (sceneTimer === 0) {
            // Splash effect
            for(let i=0; i<10; i++) particles.push(new Particle(baron.x, height-100, 'splash'));
        }
    }},
    { name: "Panic!", dur: 150, action: () => {
        baron.panicLevel = 1;
    }},
    { name: "EUREKA!", dur: 120, action: () => {
        baron.panicLevel = 0;
        // Lightbulb?
        if (sceneTimer === 0) {
             // Visual cue for idea
             ctx.fillStyle = 'yellow';
             ctx.font = '40px Bangers';
             ctx.fillText("!", baron.x + 40, baron.y - 100);
        }
    }},
    { name: "Pulling Up", dur: 300, action: () => {
        baron.pulling = true;
        baron.hairGrabbed = true;
        baron.targetY = height/2;
    }},
    { name: "Triumphant", dur: 400, action: () => {
        baron.targetY = height/2 - 100;
    }}
];

function updateScene() {
    sceneTimer++;
    
    // Run current scene logic
    SCENES[scene].action();

    // Check transition
    if (sceneTimer > SCENES[scene].dur) {
        scene++;
        sceneTimer = 0;
        if (scene >= SCENES.length) {
            scene = 0; // Loop or End
            baron.targetY = height - 150;
            baron.y = height - 150;
            baron.pulling = false;
            baron.hairGrabbed = false;
            
            // Show replay button
            replayBtn.classList.remove('hidden');
            startHint.classList.add('hidden');
        }
        
        // Update Caption
        captionEl.innerText = SCENES[scene].name;
        captionEl.classList.remove('opacity-0');
        setTimeout(() => captionEl.classList.add('opacity-0'), 2000);
    }
}

// --- Main Loop ---

function animate() {
    ctx.clearRect(0, 0, width, height);

    drawBackground();
    drawSwamp();

    // Update Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw(ctx);
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    baron.update();
    baron.draw(ctx);

    updateScene();

    frame++;
    requestAnimationFrame(animate);
}

// --- Interaction ---

function restart() {
    scene = 0;
    sceneTimer = 0;
    frame = 0;
    baron.x = width/2;
    baron.y = height - 150;
    baron.targetY = height - 150;
    baron.rotation = 0;
    baron.pulling = false;
    baron.hairGrabbed = false;
    particles = [];
    replayBtn.classList.add('hidden');
    startHint.classList.remove('hidden');
    
    captionEl.innerText = SCENES[0].name;
    captionEl.classList.remove('opacity-0');
    setTimeout(() => captionEl.classList.add('opacity-0'), 2000);
}

canvas.addEventListener('click', restart);
replayBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // Prevent double trigger
    restart();
});

// Start
captionEl.innerText = SCENES[0].name;
captionEl.classList.remove('opacity-0');
setTimeout(() => captionEl.classList.add('opacity-0'), 2000);
animate();

</script>
</body>
</html>
