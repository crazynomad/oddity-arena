<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baron Munchausen Escapes the Swamp</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #111;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  canvas {
    background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    cursor: pointer;
    border-radius: 8px;
  }
  #overlay {
    position: absolute;
    top: 20px;
    color: rgba(255, 255, 255, 0.7);
    font-size: 1.2rem;
    pointer-events: none;
    text-shadow: 1px 1px 3px black;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="overlay">Click anywhere to replay</div>
<canvas id="animationCanvas" width="800" height="600"></canvas>

<script>
  const canvas = document.getElementById('animationCanvas');
  const ctx = canvas.getContext('2d');
  
  // Game states: 0: walking, 1: sinking, 2: panic, 3: eureka, 4: grabs hair, 5: rises, 6: triumph
  let state = 0;
  let frameCount = 0;
  let particles = [];
  
  // Actor: Baron Munchausen
  const baron = {
    x: -100,
    y: 380,
    vx: 2.5,
    vy: 0,
    bounce: 0,
    hairGrabbed: false,
    sweatDrops: []
  };
  
  // Environment: Swamp
  const swamp = {
    y: 450,
    mudStart: 350,
    mudEnd: 650,
    bubbles: []
  };
  
  function initEnvironment() {
    swamp.bubbles = [];
    for(let i=0; i<40; i++) {
      swamp.bubbles.push({
        x: swamp.mudStart + Math.random() * (swamp.mudEnd - swamp.mudStart),
        y: swamp.y + Math.random() * (canvas.height - swamp.y),
        r: Math.random() * 6 + 2,
        speed: Math.random() * 1.5 + 0.5,
        wobble: Math.random() * Math.PI * 2
      });
    }
  }
  
  function resetAnimation() {
    state = 0;
    frameCount = 0;
    baron.x = -100;
    baron.y = 380;
    baron.vx = 2.5;
    baron.vy = 0;
    baron.hairGrabbed = false;
    baron.sweatDrops = [];
    particles = [];
  }
  
  canvas.addEventListener('click', () => {
    if (state === 6) resetAnimation();
  });
  
  function createParticles(x, y, color, count, speedModifier = 1) {
    for(let i=0; i<count; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 6 * speedModifier,
        vy: (Math.random() - 0.5) * 6 * speedModifier - (Math.random() * 2),
        life: 1,
        decay: Math.random() * 0.02 + 0.01,
        color: color,
        size: Math.random() * 4 + 2
      });
    }
  }
  
  function drawBackground() {
    // Clouds
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.beginPath();
    ctx.arc(150, 100, 30, 0, Math.PI * 2);
    ctx.arc(190, 100, 40, 0, Math.PI * 2);
    ctx.arc(230, 100, 30, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(600, 150, 25, 0, Math.PI * 2);
    ctx.arc(630, 140, 35, 0, Math.PI * 2);
    ctx.arc(660, 150, 25, 0, Math.PI * 2);
    ctx.fill();

    // Distant hills
    ctx.fillStyle = '#6E9E75';
    ctx.beginPath();
    ctx.moveTo(0, swamp.y);
    ctx.quadraticCurveTo(200, 300, 400, swamp.y);
    ctx.quadraticCurveTo(600, 280, 800, swamp.y);
    ctx.lineTo(800, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.fill();
    
    // Foreground grass/ground
    ctx.fillStyle = '#4A6B32';
    ctx.fillRect(0, swamp.y, canvas.width, canvas.height - swamp.y);
    
    // Swamp mud pool
    ctx.fillStyle = '#3E2723';
    ctx.beginPath();
    ctx.moveTo(swamp.mudStart - 50, swamp.y);
    ctx.bezierCurveTo(swamp.mudStart + 50, swamp.y + 40, swamp.mudEnd - 50, swamp.y + 40, swamp.mudEnd + 50, swamp.y);
    ctx.bezierCurveTo(swamp.mudEnd + 20, canvas.height, swamp.mudStart - 20, canvas.height, swamp.mudStart - 50, swamp.y);
    ctx.fill();
    
    // Swamp bubbles
    ctx.fillStyle = 'rgba(101, 67, 33, 0.6)';
    ctx.strokeStyle = 'rgba(139, 90, 43, 0.8)';
    ctx.lineWidth = 1;
    swamp.bubbles.forEach(b => {
      ctx.beginPath();
      let wobbleX = Math.sin(frameCount * 0.05 + b.wobble) * 2;
      ctx.arc(b.x + wobbleX, b.y, b.r, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
      
      b.y -= b.speed;
      if (b.y < swamp.y + 10) {
        if(Math.random() < 0.1) createParticles(b.x, b.y, '#5D4037', 3, 0.5); // Pop effect
        b.y = canvas.height - 10;
        b.x = swamp.mudStart + Math.random() * (swamp.mudEnd - swamp.mudStart);
      }
    });
  }
  
  function drawBaron() {
    ctx.save();
    
    // Add jitter if panicking
    let jitterX = state === 2 ? (Math.random() - 0.5) * 4 : 0;
    let jitterY = state === 2 ? (Math.random() - 0.5) * 4 : 0;
    
    ctx.translate(baron.x + jitterX, baron.y + baron.bounce + jitterY);
    
    // Legs
    ctx.fillStyle = '#111';
    if (state === 0) { // Walking
      const walk = Math.sin(frameCount * 0.15) * 20;
      ctx.fillRect(-15, 20, 12, 50 + walk);
      ctx.fillRect(5, 20, 12, 50 - walk);
    } else if (state === 5) { // Rising (dangling legs)
      ctx.fillRect(-12, 20, 12, 55);
      ctx.fillRect(5, 20, 12, 50);
    } else { // Standing/Sinking
      ctx.fillRect(-15, 20, 12, 50);
      ctx.fillRect(5, 20, 12, 50);
    }
    
    // Coat tails
    ctx.fillStyle = '#A00000';
    ctx.beginPath();
    ctx.moveTo(-25, 20); ctx.lineTo(-35, 50); ctx.lineTo(-15, 20); ctx.fill();
    
    // Torso
    ctx.fillStyle = '#C00000';
    ctx.fillRect(-25, -45, 50, 70);
    
    // Belt & Buttons
    ctx.fillStyle = '#000';
    ctx.fillRect(-26, 5, 52, 10);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(-5, 3, 14, 14);
    for(let i=0; i<3; i++) {
        ctx.beginPath(); ctx.arc(0, -30 + i*15, 3, 0, Math.PI*2); ctx.fill();
    }
    
    // Head
    ctx.fillStyle = '#FFDAB9'; // Peach skin
    ctx.beginPath();
    ctx.arc(0, -65, 20, 0, Math.PI * 2);
    ctx.fill();
    
    // Big Mustache
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.moveTo(0, -55);
    ctx.quadraticCurveTo(-25, -60, -30, -45);
    ctx.quadraticCurveTo(-15, -50, 0, -53);
    ctx.quadraticCurveTo(15, -50, 30, -45);
    ctx.quadraticCurveTo(25, -60, 0, -55);
    ctx.fill();
    
    // Eyes & Expression
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-7, -70, 5, 0, Math.PI*2); ctx.arc(7, -70, 5, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = '#000';
    if (state === 1 || state === 2) { // Panic/Shocked
      ctx.beginPath(); ctx.arc(-7, -70, 2, 0, Math.PI*2); ctx.arc(7, -70, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0, -45, 6, 8, 0, 0, Math.PI*2); ctx.fill(); // Open mouth
    } else if (state === 3) { // Eureka
      ctx.beginPath(); ctx.arc(-7, -70, 2.5, 0, Math.PI*2); ctx.arc(7, -70, 2.5, 0, Math.PI*2); ctx.fill();
      // Eyebrows raised
      ctx.fillRect(-12, -82, 10, 2); ctx.fillRect(2, -82, 10, 2);
    } else if (state >= 4) { // Determined/Triumph
      ctx.beginPath(); ctx.arc(-6, -70, 2, 0, Math.PI*2); ctx.arc(8, -70, 2, 0, Math.PI*2); ctx.fill();
      // Angry/determined eyebrows
      ctx.beginPath(); ctx.moveTo(-12, -80); ctx.lineTo(-2, -75); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(12, -80); ctx.lineTo(2, -75); ctx.stroke();
    } else { // Normal
      ctx.beginPath(); ctx.arc(-5, -70, 2, 0, Math.PI*2); ctx.arc(5, -70, 2, 0, Math.PI*2); ctx.fill();
    }
    
    // Hair (Iconic Pigtail)
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -85); // Top of head
    
    if (baron.hairGrabbed) {
      // Pulled taut straight up
      ctx.lineTo(0, -150);
    } else {
      // Flopping back
      let flop = Math.sin(frameCount * 0.1) * 5;
      if(state === 1 || state === 2) flop = 0; // Stiff when sinking
      ctx.quadraticCurveTo(-15, -100 + flop, -25, -80 + flop);
    }
    ctx.stroke();
    
    // Left Arm
    ctx.strokeStyle = '#C00000';
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.moveTo(-20, -35);
    if (state === 0) { // Swinging
       ctx.lineTo(-35 + Math.sin(frameCount * 0.15) * 15, -5);
    } else if (state === 1 || state === 2) { // Flailing
       ctx.lineTo(-45, -60 + Math.sin(frameCount * 0.3) * 20);
    } else {
       ctx.lineTo(-30, -5);
    }
    ctx.stroke();
    
    // Right Arm
    ctx.beginPath();
    ctx.moveTo(20, -35);
    if (baron.hairGrabbed) {
      // Reaching straight up to grab hair
      ctx.lineTo(10, -145);
    } else if (state === 0) {
      ctx.lineTo(35 - Math.sin(frameCount * 0.15) * 15, -5);
    } else if (state === 1 || state === 2) {
      ctx.lineTo(45, -60 + Math.cos(frameCount * 0.3) * 20);
    } else if (state === 3) {
      // Pointing up for Eureka
      ctx.lineTo(40, -90);
    } else {
      ctx.lineTo(30, -5);
    }
    ctx.stroke();
    
    // Hands (White Gloves)
    ctx.fillStyle = '#FFF';
    if (baron.hairGrabbed) {
       ctx.beginPath(); ctx.arc(5, -145, 10, 0, Math.PI*2); ctx.fill();
    } else if (state === 3) {
       ctx.beginPath(); ctx.arc(40, -90, 8, 0, Math.PI*2); ctx.fill(); // Pointing hand base
       ctx.fillRect(38, -100, 4, 15); // Finger
    }
    
    // Sweat drops in panic
    if (state === 1 || state === 2) {
      ctx.fillStyle = '#ADD8E6';
      if (Math.random() < 0.2) baron.sweatDrops.push({x: (Math.random()-0.5)*30, y: -80, vy: 0});
      for (let i = baron.sweatDrops.length - 1; i >= 0; i--) {
        let s = baron.sweatDrops[i];
        s.y += s.vy;
        s.vy += 0.3;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y - 5);
        ctx.arc(s.x, s.y, 3, 0, Math.PI);
        ctx.fill();
        if (s.y > 0) baron.sweatDrops.splice(i, 1);
      }
    }
    
    ctx.restore();
    
    // Eureka Lightbulb Effect
    if (state === 3) {
      let alpha = Math.min(1, frameCount / 20);
      ctx.save();
      ctx.translate(baron.x + 40, baron.y - 120);
      ctx.scale(alpha, alpha);
      
      ctx.fillStyle = '#FFEA00';
      ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(-8, 10, 16, 12);
      ctx.fillStyle = '#9E9E9E';
      ctx.fillRect(-6, 22, 12, 6);
      
      ctx.strokeStyle = '#FFEA00';
      ctx.lineWidth = 3;
      for(let i=0; i<8; i++) {
        let angle = i * Math.PI/4 + (frameCount * 0.05);
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle)*20, Math.sin(angle)*20);
        ctx.lineTo(Math.cos(angle)*35, Math.sin(angle)*35);
        ctx.stroke();
      }
      ctx.restore();
    }
  }
  
  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      let p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15; // Gravity
      p.life -= p.decay;
      
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
      
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  
  function update() {
    frameCount++;
    
    // Hide parts of Baron if sinking
    let clipY = canvas.height;
    if (state === 1 || state === 2 || state === 3 || state === 4) {
      clipY = swamp.y + 10; 
    }
    
    switch(state) {
      case 0: // Walking right
        baron.x += baron.vx;
        baron.bounce = Math.sin(frameCount * 0.3) * 3;
        if (baron.x > swamp.mudStart + 100) {
          state = 1; // Enter swamp
          frameCount = 0;
          baron.vx = 0;
        }
        break;
        
      case 1: // Sinking
        baron.y += 0.8;
        baron.bounce = 0;
        if (frameCount % 10 === 0) createParticles(baron.x, swamp.y, '#5D4037', 5, 0.5); // Mud splashes
        if (baron.y > swamp.y + 40) {
          state = 2; // Deep panic
          frameCount = 0;
        }
        break;
        
      case 2: // Panic flailing
        if (frameCount % 5 === 0) createParticles(baron.x + (Math.random()-0.5)*40, swamp.y, '#5D4037', 3, 0.8);
        if (frameCount > 120) {
          state = 3; // Idea!
          frameCount = 0;
        }
        break;
        
      case 3: // Eureka!
        if (frameCount > 80) {
          state = 4; // Grab hair
          frameCount = 0;
          baron.hairGrabbed = true;
        }
        break;
        
      case 4: // Tension building
        baron.y -= 0.2; // Slight pull up
        if (frameCount > 40) {
          state = 5; // The Impossible Lift
          frameCount = 0;
          createParticles(baron.x, swamp.y, '#5D4037', 40, 2); // Big splash
        }
        break;
        
      case 5: // Rising horizontally and vertically
        baron.y -= 3;
        baron.x += 2.5; // Drift towards dry land
        
        // Effort particles
        if (frameCount % 4 === 0) {
          createParticles(baron.x, baron.y - 120, '#FFF', 2, 0.3); // Stars of effort
        }
        // Dripping mud
        if (frameCount % 5 === 0 && baron.y > swamp.y - 100) {
           createParticles(baron.x, baron.y + 50, '#3E2723', 3, 0.2); 
        }

        if (baron.y < 200 && baron.x > swamp.mudEnd + 20) {
          state = 6; // Drop down to dry land
          frameCount = 0;
          baron.hairGrabbed = false;
        }
        break;
        
      case 6: // Triumph Landing
        if (baron.y < 380) {
          baron.y += 6; // Falling fast
        } else {
          baron.y = 380;
          if (frameCount === 10) { // Just landed
            baron.bounce = 10; // Squish
            createParticles(baron.x, baron.y + 70, '#4A6B32', 20, 1.5); // Grass dust
          } else if (frameCount > 15) {
            baron.bounce *= 0.8; // Recover posture
            if (frameCount === 30) {
              // Confetti/Triumph stars
              for(let i=0; i<3; i++) {
                createParticles(baron.x, baron.y - 50, '#FFD700', 15, 2);
                createParticles(baron.x, baron.y - 50, '#FF5252', 15, 2);
              }
            }
          }
        }
        break;
    }
  }
  
  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawBackground();
    
    // Use clipping to hide sinking baron below mud line
    ctx.save();
    if (state >= 1 && state <= 4) {
      ctx.beginPath();
      ctx.rect(0, 0, canvas.width, swamp.y + 5);
      ctx.clip();
    }
    
    drawBaron();
    ctx.restore();
    
    drawParticles();
    
    update();
    requestAnimationFrame(render);
  }
  
  initEnvironment();
  render();
</script>
</body>
</html>
