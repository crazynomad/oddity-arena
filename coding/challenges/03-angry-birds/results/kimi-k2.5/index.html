<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angry Blocks - Physics Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue */
            font-family: 'Fredoka One', cursive;
            touch-action: none; /* Prevent scrolling on mobile */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .score-board {
            font-size: 2rem;
            color: white;
            text-shadow: 3px 3px 0 #000;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 15px;
            align-self: flex-start;
        }

        .controls {
            pointer-events: auto;
            align-self: center;
            margin-bottom: 20px;
        }

        button {
            background: #ff4757;
            border: 4px solid #fff;
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b33939, 0 10px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: 'Fredoka One', cursive;
            text-transform: uppercase;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b33939, 0 4px 4px rgba(0,0,0,0.3);
        }

        .power-indicator {
            position: absolute;
            width: 0;
            height: 0;
            pointer-events: none;
            transform-origin: left center;
        }
        
        .tutorial {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2rem;
            text-shadow: 2px 2px 0 #000;
            opacity: 0.8;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.5; transform: translateX(-50%) scale(1.05); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="score-board">SCORE: <span id="scoreVal">0</span></div>
        <div class="tutorial" id="tutorialText">Drag the ball back to aim!</div>
        <div class="controls">
            <button id="resetBtn">Reset Level</button>
        </div>
    </div>
</div>

<script>
/**
 * GAME ENGINE & LOGIC
 * Built from scratch with basic physics simulation (Verlet integration principles + Collision Resolution)
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreVal');
const resetBtn = document.getElementById('resetBtn');
const tutorialText = document.getElementById('tutorialText');

// Configuration
const CONFIG = {
    gravity: 0.5,
    friction: 0.98, // Air resistance
    groundFriction: 0.8,
    elasticity: 0.5, // Bounciness
    slingshotPos: { x: 200, y: 400 },
    slingshotRadius: 120, // Max drag distance
    projectileRadius: 15,
    colors: {
        projectile: '#ff4757',
        wood: '#cd853f',
        stone: '#a9a9a9',
        ice: '#add8e6',
        ground: '#2ecc71'
    }
};

// Game State
let state = {
    score: 0,
    isDragging: false,
    dragStart: { x: 0, y: 0 },
    dragCurrent: { x: 0, y: 0 },
    projectile: null,
    blocks: [],
    particles: [],
    cameraShake: 0
};

// Input Handling
let mouse = { x: 0, y: 0, isDown: false };

// Resize Handling
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    // Re-center slingshot vertically based on new height
    CONFIG.slingshotPos.y = canvas.height - 150;
}
window.addEventListener('resize', resize);
resize();

// --- Classes ---

class Vector {
    constructor(x, y) {
        this.x = x;
        this.y = y;
    }
    add(v) { this.x += v.x; this.y += v.y; }
    sub(v) { this.x -= v.x; this.y -= v.y; }
    mult(n) { this.x *= n; this.y *= n; }
    mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
    normalize() {
        let m = this.mag();
        if (m !== 0) this.mult(1 / m);
    }
    dist(v) { return Math.sqrt(Math.pow(this.x - v.x, 2) + Math.pow(this.y - v.y, 2)); }
    copy() { return new Vector(this.x, this.y); }
}

class Particle {
    constructor(x, y, color, speed, life) {
        this.pos = new Vector(x, y);
        const angle = Math.random() * Math.PI * 2;
        this.vel = new Vector(Math.cos(angle) * speed, Math.sin(angle) * speed);
        this.color = color;
        this.life = life;
        this.maxLife = life;
        this.size = Math.random() * 4 + 2;
    }

    update() {
        this.vel.y += CONFIG.gravity * 0.5;
        this.pos.add(this.vel);
        this.life--;
        this.size *= 0.95;
    }

    draw(ctx) {
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

class Block {
    constructor(x, y, w, h, type) {
        this.pos = new Vector(x, y);
        this.w = w;
        this.h = h;
        this.type = type; // 'wood', 'stone', 'ice'
        
        // Physics properties based on type
        if (type === 'wood') {
            this.mass = 2; this.health = 30; this.color = CONFIG.colors.wood;
        } else if (type === 'stone') {
            this.mass = 5; this.health = 60; this.color = CONFIG.colors.stone;
        } else {
            this.mass = 1; this.health = 10; this.color = CONFIG.colors.ice;
        }

        this.vel = new Vector(0, 0);
        this.acc = new Vector(0, 0);
        this.angle = 0;
        this.angularVel = 0;
        this.isStatic = false; // For ground
        this.isDead = false;
    }

    update() {
        if (this.isStatic) return;

        // Apply forces
        this.vel.y += CONFIG.gravity;
        
        // Apply velocity
        this.pos.add(this.vel);
        
        // Angular friction/damping
        this.angularVel *= 0.99;
        this.angle += this.angularVel;

        // Floor collision
        const groundY = canvas.height - 50;
        if (this.pos.y + this.h / 2 > groundY) {
            this.pos.y = groundY - this.h / 2;
            this.vel.y *= -0.3; // Dampen
            this.vel.x *= CONFIG.groundFriction;
            this.angularVel *= 0.8;
        }

        // Wall collisions
        if (this.pos.x < this.w/2) { this.pos.x = this.w/2; this.vel.x *= -0.5; }
        if (this.pos.x > canvas.width - this.w/2) { this.pos.x = canvas.width - this.w/2; this.vel.x *= -0.5; }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(this.angle);
        
        // Texture/Pattern
        ctx.fillStyle = this.color;
        
        // Simple 3D effect
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h/2);
        
        // Border
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 2;
        ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);

        ctx.restore();
    }
    
    takeDamage(amount, impactVel) {
        this.health -= amount;
        // Add some kickback
        this.vel.x += impactVel.x * 0.1;
        this.vel.y += impactVel.y * 0.1;
        this.angularVel += (Math.random() - 0.5) * 0.2;

        if (this.health <= 0 && !this.isDead) {
            this.destroy();
        }
    }

    destroy() {
        this.isDead = true;
        state.score += (this.type === 'stone' ? 500 : (this.type === 'wood' ? 200 : 100));
        scoreEl.innerText = state.score;
        createExplosion(this.pos.x, this.pos.y, this.color, 10);
        state.cameraShake = 5;
    }
}

class Projectile {
    constructor(x, y) {
        this.pos = new Vector(x, y);
        this.vel = new Vector(0, 0);
        this.radius = CONFIG.projectileRadius;
        this.isLaunched = false;
        this.isRolling = false;
        this.state = 'IDLE'; // IDLE, DRAGGING, FLYING, STOPPED
    }

    update() {
        if (this.state === 'IDLE') {
            // Follow slingshot center
            this.pos = CONFIG.slingshotPos.copy();
            this.vel = new Vector(0,0);
        } 
        else if (this.state === 'DRAGGING') {
            // Handled in input events, just clamp position
        } 
        else if (this.state === 'FLYING' || this.state === 'STOPPED') {
            if (this.state === 'STOPPED') return;

            // Physics
            this.vel.y += CONFIG.gravity;
            this.vel.mult(CONFIG.friction); // Air drag
            this.pos.add(this.vel);

            // Floor Collision
            const groundY = canvas.height - 50;
            if (this.pos.y + this.radius > groundY) {
                this.pos.y = groundY - this.radius;
                this.vel.y *= -0.5; // Bounce
                this.vel.x *= CONFIG.groundFriction;
                
                if (Math.abs(this.vel.y) < 1 && Math.abs(this.vel.x) < 0.5) {
                    this.state = 'STOPPED';
                }
            }

            // Wall Collision
            if (this.pos.x < this.radius) {
                this.pos.x = this.radius;
                this.vel.x *= -0.5;
            }
            if (this.pos.x > canvas.width - this.radius) {
                this.pos.x = canvas.width - this.radius;
                this.vel.x *= -0.5;
            }

            // Check collisions with blocks
            checkProjectileCollisions(this);
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        
        // Shadow if on ground
        if (this.state !== 'DRAGGING') {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(0, this.radius + 5, this.radius * 0.8, this.radius * 0.3, 0, 0, Math.PI*2);
            ctx.fill();
        }

        // Body
        ctx.fillStyle = CONFIG.colors.projectile;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.arc(-5, -5, 5, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(-5, -2, 2, 0, Math.PI*2);
        ctx.arc(5, -2, 2, 0, Math.PI*2);
        ctx.fill();

        // Angry Eyebrows
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-8, -6);
        ctx.lineTo(-2, -2);
        ctx.moveTo(8, -6);
        ctx.lineTo(2, -2);
        ctx.stroke();

        ctx.restore();
    }

    launch(forceVec) {
        this.state = 'FLYING';
        this.vel = forceVec;
    }
}

// --- Physics Helpers ---

function checkProjectileCollisions(ball) {
    for (let block of state.blocks) {
        if (block.isDead) continue;

        // AABB vs Circle (Simplified for rectangular blocks)
        // Find closest point on rect to circle center
        let closestX = Math.max(block.pos.x - block.w/2, Math.min(ball.pos.x, block.pos.x + block.w/2));
        let closestY = Math.max(block.pos.y - block.h/2, Math.min(ball.pos.y, block.pos.y + block.h/2));

        let distX = ball.pos.x - closestX;
        let distY = ball.pos.y - closestY;
        let distanceSquared = (distX * distX) + (distY * distY);

        if (distanceSquared < (ball.radius * ball.radius)) {
            // Collision Detected
            let distance = Math.sqrt(distanceSquared);
            let overlap = ball.radius - distance;

            // Normal vector
            let nx = distX / distance;
            let ny = distY / distance;

            // Separate objects
            if (distance === 0) { nx = 1; ny = 0; } // Prevent div by zero
            ball.pos.x += nx * overlap;
            ball.pos.y += ny * overlap;

            // Relative velocity
            let rvx = ball.vel.x - block.vel.x;
            let rvy = ball.vel.y - block.vel.y;

            // Velocity along normal
            let velAlongNormal = rvx * nx + rvy * ny;

            // Do not resolve if velocities are separating
            if (velAlongNormal > 0) return;

            // Restitution (bounciness)
            let e = Math.min(CONFIG.elasticity, 0.5); // Blocks are less bouncy
            
            // Impulse scalar
            let j = -(1 + e) * velAlongNormal;
            j /= (1/ball.mass + 1/block.mass);

            // Apply impulse
            let impulseX = j * nx;
            let impulseY = j * ny;

            ball.vel.x += impulseX / ball.mass;
            ball.vel.y += impulseY / ball.mass;
            
            // Transfer impulse to block
            block.vel.x -= impulseX / block.mass;
            block.vel.y -= impulseY / block.mass;
            
            // Add some spin to block based on hit location
            block.angularVel += (Math.random() - 0.5) * 0.5;

            // Damage calculation
            let impactForce = Math.sqrt(ball.vel.x**2 + ball.vel.y**2) * ball.mass;
            block.takeDamage(impactForce * 2, ball.vel);
            
            // Particle effect on hit
            createExplosion(closestX, closestY, block.color, 3);
        }
    }
}

// --- Game Logic ---

function initLevel() {
    state.blocks = [];
    state.particles = [];
    state.projectile = new Projectile(CONFIG.slingshotPos.x, CONFIG.slingshotPos.y);
    state.score = 0;
    scoreEl.innerText = "0";
    
    // Build a structure
    const startX = canvas.width - 300;
    const groundY = canvas.height - 50;
    
    // Base
    state.blocks.push(new Block(startX, groundY - 25, 50, 50, 'stone'));
    state.blocks.push(new Block(startX + 60, groundY - 25, 50, 50, 'stone'));
    state.blocks.push(new Block(startX + 120, groundY - 25, 50, 50, 'stone'));
    
    // Pillars
    state.blocks.push(new Block(startX, groundY - 75, 15, 50, 'wood'));
    state.blocks.push(new Block(startX + 120, groundY - 75, 15, 50, 'wood'));
    
    // Top
    state.blocks.push(new Block(startX + 60, groundY - 100, 180, 20, 'wood'));
    
    // Pig/Enemy block (let's use a red block as target)
    state.blocks.push(new Block(startX + 60, groundY - 130, 40, 40, 'ice'));
    
    // Higher pillar
    state.blocks.push(new Block(startX + 60, groundY - 160, 15, 40, 'stone'));
    state.blocks.push(new Block(startX + 60, groundY - 190, 40, 20, 'wood'));

    tutorialText.style.display = 'block';
}

function createExplosion(x, y, color, count) {
    for(let i=0; i<count; i++) {
        state.particles.push(new Particle(x, y, color, Math.random()*10+2, 60));
    }
}

// --- Rendering ---

function drawSlingshot(ctx) {
    const pos = CONFIG.slingshotPos;
    
    // Back band
    if (state.projectile.state === 'DRAGGING') {
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(pos.x - 15, pos.y - 20); // Left fork
        ctx.lineTo(state.projectile.pos.x, state.projectile.pos.y);
        ctx.stroke();
    }

    // Slingshot body (Y shape)
    ctx.fillStyle = '#795548';
    ctx.beginPath();
    ctx.moveTo(pos.x - 20, pos.y);
    ctx.lineTo(pos.x - 25, pos.y - 80); // Left arm base
    ctx.lineTo(pos.x - 15, pos.y - 80); // Left arm tip
    ctx.lineTo(pos.x, pos.y - 20); // Center
    ctx.lineTo(pos.x + 15, pos.y - 80); // Right arm tip
    ctx.lineTo(pos.x + 25, pos.y - 80); // Right arm base
    ctx.lineTo(pos.x + 20, pos.y);
    ctx.fill();
    
    // Details
    ctx.fillStyle = '#5d4037'; // Darker wood
    ctx.beginPath();
    ctx.arc(pos.x, pos.y - 20, 10, 0, Math.PI*2);
    ctx.fill();

    // Front band
    if (state.projectile.state === 'DRAGGING') {
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(pos.x + 15, pos.y - 20); // Right fork
        ctx.lineTo(state.projectile.pos.x, state.projectile.pos.y);
        ctx.stroke();
        
        // Draw projectile on top of bands
        state.projectile.draw(ctx);
    }
}

function drawTrajectory(ctx) {
    if (state.projectile.state !== 'DRAGGING') return;

    // Calculate launch vector
    let dragVec = new Vector(CONFIG.slingshotPos.x - state.projectile.pos.x, CONFIG.slingshotPos.y - state.projectile.pos.y);
    let power = dragVec.mag();
    
    // Dots to show path
    let simVel = dragVec.copy();
    simVel.mult(0.15); // Launch force multiplier
    let simPos = state.projectile.pos.copy();
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    
    for(let i=0; i<15; i++) {
        simPos.x += simVel.x;
        simPos.y += simVel.y;
        simVel.y += CONFIG.gravity;
        
        ctx.beginPath();
        ctx.arc(simPos.x, simPos.y, 3, 0, Math.PI*2);
        ctx.fill();
    }
}

function drawGround(ctx) {
    ctx.fillStyle = '#2ecc71'; // Grass
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
    
    ctx.fillStyle = '#27ae60'; // Grass details
    for(let i=0; i<canvas.width; i+=20) {
        ctx.beginPath();
        ctx.moveTo(i, canvas.height-50);
        ctx.lineTo(i+10, canvas.height-60);
        ctx.lineTo(i+20, canvas.height-50);
        ctx.fill();
    }
}

function loop() {
    // Clear
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Camera Shake
    if (state.cameraShake > 0) {
        ctx.save();
        let dx = (Math.random() - 0.5) * state.cameraShake;
        let dy = (Math.random() - 0.5) * state.cameraShake;
        ctx.translate(dx, dy);
        state.cameraShake *= 0.9;
        if (state.cameraShake < 0.5) state.cameraShake = 0;
    }

    // Draw Background Elements
    drawGround(ctx);

    // Update & Draw Blocks
    state.blocks = state.blocks.filter(b => !b.isDead);
    state.blocks.forEach(b => {
        b.update();
        b.draw(ctx);
    });

    // Update & Draw Projectile
    if (state.projectile) {
        state.projectile.update();
        
        // Only draw projectile if not dragging (dragging handled in slingshot draw)
        if (state.projectile.state !== 'DRAGGING') {
            state.projectile.draw(ctx);
        }
    }

    // Draw Slingshot (bands + body)
    drawSlingshot(ctx);
    
    // Draw Trajectory
    drawTrajectory(ctx);

    // Particles
    state.particles = state.particles.filter(p => p.life > 0);
    state.particles.forEach(p => {
        p.update();
        p.draw(ctx);
    });

    if (state.cameraShake > 0) ctx.restore();

    requestAnimationFrame(loop);
}

// --- Input Handling ---

function getMousePos(evt) {
    const rect = canvas.getBoundingClientRect();
    const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

function onDown(e) {
    if (!state.projectile || state.projectile.state !== 'IDLE') return;
    
    const pos = getMousePos(e);
    const dist = Math.hypot(pos.x - CONFIG.slingshotPos.x, pos.y - CONFIG.slingshotPos.y);
    
    // Check if clicking near the projectile/slingshot
    if (dist < 60) {
        state.projectile.state = 'DRAGGING';
        state.dragStart = CONFIG.slingshotPos;
        tutorialText.style.display = 'none';
    }
}

function onMove(e) {
    if (!state.projectile || state.projectile.state !== 'DRAGGING') return;
    
    const pos = getMousePos(e);
    const slingshot = CONFIG.slingshotPos;
    
    // Vector from slingshot to mouse
    let dx = pos.x - slingshot.x;
    let dy = pos.y - slingshot.y;
    
    // Clamp distance
    const dist = Math.hypot(dx, dy);
    const maxDist = 100; // Max pull
    
    if (dist > maxDist) {
        const angle = Math.atan2(dy, dx);
        dx = Math.cos(angle) * maxDist;
        dy = Math.sin(angle) * maxDist;
    }
    
    state.projectile.pos.x = slingshot.x + dx;
    state.projectile.pos.y = slingshot.y + dy;
}

function onUp(e) {
    if (!state.projectile || state.projectile.state !== 'DRAGGING') return;
    
    // Calculate launch vector (opposite to drag)
    let dx = CONFIG.slingshotPos.x - state.projectile.pos.x;
    let dy = CONFIG.slingshotPos.y - state.projectile.pos.y;
    
    // Force multiplier
    const force = 0.18;
    const launchVel = new Vector(dx * force, dy * force);
    
    state.projectile.launch(launchVel);
}

// Event Listeners
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);

canvas.addEventListener('touchstart', onDown, {passive: false});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, {passive: false});
window.addEventListener('touchend', onUp);

resetBtn.addEventListener('click', initLevel);

// Start
initLevel();
loop();

</script>
</body>
</html>
