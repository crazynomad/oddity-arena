<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angry Birds - One Level</title>
  <style>
    :root {
      --bg1: #f8d9a0;
      --bg2: #ffd27a;
      --panel: #1f2933;
      --accent: #e33d32;
      --good: #0f9d58;
      --bad: #b42318;
      --ink: #f9fafb;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      background: radial-gradient(circle at 20% 10%, #ffe9bb, var(--bg1) 45%, var(--bg2) 100%);
      color: var(--ink);
    }

    body {
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .game-shell {
      width: min(1100px, 100%);
      background: linear-gradient(180deg, #2f3b46 0%, #1f2933 100%);
      border: 3px solid #0b1117;
      border-radius: 14px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .hud {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.25);
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      flex-wrap: wrap;
    }

    .stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.24);
      font-size: 14px;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.25);
    }

    button:hover {
      filter: brightness(1.06);
    }

    .hint {
      color: #e5e7eb;
      font-size: 13px;
      opacity: 0.95;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #87ceeb 0%, #b8ecff 54%, #e5f8ff 100%);
      touch-action: none;
    }

    @media (max-width: 650px) {
      .badge {
        font-size: 12px;
      }

      .hint {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="hud">
      <div class="stats">
        <div class="badge" id="scoreLabel">Score: 0</div>
        <div class="badge" id="birdsLabel">Birds Left: 3</div>
        <div class="badge" id="blocksLabel">Blocks: 10</div>
        <div class="badge" id="stateLabel">State: Aim</div>
      </div>
      <div class="actions">
        <span class="hint">Drag bird to aim, release to fire. Press R to reset.</span>
        <button id="resetBtn" type="button">Reset</button>
      </div>
    </div>
    <canvas id="game" width="1000" height="560" aria-label="Angry Birds one level game"></canvas>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const scoreLabel = document.getElementById("scoreLabel");
      const birdsLabel = document.getElementById("birdsLabel");
      const blocksLabel = document.getElementById("blocksLabel");
      const stateLabel = document.getElementById("stateLabel");
      const resetBtn = document.getElementById("resetBtn");

      const W = canvas.width;
      const H = canvas.height;
      const groundY = H - 64;
      const sling = { x: 170, y: groundY - 18, radius: 92 };

      const gravity = 1450;
      const launchPower = 6.8;
      const birdRadius = 16;
      const totalBirds = 3;

      let score = 0;
      let birdsSpawned = 0;
      let state = "aim";
      let dragging = false;
      let activePointerId = null;

      let currentBird = null;
      let blocks = [];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function makeBird() {
        return {
          x: sling.x,
          y: sling.y,
          vx: 0,
          vy: 0,
          r: birdRadius,
          launched: false,
          settledTimer: 0,
          trail: []
        };
      }

      function spawnBird() {
        if (birdsSpawned >= totalBirds) {
          currentBird = null;
          return;
        }
        birdsSpawned += 1;
        currentBird = makeBird();
      }

      function createBlocks() {
        const list = [];

        const towerX = 700;
        const floor = groundY;

        function addBlock(x, y, w, h, hp) {
          list.push({
            x,
            y,
            w,
            h,
            vx: 0,
            vy: 0,
            mass: Math.max(1, (w * h) / 1200),
            hp,
            maxHp: hp,
            alive: true
          });
        }

        // Lower frame
        addBlock(towerX + 0, floor - 40, 120, 40, 180);
        addBlock(towerX + 140, floor - 40, 120, 40, 180);
        addBlock(towerX + 60, floor - 80, 140, 35, 170);

        // Middle stack
        addBlock(towerX + 40, floor - 125, 40, 45, 120);
        addBlock(towerX + 180, floor - 125, 40, 45, 120);
        addBlock(towerX + 60, floor - 160, 140, 30, 130);

        // Top stack
        addBlock(towerX + 86, floor - 205, 34, 44, 100);
        addBlock(towerX + 140, floor - 205, 34, 44, 100);
        addBlock(towerX + 80, floor - 235, 104, 26, 110);
        addBlock(towerX + 112, floor - 268, 40, 30, 95);

        return list;
      }

      function resetGame() {
        score = 0;
        birdsSpawned = 0;
        state = "aim";
        dragging = false;
        activePointerId = null;

        blocks = createBlocks();
        spawnBird();
        updateHud();
      }

      function toCanvasPos(evt) {
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width;
        const sy = canvas.height / rect.height;
        return {
          x: (evt.clientX - rect.left) * sx,
          y: (evt.clientY - rect.top) * sy
        };
      }

      function startDrag(evt) {
        if (!currentBird || currentBird.launched) return;

        const p = toCanvasPos(evt);
        const dx = p.x - currentBird.x;
        const dy = p.y - currentBird.y;
        const dist = Math.hypot(dx, dy);

        if (dist <= currentBird.r + 10) {
          dragging = true;
          activePointerId = evt.pointerId;
          canvas.setPointerCapture(activePointerId);
        }
      }

      function moveDrag(evt) {
        if (!dragging || evt.pointerId !== activePointerId || !currentBird) return;

        const p = toCanvasPos(evt);
        let dx = p.x - sling.x;
        let dy = p.y - sling.y;

        const d = Math.hypot(dx, dy);
        if (d > sling.radius) {
          const t = sling.radius / d;
          dx *= t;
          dy *= t;
        }

        currentBird.x = sling.x + dx;
        currentBird.y = sling.y + dy;
      }

      function launchBird() {
        if (!dragging || !currentBird) return;

        dragging = false;
        if (activePointerId !== null) {
          try {
            canvas.releasePointerCapture(activePointerId);
          } catch (err) {
            // Ignore when pointer is already released.
          }
          activePointerId = null;
        }

        const dx = sling.x - currentBird.x;
        const dy = sling.y - currentBird.y;
        const pull = Math.hypot(dx, dy);

        if (pull < 8) {
          currentBird.x = sling.x;
          currentBird.y = sling.y;
          return;
        }

        currentBird.vx = dx * launchPower;
        currentBird.vy = dy * launchPower;
        currentBird.launched = true;
        state = "flying";
      }

      function circleRectCollision(bird, block) {
        const nearestX = clamp(bird.x, block.x, block.x + block.w);
        const nearestY = clamp(bird.y, block.y, block.y + block.h);

        const dx = bird.x - nearestX;
        const dy = bird.y - nearestY;
        const distSq = dx * dx + dy * dy;

        if (distSq > bird.r * bird.r) return;

        const dist = Math.sqrt(distSq) || 0.0001;
        const nx = dx / dist;
        const ny = dy / dist;
        const penetration = bird.r - dist;

        bird.x += nx * penetration;
        bird.y += ny * penetration;

        const relVx = bird.vx - block.vx;
        const relVy = bird.vy - block.vy;
        const velAlongNormal = relVx * nx + relVy * ny;

        if (velAlongNormal > 0) return;

        const restitution = 0.42;
        const invMassBird = 1;
        const invMassBlock = 1 / block.mass;
        const impulse = (-(1 + restitution) * velAlongNormal) / (invMassBird + invMassBlock);

        bird.vx += impulse * nx * invMassBird;
        bird.vy += impulse * ny * invMassBird;

        block.vx -= impulse * nx * invMassBlock;
        block.vy -= impulse * ny * invMassBlock;

        const dmg = Math.abs(impulse) * 0.42;
        if (dmg > 8) {
          block.hp -= dmg;
          score += Math.floor(dmg * 0.12);
        }
      }

      function overlapAmount(a, b) {
        const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
        const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
        return { overlapX, overlapY };
      }

      function blockBlockCollision(a, b) {
        if (!a.alive || !b.alive) return;

        const o = overlapAmount(a, b);
        if (o.overlapX <= 0 || o.overlapY <= 0) return;

        let nx = 0;
        let ny = 0;
        let penetration = 0;

        if (o.overlapX < o.overlapY) {
          penetration = o.overlapX;
          nx = a.x + a.w / 2 < b.x + b.w / 2 ? -1 : 1;
        } else {
          penetration = o.overlapY;
          ny = a.y + a.h / 2 < b.y + b.h / 2 ? -1 : 1;
        }

        const invMassA = 1 / a.mass;
        const invMassB = 1 / b.mass;
        const invMassSum = invMassA + invMassB;

        a.x += nx * penetration * (invMassA / invMassSum);
        a.y += ny * penetration * (invMassA / invMassSum);
        b.x -= nx * penetration * (invMassB / invMassSum);
        b.y -= ny * penetration * (invMassB / invMassSum);

        const relVx = a.vx - b.vx;
        const relVy = a.vy - b.vy;
        const velAlongNormal = relVx * nx + relVy * ny;

        if (velAlongNormal > 0) return;

        const restitution = 0.18;
        const impulse = (-(1 + restitution) * velAlongNormal) / invMassSum;

        a.vx += impulse * nx * invMassA;
        a.vy += impulse * ny * invMassA;
        b.vx -= impulse * nx * invMassB;
        b.vy -= impulse * ny * invMassB;

        const impactDamage = Math.abs(impulse) * 0.03;
        if (impactDamage > 3) {
          a.hp -= impactDamage;
          b.hp -= impactDamage;
        }
      }

      function physics(dt) {
        if (currentBird && currentBird.launched) {
          currentBird.vy += gravity * dt;
          currentBird.vx *= 0.999;
          currentBird.vy *= 0.999;

          currentBird.x += currentBird.vx * dt;
          currentBird.y += currentBird.vy * dt;

          currentBird.trail.push({ x: currentBird.x, y: currentBird.y, age: 0.8 });
          if (currentBird.trail.length > 25) currentBird.trail.shift();

          if (currentBird.x - currentBird.r < 0) {
            currentBird.x = currentBird.r;
            currentBird.vx *= -0.45;
          }
          if (currentBird.x + currentBird.r > W) {
            currentBird.x = W - currentBird.r;
            currentBird.vx *= -0.45;
          }
          if (currentBird.y - currentBird.r < 0) {
            currentBird.y = currentBird.r;
            currentBird.vy *= -0.4;
          }
          if (currentBird.y + currentBird.r > groundY) {
            currentBird.y = groundY - currentBird.r;
            currentBird.vy *= -0.35;
            currentBird.vx *= 0.86;
          }

          for (const block of blocks) {
            if (block.alive) circleRectCollision(currentBird, block);
          }

          const speed = Math.hypot(currentBird.vx, currentBird.vy);
          if (speed < 28 && currentBird.y + currentBird.r >= groundY - 2) {
            currentBird.settledTimer += dt;
          } else {
            currentBird.settledTimer = 0;
          }

          if (currentBird.settledTimer > 0.9 || currentBird.x > W + 120 || currentBird.x < -120) {
            currentBird = null;
            if (blocks.some((b) => b.alive)) {
              spawnBird();
              if (!currentBird) state = "out";
              else state = "aim";
            }
          }
        }

        for (const t of currentBird?.trail || []) {
          t.age -= dt;
        }
        if (currentBird) {
          currentBird.trail = currentBird.trail.filter((p) => p.age > 0);
        }

        for (const block of blocks) {
          if (!block.alive) continue;

          block.vy += gravity * dt;
          block.vx *= 0.995;
          block.vy *= 0.995;

          block.x += block.vx * dt;
          block.y += block.vy * dt;

          if (block.x < 0) {
            block.x = 0;
            block.vx *= -0.3;
          }
          if (block.x + block.w > W) {
            block.x = W - block.w;
            block.vx *= -0.3;
          }

          if (block.y + block.h > groundY) {
            const impact = Math.abs(block.vy);
            block.y = groundY - block.h;
            block.vy *= -0.18;
            block.vx *= 0.9;
            if (impact > 240) block.hp -= impact * 0.015;
          }

          if (block.hp <= 0 && block.alive) {
            block.alive = false;
            score += 100;
          }
        }

        for (let i = 0; i < blocks.length; i += 1) {
          for (let j = i + 1; j < blocks.length; j += 1) {
            if (blocks[i].alive && blocks[j].alive) {
              blockBlockCollision(blocks[i], blocks[j]);
            }
          }
        }

        const aliveCount = blocks.filter((b) => b.alive).length;
        if (aliveCount === 0) {
          state = "win";
        } else if (!currentBird && birdsSpawned >= totalBirds) {
          state = "out";
        }

        updateHud();
      }

      function drawTrajectoryPreview() {
        if (!currentBird || currentBird.launched || !dragging) return;

        let x = currentBird.x;
        let y = currentBird.y;
        let vx = (sling.x - currentBird.x) * launchPower;
        let vy = (sling.y - currentBird.y) * launchPower;

        ctx.save();
        for (let i = 0; i < 22; i += 1) {
          const dt = 0.06;
          vy += gravity * dt;
          x += vx * dt;
          y += vy * dt;
          const alpha = 1 - i / 24;
          ctx.fillStyle = `rgba(255, 255, 255, ${0.55 * alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, 3.5 * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawSlingshot() {
        ctx.fillStyle = "#6c4020";
        ctx.fillRect(sling.x - 40, sling.y - 8, 14, 56);
        ctx.fillRect(sling.x + 22, sling.y - 8, 14, 56);

        if (currentBird && !currentBird.launched) {
          const bx = currentBird.x;
          const by = currentBird.y;

          ctx.strokeStyle = "#3f2918";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(sling.x - 30, sling.y + 3);
          ctx.lineTo(bx, by);
          ctx.lineTo(sling.x + 30, sling.y + 3);
          ctx.stroke();
        } else {
          ctx.strokeStyle = "#3f2918";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(sling.x - 30, sling.y + 3);
          ctx.lineTo(sling.x + 30, sling.y + 3);
          ctx.stroke();
        }
      }

      function drawGround() {
        const grad = ctx.createLinearGradient(0, groundY, 0, H);
        grad.addColorStop(0, "#97c95c");
        grad.addColorStop(1, "#649d30");
        ctx.fillStyle = grad;
        ctx.fillRect(0, groundY, W, H - groundY);

        ctx.fillStyle = "rgba(0, 0, 0, 0.07)";
        ctx.fillRect(0, groundY - 6, W, 6);
      }

      function drawBlocks() {
        for (const block of blocks) {
          if (!block.alive) continue;
          const hpRatio = clamp(block.hp / block.maxHp, 0, 1);
          const red = Math.floor(180 + (1 - hpRatio) * 60);
          const green = Math.floor(140 + hpRatio * 70);

          ctx.fillStyle = `rgb(${red}, ${green}, 80)`;
          ctx.fillRect(block.x, block.y, block.w, block.h);

          ctx.strokeStyle = "rgba(0, 0, 0, 0.32)";
          ctx.lineWidth = 2;
          ctx.strokeRect(block.x, block.y, block.w, block.h);

          ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
          ctx.fillRect(block.x + 3, block.y + 3, block.w - 6, 5);

          const barW = block.w - 8;
          ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
          ctx.fillRect(block.x + 4, block.y - 8, barW, 4);
          ctx.fillStyle = hpRatio > 0.35 ? "#47d16c" : "#ef4444";
          ctx.fillRect(block.x + 4, block.y - 8, barW * hpRatio, 4);
        }
      }

      function drawBird() {
        if (!currentBird) return;

        for (const p of currentBird.trail) {
          const alpha = clamp(p.age / 0.8, 0, 1) * 0.5;
          ctx.fillStyle = `rgba(227, 61, 50, ${alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 6 * alpha, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "#d22f27";
        ctx.beginPath();
        ctx.arc(currentBird.x, currentBird.y, currentBird.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(currentBird.x + 5, currentBird.y - 3, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#1f2937";
        ctx.beginPath();
        ctx.arc(currentBird.x + 7, currentBird.y - 3, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f5c54d";
        ctx.beginPath();
        ctx.moveTo(currentBird.x + 11, currentBird.y + 1);
        ctx.lineTo(currentBird.x + 21, currentBird.y + 3);
        ctx.lineTo(currentBird.x + 11, currentBird.y + 6);
        ctx.closePath();
        ctx.fill();
      }

      function drawOverlayText() {
        if (state !== "win" && state !== "out") return;

        const msg = state === "win" ? "Level Cleared" : "Out of Birds";
        const sub = state === "win" ? "Nice shot." : "Press Reset or R to try again.";

        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.font = "700 52px Trebuchet MS";
        ctx.fillText(msg, W / 2, H / 2 - 12);

        ctx.font = "600 24px Trebuchet MS";
        ctx.fillText(sub, W / 2, H / 2 + 34);
        ctx.restore();
      }

      function updateHud() {
        const birdsLeft = (currentBird ? 1 : 0) + (totalBirds - birdsSpawned);
        const aliveBlocks = blocks.filter((b) => b.alive).length;

        scoreLabel.textContent = `Score: ${score}`;
        birdsLabel.textContent = `Birds Left: ${birdsLeft}`;
        blocksLabel.textContent = `Blocks: ${aliveBlocks}`;

        if (state === "aim") stateLabel.textContent = "State: Aim";
        if (state === "flying") stateLabel.textContent = "State: Flying";
        if (state === "win") stateLabel.textContent = "State: Win";
        if (state === "out") stateLabel.textContent = "State: Out";
      }

      function drawSkyDecor() {
        ctx.save();
        ctx.globalAlpha = 0.65;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.ellipse(165, 84, 52, 20, 0, 0, Math.PI * 2);
        ctx.ellipse(205, 85, 42, 18, 0, 0, Math.PI * 2);
        ctx.ellipse(130, 90, 35, 14, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.ellipse(610, 100, 60, 22, 0, 0, Math.PI * 2);
        ctx.ellipse(655, 102, 46, 17, 0, 0, Math.PI * 2);
        ctx.ellipse(570, 106, 35, 15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, W, H);
        drawSkyDecor();
        drawGround();
        drawSlingshot();
        drawTrajectoryPreview();
        drawBlocks();
        drawBird();
        drawOverlayText();
      }

      let accumulator = 0;
      let lastTime = performance.now();

      function tick(now) {
        const frame = Math.min(0.033, (now - lastTime) / 1000);
        lastTime = now;
        accumulator += frame;

        const dt = 1 / 120;
        while (accumulator >= dt) {
          physics(dt);
          accumulator -= dt;
        }

        render();
        requestAnimationFrame(tick);
      }

      canvas.addEventListener("pointerdown", startDrag);
      canvas.addEventListener("pointermove", moveDrag);
      canvas.addEventListener("pointerup", launchBird);
      canvas.addEventListener("pointercancel", launchBird);
      resetBtn.addEventListener("click", resetGame);

      window.addEventListener("keydown", (evt) => {
        if (evt.key.toLowerCase() === "r") {
          resetGame();
        }
      });

      resetGame();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
