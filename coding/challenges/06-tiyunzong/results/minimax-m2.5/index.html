```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ti Yun Zong - Ink Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f1e8; /* Rice paper color */
        }
        canvas {
            display: block;
            cursor: pointer;
        }
        #instruction {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-family: "Courier New", Courier, monospace;
            color: #555;
            pointer-events: none;
            opacity: 0.7;
            font-size: 14px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="instruction">CLICK TO PERFORM TECHNIQUE</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let tick = 0;
        
        // Configuration
        const CONFIG = {
            gravity: 0.4,
            jumpForce: -8,
            boostForce: -22,
            groundY: 0, // Set in resize
            colors: {
                ink: '#1a1a1a',
                inkLight: '#4a4a4a',
                paper: '#f4f1e8',
                moon: '#e8e4d6'
            }
        };

        // State
        let state = {
            isPlaying: false,
            isRising: false,
            hasBoosted: false,
            frame: 0
        };

        // Entities
        let player = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            width: 30,
            height: 60,
            history: [] // For afterimages
        };

        let particles = [];
        let shockwaves = [];

        // Background Layers
        const bgLayers = [
            { type: 'moon', x: 0, speed: 0 },
            { type: 'cloud', x: 0, speed: 0.2 },
            { type: 'mountain', yOffset: 0.2, speed: 0.5, color: '#ccc' },
            { type: 'mountain', yOffset: 0.4, speed: 1.0, color: '#999' },
            { type: 'bamboo', speed: 2.0, elements: [] }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            CONFIG.groundY = height * 0.85;
            player.x = width * 0.3;
            player.y = CONFIG.groundY;
            
            // Generate static bamboo
            bgLayers[4].elements = [];
            for(let i=0; i<20; i++) {
                bgLayers[4].elements.push({
                    x: Math.random() * width,
                    h: 100 + Math.random() * 200
                });
            }
        }

        window.addEventListener('resize', resize);
        resize();

        // Input
        canvas.addEventListener('mousedown', () => {
            if (!state.isPlaying) {
                startJump();
            } else if (player.y < CONFIG.groundY - height * 0.8) {
                // Allow replay if at top or falling
                reset();
            }
        });

        function reset() {
            player.y = CONFIG.groundY;
            player.vy = 0;
            player.history = [];
            state.isPlaying = false;
            state.hasBoosted = false;
            state.frame = 0;
            particles = [];
            shockwaves = [];
        }

        function startJump() {
            state.isPlaying = true;
            state.frame = 0;
            state.hasBoosted = false;
            player.vy = CONFIG.jumpForce;
            player.history = [];
            
            // Initial Ink Splash
            createSplash(player.x, player.y + player.height, 10, true);
        }

        // --- Drawing Helpers ---

        function drawMoon() {
            const moonX = width * 0.8;
            const moonY = height * 0.15;
            const r = 40;
            
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgba(255,255,255,0.5)";
            ctx.fillStyle = CONFIG.colors.moon;
            ctx.beginPath();
            ctx.arc(moonX, moonY, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawCloud(x, y, scale) {
            ctx.fillStyle = "rgba(200, 200, 200, 0.4)";
            ctx.beginPath();
            ctx.ellipse(x, y, 60 * scale, 30 * scale, 0, 0, Math.PI * 2);
            ctx.ellipse(x + 40 * scale, y - 10 * scale, 50 * scale, 25 * scale, 0, 0, Math.PI * 2);
            ctx.ellipse(x - 40 * scale, y + 10 * scale, 50 * scale, 20 * scale, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawMountain(yOffset, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(0, height);
            // Simple procedural peaks
            let x = 0;
            ctx.lineTo(0, height * (1 - yOffset));
            while(x < width) {
                x += 100 + Math.random() * 100;
                const peakH = height * (0.3 + Math.random() * 0.4);
                ctx.lineTo(x, height - peakH);
            }
            ctx.lineTo(width, height);
            ctx.fill();
        }

        function drawBamboo() {
            ctx.strokeStyle = "#2a2a2a";
            ctx.lineWidth = 4;
            const time = tick * 0.01;
            
            bgLayers[4].elements.forEach(b => {
                // Sway
                const sway = Math.sin(time + b.x * 0.01) * 10;
                
                ctx.beginPath();
                ctx.moveTo(b.x, height);
                ctx.quadraticCurveTo(b.x + sway, height - b.h/2, b.x + sway*1.5, height - b.h);
                ctx.stroke();
                
                // Nodes
                for(let j=0; j<5; j++) {
                    let ny = height - (b.h/5) * j;
                    let nx = b.x + sway * (j/5);
                    ctx.beginPath();
                    ctx.moveTo(nx - 5, ny);
                    ctx.lineTo(nx + 5, ny);
                    ctx.stroke();
                }
                
                // Leaves
                ctx.fillStyle = "#333";
                ctx.beginPath();
                ctx.ellipse(b.x + sway*1.5 + 10, height - b.h - 10, 15, 3, Math.PI/4, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(b.x + sway*1.5 - 10, height - b.h + 5, 12, 3, -Math.PI/4, 0, Math.PI*2);
                ctx.fill();
            });
        }

        function drawPlayer(x, y, opacity = 1, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.globalAlpha = opacity;
            ctx.fillStyle = CONFIG.colors.ink;
            ctx.shadowBlur = 5;
            ctx.shadowColor = "black";

            // Style: Stick figure / Ink blot martial artist
            const w = player.width;
            const h = player.height;

            // Body (Robe)
            ctx.beginPath();
            ctx.moveTo(0, -h * 0.2);
            ctx.quadraticCurveTo(w * 0.5, -h * 0.1, w * 0.3, 0); // Right shoulder to bottom
            ctx.lineTo(-w * 0.3, 0);
            ctx.quadraticCurveTo(-w * 0.5, -h * 0.1, 0, -h * 0.2); // Left shoulder
            ctx.fill();

            // Head
            ctx.beginPath();
            ctx.arc(0, -h * 0.3, 8, 0, Math.PI * 2);
            ctx.fill();

            // Hair / Headband
            ctx.beginPath();
            ctx.moveTo(-10, -h * 0.35);
            ctx.quadraticCurveTo(0, -h * 0.5, 15, -h * 0.35);
            ctx.strokeStyle = "black";
            ctx.lineWidth = 3;
            ctx.stroke();

            // Legs (depending on state)
            ctx.strokeStyle = "black";
            ctx.lineWidth = 4;
            
            if (!state.isPlaying || player.y >= CONFIG.groundY - 1) {
                // Standing
                ctx.beginPath();
                ctx.moveTo(-5, 0);
                ctx.lineTo(-5, 15);
                ctx.moveTo(5, 0);
                ctx.lineTo(5, 15);
                ctx.stroke();
            } else {
                // Jumping / Kicking
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(10, 15); // Leg kicking up
                ctx.stroke();
            }

            ctx.restore();
        }

        // --- Effects Logic ---

        function createSplash(x, y, count, isGround = false) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * (isGround ? 10 : 5),
                    vy: (Math.random() - 1) * (isGround ? 10 : 5),
                    size: Math.random() * 4 + 1,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.03,
                    type: 'ink'
                });
            }
        }

        function createShockwave(x, y) {
            shockwaves.push({
                x: x,
                y: y,
                radius: 10,
                maxRadius: 100,
                life: 1.0,
                lineWidth: 5
            });
        }

        // --- Main Loop ---

        function update() {
            tick++;

            // Physics
            if (state.isPlaying) {
                // The "Step" Logic (Ti Yun Zong)
                // Mid-air boost at 40% height
                const progress = (CONFIG.groundY - player.y) / (CONFIG.groundY - (CONFIG.groundY - height));
                
                if (progress > 0.2 && progress < 0.3 && !state.hasBoosted) {
                    state.hasBoosted = true;
                    player.vy = CONFIG.boostForce;
                    
                    // Effects at the "step" point
                    createShockwave(player.x, player.y + player.height);
                    createSplash(player.x, player.y + player.height, 20);
                    
                    // Sound visual (text)
                    // Not adding text DOM to keep it canvas only, but ink splash implies force
                }

                player.y += player.vy;
                player.vy += CONFIG.gravity;

                // Ground collision
                if (player.y > CONFIG.groundY) {
                    player.y = CONFIG.groundY;
                    player.vy = 0;
                    state.isPlaying = false;
                }

                // History for afterimages
                if (state.hasBoosted && tick % 3 === 0) {
                    player.history.push({x: player.x, y: player.y});
                    if (player.history.length > 5) player.history.shift();
                }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity for ink
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update Shockwaves
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let s = shockwaves[i];
                s.radius += 5;
                s.life -= 0.05;
                if (s.life <= 0) shockwaves.splice(i, 1);
            }
        }

        function draw() {
            // Clear with fade effect for trails? No, clean clear for ink style
            ctx.clearRect(0, 0, width, height);

            // Draw Background Layers
            drawMoon();
            
            // Clouds (simple parallax)
            let cloudX = (tick * bgLayers[1].speed) % width;
            drawCloud(cloudX, height * 0.2, 1.5);
            drawCloud(cloudX + width/2, height * 0.25, 1.0);

            drawMountain(0.4, '#aaa'); // Far
            drawMountain(0.2, '#777'); // Near

            // Draw Shockwaves
            ctx.strokeStyle = "rgba(50,50,50,0.5)";
            shockwaves.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                ctx.lineWidth = s.lineWidth * s.life;
                ctx.stroke();
            });

            // Draw Ink Particles
            ctx.fillStyle = "rgba(30,30,30,0.8)";
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Draw Bamboo (Foreground)
            drawBamboo();

            // Draw Player
            // Draw Afterimages
            if (state.hasBoosted) {
                player.history.forEach((pos, index) => {
                    const opacity = (index / player.history.length) * 0.3;
                    drawPlayer(pos.x, pos.y, opacity, 0.9);
                });
            }

            // Draw Main Player
            // Squash and stretch
            let scaleY = 1;
            if (Math.abs(player.vy) > 5) scaleY = 1.2;
            if (player.vy > 5) scaleY = 0.8;
            
            drawPlayer(player.x, player.y, 1, scaleY);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();

    </script>
</body>
</html>
