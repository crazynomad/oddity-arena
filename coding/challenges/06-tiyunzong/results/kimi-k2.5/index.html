<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梯云纵 - Ladder Cloud Ascent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: 'Noto Serif SC', serif;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            z-index: 10;
        }

        .ink-text {
            font-family: 'Ma Shan Zheng', cursive;
            color: #1a1a1a;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .ink-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Grain overlay for paper texture */
        .paper-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
            z-index: 5;
            mix-blend-mode: multiply;
        }

        /* Vignette */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 6;
        }

        #replay-btn {
            pointer-events: auto;
            cursor: pointer;
            border: 2px solid #1a1a1a;
            background: transparent;
            padding: 10px 30px;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            opacity: 0;
            transform: scale(0.9);
        }

        #replay-btn:hover {
            background: #1a1a1a;
            color: #fff;
            transform: scale(1.05);
        }

        #replay-btn.visible {
            opacity: 1;
            transform: scale(1);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e8e8e8;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loader">
        <div class="text-2xl font-serif text-gray-800 animate-pulse">Entering the Jianghu...</div>
    </div>

    <div class="paper-texture"></div>
    <div class="vignette"></div>

    <div id="ui-layer">
        <div class="w-full flex justify-between items-start">
            <div id="title-card" class="ink-text text-6xl">梯云纵</div>
            <div id="subtitle-card" class="ink-text text-2xl mt-4 text-right">
                Ladder Cloud Ascent<br>
                <span class="text-sm font-serif opacity-70">Wudang Lightness Skill</span>
            </div>
        </div>

        <div class="w-full flex justify-center mb-10">
            <button id="replay-btn" class="ink-text">再次登峰 (Replay)</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="bg-canvas"></canvas>
        <canvas id="main-canvas"></canvas>
    </div>

    <script>
        /**
         * Wuxia Lightness Technique: Ladder Cloud Ascent
         * A pure Canvas implementation of a martial artist ascending infinitely.
         */

        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        
        let width, height;
        let frame = 0;
        let animationId;
        let cameraY = 0;
        let targetCameraY = 0;
        
        // Game State
        const state = {
            isPlaying: false,
            height: 0,
            qi: 100,
            maxQi: 100
        };

        // Resize Handler
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            bgCanvas.width = width;
            bgCanvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- UTILITIES ---

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function noise(x, y) {
            // Simple pseudo-noise for organic movement
            return Math.sin(x * 12.9898 + y * 78.233) * 43758.5453 - Math.floor(Math.sin(x * 12.9898 + y * 78.233) * 43758.5453);
        }

        // --- CLASSES ---

        class InkParticle {
            constructor(x, y, type = 'splash') {
                this.x = x;
                this.y = y;
                this.type = type; // 'splash', 'dot', 'qi'
                this.life = 1.0;
                this.decay = random(0.01, 0.03);
                
                const angle = random(0, Math.PI * 2);
                const speed = type === 'qi' ? random(2, 8) : random(1, 4);
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.size = type === 'qi' ? random(2, 5) : random(3, 8);
                this.gravity = type === 'qi' ? 0 : 0.1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life -= this.decay;
                
                if (this.type === 'qi') {
                    this.size *= 0.95; // Shrink qi
                }
            }

            draw(context) {
                context.save();
                context.globalAlpha = this.life;
                context.fillStyle = this.type === 'qi' ? '#000' : '#1a1a1a';
                
                if (this.type === 'splash') {
                    context.beginPath();
                    context.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    context.fill();
                } else if (this.type === 'dot') {
                    context.beginPath();
                    context.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                    context.fill();
                } else if (this.type === 'qi') {
                    // Draw shockwave ring
                    context.strokeStyle = '#000';
                    context.lineWidth = 2;
                    context.beginPath();
                    context.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                    context.stroke();
                }
                
                context.restore();
            }
        }

        class MartialArtist {
            constructor() {
                this.x = width / 2;
                this.y = height * 0.7;
                this.vy = 0;
                this.vx = 0;
                this.state = 'idle'; // idle, charging, stepping
                this.timer = 0;
                this.trail = []; // Afterimages
                this.legAngle = 0;
                this.armAngle = 0;
                this.scale = 1;
                this.qiAura = 0;
            }

            update() {
                // Physics
                this.y += this.vy;
                this.x += this.vx;

                // Friction/Air resistance
                this.vx *= 0.95;
                
                // State Machine
                this.timer++;

                if (this.state === 'idle') {
                    this.vy = 0;
                    this.legAngle = Math.sin(frame * 0.05) * 0.1;
                    this.armAngle = Math.cos(frame * 0.05) * 0.1;
                    
                    if (this.timer > 60) {
                        this.state = 'charging';
                        this.timer = 0;
                    }
                } 
                else if (this.state === 'charging') {
                    // Squatting down
                    this.scale = 1 - Math.sin(this.timer * 0.1) * 0.1;
                    this.qiAura += 0.05;
                    
                    // Emit Qi particles
                    if (this.timer % 2 === 0) {
                        particles.push(new InkParticle(this.x + random(-20, 20), this.y, 'qi'));
                    }

                    if (this.timer > 30) {
                        this.jump();
                    }
                }
                else if (this.state === 'stepping') {
                    this.scale = 1 + Math.sin(this.timer * 0.2) * 0.05; // Bobbing
                    
                    // Auto-jump mechanism for endless ascent
                    if (this.timer % 25 === 0) {
                        this.jump();
                    }
                    
                    // Update Trails
                    if (frame % 5 === 0) {
                        this.trail.push({
                            x: this.x,
                            y: this.y,
                            alpha: 0.6,
                            scale: this.scale
                        });
                    }
                }

                // Update Trails decay
                for (let i = this.trail.length - 1; i >= 0; i--) {
                    this.trail[i].alpha -= 0.02;
                    if (this.trail[i].alpha <= 0) {
                        this.trail.splice(i, 1);
                    }
                }

                // Keep X centered mostly, but allow drift
                const centerX = width / 2;
                this.vx += (centerX - this.x) * 0.005;
            }

            jump() {
                this.vy = -12 - random(0, 4); // Strong upward force
                this.state = 'stepping';
                this.timer = 0;
                this.scale = 1.2; // Stretch
                
                // Create Impact/Splash
                for(let i=0; i<8; i++) {
                    particles.push(new InkParticle(this.x, this.y + 40, 'splash'));
                }
                // Create Dust/Cloud
                for(let i=0; i<15; i++) {
                    particles.push(new InkParticle(this.x + random(-30, 30), this.y + 30, 'dot'));
                }

                // Screen shake effect (handled in camera)
                cameraShake = 5;
            }

            draw(context) {
                // Draw Trails
                this.trail.forEach(t => {
                    context.save();
                    context.globalAlpha = t.alpha * 0.3;
                    context.translate(t.x, t.y);
                    context.scale(t.scale, t.scale);
                    this.drawBody(context, true); // true = isGhost
                    context.restore();
                });

                // Draw Self
                context.save();
                context.translate(this.x, this.y);
                context.scale(this.scale, this.scale);
                this.drawBody(context, false);
                context.restore();
            }

            drawBody(context, isGhost) {
                const color = isGhost ? '#555' : '#000';
                context.fillStyle = color;
                context.strokeStyle = color;
                context.lineWidth = 3;
                context.lineCap = 'round';
                context.lineJoin = 'round';

                // Qi Aura (Glow)
                if (this.qiAura > 0 && !isGhost) {
                    context.save();
                    context.globalAlpha = this.qiAura * 0.2;
                    context.beginPath();
                    context.arc(0, -25, 40 + Math.sin(frame * 0.5) * 5, 0, Math.PI * 2);
                    context.fillStyle = '#fff'; // White core
                    context.fill();
                    context.strokeStyle = '#000';
                    context.lineWidth = 1;
                    context.stroke();
                    context.restore();
                }

                // Robes (Body)
                context.beginPath();
                context.moveTo(0, -40); // Neck
                context.lineTo(-15, 10); // Left Hip
                context.lineTo(15, 10); // Right Hip
                context.closePath();
                context.fill();

                // Head
                context.beginPath();
                context.arc(0, -45, 8, 0, Math.PI * 2);
                context.fill();

                // Topknot
                context.beginPath();
                context.moveTo(0, -53);
                context.lineTo(0, -60);
                context.stroke();

                // Arms
                context.beginPath();
                context.moveTo(0, -35);
                context.lineTo(-20, -20 + this.armAngle * 10);
                context.stroke();

                context.beginPath();
                context.moveTo(0, -35);
                context.lineTo(20, -20 - this.armAngle * 10);
                context.stroke();

                // Legs (Dynamic based on state)
                if (this.state === 'stepping') {
                    // One leg high (stepping on air)
                    context.beginPath();
                    context.moveTo(-5, 5);
                    context.lineTo(-15, -10); // Knee
                    context.lineTo(-5, -30); // Foot
                    context.stroke();

                    // One leg low
                    context.beginPath();
                    context.moveTo(5, 5);
                    context.lineTo(15, 20);
                    context.lineTo(10, 35);
                    context.stroke();
                } else {
                    // Idle stance
                    context.beginPath();
                    context.moveTo(-5, 5);
                    context.lineTo(-10, 30);
                    context.stroke();

                    context.beginPath();
                    context.moveTo(5, 5);
                    context.lineTo(10, 30);
                    context.stroke();
                }
            }
        }

        class BackgroundLayer {
            constructor(speed, color, complexity) {
                this.speed = speed;
                this.color = color;
                this.complexity = complexity;
                this.offset = 0;
                this.mountains = [];
                this.generateMountains();
            }

            generateMountains() {
                // Pre-calculate mountain silhouettes
                let x = 0;
                while(x < width * 2) {
                    const w = random(100, 400);
                    const h = random(100, 300);
                    this.mountains.push({x, w, h});
                    x += w * 0.8;
                }
            }

            update(cameraY) {
                this.offset = (cameraY * this.speed) % height;
            }

            draw(context) {
                context.fillStyle = this.color;
                context.beginPath();
                context.moveTo(0, height);

                this.mountains.forEach(m => {
                    // Wrap around logic for infinite scrolling
                    let drawX = m.x;
                    // Simple tiling logic
                    // To make it truly infinite, we'd need to mod the x, but for this demo, 
                    // we will just draw a large sine wave approximation for simplicity and performance
                });
                
                // Procedural Ink Mountains based on Sine waves
                for (let x = 0; x <= width; x += 10) {
                    // Combine sine waves for "ink wash" look
                    const y1 = Math.sin((x + this.offset * 2) * 0.002) * 100;
                    const y2 = Math.sin((x - this.offset) * 0.005) * 50;
                    const y3 = Math.cos((x + this.offset * 0.5) * 0.01) * 20;
                    
                    const finalY = height - 150 - (y1 + y2 + y3) * this.speed;
                    context.lineTo(x, finalY);
                }

                context.lineTo(width, height);
                context.lineTo(0, height);
                context.fill();
            }
        }

        // --- INITIALIZATION ---

        const hero = new MartialArtist();
        let particles = [];
        let backgrounds = [];
        let cameraShake = 0;

        function init() {
            // Create Parallax Backgrounds (Ink Layers)
            backgrounds = [
                new BackgroundLayer(0.1, '#d4d4d4', 5), // Far
                new BackgroundLayer(0.3, '#a3a3a3', 4), // Mid
                new BackgroundLayer(0.6, '#737373', 3)  // Close
            ];

            hero.y = height * 0.8;
            hero.vy = 0;
            state.height = 0;
            particles = [];
            hero.trail = [];
            
            // UI Reset
            document.getElementById('replay-btn').classList.remove('visible');
            document.getElementById('title-card').classList.add('visible');
            document.getElementById('subtitle-card').classList.add('visible');
            
            // Start Sequence
            setTimeout(() => {
                hero.state = 'idle';
                state.isPlaying = true;
            }, 1000);
        }

        // --- MAIN LOOP ---

        function loop() {
            if (!state.isPlaying) {
                animationId = requestAnimationFrame(loop);
                return;
            }

            // Clear Canvas
            ctx.clearRect(0, 0, width, height);
            bgCtx.clearRect(0, 0, width, height);

            // Logic
            hero.update();
            
            // Camera Logic (Follow Hero)
            const desiredCamY = hero.y - height * 0.4;
            // Smooth lerp
            cameraY += (desiredCamY - cameraY) * 0.1;
            
            // Apply Camera Shake
            let shakeX = 0;
            let shakeY = 0;
            if (cameraShake > 0) {
                shakeX = random(-cameraShake, cameraShake);
                shakeY = random(-cameraShake, cameraShake);
                cameraShake *= 0.9;
                if(cameraShake < 0.5) cameraShake = 0;
            }

            // Draw Backgrounds (Parallax)
            // We move the context inversely to camera to simulate camera movement
            bgCtx.save();
            bgCtx.translate(0, -cameraY * 0.5); // Parallax factor
            
            // Draw Sky Gradient (Static relative to world)
            const grad = bgCtx.createLinearGradient(0, cameraY, 0, cameraY + height);
            grad.addColorStop(0, '#f0f0f0');
            grad.addColorStop(1, '#ffffff');
            bgCtx.fillStyle = grad;
            bgCtx.fillRect(0, cameraY, width, height);

            backgrounds.forEach(bg => {
                bg.update(cameraY);
                bg.draw(bgCtx);
            });
            bgCtx.restore();


            // Draw Particles (World Space)
            ctx.save();
            ctx.translate(shakeX, shakeY - cameraY); // Camera Transform
            
            // Update and Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw(ctx);
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Draw Hero
            hero.draw(ctx);
            
            // Draw Height Counter (In World Space so it scrolls? No, let's keep it relative)
            // Actually, let's draw clouds as static elements in screen space occasionally
            ctx.restore();

            // Check for Game Over (Falling too far)
            if (hero.y > cameraY + height + 100) {
                endGame();
            }

            // Check for "Win" (Arbitrary height reached to show mastery, then loop/fade)
            if (hero.y < -10000 && state.isPlaying) {
                // Just keep going, but maybe slow down?
                // Or transition to a "Heaven" realm?
            }

            animationId = requestAnimationFrame(loop);
        }

        function endGame() {
            state.isPlaying = false;
            document.getElementById('replay-btn').classList.add('visible');
        }

        // --- INPUT & EVENTS ---

        document.getElementById('replay-btn').addEventListener('click', () => {
            init();
        });

        // Optional: Click to boost/jump
        canvas.addEventListener('mousedown', () => {
            if (state.isPlaying && hero.state === 'stepping') {
                hero.jump();
                // Visual feedback
                ctx.save();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(hero.x, hero.y - cameraY, 50, 0, Math.PI*2);
                ctx.stroke();
                ctx.restore();
            }
        });

        // Start
        window.onload = () => {
            const loader = document.getElementById('loader');
            loader.style.opacity = 0;
            setTimeout(() => {
                loader.style.display = 'none';
                init();
                loop();
            }, 500);
        };

    </script>
</body>
</html>
