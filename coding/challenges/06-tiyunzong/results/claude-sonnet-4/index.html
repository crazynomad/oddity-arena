```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梯云纵 - Tī Yún Zòng</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 30% 70%, #1a1a1a 0%, #0f0f0f 100%);
            overflow: hidden;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
        }
        
        canvas {
            display: block;
            background: linear-gradient(180deg, #2a2a3a 0%, #1a1a2a 50%, #0a0a1a 100%);
        }
        
        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #f0f0f0;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            z-index: 10;
            pointer-events: none;
        }
        
        .subtitle {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #c0c0c0;
            font-size: 1rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            z-index: 10;
            pointer-events: none;
        }
        
        .replay-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 0.9rem;
            z-index: 10;
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="title">梯云纵</div>
    <div class="subtitle">点击重播 · Click to Replay</div>
    <div class="replay-hint">古典轻功 · Classical Qinggong</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Canvas setup
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Animation state
        let time = 0;
        let animationState = 'setup'; // setup -> leap -> ascending -> peak -> descending -> landing
        let stateTime = 0;
        let particles = [];
        let qiWaves = [];
        let afterImages = [];
        
        // Fighter properties
        const fighter = {
            x: canvas.width * 0.5,
            y: canvas.height * 0.8,
            baseY: canvas.height * 0.8,
            vx: 0,
            vy: 0,
            rotation: 0,
            scale: 1,
            alpha: 1
        };
        
        // Background elements
        const mountains = [];
        const bamboos = [];
        const clouds = [];
        
        // Initialize background
        function initBackground() {
            // Mountains
            for (let i = 0; i < 5; i++) {
                mountains.push({
                    x: (canvas.width / 4) * i - 100,
                    y: canvas.height * 0.6 + Math.random() * 100,
                    width: canvas.width * 0.4,
                    height: canvas.height * 0.4,
                    opacity: 0.3 - i * 0.05,
                    parallax: 0.1 + i * 0.02
                });
            }
            
            // Bamboos
            for (let i = 0; i < 8; i++) {
                bamboos.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height * 0.3,
                    height: 200 + Math.random() * 300,
                    sway: Math.random() * Math.PI * 2,
                    opacity: 0.2 + Math.random() * 0.3
                });
            }
            
            // Clouds
            for (let i = 0; i < 6; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * 0.4,
                    size: 50 + Math.random() * 100,
                    speed: 0.5 + Math.random() * 1,
                    opacity: 0.1 + Math.random() * 0.2
                });
            }
        }
        
        // Particle system
        class Particle {
            constructor(x, y, type = 'ink') {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
                this.size = 2 + Math.random() * 6;
                this.type = type;
                this.rotation = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                this.rotation += 0.1;
            }
            
            draw() {
                if (this.life <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                if (this.type === 'ink') {
                    ctx.fillStyle = `rgba(40, 40, 60, ${this.life})`;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'qi') {
                    ctx.strokeStyle = `rgba(200, 200, 255, ${this.life})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i / 5) * Math.PI * 2;
                        const x = Math.cos(angle) * this.size;
                        const y = Math.sin(angle) * this.size;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }
        
        // Qi wave effect
        class QiWave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 150;
                this.life = 1;
                this.decay = 0.03;
            }
            
            update() {
                this.radius += 8;
                this.life -= this.decay;
            }
            
            draw() {
                if (this.life <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.strokeStyle = `rgba(150, 200, 255, ${this.life})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.strokeStyle = `rgba(200, 220, 255, ${this.life * 0.5})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 10, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }
        
        // Draw background elements
        function drawBackground() {
            // Moon
            ctx.save();
            ctx.fillStyle = 'rgba(240, 240, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.8, canvas.height * 0.15, 60, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            
            // Mountains
            mountains.forEach(mountain => {
                ctx.save();
                ctx.globalAlpha = mountain.opacity;
                ctx.fillStyle = '#2a2a3a';
                ctx.beginPath();
                ctx.moveTo(mountain.x, canvas.height);
                ctx.lineTo(mountain.x + mountain.width * 0.3, mountain.y);
                ctx.lineTo(mountain.x + mountain.width * 0.7, mountain.y + 50);
                ctx.lineTo(mountain.x + mountain.width, canvas.height);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });
            
            // Bamboos
            bamboos.forEach(bamboo => {
                const sway = Math.sin(time * 0.01 + bamboo.sway) * 20;
                ctx.save();
                ctx.globalAlpha = bamboo.opacity;
                ctx.strokeStyle = '#3a3a4a';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(bamboo.x, canvas.height);
                ctx.quadraticCurveTo(
                    bamboo.x + sway * 0.5, 
                    bamboo.y + bamboo.height * 0.5,
                    bamboo.x + sway, 
                    bamboo.y
                );
                ctx.stroke();
                ctx.restore();
            });
            
            // Clouds
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > canvas.width + cloud.size) cloud.x = -cloud.size;
                
                ctx.save();
                ctx.globalAlpha = cloud.opacity;
                ctx.fillStyle = '#4a4a5a';
                ctx.beginPath();
                ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        // Draw fighter
        function drawFighter() {
            ctx.save();
            ctx.globalAlpha = fighter.alpha;
            ctx.translate(fighter.x, fighter.y);
            ctx.rotate(fighter.rotation);
            ctx.scale(fighter.scale, fighter.scale);
            
            // Body
            ctx.fillStyle = '#1a1a2a';
            ctx.fillRect(-8, -30, 16, 40);
            
            // Head
            ctx.fillStyle = '#2a2a3a';
            ctx.beginPath();
            ctx.arc(0, -40, 12, 0, Math.PI * 2);
            ctx.fill();
            
            // Arms
            ctx.strokeStyle = '#2a2a3a';
            ctx.lineWidth = 6;
            
            // Arm positions based on animation state
            let leftArmX = -15, leftArmY = -20;
            let rightArmX = 15, rightArmY = -20;
            
            if (animationState === 'ascending' || animationState === 'peak') {
                leftArmX = -25;
                leftArmY = -35;
                rightArmX = 25;
                rightArmY = -35;
            }
            
            ctx.beginPath();
            ctx.moveTo(-8, -25);
            ctx.lineTo(leftArmX, leftArmY);
            ctx.moveTo(8, -25);
            ctx.lineTo(rightArmX, rightArmY);
            ctx.stroke();
            
            // Legs
            let leftLegX = -6, leftLegY = 15;
            let rightLegX = 6, rightLegY = 15;
            
            if (animationState === 'ascending') {
                leftLegX = -10;
                leftLegY = 5;
                rightLegX = 10;
                rightLegY = 25;
            }
            
            ctx.beginPath();
            ctx.moveTo(-6, 10);
            ctx.lineTo(leftLegX, leftLegY);
            ctx.moveTo(6, 10);
            ctx.lineTo(rightLegX, rightLegY);
            ctx.stroke();
            
            // Flowing robes
            ctx.fillStyle = 'rgba(60, 60, 80, 0.7)';
            for (let i = 0; i < 3; i++) {
                const flow = Math.sin(time * 0.05 + i) * 10;
                ctx.beginPath();
                ctx.ellipse(-20 + i * 20 + flow, 20, 8, 15, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        // Animation logic
        function updateAnimation() {
            stateTime++;
            
            switch (animationState) {
                case 'setup':
                    if (stateTime > 60) {
                        animationState = 'leap';
                        stateTime = 0;
                        fighter.vy = -8;
                        
                        // Create initial qi burst
                        qiWaves.push(new QiWave(fighter.x, fighter.y));
                        for (let i = 0; i < 15; i++) {
                            particles.push(new Particle(fighter.x, fighter.y, 'qi'));
                        }
                    }
                    break;
                    
                case 'leap':
                    fighter.y += fighter.vy;
                    fighter.vy += 0.2; // gravity
                    
                    if (stateTime > 30) {
                        animationState = 'ascending';
                        stateTime = 0;
                        fighter.vy = -12;
                    }
                    break;
                    
                case 'ascending':
                    fighter.y += fighter.vy;
                    fighter.vy += 0.1; // reduced gravity during technique
                    
                    // Step-on-foot effect every 20 frames
                    if (stateTime % 20 === 0 && stateTime < 100) {
                        fighter.vy = -10; // boost upward
                        
                        // Create step effects
                        qiWaves.push(new QiWave(fighter.x, fighter.y + 20));
                        for (let i = 0; i < 10; i++) {
                            particles.push(new Particle(fighter.x, fighter.y + 20, 'ink'));
                        }
                        
                        // Add afterimage
                        afterImages.push({
                            x: fighter.x,
                            y: fighter.y,
                            rotation: fighter.rotation,
                            alpha: 0.3,
                            decay: 0.02
                        });
                    }
                    
                    if (stateTime > 120 || fighter.vy > 0) {
                        animationState = 'peak';
                        stateTime = 0;
                        fighter.vy = 0;
                    }
                    break;
                    
                case 'peak':
                    fighter.y += Math.sin(time * 0.1) * 0.5; // floating effect
                    
                    if (stateTime > 60) {
                        animationState = 'descending';
                        stateTime = 0;
                        fighter.vy = 1;
                    }
                    break;
                    
                case 'descending':
                    fighter.y += fighter.vy;
                    fighter.vy += 0.3; // gravity
                    
                    if (fighter.y >= fighter.baseY) {
                        animationState = 'landing';
                        stateTime = 0;
                        fighter.y = fighter.baseY;
                        
                        // Landing effects
                        qiWaves.push(new QiWave(fighter.x, fighter.y));
                        for (let i = 0; i < 20; i++) {
                            particles.push(new Particle(fighter.x, fighter.y, 'qi'));
                        }
                    }
                    break;
                    
                case 'landing':
                    if (stateTime > 120) {
                        // Reset animation
                        animationState = 'setup';
                        stateTime = 0;
                        fighter.x = canvas.width * 0.5;
                        fighter.y = fighter.baseY;
                        fighter.vy = 0;
                        fighter.rotation = 0;
                        particles = [];
                        qiWaves = [];
                        afterImages = [];
                    }
                    break;
            }
        }
        
        // Main animation loop
        function animate() {
            time++;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            drawBackground();
            
            // Update and draw afterimages
            afterImages = afterImages.filter(img => {
                img.alpha -= img.decay;
                if (img.alpha > 0) {
                    ctx.save();
                    ctx.globalAlpha = img.alpha;
                    ctx.translate(img.x, img.y);
                    ctx.rotate(img.rotation);
                    ctx.fillStyle = 'rgba(100, 150, 200, 0.3)';
                    ctx.fillRect(-8, -30, 16, 40);
                    ctx.restore();
                    return true;
                }
                return false;
            });
            
            // Update and draw particles
            particles = particles.filter(p => {
                p.update();
                p.draw();
                return p.life > 0;
            });
            
            // Update and draw qi waves
            qiWaves = qiWaves.filter(wave => {
                wave.update();
                wave.draw();
                return wave.life > 0;
            });
            
            // Update animation
            updateAnimation();
            
            // Draw fighter
            drawFighter();
            
            requestAnimationFrame(animate);
        }
        
        // Click to restart
        canvas.addEventListener('click', () => {
            animationState = 'setup';
            stateTime = 0;
            fighter.x = canvas.width * 0.5;
            fighter.y = fighter.baseY;
            fighter.vy = 0;
            fighter.rotation = 0;
            particles = [];
            qiWaves = [];
            afterImages = [];
        });
        
        // Initialize and start
        initBackground();
        animate();
    </script>
</body>
</html>
