<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鹈鹕骑自行车 — Pelican on a Bicycle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Courier New', monospace;
  }
  h1 {
    color: #FFE500;
    font-size: clamp(1rem, 3.5vw, 1.8rem);
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 3px;
    text-shadow: 0 0 24px #FFE50066;
  }
  svg {
    width: 100%;
    max-width: 900px;
    border: 2px solid #FFE500;
    border-radius: 12px;
    box-shadow: 0 0 50px #FFE50022, 0 8px 32px #00000066;
  }
  .caption {
    color: #888;
    font-size: 0.8rem;
    margin-top: 12px;
    text-align: center;
    line-height: 1.6;
  }
  .caption span { color: #FFE500; }
</style>
</head>
<body>
<h1>🦅 鹈鹕骑自行车 🚲</h1>
<svg viewBox="0 0 900 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="55%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#C2E8C8"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </radialGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#6B5230"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00000030"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- ═══════ BACKGROUND ═══════ -->
  <rect width="900" height="630" fill="url(#skyGrad)"/>

  <!-- Sun -->
  <circle cx="810" cy="72" r="50" fill="url(#sunGrad)" opacity="0.95"/>
  <circle cx="810" cy="72" r="70" fill="#FFD600" opacity="0.12"/>
  <!-- Sun rays -->
  <g stroke="#FFD600" stroke-width="2.5" opacity="0.4" stroke-linecap="round">
    <line x1="810" y1="12" x2="810" y2="2"/>
    <line x1="810" y1="132" x2="810" y2="142"/>
    <line x1="750" y1="72" x2="740" y2="72"/>
    <line x1="870" y1="72" x2="880" y2="72"/>
    <line x1="767" y1="29" x2="760" y2="22"/>
    <line x1="853" y1="115" x2="860" y2="122"/>
    <line x1="853" y1="29" x2="860" y2="22"/>
    <line x1="767" y1="115" x2="760" y2="122"/>
  </g>

  <!-- Clouds -->
  <g fill="white" opacity="0.82">
    <ellipse cx="125" cy="88" rx="58" ry="30"/>
    <ellipse cx="172" cy="78" rx="50" ry="26"/>
    <ellipse cx="82" cy="97" rx="42" ry="23"/>
    <ellipse cx="630" cy="110" rx="62" ry="32"/>
    <ellipse cx="678" cy="100" rx="52" ry="27"/>
    <ellipse cx="588" cy="118" rx="44" ry="24"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="548" width="900" height="82" fill="url(#groundGrad)"/>
  <!-- Grass -->
  <rect x="0" y="544" width="900" height="9" fill="#5A8C1C"/>
  <path d="M0,544 Q45,540 90,544 Q135,548 180,544 Q225,540 270,544 Q315,548 360,544 Q405,540 450,544 Q495,548 540,544 Q585,540 630,544 Q675,548 720,544 Q765,540 810,544 Q855,548 900,544"
        fill="none" stroke="#4A7A18" stroke-width="3"/>
  <!-- Grass tufts -->
  <g fill="#3D6E14">
    <path d="M55,544 Q57,532 59,544"/><path d="M62,544 Q65,536 68,544"/>
    <path d="M200,544 Q202,534 204,544"/><path d="M208,544 Q211,537 214,544"/>
    <path d="M490,544 Q492,533 494,544"/><path d="M498,544 Q501,536 504,544"/>
    <path d="M730,544 Q732,534 734,544"/><path d="M738,544 Q741,537 744,544"/>
  </g>

  <!-- Road center dashes -->
  <line x1="0" y1="572" x2="900" y2="572" stroke="#C5B080" stroke-width="2.5" stroke-dasharray="35,25" opacity="0.35"/>

  <!-- Ground shadow -->
  <ellipse cx="395" cy="548" rx="195" ry="11" fill="#5B4525" opacity="0.30"/>

  <!-- ═══════ BICYCLE ═══════ -->
  <!--
    Effective ground: y=548
    Wheel radius: 68  →  wheel centers at y=480
    Rear  wheel: (240, 480)
    Front wheel: (545, 480)
    Bottom bracket: (368, 472)
    Seat cluster: (316, 368)
    Head tube top: (515, 362)
    Head tube btm: (528, 415)
  -->

  <!-- Chain (behind frame) -->
  <path d="M240,480 Q302,507 368,472" fill="none" stroke="#444" stroke-width="5" stroke-dasharray="7,5"/>

  <!-- FRAME -->
  <g stroke="#C82020" fill="none" stroke-linecap="round">
    <line x1="240" y1="480" x2="368" y2="472" stroke-width="10"/><!-- chainstay -->
    <line x1="240" y1="480" x2="316" y2="368" stroke-width="7"/><!-- seatstay -->
    <line x1="368" y1="472" x2="316" y2="368" stroke-width="10"/><!-- seat tube -->
    <line x1="316" y1="368" x2="515" y2="362" stroke-width="10"/><!-- top tube -->
    <line x1="368" y1="472" x2="520" y2="390" stroke-width="10"/><!-- down tube -->
    <line x1="515" y1="362" x2="545" y2="480" stroke-width="7"/><!-- fork blade -->
    <line x1="520" y1="390" x2="545" y2="480" stroke-width="7"/><!-- fork blade -->
  </g>
  <!-- Frame highlights -->
  <g stroke="#E84444" fill="none" stroke-linecap="round" opacity="0.4">
    <line x1="316" y1="365" x2="515" y2="359" stroke-width="4"/>
    <line x1="368" y1="469" x2="520" y2="387" stroke-width="4"/>
    <line x1="240" y1="477" x2="368" y2="469" stroke-width="4"/>
  </g>

  <!-- REAR WHEEL -->
  <g transform="translate(240,480)" filter="url(#drop)">
    <circle r="68" fill="none" stroke="#0F0F0F" stroke-width="14"/>
    <circle r="54" fill="none" stroke="#9A9A9A" stroke-width="3.5"/>
    <circle r="9" fill="#666"/>
    <g stroke="#808080" stroke-width="1.8">
      <line x1="0" y1="-54" x2="0" y2="54"/>
      <line x1="-54" y1="0" x2="54" y2="0"/>
      <line x1="-38" y1="-38" x2="38" y2="38"/>
      <line x1="38" y1="-38" x2="-38" y2="38"/>
      <line x1="-27" y1="-47" x2="27" y2="47"/>
      <line x1="27" y1="-47" x2="-27" y2="47"/>
      <line x1="-47" y1="-27" x2="47" y2="27"/>
      <line x1="47" y1="-27" x2="-47" y2="27"/>
      <line x1="-14" y1="-52" x2="14" y2="52"/>
      <line x1="14" y1="-52" x2="-14" y2="52"/>
      <line x1="-52" y1="-14" x2="52" y2="14"/>
      <line x1="52" y1="-14" x2="-52" y2="14"/>
    </g>
    <circle r="9" fill="#BBBBBB" stroke="#888" stroke-width="1.5"/>
  </g>

  <!-- FRONT WHEEL -->
  <g transform="translate(545,480)" filter="url(#drop)">
    <circle r="68" fill="none" stroke="#0F0F0F" stroke-width="14"/>
    <circle r="54" fill="none" stroke="#9A9A9A" stroke-width="3.5"/>
    <circle r="9" fill="#666"/>
    <g stroke="#808080" stroke-width="1.8">
      <line x1="0" y1="-54" x2="0" y2="54"/>
      <line x1="-54" y1="0" x2="54" y2="0"/>
      <line x1="-38" y1="-38" x2="38" y2="38"/>
      <line x1="38" y1="-38" x2="-38" y2="38"/>
      <line x1="-27" y1="-47" x2="27" y2="47"/>
      <line x1="27" y1="-47" x2="-27" y2="47"/>
      <line x1="-47" y1="-27" x2="47" y2="27"/>
      <line x1="47" y1="-27" x2="-47" y2="27"/>
      <line x1="-14" y1="-52" x2="14" y2="52"/>
      <line x1="14" y1="-52" x2="-14" y2="52"/>
      <line x1="-52" y1="-14" x2="52" y2="14"/>
      <line x1="52" y1="-14" x2="-52" y2="14"/>
    </g>
    <circle r="9" fill="#BBBBBB" stroke="#888" stroke-width="1.5"/>
  </g>

  <!-- SEAT POST -->
  <line x1="316" y1="368" x2="319" y2="332" stroke="#222" stroke-width="9" stroke-linecap="round"/>
  <!-- SEAT (saddle) -->
  <path d="M283,328 Q319,319 358,326 Q350,341 319,343 Q288,341 283,328 Z" fill="#111" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Seat nose -->
  <path d="M352,325 Q372,323 376,329 Q370,335 352,334 Z" fill="#111"/>

  <!-- HANDLEBAR STEM -->
  <line x1="515" y1="362" x2="515" y2="322" stroke="#333" stroke-width="9" stroke-linecap="round"/>
  <!-- HANDLEBARS (drop bar style) -->
  <line x1="483" y1="318" x2="552" y2="318" stroke="#1A1A1A" stroke-width="10" stroke-linecap="round"/>
  <!-- Drops with leather tape -->
  <path d="M483,318 Q479,336 481,352" fill="none" stroke="#7B3F00" stroke-width="10" stroke-linecap="round"/>
  <path d="M552,318 Q556,336 554,352" fill="none" stroke="#7B3F00" stroke-width="10" stroke-linecap="round"/>
  <!-- Bar outline -->
  <path d="M483,318 Q479,336 481,352" fill="none" stroke="#1A1A1A" stroke-width="10.5" stroke-linecap="round" opacity="0.2"/>

  <!-- CRANK & PEDALS -->
  <circle cx="368" cy="472" r="13" fill="#888" stroke="#555" stroke-width="2.5"/>
  <!-- Crank arm → left pedal (down-back) -->
  <line x1="368" y1="472" x2="337" y2="500" stroke="#555" stroke-width="9" stroke-linecap="round"/>
  <!-- Crank arm → right pedal (up-forward) -->
  <line x1="368" y1="472" x2="399" y2="444" stroke="#555" stroke-width="9" stroke-linecap="round"/>
  <!-- Left pedal platform -->
  <rect x="316" y="496" width="40" height="11" rx="3" fill="#1A1A1A" stroke="#0A0A0A" stroke-width="1.5" transform="rotate(-20, 336, 501)"/>
  <!-- Right pedal platform -->
  <rect x="387" y="438" width="40" height="11" rx="3" fill="#1A1A1A" stroke="#0A0A0A" stroke-width="1.5" transform="rotate(-20, 407, 443)"/>
  <!-- Crank center bolt -->
  <circle cx="368" cy="472" r="8" fill="#CCC" stroke="#999" stroke-width="1.5"/>

  <!-- ═══════ PELICAN ═══════ -->
  <!-- Drawing order: tail → left-wing → legs → body → right-wing → neck → head → beak/pouch -->

  <!-- TAIL FEATHERS -->
  <g fill="white" stroke="#CFCFC8" stroke-width="1.5">
    <path d="M272,280 Q242,268 228,252 Q252,266 268,278 Z"/>
    <path d="M270,291 Q238,282 224,268 Q250,275 266,289 Z"/>
    <path d="M270,302 Q239,296 226,284 Q250,288 266,300 Z"/>
  </g>

  <!-- LEFT WING (spread for aero balance) -->
  <path d="M280,278 Q244,253 196,260 Q218,278 250,285 Q266,289 281,290 Z"
        fill="white" stroke="#D0D0C8" stroke-width="2"/>
  <g stroke="#C0C0B8" stroke-width="1.3" fill="none">
    <path d="M278,283 Q245,263 200,262"/>
    <path d="M277,290 Q246,276 210,278"/>
  </g>
  <!-- Dark flight feathers at wing tip -->
  <path d="M199,262 Q183,268 190,278 Q200,270 208,265 Z" fill="#D8D8D0" stroke="#C0C0B8" stroke-width="1"/>

  <!-- LEFT LEG (drawn before body so body overlaps at top) -->
  <path d="M312,328 Q308,368 317,408 Q324,438 338,492"
        stroke="#FF8C00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Knee -->
  <circle cx="318" cy="408" r="8" fill="#FF7700" stroke="#CC5500" stroke-width="1.5"/>
  <!-- Left foot -->
  <path d="M330,492 Q346,494 355,490 Q350,503 328,503 Q320,501 322,493 Z"
        fill="#FF6600" stroke="#CC4400" stroke-width="1.5"/>
  <!-- Left webbed toes -->
  <path d="M327,501 Q316,512 312,518" stroke="#FF4400" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M333,503 Q328,514 327,520" stroke="#FF4400" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M340,502 Q341,514 342,520" stroke="#FF4400" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M349,498 Q354,509 357,514" stroke="#FF4400" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- RIGHT LEG -->
  <path d="M358,332 Q370,368 380,400 Q390,430 402,440"
        stroke="#FF8C00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Knee -->
  <circle cx="381" cy="400" r="8" fill="#FF7700" stroke="#CC5500" stroke-width="1.5"/>
  <!-- Right foot -->
  <path d="M396,440 Q412,442 420,437 Q416,450 394,451 Q386,448 388,441 Z"
        fill="#FF6600" stroke="#CC4400" stroke-width="1.5"/>
  <!-- Right webbed toes -->
  <path d="M392,449 Q381,460 378,465" stroke="#FF4400" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M399,451 Q394,462 393,468" stroke="#FF4400" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M406,450 Q407,461 408,467" stroke="#FF4400" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M414,446 Q419,456 422,461" stroke="#FF4400" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- BODY -->
  <ellipse cx="340" cy="280" rx="76" ry="57" fill="white" stroke="#D2D2CA" stroke-width="2.5" filter="url(#soft)"/>
  <!-- Body sheen -->
  <ellipse cx="322" cy="262" rx="42" ry="30" fill="white" opacity="0.45"/>
  <!-- Feather texture -->
  <g stroke="#E0E0D8" stroke-width="1.2" fill="none" opacity="0.8">
    <path d="M282,264 Q314,260 346,266"/>
    <path d="M279,276 Q314,272 350,278"/>
    <path d="M282,288 Q316,284 352,290"/>
    <path d="M290,300 Q322,296 355,302"/>
  </g>

  <!-- RIGHT WING (angled forward toward handlebars) -->
  <path d="M404,264 Q445,242 482,249 Q465,268 435,274 Q418,278 405,274 Z"
        fill="white" stroke="#D0D0C8" stroke-width="2"/>
  <g stroke="#C0C0B8" stroke-width="1.3" fill="none">
    <path d="M406,268 Q440,250 480,252"/>
    <path d="M405,274 Q435,262 470,264"/>
  </g>
  <!-- Wing tip near handlebar -->
  <path d="M476,252 Q493,250 490,261 Q480,260 476,256 Z" fill="#E2E2DA" stroke="#C8C8C0" stroke-width="1"/>

  <!-- NECK -->
  <path d="M393,248 Q420,224 421,198 Q419,174 409,158"
        fill="white" stroke="white" stroke-width="30" stroke-linecap="round"/>
  <path d="M378,250 Q404,225 406,198 Q404,172 394,155"
        fill="none" stroke="#D0D0C8" stroke-width="2"/>
  <path d="M410,244 Q436,220 436,196 Q433,172 422,156"
        fill="none" stroke="#D0D0C8" stroke-width="2"/>

  <!-- HEAD -->
  <ellipse cx="415" cy="150" rx="31" ry="27" fill="white" stroke="#D0D0C8" stroke-width="2.5" filter="url(#soft)"/>
  <!-- Crown crest -->
  <path d="M401,132 Q415,124 428,133" fill="#F2EEE6" stroke="#D5D0C5" stroke-width="1.5"/>
  <path d="M408,127 Q410,113 412,106" stroke="#E2DDD5" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M415,126 Q418,111 421,104" stroke="#E2DDD5" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Bare loral skin (eye ring — pelican trait) -->
  <circle cx="426" cy="144" r="13" fill="#FFD070" stroke="#CCAA40" stroke-width="1.5"/>
  <!-- EYE -->
  <circle cx="426" cy="144" r="8.5" fill="#E09820" stroke="#B07010" stroke-width="2"/>
  <circle cx="426" cy="144" r="5" fill="#0A0A0A"/>
  <circle cx="428" cy="142" r="2" fill="white"/>
  <!-- Eyelid -->
  <path d="M418,140 Q426,135 434,140" fill="none" stroke="#B07010" stroke-width="1.2"/>

  <!-- BEAK — Upper mandible -->
  <path d="M434,153 Q478,145 540,149 Q535,155 478,159 Q438,161 434,157 Z"
        fill="#FF9010" stroke="#CC5A00" stroke-width="1.5"/>
  <!-- Ridge line -->
  <path d="M436,151 Q481,144 537,149" fill="none" stroke="#FFCC60" stroke-width="1.8" opacity="0.55"/>
  <!-- Hook tip -->
  <path d="M536,147 Q551,149 542,158 Q534,153 536,147 Z" fill="#BB5000" stroke="#AA3A00" stroke-width="1"/>
  <!-- Nostril groove -->
  <path d="M452,150 Q458,148 464,150" fill="none" stroke="#CC5A00" stroke-width="1.5"/>

  <!-- BEAK — Lower mandible -->
  <path d="M434,157 Q478,161 538,155 Q530,166 478,170 Q440,170 434,163 Z"
        fill="#FF9010" stroke="#CC5A00" stroke-width="1.5"/>

  <!-- GULAR POUCH ★ — the pelican's signature feature / 喉囊 -->
  <path d="M435,160 Q450,174 466,184 Q474,192 467,204 Q452,215 436,210 Q420,202 418,186 Q416,170 432,161 Z"
        fill="#FF5200" stroke="#CC2800" stroke-width="2.2" filter="url(#soft)"/>
  <!-- Pouch skin folds -->
  <g stroke="#FF7744" stroke-width="1.6" fill="none" opacity="0.7">
    <path d="M428,168 Q446,176 462,180"/>
    <path d="M424,178 Q440,186 456,190"/>
    <path d="M424,188 Q434,195 446,198"/>
  </g>
  <!-- Pouch highlight -->
  <path d="M436,165 Q452,173 464,178" fill="none" stroke="#FF9966" stroke-width="2.5" opacity="0.45"/>
  <!-- Pouch bottom curve -->
  <path d="M424,200 Q438,210 452,208" fill="none" stroke="#AA2200" stroke-width="1.5" opacity="0.5"/>

  <!-- ═══════ FUN EXTRAS ═══════ -->

  <!-- Speed lines -->
  <g stroke="#A0CCE8" stroke-width="2.2" opacity="0.22" stroke-linecap="round">
    <line x1="30" y1="305" x2="148" y2="305"/>
    <line x1="20" y1="323" x2="142" y2="323"/>
    <line x1="40" y1="341" x2="145" y2="341"/>
    <line x1="28" y1="359" x2="136" y2="359"/>
    <line x1="45" y1="377" x2="132" y2="377"/>
  </g>

  <!-- Tiny bird following along (cheer squad) -->
  <g transform="translate(690,240)" fill="#888" opacity="0.7">
    <path d="M0,0 Q8,-6 16,0 Q8,3 0,0 Z"/>
    <circle cx="14" cy="-1" r="4" fill="#999"/>
    <path d="M14,-3 Q18,-8 20,-4" fill="#888"/>
  </g>
  <g transform="translate(720,225)" fill="#888" opacity="0.55">
    <path d="M0,0 Q7,-5 14,0 Q7,2 0,0 Z"/>
    <circle cx="12" cy="-1" r="3.5" fill="#999"/>
  </g>

  <!-- Info card -->
  <g transform="translate(636, 375)">
    <rect width="228" height="128" rx="10" ry="10" fill="#FFFFF8" opacity="0.93" stroke="#D4C088" stroke-width="2"/>
    <!-- header band -->
    <rect x="0" y="0" width="228" height="30" rx="10" ry="10" fill="#FFE500" opacity="0.85"/>
    <rect x="0" y="18" width="228" height="12" fill="#FFE500" opacity="0.85"/>
    <text x="114" y="21" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#1A1A1A">🏆 AI BENCHMARK #1</text>
    <text x="114" y="48" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#555">创始人 / Creator:</text>
    <text x="114" y="63" text-anchor="middle" font-family="'Courier New',monospace" font-size="10.5" fill="#222" font-weight="bold">Simon Willison (2024)</text>
    <line x1="15" y1="72" x2="213" y2="72" stroke="#D4C088" stroke-width="1"/>
    <text x="114" y="87" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#333">喉囊 Gular Pouch  ✅</text>
    <text x="114" y="102" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#333">踏板 Pedals  ✅  车架 Frame ✅</text>
    <text x="114" y="117" text-anchor="middle" font-family="'Courier New',monospace" font-size="10.5" fill="#C82020" font-weight="bold">空间逻辑 ✅ 鹈鹕真的在上面!</text>
  </g>

  <!-- Speech bubble from pelican -->
  <g transform="translate(540, 90)">
    <rect x="0" y="0" width="148" height="48" rx="10" fill="white" opacity="0.92" stroke="#CCBB88" stroke-width="1.8"/>
    <!-- bubble tail -->
    <path d="M35,48 Q28,60 18,65 Q32,56 42,50 Z" fill="white" stroke="#CCBB88" stroke-width="1.5"/>
    <text x="74" y="20" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#333" font-weight="bold">Wheee! 好快！</text>
    <text x="74" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#888">I ♥ cycling!</text>
  </g>

</svg>
<p class="caption">
  Challenge 04: 鹈鹕骑自行车 — <span>AI 界最著名的非官方基准测试</span><br>
  首创：Simon Willison (2024) | 测试要点：喉囊 · 车架 · 踏板 · 空间逻辑
</p>
</body>
</html>
