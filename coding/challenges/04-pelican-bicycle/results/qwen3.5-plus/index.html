<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelican on a Bicycle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f8ff;
            font-family: sans-serif;
        }
        svg {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background-color: #ffffff;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<svg width="600" height="500" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Definitions for gradients -->
    <defs>
        <linearGradient id="beakGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ffb347;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffcc33;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="pouchGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffcc33;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff9900;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- GROUND SHADOW -->
    <ellipse cx="300" cy="420" rx="220" ry="20" fill="#e0e0e0" opacity="0.6"/>

    <!-- BICYCLE WHEELS (Back) -->
    <g stroke="#333" stroke-width="8" fill="none">
        <!-- Back Wheel -->
        <circle cx="150" cy="350" r="70" />
        <circle cx="150" cy="350" r="5" fill="#333" />
        <!-- Spokes Back -->
        <line x1="150" y1="280" x2="150" y2="420" stroke="#999" stroke-width="2"/>
        <line x1="80" y1="350" x2="220" y2="350" stroke="#999" stroke-width="2"/>
        <line x1="100" y1="300" x2="200" y2="400" stroke="#999" stroke-width="2"/>
        <line x1="200" y1="300" x2="100" y2="400" stroke="#999" stroke-width="2"/>

        <!-- Front Wheel -->
        <circle cx="450" cy="350" r="70" />
        <circle cx="450" cy="350" r="5" fill="#333" />
        <!-- Spokes Front -->
        <line x1="450" y1="280" x2="450" y2="420" stroke="#999" stroke-width="2"/>
        <line x1="380" y1="350" x2="520" y2="350" stroke="#999" stroke-width="2"/>
        <line x1="400" y1="300" x2="500" y2="400" stroke="#999" stroke-width="2"/>
        <line x1="500" y1="300" x2="400" y2="400" stroke="#999" stroke-width="2"/>
    </g>

    <!-- BICYCLE FRAME -->
    <g stroke="#d32f2f" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <!-- Main Triangle -->
        <path d="M150 350 L280 350 L230 220 Z" />
        <!-- Seat Tube extension -->
        <line x1="230" y1="220" x2="230" y2="190" />
        <!-- Top Tube -->
        <line x1="230" y1="220" x2="380" y2="220" />
        <!-- Down Tube -->
        <line x1="380" y1="220" x2="280" y2="350" />
        <!-- Fork -->
        <path d="M380 220 L450 350" stroke="#333" stroke-width="8" />
    </g>

    <!-- BICYCLE COMPONENTS -->
    <g fill="#333">
        <!-- Seat -->
        <path d="M210 190 Q230 180 250 190 L250 200 Q230 210 210 200 Z" />
        <!-- Handlebars -->
        <path d="M380 220 L370 180 L400 170" stroke="#333" stroke-width="8" fill="none" stroke-linecap="round"/>
        <!-- Pedals/Crank -->
        <circle cx="280" cy="350" r="15" fill="#555" />
        <line x1="280" y1="350" x2="280" y2="380" stroke="#555" stroke-width="6" /> <!-- Crank arm -->
        <rect x="270" y="380" width="20" height="10" fill="#333" rx="2" /> <!-- Pedal -->
        
        <line x1="280" y1="350" x2="310" y2="330" stroke="#555" stroke-width="6" /> <!-- Other Crank arm -->
        <rect x="300" y="320" width="20" height="10" fill="#333" rx="2" transform="rotate(-30 310 330)" /> <!-- Other Pedal -->
    </g>

    <!-- PELICAN LEGS (Behind body) -->
    <g stroke="#ff9900" stroke-width="12" fill="none" stroke-linecap="round">
        <!-- Left Leg -->
        <path d="M240 280 L240 350 L275 380" />
        <!-- Right Leg -->
        <path d="M260 280 L290 330 L315 330" />
    </g>
    
    <!-- PELICAN FEET -->
    <g fill="#ff9900">
        <path d="M265 375 L290 385 L295 375 L270 365 Z" /> <!-- Left foot on pedal -->
        <path d="M305 325 L330 335 L335 325 L310 315 Z" /> <!-- Right foot on pedal -->
    </g>

    <!-- PELICAN BODY -->
    <g>
        <!-- Main Body Shape -->
        <ellipse cx="250" cy="250" rx="60" ry="80" fill="#ffffff" stroke="#ddd" stroke-width="2"/>
        
        <!-- Neck -->
        <path d="M270 200 Q300 180 300 140" stroke="#ffffff" stroke-width="50" fill="none" stroke-linecap="round"/>
        
        <!-- Wing (Holding Handlebars) -->
        <path d="M260 240 Q320 220 360 200" stroke="#ffffff" stroke-width="35" fill="none" stroke-linecap="round"/>
        <path d="M260 240 Q320 220 360 200" stroke="#eee" stroke-width="35" fill="none" stroke-linecap="round" stroke-dasharray="5,100" opacity="0.5"/> <!-- Wing detail -->
        
        <!-- Wing Tip / Hand holding bar -->
        <circle cx="365" cy="195" r="12" fill="#ff9900" />

        <!-- Head -->
        <circle cx="300" cy="130" r="35" fill="#ffffff" />
        
        <!-- Eye -->
        <circle cx="310" cy="125" r="5" fill="#000" />
        <circle cx="312" cy="123" r="2" fill="#fff" />

        <!-- BEAK -->
        <!-- Upper Mandible -->
        <path d="M325 120 L430 130 L325 145 Z" fill="url(#beakGradient)" stroke="#cc8800" stroke-width="1"/>
        
        <!-- Pouch -->
        <path d="M325 145 Q360 210 430 130" fill="url(#pouchGradient)" stroke="#cc8800" stroke-width="1"/>
        
        <!-- Beak Tip Detail -->
        <path d="M425 128 L435 130 L425 132" fill="none" stroke="#cc8800" stroke-width="2"/>

    </g>

</svg>

</body>
</html>
