<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">Battle — Oddity Arena</title>
  <link rel="stylesheet" href="../../../assets/style.css">
</head>
<body>
  <div class="container">
    <nav>
      <a href="../../../" class="nav-brand">⚡ ODDITY ARENA</a>
      <div class="nav-links">
        <a href="../../../#challenges">Challenges</a>
        <a href="../../../">Home</a>
      </div>
    </nav>

    <!-- Header -->
    <div class="battle-header">
      <div style="margin-bottom:12px;">
        <span class="tag" id="diff-tag"></span>
        <span class="tag tag-category" id="cat-tag"></span>
      </div>
      <h1 id="challenge-title"></h1>
      <p class="subtitle" id="challenge-desc"></p>
    </div>

    <!-- Waiting state (< 2 models) -->
    <div class="battle-waiting" id="waiting" style="display:none;">
      <p>⏳ Waiting for more models to compete...</p>
      <p style="font-size:0.9em; margin-top:12px;">Only 1 model has entered this challenge so far.</p>
      <div style="margin-top:24px;">
        <a href="../../../" class="btn btn-secondary">← Back to Challenges</a>
      </div>
      <div id="solo-preview" style="margin-top:32px;"></div>
    </div>

    <!-- Battle arena (>= 2 models) -->
    <div id="arena" style="display:none;">
      <div class="battle-arena">
        <div class="battle-side">
          <div class="battle-label" id="label-a">Model A</div>
          <iframe class="battle-iframe" id="iframe-a" sandbox="allow-scripts allow-same-origin"></iframe>
          <button class="btn btn-vote" id="vote-a" onclick="vote('a')">👈 Pick This One</button>
        </div>
        <div class="battle-side">
          <div class="battle-label" id="label-b">Model B</div>
          <iframe class="battle-iframe" id="iframe-b" sandbox="allow-scripts allow-same-origin"></iframe>
          <button class="btn btn-vote" id="vote-b" onclick="vote('b')">Pick This One 👉</button>
        </div>
      </div>

      <!-- Results (after voting) -->
      <div id="results" style="display:none;" class="fade-in">
        <div style="text-align:center; margin: 24px 0 16px;">
          <h3 style="color:var(--text-dim);">Community Votes</h3>
        </div>
        <div class="progress-bar" id="progress"></div>
        <div class="battle-actions">
          <button class="btn btn-primary" onclick="newPair()">🔀 New Pair</button>
          <button class="btn btn-secondary" onclick="showGallery()">🖼️ All Results</button>
          <button class="btn btn-secondary" onclick="share()">📤 Share</button>
        </div>
      </div>
    </div>

    <!-- Gallery (hidden by default) -->
    <div id="gallery" style="display:none;" class="section">
      <h2>All Submissions</h2>
      <div class="card-grid" id="gallery-grid"></div>
      <div style="text-align:center; margin-top:24px;">
        <button class="btn btn-primary" onclick="hideGallery()">← Back to Battle</button>
      </div>
    </div>

    <footer>
      <p><a href="../../../">Oddity Arena</a> — Part of the <a href="https://github.com/crazynomad">Oddity</a> universe. 🛸</p>
    </footer>
  </div>

  <script>
    let meta = {};
    let modelA = '', modelB = '';
    let voted = false;

    async function init() {
      try {
        const resp = await fetch('meta.json');
        meta = await resp.json();
      } catch {
        meta = { id: 'unknown', title: 'Challenge', difficulty: 'medium', category: 'coding', models: [], description: '' };
      }

      document.getElementById('page-title').textContent = `${meta.title} — Oddity Arena`;
      document.getElementById('challenge-title').textContent = meta.titleCn ? `${meta.title} / ${meta.titleCn}` : meta.title;
      document.getElementById('challenge-desc').textContent = meta.description || '';

      const diffTag = document.getElementById('diff-tag');
      diffTag.textContent = meta.difficulty;
      diffTag.className = `tag tag-${meta.difficulty}`;
      document.getElementById('cat-tag').textContent = meta.category;

      if (!meta.models || meta.models.length < 2) {
        document.getElementById('waiting').style.display = 'block';
        // Show solo preview if 1 model exists
        if (meta.models && meta.models.length === 1) {
          const solo = document.getElementById('solo-preview');
          solo.innerHTML = `
            <h3 style="margin-bottom:12px;">${meta.models[0]}</h3>
            <iframe class="battle-iframe" src="results/${meta.models[0]}/index.html" sandbox="allow-scripts allow-same-origin" style="max-width:800px; margin:0 auto; display:block;"></iframe>
          `;
        }
      } else {
        document.getElementById('arena').style.display = 'block';
        newPair();
      }
    }

    function newPair() {
      voted = false;
      document.getElementById('results').style.display = 'none';
      document.getElementById('vote-a').classList.remove('selected');
      document.getElementById('vote-b').classList.remove('selected');
      document.getElementById('vote-a').disabled = false;
      document.getElementById('vote-b').disabled = false;
      document.getElementById('label-a').textContent = 'Model A';
      document.getElementById('label-a').classList.remove('revealed');
      document.getElementById('label-b').textContent = 'Model B';
      document.getElementById('label-b').classList.remove('revealed');
      document.getElementById('iframe-a').classList.remove('winner');
      document.getElementById('iframe-b').classList.remove('winner');

      // Random pair
      const models = [...meta.models];
      const i = Math.floor(Math.random() * models.length);
      modelA = models.splice(i, 1)[0];
      modelB = models[Math.floor(Math.random() * models.length)];

      // Random swap
      if (Math.random() > 0.5) [modelA, modelB] = [modelB, modelA];

      document.getElementById('iframe-a').src = `results/${modelA}/index.html`;
      document.getElementById('iframe-b').src = `results/${modelB}/index.html`;
    }

    function vote(choice) {
      if (voted) return;
      voted = true;

      const winner = choice === 'a' ? modelA : modelB;

      // Save vote
      const key = `oddity-vote-${meta.id}`;
      const votes = JSON.parse(localStorage.getItem(key) || '{}');
      votes[winner] = (votes[winner] || 0) + 1;
      localStorage.setItem(key, JSON.stringify(votes));

      // Reveal
      const labelA = document.getElementById('label-a');
      const labelB = document.getElementById('label-b');
      labelA.textContent = modelA;
      labelA.classList.add('revealed');
      labelB.textContent = modelB;
      labelB.classList.add('revealed');

      // Highlight winner
      document.getElementById(choice === 'a' ? 'vote-a' : 'vote-b').classList.add('selected');
      document.getElementById(choice === 'a' ? 'iframe-a' : 'iframe-b').classList.add('winner');
      document.getElementById('vote-a').disabled = true;
      document.getElementById('vote-b').disabled = true;

      // Show results
      showResults(votes);
    }

    function showResults(votes) {
      const total = Object.values(votes).reduce((a, b) => a + b, 0);
      const progress = document.getElementById('progress');
      let html = '';
      // Sort by votes desc
      const sorted = Object.entries(votes).sort((a, b) => b[1] - a[1]);
      for (const [model, count] of sorted) {
        const pct = Math.round(count / total * 100);
        const cls = model === modelA ? 'progress-a' : 'progress-b';
        html += `<div class="progress-fill ${cls}" style="width:${pct}%">${model} ${pct}%</div>`;
      }
      progress.innerHTML = html;
      document.getElementById('results').style.display = 'block';
    }

    function showGallery() {
      document.getElementById('arena').style.display = 'none';
      document.getElementById('results').style.display = 'none';
      const gallery = document.getElementById('gallery');
      gallery.style.display = 'block';

      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';
      const votes = JSON.parse(localStorage.getItem(`oddity-vote-${meta.id}`) || '{}');
      const total = Object.values(votes).reduce((a, b) => a + b, 0);

      for (const model of meta.models) {
        const count = votes[model] || 0;
        const pct = total > 0 ? Math.round(count / total * 100) : 0;
        grid.innerHTML += `
          <div class="card">
            <h3>${model}</h3>
            <p style="color:var(--text-dim); font-size:0.85em; margin:8px 0;">${count} votes (${pct}%)</p>
            <iframe class="battle-iframe" src="results/${model}/index.html" sandbox="allow-scripts allow-same-origin" style="height:350px;"></iframe>
          </div>
        `;
      }
    }

    function hideGallery() {
      document.getElementById('gallery').style.display = 'none';
      document.getElementById('arena').style.display = 'block';
    }

    function share() {
      const text = `I just voted on "${meta.title}" in Oddity Arena — the playable AI model competition! 🛸\n\nCome play and vote: ${window.location.href}`;
      if (navigator.share) {
        navigator.share({ title: `${meta.title} — Oddity Arena`, text, url: window.location.href });
      } else {
        window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
      }
    }

    init();
  </script>
</body>
</html>
