<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar System - N-Body Gravity Sandbox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:280px;padding:16px;background:rgba(10,10,30,0.85);border-right:1px solid rgba(100,140,255,0.2);height:100vh;overflow-y:auto;backdrop-filter:blur(8px)}
#ui h2{font-size:14px;color:#6af;margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px}
#ui h2:first-child{margin-top:0}
.slider-row{display:flex;align-items:center;justify-content:space-between;margin:4px 0}
.slider-row label{font-size:12px;color:#aac;flex:1}
.slider-row input[type=range]{width:100px}
.slider-row .val{font-size:11px;color:#6af;width:36px;text-align:right}
button{background:rgba(80,130,255,0.25);color:#adf;border:1px solid rgba(100,150,255,0.3);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;margin:3px 2px;transition:background .2s}
button:hover{background:rgba(80,130,255,0.45)}
button.danger{background:rgba(255,60,60,0.2);color:#faa;border-color:rgba(255,80,80,0.3)}
button.danger:hover{background:rgba(255,60,60,0.4)}
.input-row{display:flex;gap:4px;margin:3px 0}
.input-row input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:4px 6px;border-radius:3px;font-size:11px;width:100%}
#body-list{max-height:180px;overflow-y:auto;margin:4px 0}
.body-item{display:flex;align-items:center;justify-content:space-between;padding:4px 6px;margin:2px 0;border-radius:3px;background:rgba(255,255,255,0.04);font-size:11px}
.body-item .dot{width:10px;height:10px;border-radius:50%;margin-right:6px;flex-shrink:0}
.body-item .name{flex:1}
.body-item button{padding:2px 6px;font-size:10px;margin:0}
#info{position:absolute;bottom:12px;right:12px;font-size:11px;color:#557;pointer-events:none}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(100,150,255,0.3);font-size:24px;pointer-events:none;display:none}
</style>
</head>
<body>
<div id="ui">
  <h2>⚙ Simulation</h2>
  <div style="display:flex;gap:4px;flex-wrap:wrap">
    <button id="btn-pause">⏸ Pause</button>
    <button id="btn-reset">↺ Reset</button>
    <button id="btn-preset">🪐 Solar Preset</button>
  </div>
  <div class="slider-row"><label>Gravity</label><input type="range" id="sl-gravity" min="0" max="500" value="100"><span class="val" id="v-gravity">1.0</span></div>
  <div class="slider-row"><label>Speed</label><input type="range" id="sl-speed" min="0" max="400" value="100"><span class="val" id="v-speed">1.0</span></div>
  <div class="slider-row"><label>Trail Length</label><input type="range" id="sl-trail" min="0" max="500" value="200"><span class="val" id="v-trail">200</span></div>
  <div class="slider-row"><label>Curvature Grid</label><input type="range" id="sl-curve" min="0" max="100" value="50"><span class="val" id="v-curve">0.5</span></div>

  <h2>➕ Add Body</h2>
  <div class="input-row"><input id="in-mass" type="number" placeholder="Mass (1-1000)" value="10"></div>
  <div class="input-row"><input id="in-px" type="number" placeholder="X" value="0"><input id="in-py" type="number" placeholder="Y" value="0"><input id="in-pz" type="number" placeholder="Z" value="0"></div>
  <div class="input-row"><input id="in-vx" type="number" placeholder="Vx" value="0"><input id="in-vy" type="number" placeholder="Vy" value="0"><input id="in-vz" type="number" placeholder="Vz" value="0.5"></div>
  <button id="btn-add">Add Body</button>
  <button id="btn-random">🎲 Random</button>

  <h2>Bodies</h2>
  <div id="body-list"></div>
</div>
<div id="info">Click body to select · Scroll to zoom · Drag to orbit</div>
<div id="crosshair">+</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
const G_BASE = 0.5;
let paused = false, gravMul = 1, speedMul = 1, trailLen = 200, curveMul = 0.5;
let bodies = [], nextId = 0;

// Three.js setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 5000);
camera.position.set(0, 40, 60);
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lighting
scene.add(new THREE.AmbientLight(0x223344, 0.6));
const sunLight = new THREE.PointLight(0xffeedd, 2, 500);
scene.add(sunLight);
scene.add(new THREE.DirectionalLight(0x4466aa, 0.3));

// Starfield
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000*3);
for(let i=0;i<9000;i++) starPos[i]=(Math.random()-0.5)*2000;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.5,transparent:true,opacity:0.7})));

// Spacetime grid
const gridSize = 80, gridRes = 40;
const gridGeo = new THREE.PlaneGeometry(gridSize*2, gridSize*2, gridRes, gridRes);
gridGeo.rotateX(-Math.PI/2);
const gridMat = new THREE.MeshBasicMaterial({color:0x2244aa, wireframe:true, transparent:true, opacity:0.15});
const gridMesh = new THREE.Mesh(gridGeo, gridMat);
gridMesh.position.y = -15;
scene.add(gridMesh);
const gridBaseY = new Float32Array(gridGeo.attributes.position.count);
for(let i=0;i<gridBaseY.length;i++) gridBaseY[i]=gridGeo.attributes.position.array[i*3+1];

// Colors
const COLORS = [0xff6644,0x44aaff,0x44ff88,0xffaa22,0xdd44ff,0xff4488,0x88ffdd,0xffdd44,0x4488ff,0xaa66ff];

function makeBody(mass, pos, vel, color){
  const id = nextId++;
  const r = Math.pow(mass, 0.33)*0.3 + 0.3;
  const geo = new THREE.SphereGeometry(r, 24, 18);
  const mat = new THREE.MeshStandardMaterial({color, emissive: color, emissiveIntensity: mass>80?0.8:0.15, roughness:0.4, metalness:0.3});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);

  // Glow
  const glowGeo = new THREE.SphereGeometry(r*1.6, 16, 12);
  const glowMat = new THREE.MeshBasicMaterial({color, transparent:true, opacity: mass>80?0.18:0.06});
  const glow = new THREE.Mesh(glowGeo, glowMat);
  mesh.add(glow);

  // Trail
  const maxTrail = 600;
  const trailGeo = new THREE.BufferGeometry();
  const trailArr = new Float32Array(maxTrail*3);
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailArr, 3));
  trailGeo.setDrawRange(0,0);
  const trailMat = new THREE.LineBasicMaterial({color, transparent:true, opacity:0.5});
  const trailLine = new THREE.Line(trailGeo, trailMat);
  scene.add(trailLine);

  const body = {id, mass, pos:pos.clone(), vel:vel.clone(), mesh, glow, trail:[], trailLine, trailGeo, trailArr, maxTrail, r, color, name:`Body ${id}`};
  bodies.push(body);
  if(mass > 80) sunLight.position.copy(pos);
  updateList();
  return body;
}

function removeBody(id){
  const idx = bodies.findIndex(b=>b.id===id);
  if(idx<0) return;
  const b = bodies[idx];
  scene.remove(b.mesh);
  scene.remove(b.trailLine);
  bodies.splice(idx,1);
  updateList();
}

function clearAll(){
  while(bodies.length) removeBody(bodies[0].id);
  nextId = 0;
}

function loadPreset(){
  clearAll();
  makeBody(200, new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0), 0xffcc33); // Sun
  const planets = [
    {m:3, d:10, s:1.8, c:0xaaaaaa},
    {m:5, d:16, s:1.4, c:0xddaa44},
    {m:6, d:22, s:1.15, c:0x4488ff},
    {m:4, d:28, s:1.0, c:0xdd4422},
    {m:40, d:40, s:0.7, c:0xddaa77},
    {m:30, d:52, s:0.58, c:0xccbb66},
    {m:12, d:62, s:0.48, c:0x66ccdd},
    {m:10, d:72, s:0.4, c:0x4455dd},
  ];
  planets.forEach(p=>{
    const angle = Math.random()*Math.PI*2;
    const tilt = (Math.random()-0.5)*0.3;
    const px = Math.cos(angle)*p.d, pz = Math.sin(angle)*p.d, py = tilt*p.d*0.1;
    const vx = -Math.sin(angle)*p.s, vz = Math.cos(angle)*p.s, vy = 0;
    makeBody(p.m, new THREE.Vector3(px,py,pz), new THREE.Vector3(vx,vy,vz), p.c);
  });
}

// Physics
function step(dt){
  if(paused) return;
  dt *= speedMul;
  const g = G_BASE * gravMul;
  const softening = 1.0;
  const n = bodies.length;

  // Compute accelerations
  for(let i=0;i<n;i++){
    const a = bodies[i];
    a.acc = new THREE.Vector3();
    for(let j=0;j<n;j++){
      if(i===j) continue;
      const b = bodies[j];
      const dx = b.pos.x-a.pos.x, dy = b.pos.y-a.pos.y, dz = b.pos.z-a.pos.z;
      const dist2 = dx*dx+dy*dy+dz*dz+softening;
      const dist = Math.sqrt(dist2);
      const f = g*b.mass/(dist2*dist);
      a.acc.x += f*dx; a.acc.y += f*dy; a.acc.z += f*dz;
    }
  }

  // Integrate (leapfrog-ish)
  for(const b of bodies){
    b.vel.x += b.acc.x*dt; b.vel.y += b.acc.y*dt; b.vel.z += b.acc.z*dt;
    b.pos.x += b.vel.x*dt; b.pos.y += b.vel.y*dt; b.pos.z += b.vel.z*dt;
    b.mesh.position.copy(b.pos);
  }

  // Collisions
  for(let i=0;i<bodies.length;i++){
    for(let j=i+1;j<bodies.length;j++){
      const a=bodies[i], b=bodies[j];
      const d = a.pos.distanceTo(b.pos);
      if(d < a.r + b.r){
        // Merge into heavier
        const [big,small] = a.mass>=b.mass ? [a,b] : [b,a];
        const totalMass = big.mass + small.mass;
        big.vel.x = (big.vel.x*big.mass + small.vel.x*small.mass)/totalMass;
        big.vel.y = (big.vel.y*big.mass + small.vel.y*small.mass)/totalMass;
        big.vel.z = (big.vel.z*big.mass + small.vel.z*small.mass)/totalMass;
        big.mass = totalMass;
        big.r = Math.pow(totalMass, 0.33)*0.3+0.3;
        big.mesh.geometry.dispose();
        big.mesh.geometry = new THREE.SphereGeometry(big.r, 24, 18);
        big.glow.geometry.dispose();
        big.glow.geometry = new THREE.SphereGeometry(big.r*1.6, 16, 12);
        big.mesh.material.emissiveIntensity = totalMass>80?0.8:0.15;
        big.glow.material.opacity = totalMass>80?0.18:0.06;
        removeBody(small.id);
        j--;
      }
    }
  }

  // Trails
  for(const b of bodies){
    b.trail.push(b.pos.clone());
    if(b.trail.length > trailLen) b.trail.shift();
    const arr = b.trailArr;
    const len = Math.min(b.trail.length, b.maxTrail);
    for(let i=0;i<len;i++){
      const t=b.trail[b.trail.length-len+i];
      arr[i*3]=t.x; arr[i*3+1]=t.y; arr[i*3+2]=t.z;
    }
    b.trailGeo.attributes.position.needsUpdate=true;
    b.trailGeo.setDrawRange(0, len);
  }

  // Update grid curvature
  const pos = gridGeo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.array[i*3], z=pos.array[i*3+2];
    let dy=0;
    for(const b of bodies){
      const dx2=(x-b.pos.x)**2+(z-b.pos.z)**2;
      dy -= curveMul * b.mass/(dx2+8) * 2;
    }
    pos.array[i*3+1] = gridBaseY[i]+Math.max(dy,-20);
  }
  pos.needsUpdate=true;

  // Sun light follows heaviest
  if(bodies.length){
    const heaviest = bodies.reduce((a,b)=>a.mass>b.mass?a:b);
    sunLight.position.copy(heaviest.pos);
  }
}

// UI
function updateList(){
  const el = document.getElementById('body-list');
  el.innerHTML = bodies.map(b=>`<div class="body-item"><span class="dot" style="background:#${b.color.toString(16).padStart(6,'0')}"></span><span class="name">${b.name} (m=${b.mass.toFixed(0)})</span><button class="danger" onclick="window._removeBody(${b.id})">✕</button></div>`).join('');
}
window._removeBody = removeBody;

document.getElementById('btn-pause').onclick=function(){paused=!paused;this.textContent=paused?'▶ Resume':'⏸ Pause'};
document.getElementById('btn-reset').onclick=loadPreset;
document.getElementById('btn-preset').onclick=loadPreset;

document.getElementById('btn-add').onclick=function(){
  const m=parseFloat(document.getElementById('in-mass').value)||10;
  const p=new THREE.Vector3(parseFloat(document.getElementById('in-px').value)||0,parseFloat(document.getElementById('in-py').value)||0,parseFloat(document.getElementById('in-pz').value)||0);
  const v=new THREE.Vector3(parseFloat(document.getElementById('in-vx').value)||0,parseFloat(document.getElementById('in-vy').value)||0,parseFloat(document.getElementById('in-vz').value)||0);
  makeBody(m,p,v,COLORS[nextId%COLORS.length]);
};

document.getElementById('btn-random').onclick=function(){
  const m = 2+Math.random()*30;
  const d = 15+Math.random()*50;
  const a = Math.random()*Math.PI*2;
  const p = new THREE.Vector3(Math.cos(a)*d, (Math.random()-0.5)*6, Math.sin(a)*d);
  const s = 0.3+Math.random()*1.2;
  const v = new THREE.Vector3(-Math.sin(a)*s, 0, Math.cos(a)*s);
  makeBody(m,p,v,COLORS[nextId%COLORS.length]);
};

// Sliders
function sl(id,vid,cb){const e=document.getElementById(id);e.oninput=()=>{const v=e.value;document.getElementById(vid).textContent=cb(v)}}
sl('sl-gravity','v-gravity',v=>{gravMul=v/100;return gravMul.toFixed(1)});
sl('sl-speed','v-speed',v=>{speedMul=v/100;return speedMul.toFixed(1)});
sl('sl-trail','v-trail',v=>{trailLen=+v;return v});
sl('sl-curve','v-curve',v=>{curveMul=v/100;return (v/100).toFixed(1)});

// Resize
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

// Main loop
loadPreset();
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  step(dt*4);
  controls.update();
  renderer.render(scene, camera);
}
animate();
})();
</script>
</body>
</html>
