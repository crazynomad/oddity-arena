<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Birds - Qwen Max</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #87CEEB;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
  }
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 1200px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.15);
    border-radius: 0 0 12px 12px;
    color: #fff;
    z-index: 10;
  }
  #header h1 { font-size: 22px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
  #score-display { font-size: 20px; font-weight: bold; }
  #birds-left { font-size: 16px; }
  #status-msg {
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    min-height: 36px;
  }
  button {
    padding: 8px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #e74c3c;
    color: #fff;
    font-weight: bold;
    transition: background 0.2s;
  }
  button:hover { background: #c0392b; }
  canvas {
    border-bottom: 4px solid #5a3d1a;
    cursor: crosshair;
  }
</style>
</head>
<body>

<div id="header">
  <h1>🐦 Angry Birds</h1>
  <span id="birds-left">Birds: 5</span>
  <span id="score-display">Score: 0</span>
  <span id="status-msg"></span>
  <button id="resetBtn" onclick="resetGame()">🔄 Reset</button>
</div>
<canvas id="gameCanvas"></canvas>

<script>
// ─── Engine Setup ───────────────────────────────────────────
const { Engine, Render, Runner, Bodies, Body, Composite, Events, Mouse, Constraint, Vector } = Matter;

const W = 1200, H = 600;
const GROUND_H = 60;
const SLING_X = 160, SLING_Y = H - GROUND_H - 100;
const MAX_DRAG = 120;
const BIRD_RADIUS = 18;
const TOTAL_BIRDS = 5;
const LAUNCH_POWER = 0.045;

let engine, render, runner;
let ground, wallL, wallR;
let birds = [], pigs = [], blocks = [];
let currentBird = null;
let slingConstraint = null;
let dragging = false;
let dragStart = null;
let launched = false;
let score = 0;
let birdsUsed = 0;
let gameOver = false;
let settling = false;
let settleTimer = 0;
let trajectoryPoints = [];

const canvas = document.getElementById('gameCanvas');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// ─── Category Filters ──────────────────────────────────────
const CAT_BIRD    = 0x0001;
const CAT_PIG     = 0x0002;
const CAT_BLOCK   = 0x0004;
const CAT_GROUND  = 0x0008;

function initEngine() {
  engine = Engine.create({ gravity: { x: 0, y: 1.2 } });

  // Ground
  ground = Bodies.rectangle(W / 2, H - GROUND_H / 2, W, GROUND_H, {
    isStatic: true, label: 'ground',
    render: { fillStyle: '#5a8f3c' },
    collisionFilter: { category: CAT_GROUND, mask: CAT_BIRD | CAT_PIG | CAT_BLOCK }
  });

  wallL = Bodies.rectangle(-10, H / 2, 20, H, { isStatic: true, label: 'wall' });
  wallR = Bodies.rectangle(W + 10, H / 2, 20, H, { isStatic: true, label: 'wall' });

  Composite.add(engine.world, [ground, wallL, wallR]);
}

// ─── Fortress Builder ───────────────────────────────────────
function createBlock(x, y, w, h, type) {
  const isStone = type === 'stone';
  const block = Bodies.rectangle(x, y, w, h, {
    label: 'block',
    density: isStone ? 0.008 : 0.004,
    friction: 0.8,
    restitution: 0.15,
    collisionFilter: { category: CAT_BLOCK, mask: CAT_BIRD | CAT_PIG | CAT_BLOCK | CAT_GROUND },
    blockType: type,
    hp: isStone ? 3 : 1,
    maxHp: isStone ? 3 : 1,
    blockW: w,
    blockH: h
  });
  blocks.push(block);
  Composite.add(engine.world, block);
  return block;
}

function createPig(x, y) {
  const pig = Bodies.circle(x, y, 20, {
    label: 'pig',
    density: 0.003,
    friction: 0.5,
    restitution: 0.3,
    collisionFilter: { category: CAT_PIG, mask: CAT_BIRD | CAT_PIG | CAT_BLOCK | CAT_GROUND },
    hp: 2,
    alive: true
  });
  pigs.push(pig);
  Composite.add(engine.world, pig);
  return pig;
}

function buildFortress() {
  const bx = 750;
  const gy = H - GROUND_H;

  // Base platform - stone
  createBlock(bx, gy - 15, 240, 30, 'stone');

  // Left tower
  createBlock(bx - 90, gy - 75, 20, 90, 'wood');
  createBlock(bx - 50, gy - 75, 20, 90, 'wood');
  createBlock(bx - 70, gy - 125, 60, 12, 'wood');

  // Right tower
  createBlock(bx + 50, gy - 75, 20, 90, 'wood');
  createBlock(bx + 90, gy - 75, 20, 90, 'wood');
  createBlock(bx + 70, gy - 125, 60, 12, 'wood');

  // Middle section
  createBlock(bx, gy - 60, 80, 20, 'stone');
  createBlock(bx, gy - 90, 20, 40, 'wood');

  // Top bridge
  createBlock(bx, gy - 140, 200, 14, 'stone');

  // Top structure
  createBlock(bx - 40, gy - 175, 16, 56, 'wood');
  createBlock(bx + 40, gy - 175, 16, 56, 'wood');
  createBlock(bx, gy - 208, 100, 12, 'wood');

  // Small top roof
  createBlock(bx, gy - 230, 60, 14, 'stone');

  // Pigs
  createPig(bx - 70, gy - 45);  // left chamber
  createPig(bx + 70, gy - 45);  // right chamber
  createPig(bx, gy - 165);       // top chamber
}

// ─── Birds ──────────────────────────────────────────────────
function createBird() {
  const bird = Bodies.circle(SLING_X, SLING_Y, BIRD_RADIUS, {
    label: 'bird',
    density: 0.006,
    friction: 0.5,
    restitution: 0.4,
    collisionFilter: { category: CAT_BIRD, mask: CAT_PIG | CAT_BLOCK | CAT_GROUND }
  });
  bird.isSleeping = true;
  Composite.add(engine.world, bird);
  return bird;
}

function loadBird() {
  if (birdsUsed >= TOTAL_BIRDS || gameOver) return;
  currentBird = createBird();
  Body.setPosition(currentBird, { x: SLING_X, y: SLING_Y });
  Body.setStatic(currentBird, true);
  launched = false;
  settling = false;
}

// ─── Trajectory ─────────────────────────────────────────────
function computeTrajectory(from, velocity, steps) {
  const pts = [];
  let x = from.x, y = from.y;
  let vx = velocity.x, vy = velocity.y;
  const g = engine.gravity.y * 1.2;
  const dt = 1000 / 60 / 1000;
  for (let i = 0; i < steps; i++) {
    vy += g * 0.5;
    x += vx * 3;
    y += vy * 3;
    if (y > H - GROUND_H) break;
    pts.push({ x, y });
  }
  return pts;
}

// ─── Input ──────────────────────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
  if (gameOver || !currentBird || launched) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const dx = mx - SLING_X;
  const dy = my - SLING_Y;
  if (Math.sqrt(dx * dx + dy * dy) < 50) {
    dragging = true;
    dragStart = { x: mx, y: my };
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging || !currentBird) return;
  const rect = canvas.getBoundingClientRect();
  let mx = e.clientX - rect.left;
  let my = e.clientY - rect.top;

  let dx = mx - SLING_X;
  let dy = my - SLING_Y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > MAX_DRAG) {
    dx = (dx / dist) * MAX_DRAG;
    dy = (dy / dist) * MAX_DRAG;
    mx = SLING_X + dx;
    my = SLING_Y + dy;
  }

  Body.setPosition(currentBird, { x: mx, y: my });

  // Trajectory preview
  const vx = (SLING_X - mx) * LAUNCH_POWER;
  const vy = (SLING_Y - my) * LAUNCH_POWER;
  trajectoryPoints = computeTrajectory({ x: mx, y: my }, { x: vx, y: vy }, 40);
});

canvas.addEventListener('mouseup', () => {
  if (!dragging || !currentBird) return;
  dragging = false;
  trajectoryPoints = [];

  const bx = currentBird.position.x;
  const by = currentBird.position.y;
  const dx = SLING_X - bx;
  const dy = SLING_Y - by;

  if (Math.sqrt(dx * dx + dy * dy) < 10) {
    Body.setPosition(currentBird, { x: SLING_X, y: SLING_Y });
    return;
  }

  Body.setStatic(currentBird, false);
  currentBird.isSleeping = false;
  Body.setVelocity(currentBird, {
    x: dx * LAUNCH_POWER,
    y: dy * LAUNCH_POWER
  });

  launched = true;
  birdsUsed++;
  updateUI();

  // Wait for bird to settle then load next
  settling = true;
  settleTimer = 0;
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  canvas.dispatchEvent(new MouseEvent('mouseup'));
}, { passive: false });

// ─── Collision Handling ─────────────────────────────────────
function setupCollisions() {
  Events.on(engine, 'collisionStart', (event) => {
    for (const pair of event.pairs) {
      const a = pair.bodyA, b = pair.bodyB;
      handleHit(a, b, pair);
      handleHit(b, a, pair);
    }
  });
}

function handleHit(a, b, pair) {
  const relVel = Math.abs(pair.collision.depth) +
    Math.sqrt(
      Math.pow((a.velocity?.x || 0) - (b.velocity?.x || 0), 2) +
      Math.pow((a.velocity?.y || 0) - (b.velocity?.y || 0), 2)
    );

  // Bird hits block
  if (a.label === 'bird' && b.label === 'block') {
    if (relVel > 3) {
      b.hp -= 1;
      if (b.hp <= 0) {
        destroyBlock(b);
        score += (b.blockType === 'stone' ? 500 : 200);
      }
    }
  }

  // Bird hits pig
  if (a.label === 'bird' && b.label === 'pig' && b.alive) {
    if (relVel > 2) {
      b.hp -= 1;
      if (b.hp <= 0) {
        killPig(b);
      }
    }
  }

  // Block hits pig (falling debris)
  if (a.label === 'block' && b.label === 'pig' && b.alive) {
    if (relVel > 4) {
      b.hp -= 1;
      if (b.hp <= 0) {
        killPig(b);
      }
    }
  }

  // Block-on-block damage
  if (a.label === 'block' && b.label === 'block') {
    if (relVel > 8) {
      a.hp -= 1;
      if (a.hp <= 0) {
        destroyBlock(a);
        score += (a.blockType === 'stone' ? 500 : 200);
      }
    }
  }
}

function destroyBlock(block) {
  Composite.remove(engine.world, block);
  const idx = blocks.indexOf(block);
  if (idx > -1) blocks.splice(idx, 1);
  spawnParticles(block.position.x, block.position.y, block.blockType === 'stone' ? '#888' : '#c08040', 6);
}

function killPig(pig) {
  pig.alive = false;
  score += 1000;
  spawnParticles(pig.position.x, pig.position.y, '#4CAF50', 8);
  setTimeout(() => {
    Composite.remove(engine.world, pig);
  }, 100);
  updateUI();
  checkWin();
}

// ─── Particles ──────────────────────────────────────────────
let particles = [];

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 1) * 6,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 3 + Math.random() * 4
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── Win/Lose ───────────────────────────────────────────────
function checkWin() {
  const alive = pigs.filter(p => p.alive).length;
  if (alive === 0) {
    gameOver = true;
    score += (TOTAL_BIRDS - birdsUsed) * 500; // bonus for unused birds
    document.getElementById('status-msg').textContent = '🎉 YOU WIN! 🎉';
    document.getElementById('status-msg').style.color = '#FFD700';
    updateUI();
  }
}

function checkLose() {
  if (gameOver) return;
  const alive = pigs.filter(p => p.alive).length;
  if (alive > 0 && birdsUsed >= TOTAL_BIRDS && !currentBird) {
    gameOver = true;
    document.getElementById('status-msg').textContent = '💀 GAME OVER 💀';
    document.getElementById('status-msg').style.color = '#e74c3c';
  }
}

// ─── UI Updates ─────────────────────────────────────────────
function updateUI() {
  document.getElementById('score-display').textContent = `Score: ${score}`;
  document.getElementById('birds-left').textContent = `Birds: ${TOTAL_BIRDS - birdsUsed}`;
}

// ─── Rendering ──────────────────────────────────────────────
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#4A90D9');
  grad.addColorStop(0.6, '#87CEEB');
  grad.addColorStop(1, '#B0E0FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  drawCloud(100, 60, 50);
  drawCloud(400, 90, 40);
  drawCloud(700, 40, 60);
  drawCloud(1000, 80, 35);
}

function drawCloud(x, y, s) {
  ctx.beginPath();
  ctx.arc(x, y, s * 0.6, 0, Math.PI * 2);
  ctx.arc(x + s * 0.5, y - s * 0.2, s * 0.5, 0, Math.PI * 2);
  ctx.arc(x + s, y, s * 0.55, 0, Math.PI * 2);
  ctx.arc(x + s * 0.5, y + s * 0.15, s * 0.45, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  // Dirt
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);

  // Grass
  const grassGrad = ctx.createLinearGradient(0, H - GROUND_H, 0, H - GROUND_H + 18);
  grassGrad.addColorStop(0, '#4CAF50');
  grassGrad.addColorStop(1, '#388E3C');
  ctx.fillStyle = grassGrad;
  ctx.fillRect(0, H - GROUND_H, W, 18);

  // Grass tufts
  ctx.strokeStyle = '#66BB6A';
  ctx.lineWidth = 2;
  for (let i = 0; i < W; i += 12) {
    ctx.beginPath();
    ctx.moveTo(i, H - GROUND_H);
    ctx.lineTo(i + 3, H - GROUND_H - 6);
    ctx.stroke();
  }
}

function drawSlingshot() {
  // Back arm
  ctx.fillStyle = '#5D3A1A';
  ctx.fillRect(SLING_X - 4, SLING_Y - 50, 8, 60);

  // Fork left
  ctx.fillStyle = '#6D4C2A';
  ctx.beginPath();
  ctx.moveTo(SLING_X - 4, SLING_Y - 50);
  ctx.lineTo(SLING_X - 18, SLING_Y - 70);
  ctx.lineTo(SLING_X - 10, SLING_Y - 70);
  ctx.lineTo(SLING_X - 2, SLING_Y - 50);
  ctx.fill();

  // Fork right
  ctx.beginPath();
  ctx.moveTo(SLING_X + 4, SLING_Y - 50);
  ctx.lineTo(SLING_X + 18, SLING_Y - 70);
  ctx.lineTo(SLING_X + 10, SLING_Y - 70);
  ctx.lineTo(SLING_X + 2, SLING_Y - 50);
  ctx.fill();

  // Rubber band (back)
  if (currentBird && dragging) {
    ctx.strokeStyle = '#3E2723';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(SLING_X - 14, SLING_Y - 68);
    ctx.lineTo(currentBird.position.x, currentBird.position.y);
    ctx.stroke();
  }
}

function drawSlingshotFront() {
  // Rubber band (front) - drawn after bird
  if (currentBird && dragging) {
    ctx.strokeStyle = '#4E342E';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(currentBird.position.x, currentBird.position.y);
    ctx.lineTo(SLING_X + 14, SLING_Y - 68);
    ctx.stroke();
  }
}

function drawBird(bird) {
  const x = bird.position.x;
  const y = bird.position.y;
  const r = BIRD_RADIUS;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(bird.angle);

  // Body
  const bodyGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, r);
  bodyGrad.addColorStop(0, '#FF5252');
  bodyGrad.addColorStop(1, '#C62828');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#FFCDD2';
  ctx.beginPath();
  ctx.ellipse(0, 5, r * 0.5, r * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (white)
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.ellipse(-5, -4, 6, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(5, -4, 6, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-3, -3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, -3, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Eyebrows (angry!)
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-10, -11);
  ctx.lineTo(-2, -8);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(10, -11);
  ctx.lineTo(2, -8);
  ctx.stroke();

  // Beak
  ctx.fillStyle = '#FF8F00';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-5, 4);
  ctx.lineTo(0, 8);
  ctx.lineTo(5, 4);
  ctx.closePath();
  ctx.fill();

  // Tail feathers
  ctx.fillStyle = '#B71C1C';
  ctx.beginPath();
  ctx.moveTo(-r + 2, -2);
  ctx.lineTo(-r - 10, -10);
  ctx.lineTo(-r - 6, 0);
  ctx.lineTo(-r - 10, 8);
  ctx.lineTo(-r + 2, 4);
  ctx.closePath();
  ctx.fill();

  // Head tuft
  ctx.fillStyle = '#D32F2F';
  ctx.beginPath();
  ctx.moveTo(-2, -r + 2);
  ctx.lineTo(-4, -r - 8);
  ctx.lineTo(0, -r - 4);
  ctx.lineTo(4, -r - 10);
  ctx.lineTo(2, -r + 2);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawPig(pig) {
  if (!pig.alive) return;
  const x = pig.position.x;
  const y = pig.position.y;
  const r = 20;

  ctx.save();
  ctx.translate(x, y);

  // Body
  const pigGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, r);
  pigGrad.addColorStop(0, '#81C784');
  pigGrad.addColorStop(1, '#388E3C');
  ctx.fillStyle = pigGrad;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  // Outline
  ctx.strokeStyle = '#2E7D32';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Ears
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath();
  ctx.ellipse(-14, -14, 7, 5, -0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(14, -14, 7, 5, 0.5, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(-7, -4, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, -4, 6, 0, Math.PI * 2);
  ctx.fill();

  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-6, -3, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(8, -3, 3, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = '#66BB6A';
  ctx.beginPath();
  ctx.ellipse(0, 6, 10, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#388E3C';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Nostrils
  ctx.fillStyle = '#2E7D32';
  ctx.beginPath();
  ctx.ellipse(-4, 6, 2.5, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(4, 6, 2.5, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Damage indicator
  if (pig.hp < 2) {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    // Dizzy eyes
    ctx.beginPath();
    ctx.moveTo(-9, -6); ctx.lineTo(-3, -1);
    ctx.moveTo(-3, -6); ctx.lineTo(-9, -1);
    ctx.stroke();
  }

  ctx.restore();
}

function drawBlock(block) {
  const x = block.position.x;
  const y = block.position.y;
  const w = block.blockW;
  const h = block.blockH;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(block.angle);

  if (block.blockType === 'stone') {
    const grad = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
    grad.addColorStop(0, '#9E9E9E');
    grad.addColorStop(0.5, '#BDBDBD');
    grad.addColorStop(1, '#757575');
    ctx.fillStyle = grad;
    ctx.fillRect(-w / 2, -h / 2, w, h);

    ctx.strokeStyle = '#616161';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-w / 2, -h / 2, w, h);

    // Cracks for damage
    if (block.hp < block.maxHp) {
      ctx.strokeStyle = '#424242';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-w * 0.2, -h * 0.3);
      ctx.lineTo(w * 0.1, h * 0.2);
      ctx.lineTo(w * 0.3, 0);
      ctx.stroke();
    }
  } else {
    // Wood
    const grad = ctx.createLinearGradient(-w/2, 0, w/2, 0);
    grad.addColorStop(0, '#A1887F');
    grad.addColorStop(0.3, '#D7CCC8');
    grad.addColorStop(0.6, '#BCAAA4');
    grad.addColorStop(1, '#8D6E63');
    ctx.fillStyle = grad;
    ctx.fillRect(-w / 2, -h / 2, w, h);

    ctx.strokeStyle = '#5D4037';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-w / 2, -h / 2, w, h);

    // Wood grain
    ctx.strokeStyle = 'rgba(93,64,55,0.3)';
    ctx.lineWidth = 0.5;
    for (let i = -w / 2 + 5; i < w / 2; i += 8) {
      ctx.beginPath();
      ctx.moveTo(i, -h / 2);
      ctx.lineTo(i + 2, h / 2);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawTrajectory() {
  if (!dragging || trajectoryPoints.length === 0) return;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < trajectoryPoints.length; i += 2) {
    const p = trajectoryPoints[i];
    const size = Math.max(1, 4 - i * 0.1);
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBirdQueue() {
  const remaining = TOTAL_BIRDS - birdsUsed;
  for (let i = 0; i < remaining - (currentBird ? 1 : 0); i++) {
    const qx = 60 - i * 30;
    const qy = H - GROUND_H - BIRD_RADIUS - 2;
    const r = BIRD_RADIUS * 0.7;

    // Mini bird
    ctx.fillStyle = '#E53935';
    ctx.beginPath();
    ctx.arc(qx, qy, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#FFCDD2';
    ctx.beginPath();
    ctx.ellipse(qx, qy + 3, r * 0.45, r * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(qx - 3, qy - 2, 3, 0, Math.PI * 2);
    ctx.arc(qx + 3, qy - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(qx - 2, qy - 1, 1.5, 0, Math.PI * 2);
    ctx.arc(qx + 4, qy - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─── Main Loop ──────────────────────────────────────────────
function gameLoop() {
  Engine.update(engine, 1000 / 60);
  updateParticles();

  // Bird settling logic
  if (launched && settling && currentBird) {
    settleTimer++;
    const v = currentBird.velocity;
    const speed = Math.sqrt(v.x * v.x + v.y * v.y);
    const offScreen = currentBird.position.x > W + 50 ||
                      currentBird.position.y > H + 50 ||
                      currentBird.position.x < -50;

    if (speed < 0.3 && settleTimer > 90 || settleTimer > 300 || offScreen) {
      // Remove old bird
      Composite.remove(engine.world, currentBird);
      currentBird = null;
      settling = false;
      launched = false;

      if (!gameOver) {
        checkLose();
        if (!gameOver) {
          loadBird();
        }
      }
    }
  }

  // Render
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawGround();
  drawSlingshot();

  // Draw blocks
  for (const block of blocks) drawBlock(block);

  // Draw pigs
  for (const pig of pigs) drawPig(pig);

  // Draw trajectory
  drawTrajectory();

  // Draw current bird
  if (currentBird) drawBird(currentBird);

  drawSlingshotFront();
  drawBirdQueue();
  drawParticles();

  requestAnimationFrame(gameLoop);
}

// ─── Reset ──────────────────────────────────────────────────
function resetGame() {
  // Clear world
  if (engine) {
    Composite.clear(engine.world, false);
    Engine.clear(engine);
  }

  birds = [];
  pigs = [];
  blocks = [];
  particles = [];
  trajectoryPoints = [];
  currentBird = null;
  score = 0;
  birdsUsed = 0;
  gameOver = false;
  launched = false;
  settling = false;
  dragging = false;

  document.getElementById('status-msg').textContent = '';

  initEngine();
  setupCollisions();
  buildFortress();
  loadBird();
  updateUI();
}

// ─── Init ───────────────────────────────────────────────────
resetGame();
gameLoop();
</script>
