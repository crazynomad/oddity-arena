```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angry Birds Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #444;
            border-radius: 8px;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            cursor: crosshair;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .score-box {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: #fff;
        }
        button {
            pointer-events: auto;
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px #c0392b;
            transition: transform 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 #c0392b;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 0 #000;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-layer">
            <div class="score-box">Score: <span id="score">0</span></div>
            <button id="resetBtn">Reset Level</button>
        </div>
        <div id="message">LEVEL CLEARED!</div>
    </div>

<script>
    // --- Configuration ---
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 600;
    const GRAVITY = 0.5;
    const GROUND_Y = 550;
    const SLING_X = 150;
    const SLING_Y = 400;
    const MAX_DRAG = 100;
    const LAUNCH_FORCE = 0.15;

    // --- State ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('message');
    const resetBtn = document.getElementById('resetBtn');

    let score = 0;
    let isDragging = false;
    let isFlying = false;
    let mouse = { x: 0, y: 0 };
    let particles = [];
    
    // --- Entities ---
    let bird = {
        x: SLING_X,
        y: SLING_Y,
        r: 15,
        vx: 0,
        vy: 0,
        rotation: 0
    };

    let blocks = [];
    let pigs = [];

    // --- Initialization ---
    function initLevel() {
        score = 0;
        scoreEl.innerText = score;
        msgEl.style.display = 'none';
        particles = [];
        resetBird();
        
        // Build Stack
        blocks = [];
        pigs = [];
        
        const startX = 550;
        const bottomY = GROUND_Y;
        const w = 40;
        const h = 40;

        // Row 1
        createBlock(startX, bottomY - h, 'wood');
        createBlock(startX + w*3, bottomY - h, 'wood');
        createPig(startX + w*1.5, bottomY - h - 15);
        
        // Row 2
        createBlock(startX + w, bottomY - h*2, 'wood');
        createBlock(startX + w*2, bottomY - h*2, 'wood');
        
        // Roof
        createBlock(startX + w*1.5, bottomY - h*3, 'wood');
        
        // Side structure
        createBlock(startX + 200, bottomY - h, 'stone');
        createPig(startX + 200, bottomY - h - 15);
    }

    function resetBird() {
        bird.x = SLING_X;
        bird.y = SLING_Y;
        bird.vx = 0;
        bird.vy = 0;
        bird.rotation = 0;
        isDragging = false;
        isFlying = false;
    }

    function createBlock(x, y, type) {
        blocks.push({
            x: x, y: y, w: 40, h: 40, 
            type: type, 
            hp: type === 'stone' ? 3 : 1,
            color: type === 'stone' ? '#7f8c8d' : '#d35400'
        });
    }

    function createPig(x, y) {
        pigs.push({
            x: x, y: y, r: 15,
            hp: 1,
            color: '#2ecc71'
        });
    }

    function createParticles(x, y, color) {
        for(let i=0; i<10; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1.0,
                color: color
            });
        }
    }

    // --- Input Handling ---
    function getMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: evt.clientX - rect.left,
            y: evt.clientY - rect.top
        };
    }

    canvas.addEventListener('mousedown', (e) => {
        if (isFlying) return;
        const pos = getMousePos(e);
        const dist = Math.hypot(pos.x - bird.x, pos.y - bird.y);
        if (dist < 40) {
            isDragging = true;
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        mouse = getMousePos(e);
        
        let dx = mouse.x - SLING_X;
        let dy = mouse.y - SLING_Y;
        let dist = Math.hypot(dx, dy);
        
        if (dist > MAX_DRAG) {
            const angle = Math.atan2(dy, dx);
            dx = Math.cos(angle) * MAX_DRAG;
            dy = Math.sin(angle) * MAX_DRAG;
        }
        
        bird.x = SLING_X + dx;
        bird.y = SLING_Y + dy;
    });

    canvas.addEventListener('mouseup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        isFlying = true;
        
        let dx = SLING_X - bird.x;
        let dy = SLING_Y - bird.y;
        
        bird.vx = dx * LAUNCH_FORCE;
        bird.vy = dy * LAUNCH_FORCE;
    });

    resetBtn.addEventListener('click', initLevel);

    // --- Physics & Update ---
    function update() {
        if (isFlying) {
            // Gravity
            bird.vy += GRAVITY;
            
            // Movement
            bird.x += bird.vx;
            bird.y += bird.vy;
            
            // Rotation based on velocity
            bird.rotation = Math.atan2(bird.vy, bird.vx);

            // Ground Collision
            if (bird.y + bird.r > GROUND_Y) {
                bird.y = GROUND_Y - bird.r;
                bird.vy *= -0.5; // Bounce with dampening
                bird.vx *= 0.8; // Friction
                
                // Stop if slow
                if (Math.abs(bird.vx) < 0.1 && Math.abs(bird.vy) < 0.5) {
                    setTimeout(resetBird, 1000);
                }
            }
            
            // Wall Collision
            if (bird.x > CANVAS_WIDTH || bird.x < 0) {
                setTimeout(resetBird, 500);
            }

            // Block Collision
            blocks.forEach((b, index) => {
                if (checkCircleRect(bird, b)) {
                    resolveCollision(bird, b);
                    
                    // Damage logic
                    const speed = Math.hypot(bird.vx, bird.vy);
                    if (speed > 5) {
                        b.hp--;
                        if (b.hp <= 0) {
                            createParticles(b.x + b.w/2, b.y + b.h/2, b.color);
                            blocks.splice(index, 1);
                            score += 50;
                            scoreEl.innerText = score;
                        } else {
                            // Knockback
                            b.x += bird.vx * 0.2;
                            b.y += bird.vy * 0.2;
                        }
                    }
                }
            });

            // Pig Collision
            pigs.forEach((p, index) => {
                const dx = bird.x - p.x;
                const dy = bird.y - p.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < bird.r + p.r) {
                    const speed = Math.hypot(bird.vx, bird.vy);
                    if (speed > 3) {
                        createParticles(p.x, p.y, p.color);
                        pigs.splice(index, 1);
                        score += 100;
                        scoreEl.innerText = score;
                        
                        // Simple bounce
                        bird.vx *= 0.7;
                        bird.vy *= 0.7;
                    }
                }
            });
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += GRAVITY;
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        }
        
        // Check Win
        if (pigs.length === 0 && blocks.length === 0) {
            msgEl.style.display = 'block';
        }
    }

    // AABB vs Circle Collision Check
    function checkCircleRect(circle, rect) {
        let testX = circle.x;
        let testY = circle.y;
        
        if (circle.x < rect.x) testX = rect.x;
        else if (circle.x > rect.x + rect.w) testX = rect.x + rect.w;
        
        if (circle.y < rect.y) testY = rect.y;
        else if (circle.y > rect.y + rect.h) testY = rect.y + rect.h;
        
        let distX = circle.x - testX;
        let distY = circle.y - testY;
        let distance = Math.sqrt(distX*distX + distY*distY);
        
        return distance <= circle.r;
    }

    function resolveCollision(bird, rect) {
        // Very basic reflection logic
        // Determine which side was hit
        let bLeft = rect.x;
        let bRight = rect.x + rect.w;
        let bTop = rect.y;
        let bBottom = rect.y + rect.h;

        // Find closest point on rect
        let closestX = Math.max(bLeft, Math.min(bird.x, bRight));
        let closestY = Math.max(bTop, Math.min(bird.y, bBottom));

        let dx = bird.x - closestX;
        let dy = bird.y - closestY;

        // Normalize
        let len = Math.sqrt(dx*dx + dy*dy);
        if (len === 0) return; // prevent div by 0
        let nx = dx / len;
        let ny = dy / len;

        // Reflect
        // v' = v - 2 * (v . n) * n
        let dot = bird.vx * nx + bird.vy * ny;
        
        // Push out to prevent sticking
        bird.x += nx * (bird.r - len);
        bird.y += ny * (bird.r - len);

        bird.vx = (bird.vx - 2 * dot * nx) * 0.6; // 0.6 is restitution
        bird.vy = (bird.vy - 2 * dot * ny) * 0.6;
    }

    // --- Rendering ---
    function draw() {
        // Clear
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Ground
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(0, GROUND_Y, CANVAS_WIDTH, CANVAS_HEIGHT - GROUND_Y);
        
        // Slingshot (Back)
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#5d4037';
        ctx.beginPath();
        ctx.moveTo(SLING_X, SLING_Y + 50);
        ctx.lineTo(SLING_X, SLING_Y - 40);
        ctx.stroke();

        // Elastic Band (Back)
        if (isDragging || !isFlying) {
            ctx.beginPath();
            ctx.strokeStyle = '#3e2723';
            ctx.lineWidth = 3;
            ctx.moveTo(SLING_X - 10, SLING_Y - 40);
            ctx.lineTo(bird.x, bird.y);
            ctx.stroke();
        }

        // Blocks
        blocks.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.strokeRect(b.x, b.y, b.w, b.h);
            // Wood detail
            if(b.type === 'wood') {
                ctx.beginPath();
                ctx.moveTo(b.x, b.y); ctx.lineTo(b.x+b.w, b.y+b.h);
                ctx.moveTo(b.x+b.w, b.y); ctx.lineTo(b.x, b.y+b.h);
                ctx.stroke();
            }
        });

        // Pigs
        pigs.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
            // Snout
            ctx.fillStyle = '#27ae60';
            ctx.beginPath();
            ctx.ellipse(p.x, p.y + 2, 6, 4, 0, 0, Math.PI*2);
            ctx.fill();
            // Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(p.x-4, p.y-4, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(p.x+4, p.y-4, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(p.x-4, p.y-4, 1.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(p.x+4, p.y-4, 1.5, 0, Math.PI*2); ctx.fill();
        });

        // Bird
        ctx.save();
        ctx.translate(bird.x, bird.y);
        if(isFlying) ctx.rotate(bird.rotation);
        
        // Body
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.arc(0, 0, bird.r, 0, Math.PI*2);
        ctx.fill();
        
        // Eye
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(5, -5, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath(); ctx.arc(7, -5, 2, 0, Math.PI*2); ctx.fill();
        
        // Beak
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.moveTo(8, 2);
        ctx.lineTo(18, 5);
        ctx.lineTo(8, 8);
        ctx.fill();

        ctx.restore();

        // Slingshot (Front Fork)
        ctx.beginPath();
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 4;
        ctx.moveTo(SLING_X, SLING_Y + 50);
        ctx.lineTo(SLING_X, SLING_Y - 40);
        ctx.lineTo(SLING_X + 10, SLING_Y - 50);
        ctx.stroke();
        
        // Elastic Band (Front)
        if (isDragging || !isFlying) {
            ctx.beginPath();
            ctx.strokeStyle = '#3e2723';
            ctx.lineWidth = 3;
            ctx.moveTo(SLING_X + 10, SLING_Y - 40);
            ctx.lineTo(bird.x, bird.y);
            ctx.stroke();
        }
        
        // Particles
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 5, 5);
        });
        ctx.globalAlpha = 1.0;

        requestAnimationFrame(loop);
    }

    function loop() {
        update();
        draw();
    }

    // Start
    initLevel();
    loop();

</script>
</body>
</html>
