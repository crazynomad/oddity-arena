<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pelican on a Bicycle</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #f3fbff;
      display: grid;
      place-items: center;
      font-family: sans-serif;
    }
    svg {
      width: min(92vw, 900px);
      height: auto;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 900 520" role="img" aria-label="A pelican riding a bicycle" xmlns="http://www.w3.org/2000/svg">
    <rect width="900" height="520" fill="#e9f8ff" />

    <!-- ground -->
    <line x1="40" y1="430" x2="860" y2="430" stroke="#a8d8a0" stroke-width="8" stroke-linecap="round" />

    <!-- wheels -->
    <circle cx="290" cy="380" r="85" fill="#fff" stroke="#2f3a45" stroke-width="10" />
    <circle cx="620" cy="380" r="85" fill="#fff" stroke="#2f3a45" stroke-width="10" />
    <circle cx="290" cy="380" r="8" fill="#2f3a45" />
    <circle cx="620" cy="380" r="8" fill="#2f3a45" />

    <!-- spokes -->
    <g stroke="#73808c" stroke-width="3">
      <line x1="290" y1="295" x2="290" y2="465" />
      <line x1="205" y1="380" x2="375" y2="380" />
      <line x1="230" y1="320" x2="350" y2="440" />
      <line x1="230" y1="440" x2="350" y2="320" />

      <line x1="620" y1="295" x2="620" y2="465" />
      <line x1="535" y1="380" x2="705" y2="380" />
      <line x1="560" y1="320" x2="680" y2="440" />
      <line x1="560" y1="440" x2="680" y2="320" />
    </g>

    <!-- bike frame -->
    <g fill="none" stroke="#1f2b38" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <line x1="290" y1="380" x2="430" y2="300" />
      <line x1="430" y1="300" x2="520" y2="380" />
      <line x1="520" y1="380" x2="290" y2="380" />
      <line x1="430" y1="300" x2="620" y2="380" />
      <line x1="430" y1="300" x2="445" y2="250" />
      <line x1="620" y1="380" x2="650" y2="290" />
      <line x1="650" y1="290" x2="700" y2="285" />
      <line x1="445" y1="250" x2="410" y2="250" />
    </g>

    <!-- pedals -->
    <g stroke="#1f2b38" stroke-width="8" stroke-linecap="round">
      <circle cx="520" cy="380" r="20" fill="none" />
      <line x1="520" y1="380" x2="555" y2="365" />
      <line x1="520" y1="380" x2="485" y2="395" />
      <line x1="555" y1="365" x2="575" y2="365" />
      <line x1="485" y1="395" x2="465" y2="395" />
    </g>

    <!-- pelican seated on bike -->
    <g>
      <!-- body -->
      <ellipse cx="430" cy="235" rx="95" ry="70" fill="#f4f1e8" stroke="#5a6470" stroke-width="5" />

      <!-- wing -->
      <path d="M395 225 C360 230, 350 275, 390 295 C440 300, 465 260, 445 225 Z"
            fill="#d9d3c8" stroke="#5a6470" stroke-width="4" />

      <!-- neck -->
      <path d="M490 225 C525 210, 548 188, 560 170 C567 158, 566 145, 553 142 C540 140, 528 148, 520 162 C508 182, 495 198, 468 212 Z"
            fill="#f4f1e8" stroke="#5a6470" stroke-width="5" />

      <!-- head -->
      <circle cx="560" cy="142" r="26" fill="#f4f1e8" stroke="#5a6470" stroke-width="5" />
      <circle cx="568" cy="136" r="4" fill="#1f2b38" />

      <!-- beak top -->
      <path d="M570 145 C620 138, 670 147, 705 166 C675 176, 627 178, 582 169 Z"
            fill="#f1b562" stroke="#84512a" stroke-width="4" />

      <!-- beak pouch -->
      <path d="M582 169 C625 188, 672 196, 718 186 C690 224, 620 236, 566 207 Z"
            fill="#f7c486" stroke="#84512a" stroke-width="4" />

      <!-- seat contact -->
      <path d="M392 276 C408 270, 426 268, 444 270" fill="none" stroke="#5a6470" stroke-width="4" />

      <!-- leg to pedal -->
      <path d="M430 290 C470 315, 495 340, 520 380" fill="none" stroke="#6d7885" stroke-width="8" stroke-linecap="round" />
      <path d="M448 290 C480 310, 500 330, 555 365" fill="none" stroke="#6d7885" stroke-width="8" stroke-linecap="round" />
    </g>

    <!-- handlebar grip under beak -->
    <circle cx="700" cy="285" r="7" fill="#1f2b38" />
  </svg>
</body>
</html>
