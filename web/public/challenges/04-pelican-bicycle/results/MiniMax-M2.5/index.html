<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pelican on a Bicycle – MiniMax-M2.5</title>
<style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#87CEEB;}</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <!-- Ground -->
  <rect x="0" y="400" width="500" height="50" fill="#8B7355"/>
  <rect x="0" y="395" width="500" height="8" fill="#6B8E23"/>

  <!-- BICYCLE -->
  <!-- Back wheel -->
  <circle cx="160" cy="360" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="160" cy="360" r="3" fill="#666"/>
  <!-- Spokes back -->
  <g stroke="#999" stroke-width="1">
    <line x1="160" y1="315" x2="160" y2="405"/>
    <line x1="115" y1="360" x2="205" y2="360"/>
    <line x1="128" y1="328" x2="192" y2="392"/>
    <line x1="192" y1="328" x2="128" y2="392"/>
  </g>
  <!-- Front wheel -->
  <circle cx="340" cy="360" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="340" cy="360" r="3" fill="#666"/>
  <!-- Spokes front -->
  <g stroke="#999" stroke-width="1">
    <line x1="340" y1="315" x2="340" y2="405"/>
    <line x1="295" y1="360" x2="385" y2="360"/>
    <line x1="308" y1="328" x2="372" y2="392"/>
    <line x1="372" y1="328" x2="308" y2="392"/>
  </g>
  <!-- Frame -->
  <g stroke="#E02020" stroke-width="5" fill="none" stroke-linecap="round">
    <!-- seat tube -->
    <line x1="220" y1="280" x2="200" y2="360"/>
    <!-- down tube -->
    <line x1="220" y1="280" x2="270" y2="350"/>
    <!-- chain stay -->
    <line x1="200" y1="360" x2="160" y2="360"/>
    <!-- seat stay -->
    <line x1="220" y1="280" x2="160" y2="360"/>
    <!-- top tube -->
    <line x1="220" y1="280" x2="300" y2="290"/>
    <!-- head tube -->
    <line x1="300" y1="290" x2="270" y2="350"/>
    <!-- fork -->
    <line x1="300" y1="290" x2="340" y2="360"/>
  </g>
  <!-- Seat -->
  <ellipse cx="220" cy="274" rx="18" ry="6" fill="#333"/>
  <!-- Handlebars -->
  <line x1="295" y1="275" x2="310" y2="295" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <path d="M285 270 Q295 260 310 268" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Pedal crank -->
  <circle cx="200" cy="360" r="4" fill="#666"/>
  <line x1="200" y1="345" x2="200" y2="375" stroke="#555" stroke-width="3"/>
  <rect x="190" y="341" width="20" height="6" rx="2" fill="#555"/>
  <rect x="190" y="373" width="20" height="6" rx="2" fill="#555"/>
  <!-- Chain -->
  <ellipse cx="200" cy="360" rx="22" ry="12" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- PELICAN -->
  <!-- Body -->
  <ellipse cx="230" cy="240" rx="40" ry="28" fill="#F5F0E0" stroke="#DDD5C0" stroke-width="1.5" transform="rotate(-10,230,240)"/>
  <!-- Wing -->
  <ellipse cx="220" cy="235" rx="30" ry="18" fill="#E8E0CC" transform="rotate(-15,220,235)"/>
  <!-- Wing detail -->
  <path d="M195 225 Q210 215 240 225" stroke="#CCC0A8" stroke-width="1.5" fill="none"/>
  <!-- Tail feathers -->
  <path d="M192 250 L170 260 L175 250 L165 255 L175 245" fill="#E0D8C0" stroke="#CCC0A8" stroke-width="1"/>
  
  <!-- Neck -->
  <path d="M255 230 Q275 200 270 160 Q268 140 260 130" stroke="#F5F0E0" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M255 230 Q275 200 270 160 Q268 140 260 130" stroke="#E8E0CC" stroke-width="14" fill="none" stroke-linecap="round"/>
  
  <!-- Head -->
  <ellipse cx="258" cy="122" rx="18" ry="16" fill="#F5F0E0"/>
  <!-- Eye -->
  <circle cx="264" cy="117" r="4" fill="#222"/>
  <circle cx="265" cy="116" r="1.5" fill="white"/>
  <!-- Beak upper -->
  <path d="M275 120 L320 125 L275 130" fill="#F4A830" stroke="#D48820" stroke-width="1"/>
  <!-- Beak pouch (the iconic part!) -->
  <path d="M275 130 Q310 135 320 125 Q310 150 285 148 Q275 145 275 130Z" fill="#F4C050" stroke="#D48820" stroke-width="1" opacity="0.85"/>
  <!-- Beak line -->
  <line x1="275" y1="125" x2="318" y2="125" stroke="#D48820" stroke-width="1.5"/>
  <!-- Head tuft -->
  <path d="M245 110 Q250 95 255 108" stroke="#DDD5C0" stroke-width="2" fill="none"/>
  
  <!-- Legs/feet on pedals -->
  <!-- Left leg (on top pedal) -->
  <path d="M240 260 Q230 300 200 344" stroke="#F4A830" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Right leg (on bottom pedal) -->
  <path d="M225 262 Q215 320 200 376" stroke="#F4A830" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M195 342 L185 338 L200 344 L188 344Z" fill="#F4A830"/>
  <path d="M195 374 L185 370 L200 376 L188 376Z" fill="#F4A830"/>

  <!-- Wing holding handlebar -->
  <path d="M260 235 Q280 250 292 272" stroke="#E0D8C0" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="292" cy="272" r="4" fill="#E0D8C0"/>

  <!-- Little hat for charm -->
  <ellipse cx="255" cy="108" rx="14" ry="4" fill="#E02020"/>
  <rect x="247" y="92" width="16" height="16" rx="2" fill="#E02020"/>
  <rect x="243" y="106" width="24" height="4" rx="2" fill="#C01818"/>

  <!-- Sun -->
  <circle cx="430" cy="60" r="30" fill="#FFE040" opacity="0.9"/>
  <g stroke="#FFE040" stroke-width="3" opacity="0.6">
    <line x1="430" y1="20" x2="430" y2="8"/>
    <line x1="460" y1="35" x2="470" y2="25"/>
    <line x1="470" y1="60" x2="482" y2="60"/>
    <line x1="460" y1="85" x2="470" y2="95"/>
    <line x1="400" y1="35" x2="390" y2="25"/>
    <line x1="390" y1="60" x2="378" y2="60"/>
    <line x1="400" y1="85" x2="390" y2="95"/>
  </g>

  <!-- Clouds -->
  <g fill="white" opacity="0.7">
    <circle cx="80" cy="60" r="20"/><circle cx="100" cy="50" r="25"/><circle cx="125" cy="58" r="18"/>
    <circle cx="300" cy="40" r="15"/><circle cx="318" cy="32" r="20"/><circle cx="338" cy="38" r="14"/>
  </g>
</svg>
</body>
</html>
