<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梯云纵 - Ti Yun Zong</title>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f4f4f0; cursor: pointer; user-select: none; -webkit-user-select: none; }
  canvas { display: block; }
  #instruction { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #333; font-family: 'Kaiti', 'STKaiti', serif; font-size: 20px; letter-spacing: 2px; pointer-events: none; opacity: 0; transition: opacity 1s; text-shadow: 0 0 5px #f4f4f0, 0 0 10px #f4f4f0; }
  #seal { position: absolute; top: 30px; right: 30px; width: 40px; height: 90px; border: 2px solid #a33; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #a33; font-family: 'Kaiti', 'STKaiti', serif; font-size: 20px; font-weight: bold; padding: 5px 0; background-color: rgba(244, 244, 240, 0.5); opacity: 0.8; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="seal">梯<br>云<br>纵</div>
<div id="instruction">点击重现 - Click to Replay</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const instruction = document.getElementById('instruction');

let width, height;
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function random(min, max) { return Math.random() * (max - min) + min; }

// --- Parallax Background Elements ---
class Mountain {
    constructor(x, y, w, h, speed, color) {
        this.x = x; this.y = y; this.w = w; this.h = h; this.speed = speed; this.color = color;
        this.points = [];
        let step = w / 20;
        let ty = y;
        for(let i=0; i<=20; i++) {
            this.points.push({x: x + i * step, y: ty + random(-h/3, h/3)});
        }
    }
    draw(ctx, cameraY) {
        let drawY = cameraY * this.speed;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y + drawY);
        for(let i=1; i<this.points.length; i++) {
            ctx.lineTo(this.points[i].x, this.points[i].y + drawY);
        }
        ctx.lineTo(this.x + this.w, height * 2 + drawY);
        ctx.lineTo(this.x, height * 2 + drawY);
        ctx.closePath();
        ctx.fill();
    }
}

class Cloud {
    constructor(x, y, s, speed, alpha) {
        this.x = x; this.y = y; this.s = s; this.speed = speed; this.alpha = alpha;
        this.vx = random(0.2, 0.5);
    }
    draw(ctx, cameraY) {
        this.x += this.vx;
        if (this.x > width + 200) this.x = -200;
        let drawY = this.y + cameraY * this.speed;
        
        ctx.save();
        ctx.translate(this.x, drawY);
        ctx.scale(this.s, this.s);
        ctx.fillStyle = `rgba(180, 180, 180, ${this.alpha})`;
        ctx.beginPath();
        ctx.arc(0, 0, 50, 0, Math.PI*2);
        ctx.arc(40, -20, 40, 0, Math.PI*2);
        ctx.arc(80, 10, 60, 0, Math.PI*2);
        ctx.arc(40, 20, 50, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

class Bamboo {
    constructor(x, y, h, speed, thickness) {
        this.x = x; this.y = y; this.h = h; this.speed = speed; this.thickness = thickness;
        this.swayOffset = random(0, Math.PI * 2);
    }
    draw(ctx, cameraY, time) {
        let drawY = this.y + cameraY * this.speed;
        let sway = Math.sin(time * 0.001 + this.swayOffset) * 15;
        
        ctx.strokeStyle = 'rgba(40, 45, 35, 0.85)';
        ctx.lineWidth = this.thickness;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(this.x, drawY);
        ctx.quadraticCurveTo(this.x + sway, drawY - this.h/2, this.x + sway*1.5, drawY - this.h);
        ctx.stroke();

        ctx.fillStyle = 'rgba(30, 35, 25, 0.8)';
        let segs = Math.floor(this.h / 50);
        for(let i=1; i<=segs; i++) {
            let t = i / segs;
            let bx = this.x * Math.pow(1-t, 2) + (this.x + sway) * 2 * (1-t) * t + (this.x + sway*1.5) * Math.pow(t, 2);
            let by = drawY * Math.pow(1-t, 2) + (drawY - this.h/2) * 2 * (1-t) * t + (drawY - this.h) * Math.pow(t, 2);
            
            // Draw joint
            ctx.fillRect(bx - this.thickness, by - 2, this.thickness * 2, 4);
            
            // Leaves
            if (i > segs/3) {
                ctx.beginPath();
                ctx.ellipse(bx + 20, by - 10, 25, 5, Math.PI/5, 0, Math.PI*2);
                ctx.ellipse(bx - 20, by + 5, 20, 4, -Math.PI/4, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }
}

// --- Particles & FX ---
class InkSplash {
    constructor(x, y, vx, vy, life, size) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy; 
        this.life = life; this.maxLife = life; this.size = size;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.2; // slight gravity for ink
        this.life--;
        this.size *= 0.94;
    }
    draw(ctx, cameraY) {
        let alpha = this.life / this.maxLife;
        ctx.fillStyle = `rgba(20, 20, 20, ${alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y + cameraY, this.size, 0, Math.PI*2);
        ctx.fill();
    }
}

class Shockwave {
    constructor(x, y) {
        this.x = x; this.y = y; this.r = 0; this.life = 25; this.maxLife = 25;
    }
    update() {
        this.r += 8;
        this.life--;
    }
    draw(ctx, cameraY) {
        let alpha = this.life / this.maxLife;
        ctx.strokeStyle = `rgba(180, 180, 180, ${alpha})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(this.x, this.y + cameraY, this.r * 1.8, this.r * 0.4, 0, 0, Math.PI*2);
        ctx.stroke();
    }
}

class Afterimage {
    constructor(x, y, pose, life) {
        this.x = x; this.y = y; this.pose = pose; 
        this.life = life; this.maxLife = life;
    }
    update() { this.life--; }
    draw(ctx, cameraY) {
        let alpha = (this.life / this.maxLife) * 0.4;
        drawCharacter(ctx, this.x, this.y + cameraY, this.pose, `rgba(40, 40, 40, ${alpha})`);
    }
}

// --- Character Rendering ---
function drawCharacter(ctx, x, y, pose, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Head (Ink dot)
    ctx.beginPath();
    ctx.arc(0, -45, 10, 0, Math.PI*2);
    ctx.fill();
    
    // Hair
    ctx.beginPath();
    ctx.moveTo(-6, -45);
    ctx.quadraticCurveTo(-15 + pose.hairX, -30 + pose.hairY, -30 + pose.hairX*1.5, -15 + pose.hairY*1.5);
    ctx.stroke();

    // Torso sweep
    ctx.beginPath();
    ctx.moveTo(0, -35);
    ctx.quadraticCurveTo(pose.bodyBend, -10, 0, 15);
    ctx.stroke();

    // Flowing Robes
    ctx.beginPath();
    ctx.moveTo(0, -20);
    ctx.quadraticCurveTo(-25 + pose.robeX, 5, -35 + pose.robeX, 30 + pose.robeY);
    ctx.lineTo(5, 15);
    ctx.fill();

    // Arms
    ctx.beginPath();
    ctx.moveTo(0, -25);
    ctx.lineTo(pose.arm1X, pose.arm1Y); 
    ctx.moveTo(0, -25);
    ctx.lineTo(pose.arm2X, pose.arm2Y); 
    ctx.stroke();

    // Legs & Feet (The core of Ti Yun Zong)
    ctx.beginPath();
    ctx.moveTo(0, 15);
    ctx.lineTo(pose.leg1X, pose.leg1Y);
    ctx.lineTo(pose.foot1X, pose.foot1Y);
    ctx.moveTo(0, 15);
    ctx.lineTo(pose.leg2X, pose.leg2Y);
    ctx.lineTo(pose.foot2X, pose.foot2Y);
    ctx.stroke();

    ctx.restore();
}

// --- Game State ---
let mountains = [];
let clouds = [];
let bamboos = [];
let particles = [];
let shockwaves = [];
let afterimages = [];

let charX = 0, charY = 0, charVY = 0;
let cameraY = 0, targetCameraY = 0;
let stepCount = 0;
let state = 'idle'; // ascending, falling, landed
let time = 0;
let pose = { hairX: 0, hairY: 0, bodyBend: 0, robeX: 0, robeY: 0, arm1X: 20, arm1Y: -10, arm2X: -20, arm2Y: -10, leg1X: 10, leg1Y: 35, foot1X: 15, foot1Y: 45, leg2X: -10, leg2Y: 35, foot2X: -15, foot2Y: 45 };

function initScene() {
    mountains = []; clouds = []; bamboos = [];
    particles = []; shockwaves = []; afterimages = [];
    
    // Far to near mountains
    mountains.push(new Mountain(-200, height - 300, width + 400, 200, 0.05, '#dfdfd9'));
    mountains.push(new Mountain(-200, height - 150, width + 400, 150, 0.15, '#c8c8c2'));
    mountains.push(new Mountain(-200, height, width + 400, 100, 0.3, '#b0b0a8'));
    mountains.push(new Mountain(-200, height + 100, width + 400, 100, 0.5, '#85857e'));

    for(let i=0; i<20; i++) {
        clouds.push(new Cloud(random(0, width), random(-height*4, height), random(0.5, 2.5), random(0.1, 0.4), random(0.2, 0.6)));
    }

    // Framing bamboos
    for(let i=0; i<40; i++) {
        let x = random(0, width);
        if(x > width/2 - 120 && x < width/2 + 120) continue; 
        bamboos.push(new Bamboo(x, height + 150, random(500, 1000), random(0.6, 1.2), random(3, 8)));
    }

    charX = width / 2;
    charY = height - 100;
    charVY = 0;
    cameraY = 0;
    targetCameraY = 0;
    stepCount = 0;
    state = 'ascending';
    instruction.style.opacity = 0;
    
    jump();
}

function spawnParticles(x, y, amount) {
    for(let i=0; i<amount; i++) {
        let angle = random(0, Math.PI*2);
        let speed = random(2, 7);
        particles.push(new InkSplash(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed, random(20, 50), random(3, 10)));
    }
}

function jump() {
    if (stepCount >= 9) {
        state = 'falling';
        return;
    }
    
    charVY = -24; // powerful ascent
    stepCount++;
    
    shockwaves.push(new Shockwave(charX, charY + 20));
    spawnParticles(charX, charY + 20, 25);
    
    // Ti Yun Zong Mechanic: Stepping on own foot
    let leftStepsOnRight = stepCount % 2 === 0;
    
    if (leftStepsOnRight) {
        // Right foot acts as horizontal step
        pose.leg1X = 0; pose.leg1Y = 25; pose.foot1X = 15; pose.foot1Y = 25; 
        // Left foot steps down on right foot
        pose.leg2X = -10; pose.leg2Y = 10; pose.foot2X = 0; pose.foot2Y = 25; 
        pose.arm1X = 25; pose.arm1Y = 10;
        pose.arm2X = -25; pose.arm2Y = -35;
        pose.bodyBend = 8;
    } else {
        // Left foot acts as horizontal step
        pose.leg2X = 0; pose.leg2Y = 25; pose.foot2X = -15; pose.foot2Y = 25; 
        // Right foot steps down on left foot
        pose.leg1X = 10; pose.leg1Y = 10; pose.foot1X = 0; pose.foot1Y = 25; 
        pose.arm1X = 25; pose.arm1Y = -35;
        pose.arm2X = -25; pose.arm2Y = 10;
        pose.bodyBend = -8;
    }
    
    pose.hairX = random(-10, 10); pose.hairY = 20;
    pose.robeX = random(-15, 15); pose.robeY = 30;
}

function update() {
    time += 16;
    
    if (state === 'ascending') {
        charVY += 0.85; // Gravity
        charY += charVY;
        
        // Settle pose
        pose.robeY += (0 - pose.robeY) * 0.1;
        pose.hairY += (0 - pose.hairY) * 0.1;
        
        if (charVY > -6) {
            jump();
        }
        
        if (time % 4 === 0) {
            afterimages.push(new Afterimage(charX, charY, JSON.parse(JSON.stringify(pose)), 25));
        }

        targetCameraY = (height/2 + 150) - charY;

    } else if (state === 'falling') {
        charVY += 0.4;
        charY += charVY;
        
        // Freefall pose
        pose.arm1Y = -45; pose.arm2Y = -45; 
        pose.leg1X = 20; pose.leg1Y = 35; pose.foot1X = 25; pose.foot1Y = 45;
        pose.leg2X = -20; pose.leg2Y = 35; pose.foot2X = -25; pose.foot2Y = 45;
        pose.robeY = -30; pose.hairY = -30; 
        pose.bodyBend = 0;

        targetCameraY = (height/2 + 150) - charY;
        
        if (charY > height - 100) {
            charY = height - 100;
            state = 'landed';
            shockwaves.push(new Shockwave(charX, charY + 45));
            spawnParticles(charX, charY + 45, 50);
            instruction.style.opacity = 1;
            
            // Hero Landing pose
            pose.leg1X = 35; pose.leg1Y = 20; pose.foot1X = 45; pose.foot1Y = 45;
            pose.leg2X = -35; pose.leg2Y = 20; pose.foot2X = -45; pose.foot2Y = 45;
            pose.bodyBend = 15;
            pose.arm1X = 40; pose.arm1Y = 30;
            pose.arm2X = -40; pose.arm2Y = 30;
            pose.robeY = 35; pose.hairY = 10;
        }
    }
    
    cameraY += (targetCameraY - cameraY) * 0.08;
    if(cameraY < 0 && state !== 'falling') cameraY = 0; 

    for(let i=particles.length-1; i>=0; i--) {
        particles[i].update();
        if(particles[i].life <= 0) particles.splice(i, 1);
    }
    for(let i=shockwaves.length-1; i>=0; i--) {
        shockwaves[i].update();
        if(shockwaves[i].life <= 0) shockwaves.splice(i, 1);
    }
    for(let i=afterimages.length-1; i>=0; i--) {
        afterimages[i].update();
        if(afterimages[i].life <= 0) afterimages.splice(i, 1);
    }
}

function draw() {
    ctx.fillStyle = '#f4f4f0'; // Ink paper background
    ctx.fillRect(0, 0, width, height);
    
    // Minimalist Moon
    ctx.fillStyle = 'rgba(230, 230, 220, 0.9)';
    ctx.beginPath();
    ctx.arc(width/2, height/2 + cameraY * 0.02 - 300, 100, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f4f4f0';
    ctx.beginPath();
    ctx.arc(width/2 - 25, height/2 + cameraY * 0.02 - 325, 100, 0, Math.PI*2);
    ctx.fill();

    clouds.forEach(c => c.draw(ctx, cameraY));
    mountains.forEach(m => m.draw(ctx, cameraY));
    bamboos.forEach(b => b.draw(ctx, cameraY, time));
    
    afterimages.forEach(a => a.draw(ctx, cameraY));
    shockwaves.forEach(s => s.draw(ctx, cameraY));
    particles.forEach(p => p.draw(ctx, cameraY));
    
    drawCharacter(ctx, charX, charY + cameraY, pose, '#111');
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

canvas.addEventListener('click', () => {
    if (state === 'landed' || state === 'idle') {
        initScene();
    }
});

initScene();
loop();
</script>
</body>
</html>
