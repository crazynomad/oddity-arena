<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Baron's Ascent</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.6); color: white; font-size: 24px;
            cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.5s;
            text-transform: uppercase; letter-spacing: 4px; font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }
        #overlay.visible { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="overlay">Click to Replay</div>

<script>
/**
 * BARON MUNCHAUSEN: THE HAIR PULL
 * Pure Canvas Animation
 */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

let width, height;
let frame = 0;
let state = 'WALK'; // WALK, SINK, PANIC, EUREKA, PULL, RISE, TRIUMPH
let stateTimer = 0;
let replayRequested = false;

// Physics & Positions
const swampLevelBase = 0.6; // % of height
let swampLevel = 0; 
let baronY = 0;
let baronX = 0;
let horseX = 0;
let velocityY = 0;
let pullForce = 0;
let hairTension = 0;

// Particles
let particles = [];

// Config
const GRAVITY = 0.15;
const BUOYANCY = 0.05;
const PULL_STRENGTH = 0.8;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    reset();
}

function reset() {
    state = 'WALK';
    stateTimer = 0;
    frame = 0;
    baronX = width * 0.2;
    horseX = baronX - 120;
    baronY = height * swampLevelBase;
    velocityY = 0;
    swampLevel = height * swampLevelBase;
    particles = [];
    overlay.classList.remove('visible');
    replayRequested = false;
}

class Particle {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'mud', 'sweat', 'sparkle'
        this.life = 1.0;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.size = Math.random() * 4 + 2;
        
        if (type === 'mud') {
            this.vy = -Math.random() * 5 - 2; // Splash up
            this.color = `rgba(60, 40, 20,`;
        } else if (type === 'sweat') {
            this.vy = 2; // Drip down
            this.vx = (Math.random() - 0.5);
            this.color = `rgba(100, 200, 255,`;
        } else if (type === 'sparkle') {
            this.vy = -Math.random() * 2;
            this.color = `rgba(255, 255, 200,`;
        }
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.02;
        if (this.type === 'mud') this.vy += 0.2; // Gravity
    }

    draw(ctx) {
        ctx.fillStyle = this.color + this.life + ')';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function spawnParticles(x, y, type, count) {
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, type));
}

// --- DRAWING HELPERS ---

function drawSwamp(ctx, level) {
    // Sky
    const gradSky = ctx.createLinearGradient(0, 0, 0, height);
    gradSky.addColorStop(0, '#87CEEB');
    gradSky.addColorStop(1, '#E0F7FA');
    ctx.fillStyle = gradSky;
    ctx.fillRect(0, 0, width, height);

    // Swamp Water
    const gradWater = ctx.createLinearGradient(0, level - 50, 0, height);
    gradWater.addColorStop(0, 'rgba(46, 125, 50, 0.8)');
    gradWater.addColorStop(1, '#1B5E20');
    ctx.fillStyle = gradWater;
    ctx.fillRect(0, level, width, height - level);
    
    // Surface line
    ctx.strokeStyle = '#2E7D32';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, level);
    // Wavy line
    for(let i=0; i<=width; i+=20) {
        ctx.lineTo(i, level + Math.sin((i + frame * 2) * 0.05) * 5);
    }
    ctx.stroke();
}

function drawBaron(ctx, x, y, rotation, armAngle, pulling) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);

    // Legs (sinking)
    ctx.fillStyle = '#333';
    ctx.fillRect(-15, 0, 10, 40);
    ctx.fillRect(15, 0, 10, 40);

    // Body (Red Coat)
    ctx.fillStyle = '#D32F2F';
    ctx.beginPath();
    ctx.moveTo(-25, 0);
    ctx.lineTo(25, 0);
    ctx.lineTo(20, 60);
    ctx.lineTo(-20, 60);
    ctx.fill();
    // Gold trim
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Head
    ctx.fillStyle = '#FFCCBC'; // Skin
    ctx.beginPath();
    ctx.arc(0, -15, 20, 0, Math.PI * 2);
    ctx.fill();

    // Wig (The Hair)
    ctx.fillStyle = '#F5F5F5';
    ctx.beginPath();
    ctx.arc(0, -20, 24, Math.PI, 0); // Top
    ctx.lineTo(25, -10);
    ctx.quadraticCurveTo(0, 10, -25, -10);
    ctx.fill();
    
    // Monocle
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(8, -15, 6, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(14, -15);
    ctx.lineTo(25, -10);
    ctx.stroke();

    // Arm & Hand
    ctx.save();
    ctx.translate(25, 10); // Shoulder
    ctx.rotate(armAngle);
    
    // Sleeve
    ctx.fillStyle = '#D32F2F';
    ctx.fillRect(0, -5, 40, 10);
    
    // Hand
    ctx.fillStyle = '#FFCCBC';
    ctx.beginPath();
    ctx.arc(45, 0, 8, 0, Math.PI*2);
    ctx.fill();

    // The Hair Strand (if pulling)
    if (pulling) {
        ctx.strokeStyle = '#F5F5F5';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(45, 0); // Hand
        // Bezier to head top, creating tension curve
        const tensionX = (45 + 0) / 2 + (hairTension * 20); 
        ctx.quadraticCurveTo(tensionX, -60, 0, -45); // To top of wig
        ctx.stroke();
        
        // Hair detail lines
        ctx.lineWidth = 1;
        ctx.strokeStyle = '#DDD';
        ctx.beginPath();
        ctx.moveTo(45, 0);
        ctx.quadraticCurveTo(tensionX, -60, 0, -45);
        ctx.stroke();
    }

    ctx.restore(); // Arm
    ctx.restore(); // Baron
}

function drawHorse(ctx, x, y, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);

    // Body
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = '#CCC';
    ctx.lineWidth = 2;
    
    ctx.beginPath();
    ctx.ellipse(0, 20, 60, 35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Neck & Head
    ctx.beginPath();
    ctx.moveTo(40, 10);
    ctx.quadraticCurveTo(60, -20, 70, -40); // Neck up
    ctx.lineTo(90, -45); // Snout
    ctx.lineTo(70, -30); // Jaw
    ctx.quadraticCurveTo(50, 0, 40, 10); // Neck down
    ctx.fill();
    ctx.stroke();

    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(75, -35, 3, 0, Math.PI*2);
    ctx.fill();

    // Mane
    ctx.fillStyle = '#EEE';
    ctx.beginPath();
    ctx.moveTo(50, -10);
    ctx.lineTo(40, -30);
    ctx.lineTo(30, -10);
    ctx.fill();

    ctx.restore();
}

function drawText(ctx, text, x, y, size, color) {
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px "Comic Sans MS", "Chalkboard SE", sans-serif`;
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 3;
    ctx.textAlign = 'center';
    ctx.strokeText(text, x, y);
    ctx.fillText(text, x, y);
}

// --- MAIN LOOP ---

function update() {
    frame++;
    stateTimer++;

    // State Machine
    switch(state) {
        case 'WALK':
            baronX += 2;
            horseX += 2;
            // Bobbing
            baronY = (height * swampLevelBase) + Math.sin(frame * 0.2) * 5;
            
            if (baronX > width * 0.5) {
                state = 'SINK';
                stateTimer = 0;
            }
            break;

        case 'SINK':
            velocityY += GRAVITY - BUOYANCY;
            baronY += velocityY;
            horseX = baronX - 120; // Stick to baron
            
            // Mud particles
            if (frame % 5 === 0) spawnParticles(baronX, swampLevel + 10, 'mud', 2);

            if (baronY > height * 0.85) {
                velocityY = 0;
                state = 'PANIC';
                stateTimer = 0;
            }
            break;

        case 'PANIC':
            // Shake
            baronX += (Math.random() - 0.5) * 4;
            horseX = baronX - 120 + (Math.random() - 0.5) * 4;
            
            // Sweat
            if (frame % 10 === 0) spawnParticles(baronX, baronY - 50, 'sweat', 1);

            if (stateTimer > 120) {
                state = 'EUREKA';
                stateTimer = 0;
            }
            break;

        case 'EUREKA':
            // Stop shaking, look up
            baronX = width * 0.5; 
            horseX = baronX - 120;
            
            if (stateTimer > 60) {
                state = 'PULL';
                stateTimer = 0;
                pullForce = 0;
            }
            break;

        case 'PULL':
            // Build tension
            pullForce += 0.05;
            hairTension = Math.sin(frame * 0.5) * pullForce; // Visual stretch
            
            // Apply force upwards
            velocityY -= PULL_STRENGTH * pullForce;
            baronY += velocityY;
            horseX = baronX - 120;

            // Strain particles
            if (frame % 3 === 0) spawnParticles(baronX, baronY - 40, 'sweat', 1);

            // Breakout condition
            if (baronY < height * 0.4) {
                velocityY = -15; // Launch!
                state = 'RISE';
                stateTimer = 0;
            }
            break;

        case 'RISE':
            velocityY += GRAVITY * 0.5; // Less gravity in air (cartoon logic)
            baronY += velocityY;
            horseX = baronX - 120;

            // Sparkles
            if (frame % 5 === 0) spawnParticles(baronX, baronY + 50, 'sparkle', 2);

            if (velocityY > 0 && baronY > height * 0.55) {
                velocityY = 0;
                baronY = height * 0.55;
                state = 'TRIUMPH';
                stateTimer = 0;
            }
            break;
            
        case 'TRIUMPH':
            // Hover slightly
            baronY = (height * 0.55) + Math.sin(frame * 0.1) * 5;
            if (stateTimer > 200 && !replayRequested) {
                overlay.classList.add('visible');
            }
            break;
    }

    // Update Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, width, height);

    // Calculate dynamic swamp level based on baronY to simulate camera following or water rising
    // Actually, let's keep water static and move baron, but draw water over legs if sinking
    const waterLine = height * swampLevelBase;
    
    drawSwamp(ctx, waterLine);

    // Draw Particles (behind characters mostly, but mud splashes in front)
    particles.forEach(p => {
        if(p.type !== 'mud') p.draw(ctx);
    });

    // Determine Animation Poses
    let armAngle = 0;
    let rotation = 0;
    let isPulling = false;

    if (state === 'WALK') {
        armAngle = Math.sin(frame * 0.2) * 0.5;
    } else if (state === 'SINK') {
        armAngle = -Math.PI / 2; // Arms up in panic
        rotation = 0.1; // Tilt back
    } else if (state === 'PANIC') {
        armAngle = -Math.PI / 1.5; // Flailing
        rotation = (Math.random() - 0.5) * 0.2;
    } else if (state === 'EUREKA') {
        armAngle = -Math.PI / 4; // Hand on chin
        rotation = 0;
    } else if (state === 'PULL') {
        armAngle = -Math.PI / 2 - (pullForce * 0.5); // Reaching up high
        rotation = -0.2; // Leaning back against pull
        isPulling = true;
    } else if (state === 'RISE') {
        armAngle = -Math.PI / 2; 
        rotation = 0;
        isPulling = true; // Still holding on until safe
    } else if (state === 'TRIUMPH') {
        armAngle = -Math.PI / 1.5; // Hand on hip (modified) or holding hair proudly
        rotation = 0;
        isPulling = true;
    }

    // Draw Horse
    // Horse follows baron Y but stays slightly higher in water visually
    let horseY = baronY - 20; 
    if (state === 'SINK' || state === 'PANIC') horseY = baronY + 10; // Horse sinks faster visually
    
    drawHorse(ctx, horseX, horseY, rotation * 0.5);

    // Draw Baron
    drawBaron(ctx, baronX, baronY, rotation, armAngle, isPulling);

    // Draw Particles (front)
    particles.forEach(p => {
        if(p.type === 'mud') p.draw(ctx);
    });

    // UI Text
    if (state === 'PANIC') {
        drawText(ctx, "HELP!!", baronX, baronY - 80, 40, '#D32F2F');
    } else if (state === 'EUREKA') {
        drawText(ctx, "Idea!", baronX, baronY - 80, 40, '#FFD700');
    } else if (state === 'PULL') {
        drawText(ctx, "HNNNGGG!", baronX, baronY - 90, 30, '#333');
    } else if (state === 'TRIUMPH') {
        drawText(ctx, "GENTLEMEN!", baronX, baronY - 90, 50, '#D32F2F');
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Input
window.addEventListener('resize', resize);
canvas.addEventListener('click', () => {
    if (state === 'TRIUMPH') {
        replayRequested = true;
        reset();
    }
});

// Init
resize();
loop();

</script>
</body>
</html>
