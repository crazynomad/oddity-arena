```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Baron's Hair</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; width: 100%; height: 100%; }
        #replay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; font-weight: bold; color: white; text-shadow: 2px 2px 0 #000;
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="replay">CLICK TO REPLAY</div>
    <canvas id="c"></canvas>
    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const replayUI = document.getElementById('replay');
        
        let W, H, groundY;
        let tick = 0;
        let scene = 0; // 0:Walk, 1:Sink, 2:Panic, 3:Eureka, 4:Pull, 5:Triumph
        let particles = [];
        let bubbles = [];
        let stars = [];
        
        // Baron State
        let b = { x: -100, y: 0, vy: 0, scaleX: 1, scaleY: 1, armAngle: 0, legAngle: 0, eyeSize: 1, noseW: 1 };
        
        const SCENES = [
            { name: "A casual stroll", dur: 120 },
            { name: "The Unexpected Swamp", dur: 120 },
            { name: "PANIC!", dur: 100 },
            { name: "EUREKA!", dur: 100 },
            { name: "Impossible Physics", dur: 120 },
            { name: "Triumph!", dur: 300 }
        ];

        function resize() {
            W = c.width = window.innerWidth;
            H = c.height = window.innerHeight;
            groundY = H * 0.75;
        }
        window.addEventListener('resize', resize);
        resize();

        // Input
        window.addEventListener('click', () => {
            if(scene === 5 && tick > 100) {
                reset();
            }
        });

        function reset() {
            tick = 0;
            scene = 0;
            particles = [];
            bubbles = [];
            stars = [];
            b.x = -150;
            b.y = groundY;
            b.vy = 0;
            b.scaleX = 1; b.scaleY = 1;
            b.eyeSize = 1;
            b.noseW = 1;
            b.armAngle = 0;
            b.legAngle = 0;
            replayUI.style.opacity = 0;
        }

        function createParticle(x, y, type) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1.0,
                type: type, // 'confetti', 'sparkle', 'sweat'
                color: type === 'confetti' ? `hsl(${Math.random()*360}, 80%, 50%)` : (type === 'sweat' ? '#00FFFF' : '#FFFF00')
            });
        }

        function update() {
            tick++;
            
            // State Machine
            if (tick > SCENES[scene].dur) {
                scene++;
                tick = 0;
                if (scene > 5) {
                    replayUI.style.opacity = 1;
                    scene = 5; 
                }
            }

            // --- SCENE LOGIC ---
            
            // 1. Walking
            if (scene === 0) {
                b.x += 4;
                b.legAngle = Math.sin(tick * 0.2) * 0.5;
                if (b.x > W/2) b.x = W/2; // Stop at center
                if (b.x === W/2 && tick > 60) { scene = 1; tick = 0; } // Trigger sink
            }
            
            // 2. Sinking
            if (scene === 1) {
                b.vy += 0.15;
                b.y += b.vy;
                // Squash effect
                b.scaleX = 1 + (b.vy * 0.05);
                b.scaleY = 1 - (b.vy * 0.05);
                // Panic arms
                b.armAngle = Math.sin(tick * 0.8) * 1;
                b.eyeSize = 1.5 + Math.sin(tick * 0.5) * 0.5;
                
                if(Math.random() < 0.1) bubbles.push({x: b.x + (Math.random()-0.5)*20, y: b.y, r: Math.random()*5+2, v: Math.random()*2+1});
            }

            // 3. Panic (Deep)
            if (scene === 2) {
                b.vy = 0; // Stop sinking momentarily or slow down
                b.y += Math.sin(tick * 0.5) * 2; // Bobbing
                b.armAngle = (Math.random() - 0.5) * 2; // Flailing
                b.eyeSize = 2; // Wide eyes
                b.noseW = 3; // Nose gets bigger with pressure
                
                if(Math.random() < 0.2) bubbles.push({x: b.x + (Math.random()-0.5)*20, y: b.y, r: Math.random()*5+2, v: Math.random()*2+1});
            }

            // 4. Eureka
            if (scene === 3) {
                b.armAngle = -2.5; // Grab hair
                b.eyeSize = 0.5; // Squint
                b.noseW = 2;
                
                // Sparkles around head
                if(tick % 5 === 0) createParticle(b.x, b.y - 80, 'sparkle');
                
                // Slight lift
                b.y -= 1;
            }

            // 5. The Pull (Impossible Physics)
            if (scene === 4) {
                // Accelerate upwards
                b.y -= 8;
                
                // Stretch effect
                b.scaleX = 0.6;
                b.scaleY = 1.6;
                
                // Dust particles
                if(tick % 3 === 0) createParticle(b.x, b.y + 50, 'sweat');
            }

            // 6. Triumph
            if (scene === 5) {
                // Reset proportions
                b.scaleX += (1 - b.scaleX) * 0.1;
                b.scaleY += (1 - b.scaleY) * 0.1;
                
                b.y = groundY - 10; // Stand on ground (or above swamp)
                b.armAngle = 1.5; // V pose
                b.eyeSize = 1;
                
                if (tick % 5 === 0) createParticle(b.x, b.y - 80, 'confetti');
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update Bubbles
            for (let i = bubbles.length - 1; i >= 0; i--) {
                let p = bubbles[i];
                p.y -= p.v;
                p.x += Math.sin(tick * 0.1) * 0.5;
                if (p.y < groundY - 150) bubbles.splice(i, 1);
            }
        }

        function draw() {
            // Clear
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, W, H);

            // Draw Sun
            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.arc(W - 100, 100, 50, 0, Math.PI*2);
            ctx.fill();

            // Draw Swamp
            ctx.fillStyle = "#556B2F";
            ctx.fillRect(0, groundY, W, H - groundY);
            // Swamp Surface
            ctx.fillStyle = "#6B8E23";
            ctx.fillRect(0, groundY, W, 20);

            // Draw Bubbles (Behind Baron)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
            ctx.lineWidth = 2;
            bubbles.forEach(bub => {
                ctx.beginPath();
                ctx.arc(bub.x, bub.y, bub.r, 0, Math.PI*2);
                ctx.stroke();
            });

            // Draw Baron
            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.scale(b.scaleX, b.scaleY);

            // Legs
            ctx.lineWidth = 12;
            ctx.lineCap = "round";
            ctx.strokeStyle = "#8B4513"; // Boots
            // Left Leg
            ctx.beginPath();
            ctx.moveTo(-15, 0);
            ctx.lineTo(-15 - Math.sin(b.legAngle)*20, 40);
            ctx.stroke();
            // Right Leg
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(15 + Math.sin(b.legAngle)*20, 40);
            ctx.stroke();

            // Coat (Body)
            ctx.fillStyle = "#800000"; // Red coat
            ctx.beginPath();
            ctx.moveTo(-25, 0);
            ctx.lineTo(25, 0);
            ctx.lineTo(35, 50);
            ctx.lineTo(-35, 50);
            ctx.fill();
            
            // Buttons
            ctx.fillStyle = "#FFD700";
            ctx.beginPath(); ctx.arc(0, 10, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(0, 25, 3, 0, Math.PI*2); ctx.fill();

            // Arms (Procedural based on state)
            ctx.strokeStyle = "#800000";
            ctx.lineWidth = 10;
            
            // Calculate arm positions based on angle
            // Right Arm
            ctx.beginPath();
            ctx.moveTo(25, 5);
            let armR_x = 45 * Math.cos(b.armAngle);
            let armR_y = 45 * Math.sin(b.armAngle);
            ctx.lineTo(armR_x, armR_y);
            ctx.stroke();
            
            // Left Arm
            ctx.beginPath();
            ctx.moveTo(-25, 5);
            let armL_x = -45 * Math.cos(b.armAngle);
            let armL_y = 45 * Math.sin(b.armAngle);
            ctx.lineTo(armL_x, armL_y);
            ctx.stroke();

            // Hands (Gloves)
            ctx.fillStyle = "#eee";
            ctx.beginPath(); ctx.arc(armR_x, armR_y, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(armL_x, armL_y, 8, 0, Math.PI*2); ctx.fill();

            // Head
            ctx.fillStyle = "#ffdbac"; // Skin
            ctx.beginPath();
            ctx.arc(0, -20, 25, 0, Math.PI*2);
            ctx.fill();

            // Face Features
            // Eyes
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(-8, -25, 8 * b.eyeSize, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(8, -25, 8 * b.eyeSize, 0, Math.PI*2); ctx.fill();
            // Pupils
            ctx.fillStyle = "black";
            if(scene < 3) { // Look down/panic
                ctx.beginPath(); ctx.arc(-8, -20, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(8, -20, 3, 0, Math.PI*2); ctx.fill();
            } else { // Look up/confident
                ctx.beginPath(); ctx.arc(-8, -28, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(8, -28, 3, 0, Math.PI*2); ctx.fill();
            }

            // The Nose (The star of the show)
            ctx.fillStyle = "#ffdbac";
            ctx.beginPath();
            // If grabbing hair (scene 3,4), nose points up
            if (scene >= 3) {
                ctx.ellipse(0, -15, 10 * b.noseW, 25, 0, 0, Math.PI*2);
            } else {
                ctx.ellipse(0, -15, 10 * b.noseW, 15, 0, 0, Math.PI*2);
            }
            ctx.fill();

            // Mustache
            ctx.fillStyle = "#444";
            ctx.beginPath();
            ctx.ellipse(0, -10, 20, 5, 0, 0, Math.PI*2);
            ctx.fill();

            // Hat
            // Brim
            ctx.fillStyle = "#333";
            ctx.beginPath();
            ctx.ellipse(0, -40, 40, 10, 0, 0, Math.PI*2);
            ctx.fill();
            // Cylinder
            ctx.fillRect(-25, -90, 50, 50);
            // Feather
            ctx.fillStyle = "#FF4500";
            ctx.beginPath();
            ctx.moveTo(15, -80);
            ctx.quadraticCurveTo(40, -100, 20, -60);
            ctx.fill();

            ctx.restore();

            // Particles Overlay
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                if(p.type === 'confetti') {
                    ctx.fillRect(p.x, p.y, 8, 8);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            });

            // Text
            ctx.fillStyle = "white";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 3;
            ctx.font = "bold 30px Courier New";
            ctx.textAlign = "center";
            ctx.strokeText(SCENES[scene].name, W/2, 50);
            ctx.fillText(SCENES[scene].name, W/2, 50);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        reset();
        loop();

    </script>
</body>
</html>
