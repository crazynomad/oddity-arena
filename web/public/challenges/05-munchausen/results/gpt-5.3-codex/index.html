<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge 05 — Baron Munchausen</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 15%, #2a3f4f 0%, #17222c 45%, #0d141a 100%);
      overflow: hidden;
      font-family: ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    canvas { width: 100%; height: 100%; display: block; }
    .hud {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      color: #ecf7ff;
      background: rgba(8, 16, 20, 0.45);
      border: 1px solid rgba(191, 235, 255, 0.35);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      letter-spacing: .03em;
      user-select: none;
      backdrop-filter: blur(2px);
      text-shadow: 0 1px 3px rgba(0,0,0,.7);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud">Baron Munchausen vs. The Swamp — click to advance</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');

  const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let W = 1280, H = 720, t0 = performance.now(), last = t0;

  function resize() {
    W = Math.max(960, innerWidth);
    H = Math.max(540, innerHeight);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  addEventListener('resize', resize);
  resize();

  const sceneDefs = [
    { name: 'Walking', dur: 3.8 },
    { name: 'Sinking', dur: 3.0 },
    { name: 'Panic', dur: 2.7 },
    { name: 'Eureka', dur: 2.2 },
    { name: 'Pulling Hair', dur: 3.0 },
    { name: 'Rising', dur: 2.8 },
    { name: 'Triumph', dur: 3.4 },
  ];

  const S = {
    index: 0,
    sceneTime: 0,
    totalTime: 0,
    auto: true,
    done: false,
    baron: {
      x: W * 0.36,
      y: H * 0.72,
      vy: 0,
      walkPhase: 0,
      sink: 0,
      eyebrow: 0,
      grin: 0,
      hatTilt: -0.08,
      armLift: 0,
      pull: 0,
      rise: 0,
      hairLen: 22,
      bob: 0,
    },
    bubbles: [],
    mud: [],
    sparkles: [],
  };

  const swampY = () => H * 0.72;

  function resetAll() {
    S.index = 0; S.sceneTime = 0; S.totalTime = 0; S.done = false; S.auto = true;
    Object.assign(S.baron, {
      x: W * 0.36, y: swampY(), vy: 0, walkPhase: 0, sink: 0, eyebrow: 0,
      grin: 0, hatTilt: -0.08, armLift: 0, pull: 0, rise: 0, bob: 0
    });
    S.bubbles.length = 0; S.mud.length = 0; S.sparkles.length = 0;
  }

  function nextScene(manual = false) {
    if (S.done) { resetAll(); hud.textContent = 'Replaying! click to skip ahead'; return; }
    S.index++;
    S.sceneTime = 0;
    if (S.index >= sceneDefs.length) {
      S.done = true;
      S.index = sceneDefs.length - 1;
      S.auto = false;
      hud.textContent = 'Legend says: "Impossible? Watch me." Click to replay';
    } else if (manual) {
      S.auto = false;
      hud.textContent = `${sceneDefs[S.index].name} — manual mode (click for next)`;
    }
  }

  addEventListener('pointerdown', () => {
    if (S.done) { resetAll(); return; }
    nextScene(true);
  });

  function lerp(a,b,t){ return a + (b-a)*t; }
  function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }
  function easeInOut(t){ return t<.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }
  function easeOutBack(t){ const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
  function rnd(a,b){ return a + Math.random() * (b-a); }

  function emitBubble(x,y,n=1){
    for(let i=0;i<n;i++) S.bubbles.push({ x: x + rnd(-12,12), y: y + rnd(-8,8), r: rnd(2,8), vy: rnd(-25,-60), vx:rnd(-8,8), life:rnd(.8,1.8), age:0 });
  }
  function emitMud(x,y,n=8){
    for(let i=0;i<n;i++) S.mud.push({ x, y, vx:rnd(-120,120), vy:rnd(-220,-60), g:520, r:rnd(3,9), life:rnd(.4,.95), age:0, rot:rnd(-3,3) });
  }
  function emitSparkles(x,y,n=16){
    for(let i=0;i<n;i++) S.sparkles.push({ x, y, vx:rnd(-120,120), vy:rnd(-160,40), life:rnd(.7,1.4), age:0, s:rnd(1,3), hue:rnd(40,70) });
  }

  function updateParticles(dt){
    for (const p of S.bubbles) { p.age += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.r *= 0.997; }
    for (const p of S.mud) { p.age += dt; p.vy += p.g*dt; p.x += p.vx*dt; p.y += p.vy*dt; p.rot += dt*5; }
    for (const p of S.sparkles) { p.age += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 120*dt; }
    S.bubbles = S.bubbles.filter(p => p.age < p.life && p.y > 0);
    S.mud = S.mud.filter(p => p.age < p.life && p.y < H + 40);
    S.sparkles = S.sparkles.filter(p => p.age < p.life);
  }

  function update(dt){
    const b = S.baron;
    const scene = sceneDefs[S.index];
    S.sceneTime += dt;
    S.totalTime += dt;

    const st = S.sceneTime, p = clamp(st / scene.dur, 0, 1);

    if (S.auto && st > scene.dur) nextScene(false);

    b.bob += dt;

    switch (S.index) {
      case 0: { // walking
        b.walkPhase += dt * 8.5;
        b.x += 46 * dt;
        b.sink = lerp(b.sink, 0.02, 0.05);
        if (Math.sin(b.walkPhase) > 0.93) emitMud(b.x-20, swampY()+10, 1);
        break;
      }
      case 1: { // sinking
        b.sink = lerp(0.02, 0.42, easeInOut(p));
        b.x += 8 * dt;
        if (Math.random() < 0.22) emitBubble(b.x + rnd(-20,20), swampY()+8, 1);
        if (Math.random() < 0.14) emitMud(b.x + rnd(-12,12), swampY()+6, 2);
        break;
      }
      case 2: { // panic
        b.eyebrow = 1;
        b.grin = -0.9;
        b.armLift = (Math.sin(st * 18) * 0.5 + 0.5) * 0.9;
        b.hatTilt = Math.sin(st * 22) * 0.24;
        if (Math.random() < 0.25) emitBubble(b.x + rnd(-30,30), swampY()+10, 2);
        if (Math.random() < 0.18) emitMud(b.x + rnd(-22,22), swampY()+2, 3);
        break;
      }
      case 3: { // eureka
        b.eyebrow = lerp(1, -0.1, p);
        b.grin = lerp(-.8, 1, p);
        b.armLift = lerp(0.4, 1.0, p);
        b.hatTilt = lerp(0.14, -0.02, p);
        if (Math.random() < 0.2) emitSparkles(b.x + 8, b.y - 118, 2);
        if (p > .55 && Math.random() < 0.35) emitSparkles(b.x + 10, b.y - 118, 3);
        break;
      }
      case 4: { // pulling hair
        b.pull = easeInOut(p);
        b.armLift = 1;
        b.hairLen = lerp(22, 36, 0.5 + 0.5*Math.sin(st*9));
        b.grin = 0.5 + 0.5*Math.sin(st*10);
        if (Math.random() < 0.18) emitMud(b.x + rnd(-18,18), swampY()+3, 3);
        break;
      }
      case 5: { // rising
        const k = easeOutBack(p);
        b.rise = k;
        b.sink = lerp(0.42, -0.08, k);
        b.y = swampY() - 150 * k;
        b.hatTilt = lerp(-0.02, 0.08, p);
        if (Math.random() < 0.28) emitSparkles(b.x + rnd(-10,10), b.y - 70, 3);
        if (Math.random() < 0.22) emitBubble(b.x + rnd(-40,40), swampY()+5, 2);
        break;
      }
      case 6: { // triumph
        b.sink = lerp(-0.08, -0.12 + Math.sin(st*4)*0.01, 0.14);
        b.grin = 1;
        b.eyebrow = -0.4;
        b.armLift = 0.65 + 0.35*Math.sin(st*5);
        b.hatTilt = Math.sin(st*4)*0.07;
        if (Math.random() < 0.36) emitSparkles(b.x + rnd(-45,45), b.y - rnd(70,120), 3);
        break;
      }
    }

    updateParticles(dt);
  }

  function drawBackground(time){
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, '#233949');
    g.addColorStop(.45, '#1a2d36');
    g.addColorStop(1, '#0f1b1f');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // moon
    ctx.save();
    const mx = W*0.8, my = H*0.18;
    ctx.shadowColor = 'rgba(240,255,220,.45)';
    ctx.shadowBlur = 35;
    ctx.fillStyle = '#f0f3cc';
    ctx.beginPath(); ctx.arc(mx,my,34,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // reeds
    ctx.strokeStyle = 'rgba(15,35,19,.9)';
    for(let i=0;i<50;i++){
      const x = i*(W/49);
      const h = 45 + (i%7)*9;
      ctx.beginPath();
      ctx.moveTo(x,H*0.72+12);
      ctx.quadraticCurveTo(x+Math.sin(time*0.001+i)*8,H*0.72-h,x+Math.sin(time*0.001+i*2)*4,H*0.72-h*1.35);
      ctx.stroke();
    }

    // swamp surface
    const y = swampY();
    ctx.fillStyle = '#355741';
    ctx.fillRect(0,y,W,H-y);
    ctx.fillStyle = 'rgba(186, 230, 176, 0.09)';
    for(let i=0;i<8;i++){
      const w = 220 + i*40;
      const h = 12 + i*2;
      const x = ((time*0.03 + i*190) % (W+260)) - 130;
      ctx.beginPath();
      ctx.ellipse(x, y+10+i*6, w*0.5, h, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawParticles(){
    for(const p of S.bubbles){
      const a = 1 - p.age/p.life;
      ctx.strokeStyle = `rgba(198,255,228,${0.35*a})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
    }
    for(const p of S.mud){
      const a = 1 - p.age/p.life;
      ctx.save();
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle = `rgba(66,42,26,${0.75*a})`;
      ctx.beginPath(); ctx.ellipse(0,0,p.r,p.r*0.7,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    for(const p of S.sparkles){
      const a = 1 - p.age/p.life;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.strokeStyle = `hsla(${p.hue},100%,78%,${0.85*a})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-p.s,0); ctx.lineTo(p.s,0);
      ctx.moveTo(0,-p.s); ctx.lineTo(0,p.s);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawBaron(time){
    const b = S.baron;
    const baseY = S.index === 5 || S.index === 6 ? b.y : swampY();
    const y = baseY + b.sink * 140 + Math.sin(b.bob*4)*1.5;
    const x = b.x;

    ctx.save();
    ctx.translate(x, y);

    // shadow/ooze
    ctx.fillStyle = 'rgba(18,32,21,.75)';
    ctx.beginPath();
    ctx.ellipse(0, 24, 52, 16, 0, 0, Math.PI*2);
    ctx.fill();

    // boots barely visible
    ctx.fillStyle = '#2f1f1a';
    ctx.fillRect(-18, 7, 14, 12);
    ctx.fillRect(4, 7, 14, 12);

    // torso coat
    ctx.fillStyle = '#8f2433';
    ctx.fillRect(-26, -52, 52, 62);
    ctx.fillStyle = '#e3d7a8';
    ctx.fillRect(-5,-42,10,40);

    // neck + head
    ctx.fillStyle = '#d7b08a';
    ctx.fillRect(-6,-67,12,10);
    ctx.beginPath();
    ctx.arc(0,-86,24,0,Math.PI*2);
    ctx.fill();

    // mustache
    ctx.strokeStyle = '#4a2b17';
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(-16,-83);
    ctx.quadraticCurveTo(-8,-76,-1,-80);
    ctx.quadraticCurveTo(8,-76,16,-83);
    ctx.stroke();

    // eyes + brows
    const eb = b.eyebrow;
    ctx.fillStyle = '#1a1512';
    ctx.beginPath(); ctx.arc(-8,-89,2.7,0,Math.PI*2); ctx.arc(8,-89,2.7,0,Math.PI*2); ctx.fill();
    ctx.lineWidth = 2.8;
    ctx.strokeStyle = '#4f321f';
    ctx.beginPath();
    ctx.moveTo(-15,-98-eb*4); ctx.lineTo(-3,-95+eb*2);
    ctx.moveTo(3,-95+eb*2); ctx.lineTo(15,-98-eb*4);
    ctx.stroke();

    // mouth
    ctx.strokeStyle = '#5a2a21';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const m = b.grin;
    ctx.moveTo(-9,-74);
    ctx.quadraticCurveTo(0, -74 + m*7, 9,-74);
    ctx.stroke();

    // arm left
    ctx.save();
    ctx.translate(-23,-40);
    ctx.rotate(-0.9 + b.armLift * 1.1);
    ctx.fillStyle = '#8f2433';
    ctx.fillRect(-8,-4,34,10);
    ctx.restore();

    // arm right (hair pull hand)
    ctx.save();
    ctx.translate(22,-44);
    ctx.rotate(-0.4 - b.pull*0.8 + Math.sin(time*0.01)*0.03);
    ctx.fillStyle = '#8f2433';
    ctx.fillRect(-5,-4,30,10);
    ctx.restore();

    // hat
    ctx.save();
    ctx.translate(0,-111);
    ctx.rotate(b.hatTilt);
    ctx.fillStyle = '#192029';
    ctx.fillRect(-22,-16,44,18);
    ctx.fillRect(-32,0,64,6);
    ctx.fillStyle = '#c6a84f';
    ctx.fillRect(-21,-2,42,3);
    ctx.restore();

    // hair strand + pull gag
    const hairTopY = -104;
    const handX = 22 + Math.cos(-0.4 - b.pull*0.8) * 21;
    const handY = -44 + Math.sin(-0.4 - b.pull*0.8) * 21;
    const stretch = 1 + b.pull * 0.7;
    const hz = b.hairLen * stretch;
    ctx.strokeStyle = '#6f4b2a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(6, hairTopY);
    ctx.quadraticCurveTo(18, hairTopY-18*stretch, handX, handY-2);
    ctx.stroke();

    ctx.fillStyle = '#d7b08a';
    ctx.beginPath(); ctx.arc(handX, handY, 5.5, 0, Math.PI*2); ctx.fill();

    // comic strain lines during pull
    if (S.index === 4 || S.index === 5) {
      const q = S.index === 4 ? (0.4 + 0.6*Math.sin(time*0.04)**2) : 1;
      ctx.strokeStyle = `rgba(255,255,220,${0.35*q})`;
      for(let i=0;i<4;i++){
        const sx = -40 + i*26;
        ctx.beginPath();
        ctx.moveTo(sx, -128);
        ctx.lineTo(sx + 8, -144 - i*4);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  function drawCaption(){
    const texts = [
      'A confident stroll through definitely-not-dangerous marshland…',
      'Uh oh. The Earth is accepting him as tribute.',
      'Panic mode: moustache trembles at 11/10.',
      '💡 “What if I simply… ignore physics?”',
      'Grabs own hair. Newton files a complaint.',
      'Up he goes. Reality sighs deeply.',
      'Victory! The swamp is defeated by audacity.'
    ];
    const txt = texts[S.index];
    ctx.save();
    ctx.font = '700 24px ui-rounded, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(0,0,0,.45)';
    ctx.strokeText(txt, W/2, 56);
    ctx.fillStyle = '#f6f6dd';
    ctx.fillText(txt, W/2, 56);
    ctx.restore();

    hud.textContent = S.done
      ? 'Legend says: "Impossible? Watch me." Click to replay'
      : `${sceneDefs[S.index].name} ${S.auto ? '• auto-play' : '• click to advance'}`;
  }

  function frame(now){
    const dt = Math.min(0.033, (now-last)/1000);
    last = now;

    update(dt);
    drawBackground(now);
    drawParticles();
    drawBaron(now);
    drawCaption();

    // vignette
    const vg = ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.68);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(0,0,0,.42)');
    ctx.fillStyle = vg;
    ctx.fillRect(0,0,W,H);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
