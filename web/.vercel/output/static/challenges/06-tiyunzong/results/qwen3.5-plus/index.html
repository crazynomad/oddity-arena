<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梯云纵 - Ti Yun Zong</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f1ea; /* Rice paper color */
            font-family: "KaiTi", "STKaiti", "Baskerville", serif;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .title {
            font-size: 4rem;
            color: #1a1a1a;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            writing-mode: vertical-rl;
            text-orientation: upright;
            position: absolute;
            right: 40px;
            top: 40px;
            opacity: 0.8;
            letter-spacing: 10px;
            border-right: 2px solid #1a1a1a;
            padding-right: 15px;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #555;
            position: absolute;
            right: 80px;
            top: 40px;
            writing-mode: vertical-rl;
            opacity: 0.6;
        }
        #restart-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 1s;
            cursor: pointer;
            pointer-events: auto;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }
        #restart-hint.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="title">梯云纵</div>
        <div class="subtitle">武当绝学 · 轻功</div>
        <div id="restart-hint">Click to Ascend Again</div>
    </div>
    <canvas id="canvas"></canvas>

<script>
/**
 * 梯云纵 (Ti Yun Zong) - Interactive Ink Animation
 * Pure HTML5 Canvas, No External Assets
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const restartHint = document.getElementById('restart-hint');

let width, height;
let animationId;
let lastTime = 0;

// Game State
const state = {
    playing: true,
    cameraY: 0,
    totalAscent: 0,
    shake: 0
};

// Configuration
const CONFIG = {
    gravity: 0.4,
    jumpForce: -14,
    kickForce: -16, // Stronger than initial jump
    groundY: 0, // Calculated dynamically
    inkColor: '#111',
    qiColor: 'rgba(255, 255, 255, 0.8)',
    bgMountains: []
};

// Resize Handler
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    CONFIG.groundY = height * 0.8;
    initBackground();
}
window.addEventListener('resize', resize);

// --- Classes ---

class Particle {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'ink', 'qi', 'spark'
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.01;
        
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        
        if (type === 'ink') {
            this.size = Math.random() * 4 + 1;
            this.vy += 2; // Gravity affects ink
            this.color = `rgba(10, 10, 10, ${Math.random() * 0.5 + 0.5})`;
        } else if (type === 'qi') {
            this.size = Math.random() * 20 + 10;
            this.vx *= 0.5;
            this.vy *= 0.5;
            this.color = `rgba(200, 220, 255,`;
        } else if (type === 'spark') {
            this.size = Math.random() * 2 + 1;
            this.color = '#fff';
            this.decay = 0.05;
        }
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;

        if (this.type === 'ink') {
            this.vy += 0.2; // Gravity
            this.size *= 0.95; // Shrink
        } else if (this.type === 'qi') {
            this.size *= 1.05; // Expand
        }
    }

    draw(ctx, camY) {
        if (this.life <= 0) return;
        
        ctx.save();
        ctx.globalAlpha = this.life;
        
        if (this.type === 'ink') {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y - camY, this.size, 0, Math.PI * 2);
            ctx.fill();
            // Ink bleed effect
            if (this.size > 2) {
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'black';
            }
        } else if (this.type === 'qi') {
            ctx.strokeStyle = this.color + this.life + ')';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(this.x, this.y - camY, this.size, 0, Math.PI * 2);
            ctx.stroke();
        } else if (this.type === 'spark') {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y - camY, this.size, this.size);
        }
        
        ctx.restore();
    }
}

class AfterImage {
    constructor(x, y, rotation, legState) {
        this.x = x;
        this.y = y;
        this.rotation = rotation;
        this.legState = legState; // 0: normal, 1: kicking
        this.life = 1.0;
        this.decay = 0.15;
    }

    update() {
        this.life -= this.decay;
        this.y += 2; // Drift down slightly
    }

    draw(ctx, camY) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.translate(this.x, this.y - camY);
        ctx.rotate(this.rotation);
        ctx.globalAlpha = this.life * 0.3;
        ctx.fillStyle = '#000';
        ctx.filter = 'blur(2px)';
        
        // Draw simplified silhouette
        ctx.beginPath();
        // Body
        ctx.moveTo(0, -20);
        ctx.lineTo(10, 10);
        ctx.lineTo(-10, 10);
        ctx.fill();
        
        // Robe flow
        ctx.beginPath();
        ctx.moveTo(-10, 10);
        ctx.quadraticCurveTo(-20, 30, -15, 50);
        ctx.lineTo(15, 50);
        ctx.quadraticCurveTo(20, 30, 10, 10);
        ctx.fill();

        // Legs
        ctx.beginPath();
        if (this.legState === 1) {
            // Kicking pose
            ctx.moveTo(0, 10);
            ctx.lineTo(-5, 25); // Standing leg
            ctx.moveTo(0, 10);
            ctx.lineTo(15, 5);   // Kicking leg
        } else {
            // Normal
            ctx.moveTo(0, 10);
            ctx.lineTo(-5, 25);
            ctx.moveTo(0, 10);
            ctx.lineTo(5, 25);
        }
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#000';
        ctx.stroke();

        ctx.restore();
    }
}

class Hero {
    constructor() {
        this.x = width / 2;
        this.y = CONFIG.groundY;
        this.vy = 0;
        this.rotation = 0;
        this.legState = 0; // 0: normal, 1: kick prep, 2: kick
        this.frame = 0;
        this.trail = [];
        this.canKick = true;
    }

    reset() {
        this.y = CONFIG.groundY;
        this.vy = CONFIG.jumpForce;
        this.rotation = 0;
        state.cameraY = 0;
        state.totalAscent = 0;
        this.trail = [];
        this.canKick = true;
        state.playing = true;
        restartHint.classList.remove('visible');
        initBackground();
    }

    update() {
        if (!state.playing) return;

        // Physics
        this.vy += CONFIG.gravity;
        this.y += this.vy;

        // Camera Follow (Parallax logic)
        // If hero goes above 60% of screen, move camera down (world moves down)
        const targetCamY = this.y - height * 0.6;
        if (targetCamY > state.cameraY) {
            state.cameraY += (targetCamY - state.cameraY) * 0.1;
        }
        
        // Screen shake on kick
        if (state.shake > 0) {
            state.shake *= 0.9;
            if(state.shake < 0.5) state.shake = 0;
        }

        // Rotation based on velocity
        this.rotation = this.vy * 0.02;

        // Trail logic
        if (this.frame % 3 === 0) {
            this.trail.push(new AfterImage(this.x, this.y, this.rotation, this.legState));
        }
        this.trail.forEach(t => t.update());
        this.trail = this.trail.filter(t => t.life > 0);

        // Ti Yun Zong Logic (The Kick)
        // If falling fast enough and not too close to the "ground" (simulated air step)
        // We allow stepping on air if we have momentum
        if (this.vy > 5 && this.canKick) {
            // Check if we are high enough to do a mid-air step
            // In this animation, we allow stepping once per major arc
            if (this.y < state.cameraY + height * 0.9) {
                this.performKick();
            }
        }

        // Floor collision (Reset)
        if (this.y > CONFIG.groundY) {
            this.y = CONFIG.groundY;
            this.vy = 0;
            this.canKick = true;
            // Create floor dust
            for(let i=0; i<10; i++) {
                particles.push(new Particle(this.x + (Math.random()*40-20), this.y, 'ink'));
            }
            
            // Auto jump again after a delay if playing
            setTimeout(() => {
                if(state.playing && this.y >= CONFIG.groundY) {
                    this.vy = CONFIG.jumpForce;
                    this.canKick = false; // Cannot kick immediately off ground
                    setTimeout(() => this.canKick = true, 1000);
                }
            }, 600);
        }

        this.frame++;
    }

    performKick() {
        this.vy = CONFIG.kickForce;
        this.legState = 2;
        this.canKick = false; // Must land or wait to kick again
        state.shake = 10;
        
        // Visual Effects
        // 1. Shockwave
        for(let i=0; i<8; i++) {
            particles.push(new Particle(this.x, this.y + 20, 'qi'));
        }
        // 2. Ink Splash (The "Step")
        for(let i=0; i<20; i++) {
            particles.push(new Particle(this.x, this.y + 20, 'ink'));
        }
        // 3. Sparks
        for(let i=0; i<5; i++) {
            particles.push(new Particle(this.x, this.y + 20, 'spark'));
        }

        // Reset leg state after animation
        setTimeout(() => { this.legState = 0; }, 200);
        setTimeout(() => { this.canKick = true; }, 1500);
    }

    draw(ctx, camY) {
        // Draw Trail
        this.trail.forEach(t => t.draw(ctx, camY));

        // Draw Hero
        ctx.save();
        ctx.translate(this.x, this.y - camY);
        ctx.rotate(this.rotation);
        
        // Ink Style Drawing
        ctx.fillStyle = '#000';
        ctx.strokeStyle = '#000';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Body (Robe) - Calligraphic stroke style
        ctx.beginPath();
        ctx.moveTo(0, -25); // Head
        ctx.bezierCurveTo(15, -10, 20, 20, 15, 50); // Right side flow
        ctx.bezierCurveTo(10, 55, -10, 55, -15, 50); // Bottom hem
        ctx.bezierCurveTo(-20, 20, -15, -10, 0, -25); // Left side flow
        ctx.fill();

        // Head
        ctx.beginPath();
        ctx.arc(0, -30, 6, 0, Math.PI*2);
        ctx.fill();

        // Sash/Belt
        ctx.beginPath();
        ctx.moveTo(-12, 10);
        ctx.quadraticCurveTo(0, 15, 12, 10);
        ctx.lineWidth = 3;
        ctx.stroke();

        // Sleeves (Flowing)
        ctx.beginPath();
        ctx.moveTo(5, -15);
        ctx.quadraticCurveTo(25, -5, 35, 10); // Right sleeve
        ctx.lineWidth = 6;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-5, -15);
        ctx.quadraticCurveTo(-25, -5, -35, 10); // Left sleeve
        ctx.stroke();

        // Legs
        ctx.lineWidth = 5;
        ctx.beginPath();
        if (this.legState === 2) {
            // Kicking Pose
            // Standing leg
            ctx.moveTo(0, 20);
            ctx.lineTo(-5, 45);
            ctx.stroke();
            
            // Kicking leg (Downward force visualization)
            ctx.beginPath();
            ctx.moveTo(0, 20);
            ctx.lineTo(15, 35); // Extended
            ctx.lineTo(25, 35); // Foot
            ctx.stroke();
            
            // Impact point visual
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(25, 40, 10, 4, Math.PI/4, 0, Math.PI*2);
            ctx.fill();

        } else {
            // Normal falling/jumping pose
            ctx.moveTo(0, 20);
            ctx.lineTo(-8, 45);
            ctx.moveTo(0, 20);
            ctx.lineTo(8, 45);
            ctx.stroke();
        }

        ctx.restore();
    }
}

class BackgroundMountain {
    constructor(layer) {
        this.layer = layer;
        this.points = [];
        this.generate();
        this.xOffset = Math.random() * 100;
        this.speed = (layer + 1) * 0.5; // Parallax speed
        this.opacity = 1 - (layer * 0.2);
    }

    generate() {
        let yBase = height - (this.layer * 100);
        let x = 0;
        while(x < width + 200) {
            this.points.push({
                x: x,
                y: yBase + Math.random() * 100 - 50
            });
            x += Math.random() * 50 + 20;
        }
        // Close the shape
        this.points.push({x: width + 200, y: height + 200});
        this.points.push({x: -200, y: height + 200});
    }

    update(camY) {
        // Move down as camera moves up
        // But also drift slightly horizontally for life
        this.xOffset += 0.1;
    }

    draw(ctx, camY) {
        ctx.save();
        // Parallax: Move slower than camera
        const parallaxY = camY * (0.2 + this.layer * 0.1);
        
        ctx.translate(this.xOffset, -parallaxY);
        ctx.fillStyle = `rgba(20, 20, 20, ${this.opacity * 0.3})`;
        
        ctx.beginPath();
        if (this.points.length > 0) {
            ctx.moveTo(this.points[0].x, this.points[0].y);
            for (let i = 1; i < this.points.length; i++) {
                // Smooth curve through points
                const p = this.points[i];
                const prev = this.points[i-1];
                const cx = (prev.x + p.x) / 2;
                const cy = (prev.y + p.y) / 2;
                ctx.quadraticCurveTo(prev.x, prev.y, cx, cy);
            }
            ctx.lineTo(width + 200, height + 200);
            ctx.lineTo(-200, height + 200);
        }
        ctx.fill();
        
        // Add some "texture" strokes to look like ink wash
        ctx.strokeStyle = `rgba(0,0,0, ${this.opacity * 0.1})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(50, this.points[2].y);
        ctx.lineTo(100, this.points[2].y + 50);
        ctx.stroke();

        ctx.restore();
    }
}

// --- Global Variables ---
let hero;
let particles = [];
let mountains = [];

function initBackground() {
    mountains = [];
    for(let i=0; i<5; i++) {
        mountains.push(new BackgroundMountain(i));
    }
}

function init() {
    resize();
    hero = new Hero();
    hero.vy = CONFIG.jumpForce; // Start with a jump
    loop();
}

function loop(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    // Clear Canvas with slight fade for motion blur effect? 
    // No, clean clear for crisp ink lines, we handle blur in particles
    ctx.clearRect(0, 0, width, height);

    // Apply Screen Shake
    ctx.save();
    if (state.shake > 0) {
        const dx = (Math.random() - 0.5) * state.shake;
        const dy = (Math.random() - 0.5) * state.shake;
        ctx.translate(dx, dy);
    }

    // Draw Background (Parallax)
    mountains.forEach(m => {
        m.update(state.cameraY);
        m.draw(ctx, state.cameraY);
    });

    // Update & Draw Particles
    // Use 'multiply' for ink blending
    ctx.globalCompositeOperation = 'multiply';
    particles.forEach(p => {
        p.update();
        p.draw(ctx, state.cameraY);
    });
    particles = particles.filter(p => p.life > 0);
    
    // Reset composite for hero (solid black)
    ctx.globalCompositeOperation = 'source-over';

    // Update & Draw Hero
    hero.update();
    hero.draw(ctx, state.cameraY);

    ctx.restore();

    // Check Game Over / Replay condition
    // If hero stays on ground for too long without moving up significantly
    if (state.playing && hero.y >= CONFIG.groundY - 1 && hero.vy === 0) {
        // Simple debounce to show restart
        if (!restartHint.classList.contains('visible')) {
             // Wait a bit before showing hint
             setTimeout(() => {
                 if(hero.y >= CONFIG.groundY - 1) restartHint.classList.add('visible');
             }, 1000);
        }
    } else {
        restartHint.classList.remove('visible');
    }

    animationId = requestAnimationFrame(loop);
}

// Interaction
canvas.addEventListener('click', () => {
    if (!state.playing || hero.y >= CONFIG.groundY - 10) {
        hero.reset();
    } else {
        // Manual jump if clicked mid-air (optional mechanic)
        // hero.vy = -10; 
    }
});

restartHint.addEventListener('click', (e) => {
    e.stopPropagation();
    hero.reset();
});

// Start
init();

</script>
</body>
</html>
