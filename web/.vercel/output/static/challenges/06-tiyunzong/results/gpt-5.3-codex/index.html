<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>梯云纵 · Tī Yún Zòng</title>
  <style>
    :root {
      --ink: #171717;
      --paper: #efe6d2;
      --paper2: #e3d7bf;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 20% 10%, #f6eddb 0%, #eadfc8 45%, #dac8aa 100%);
      font-family: "KaiTi", "STKaiti", "Kaiti SC", serif;
      cursor: pointer;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    (() => {
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      let w = 0;
      let h = 0;
      let dpr = 1;

      const TAU = Math.PI * 2;
      const rand = (a, b) => a + Math.random() * (b - a);
      const lerp = (a, b, t) => a + (b - a) * t;
      const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

      let camX = 0;
      let camY = 0;

      const state = {
        time: 0,
        running: true,
        ended: false,
        beat: 0.34,
        beatTimer: 0,
        beatCount: 0,
        maxBeats: 22,
        phase: 1,
        lastBurstTime: 0,
      };

      const fighter = {
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
      };

      const trails = [];
      const shockwaves = [];
      const inks = [];
      const clouds = [];
      const bamboo = [];
      const farMountains = [];
      const nearMountains = [];

      const paper = document.createElement("canvas");
      const pctx = paper.getContext("2d");

      function resize() {
        dpr = Math.min(2, window.devicePixelRatio || 1);
        w = Math.floor(window.innerWidth);
        h = Math.floor(window.innerHeight);
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        paper.width = 420;
        paper.height = 420;
        drawPaperTexture();
      }

      function drawPaperTexture() {
        pctx.clearRect(0, 0, paper.width, paper.height);
        const g = pctx.createLinearGradient(0, 0, 0, paper.height);
        g.addColorStop(0, "rgba(255,255,255,0.06)");
        g.addColorStop(1, "rgba(0,0,0,0.04)");
        pctx.fillStyle = "#eadfca";
        pctx.fillRect(0, 0, paper.width, paper.height);
        pctx.fillStyle = g;
        pctx.fillRect(0, 0, paper.width, paper.height);

        for (let i = 0; i < 2600; i++) {
          const x = Math.random() * paper.width;
          const y = Math.random() * paper.height;
          const a = Math.random() * 0.07;
          const r = Math.random() < 0.95 ? 1 : 2;
          pctx.fillStyle = `rgba(60,45,30,${a})`;
          pctx.fillRect(x, y, r, 1);
        }

        for (let i = 0; i < 180; i++) {
          const x = Math.random() * paper.width;
          const y = Math.random() * paper.height;
          const len = rand(12, 28);
          pctx.strokeStyle = `rgba(80,60,45,${rand(0.03, 0.06)})`;
          pctx.lineWidth = rand(0.4, 0.8);
          pctx.beginPath();
          pctx.moveTo(x, y);
          pctx.lineTo(x + len, y + rand(-2, 2));
          pctx.stroke();
        }
      }

      function initScene() {
        clouds.length = 0;
        bamboo.length = 0;
        farMountains.length = 0;
        nearMountains.length = 0;

        for (let i = 0; i < 18; i++) {
          clouds.push({
            x: rand(-900, 900),
            y: rand(80, 1700),
            s: rand(0.7, 2.2),
            v: rand(4, 12),
            p: rand(0.18, 0.34),
          });
        }

        for (let i = 0; i < 34; i++) {
          bamboo.push({
            x: rand(-1200, 1200),
            y: rand(-80, 380),
            h: rand(160, 420),
            w: rand(5, 11),
            sway: rand(0.8, 2.4),
            phase: rand(0, TAU),
            p: i % 2 ? 0.6 : 0.75,
            a: i % 2 ? 0.26 : 0.35,
          });
        }

        for (let i = 0; i < 10; i++) {
          farMountains.push({
            x: -1500 + i * 320 + rand(-80, 80),
            y: rand(-120, 40),
            w: rand(460, 720),
            h: rand(180, 300),
          });
        }

        for (let i = 0; i < 9; i++) {
          nearMountains.push({
            x: -1400 + i * 340 + rand(-100, 100),
            y: rand(-160, 20),
            w: rand(400, 620),
            h: rand(230, 360),
          });
        }
      }

      function reset() {
        state.time = 0;
        state.running = true;
        state.ended = false;
        state.beat = 0.34;
        state.beatTimer = 0;
        state.beatCount = 0;
        state.phase = 1;
        state.lastBurstTime = -10;

        fighter.x = 0;
        fighter.y = 0;
        fighter.vx = 0;
        fighter.vy = 0;

        camX = 0;
        camY = 0;

        trails.length = 0;
        shockwaves.length = 0;
        inks.length = 0;
      }

      function worldToScreen(x, y, parallax = 1) {
        return {
          x: w * 0.5 + x - camX * parallax,
          y: h * 0.78 - (y - camY * parallax),
        };
      }

      function burst(x, y) {
        shockwaves.push({ x, y, r: 12, life: 0, ttl: 0.7 + Math.random() * 0.25 });

        for (let i = 0; i < 32; i++) {
          const a = rand(-Math.PI * 0.95, Math.PI * 0.05);
          const sp = rand(45, 220);
          inks.push({
            x,
            y,
            vx: Math.cos(a) * sp + rand(-18, 18),
            vy: Math.sin(a) * sp + rand(-12, 12),
            g: rand(190, 330),
            life: 0,
            ttl: rand(0.45, 1.15),
            r: rand(1.2, 4.4),
            k: rand(0.8, 1.4),
          });
        }
      }

      function stepImpulse() {
        state.phase *= -1;
        state.beatCount++;
        state.lastBurstTime = state.time;

        fighter.vy += 205 + state.beatCount * 4;
        fighter.vx += state.phase * rand(26, 42);
        burst(fighter.x, fighter.y - 24);
      }

      function update(dt) {
        if (!state.running) return;

        state.time += dt;
        state.beatTimer += dt;

        if (state.beatCount < state.maxBeats && state.beatTimer >= state.beat) {
          state.beatTimer = 0;
          stepImpulse();
          state.beat = clamp(state.beat - 0.005, 0.18, 0.34);
        }

        fighter.vy -= 235 * dt;
        fighter.vx *= Math.pow(0.96, dt * 60);
        fighter.x += fighter.vx * dt;
        fighter.y += fighter.vy * dt;

        if (fighter.y < 0) {
          fighter.y = 0;
          fighter.vy = 0;
        }

        const targetCamY = fighter.y - 80;
        const targetCamX = fighter.x * 0.35;
        camY = lerp(camY, targetCamY, 0.08);
        camX = lerp(camX, targetCamX, 0.06);

        trails.push({ x: fighter.x, y: fighter.y, t: state.time, p: state.phase });
        while (trails.length > 55) trails.shift();

        for (let i = shockwaves.length - 1; i >= 0; i--) {
          const s = shockwaves[i];
          s.life += dt;
          s.r += 360 * dt;
          if (s.life > s.ttl) shockwaves.splice(i, 1);
        }

        for (let i = inks.length - 1; i >= 0; i--) {
          const p = inks[i];
          p.life += dt;
          p.vy -= p.g * dt;
          p.vx *= Math.pow(0.985, dt * 60);
          p.vy *= Math.pow(0.988, dt * 60);
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          if (p.life > p.ttl) inks.splice(i, 1);
        }

        for (const c of clouds) {
          c.x += c.v * dt;
          if (c.x > 1300) c.x = -1300;
        }

        const doneAscending =
          state.beatCount >= state.maxBeats &&
          state.time - state.lastBurstTime > 1.8 &&
          fighter.vy <= 40;

        if (doneAscending) {
          state.running = false;
          state.ended = true;
        }
      }

      function drawSky() {
        const g = ctx.createLinearGradient(0, 0, 0, h);
        g.addColorStop(0, "#f8efdf");
        g.addColorStop(0.55, "#efe3cb");
        g.addColorStop(1, "#ddccb0");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);

        ctx.globalAlpha = 0.44;
        const pattern = ctx.createPattern(paper, "repeat");
        ctx.fillStyle = pattern;
        ctx.fillRect(0, 0, w, h);
        ctx.globalAlpha = 1;
      }

      function drawMoon() {
        const m = worldToScreen(-320, 960, 0.1);
        const r = Math.min(w, h) * 0.1;

        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(m.x, m.y, r, 0, TAU);
        ctx.fillStyle = "rgba(30,30,30,0.08)";
        ctx.fill();

        ctx.beginPath();
        ctx.arc(m.x + r * 0.16, m.y - r * 0.05, r * 0.88, 0, TAU);
        ctx.fillStyle = "rgba(250,246,237,0.95)";
        ctx.fill();
        ctx.restore();
      }

      function paintMountain(layer, parallax, shade) {
        ctx.fillStyle = shade;
        for (const mtn of layer) {
          const p = worldToScreen(mtn.x, mtn.y, parallax);
          const baseY = p.y;
          const left = p.x - mtn.w * 0.5;
          const right = p.x + mtn.w * 0.5;
          const top = baseY - mtn.h;

          ctx.beginPath();
          ctx.moveTo(left, baseY);
          ctx.quadraticCurveTo(p.x - mtn.w * 0.16, top + rand(-18, 14), p.x, top);
          ctx.quadraticCurveTo(p.x + mtn.w * 0.18, top + rand(-10, 18), right, baseY);
          ctx.closePath();
          ctx.fill();
        }
      }

      function drawCloud(c) {
        const p = worldToScreen(c.x, c.y, c.p);
        const s = 58 * c.s;

        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = "#111";
        for (let i = 0; i < 5; i++) {
          const ox = (i - 2) * s * 0.34 + rand(-2, 2);
          const oy = Math.sin(i * 0.9 + c.x * 0.002) * s * 0.12;
          ctx.beginPath();
          ctx.ellipse(p.x + ox, p.y + oy, s * 0.35, s * 0.18, 0, 0, TAU);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawBamboo() {
        for (const b of bamboo) {
          const p = worldToScreen(b.x, b.y, b.p);
          const sway = Math.sin(state.time * b.sway + b.phase) * 10;
          const topX = p.x + sway;
          const topY = p.y - b.h;

          ctx.strokeStyle = `rgba(26,26,22,${b.a})`;
          ctx.lineWidth = b.w;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.quadraticCurveTo(p.x + sway * 0.4, p.y - b.h * 0.45, topX, topY);
          ctx.stroke();

          ctx.lineWidth = 1.1;
          for (let k = 1; k < 8; k++) {
            const t = k / 8;
            const nx = lerp(p.x, topX, t);
            const ny = lerp(p.y, topY, t);
            ctx.strokeStyle = `rgba(10,10,10,${b.a * 0.8})`;
            ctx.beginPath();
            ctx.moveTo(nx - b.w * 0.7, ny);
            ctx.lineTo(nx + b.w * 0.7, ny);
            ctx.stroke();
          }

          for (let j = 0; j < 3; j++) {
            const t = 0.2 + j * 0.22;
            const lx = lerp(p.x, topX, t);
            const ly = lerp(p.y, topY, t);
            ctx.strokeStyle = `rgba(22,22,18,${b.a * 0.66})`;
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.moveTo(lx, ly);
            ctx.quadraticCurveTo(lx - 24, ly - 8, lx - 42, ly - 20);
            ctx.moveTo(lx, ly);
            ctx.quadraticCurveTo(lx + 22, ly - 10, lx + 40, ly - 24);
            ctx.stroke();
          }
        }
      }

      function drawShockwaves() {
        for (const s of shockwaves) {
          const p = worldToScreen(s.x, s.y, 1);
          const t = s.life / s.ttl;
          const alpha = (1 - t) * 0.32;

          ctx.strokeStyle = `rgba(20,20,20,${alpha})`;
          ctx.lineWidth = 2 + (1 - t) * 2;
          ctx.beginPath();
          ctx.arc(p.x, p.y, s.r, 0, TAU);
          ctx.stroke();

          ctx.strokeStyle = `rgba(20,20,20,${alpha * 0.6})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(p.x, p.y, s.r * 0.65, 0, TAU);
          ctx.stroke();
        }
      }

      function drawInks() {
        for (const p of inks) {
          const s = worldToScreen(p.x, p.y, 1);
          const t = p.life / p.ttl;
          ctx.fillStyle = `rgba(14,14,14,${(1 - t) * 0.4})`;
          ctx.beginPath();
          ctx.ellipse(s.x, s.y, p.r * (0.6 + p.k * 0.7), p.r * 0.6, Math.atan2(p.vy, p.vx), 0, TAU);
          ctx.fill();
        }
      }

      function drawFighter(x, y, alpha, phase, stepT) {
        const p = worldToScreen(x, y, 1);
        const lift = Math.sin(clamp(stepT, 0, 1) * Math.PI);
        const torso = 42;
        const hipY = p.y;
        const shoulderY = p.y - torso;

        const rear = phase > 0 ? -1 : 1;
        const front = -rear;

        const rearFootX = p.x + rear * (9 + lift * 5);
        const rearFootY = p.y + 18 - lift * 16;
        const frontFootX = p.x + front * (8 + lift * 10);
        const frontFootY = p.y + 18 + lift * 12;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = "rgba(8,8,8,0.86)";
        ctx.lineCap = "round";

        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(p.x, hipY - 3);
        ctx.lineTo(p.x + rear * 4, shoulderY);
        ctx.stroke();

        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(p.x + rear * 2, shoulderY + 10);
        ctx.quadraticCurveTo(p.x + rear * 12, shoulderY + 20, rearFootX, rearFootY);
        ctx.moveTo(p.x - rear * 1, shoulderY + 12);
        ctx.quadraticCurveTo(p.x + front * 14, shoulderY + 28, frontFootX, frontFootY);
        ctx.stroke();

        ctx.lineWidth = 3.3;
        const armSwing = Math.sin(stepT * Math.PI * 2) * 9;
        ctx.beginPath();
        ctx.moveTo(p.x + rear * 2, shoulderY + 2);
        ctx.quadraticCurveTo(p.x - rear * 16, shoulderY + 14, p.x - rear * (26 + armSwing), shoulderY + 26);
        ctx.moveTo(p.x + rear * 3, shoulderY + 3);
        ctx.quadraticCurveTo(p.x + rear * 14, shoulderY + 16, p.x + rear * (20 - armSwing * 0.5), shoulderY + 30);
        ctx.stroke();

        ctx.fillStyle = "rgba(10,10,10,0.9)";
        ctx.beginPath();
        ctx.arc(p.x + rear * 4, shoulderY - 11, 7.5, 0, TAU);
        ctx.fill();

        ctx.globalAlpha = alpha * 0.22;
        ctx.strokeStyle = "rgba(15,15,15,0.7)";
        ctx.lineWidth = 11;
        ctx.beginPath();
        ctx.moveTo(p.x + front * 4, shoulderY + 6);
        ctx.quadraticCurveTo(p.x + front * 22, shoulderY + 30, p.x + front * 32, shoulderY + 52);
        ctx.stroke();
        ctx.restore();
      }

      function drawTrails() {
        const n = trails.length;
        if (!n) return;

        for (let i = 0; i < n; i += 2) {
          const tr = trails[i];
          const t = i / n;
          const alpha = t * 0.18;
          drawFighter(tr.x, tr.y, alpha, tr.p, t);
        }
      }

      function drawQiAura() {
        const pulse = Math.exp(-(state.time - state.lastBurstTime) * 6);
        if (pulse < 0.02) return;

        const p = worldToScreen(fighter.x, fighter.y + 6, 1);
        const r = 28 + (1 - pulse) * 60;

        ctx.save();
        ctx.globalAlpha = pulse * 0.16;
        ctx.strokeStyle = "rgba(20,20,20,0.7)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y - 24, r * 0.62, 0, TAU);
        ctx.stroke();

        ctx.globalAlpha = pulse * 0.1;
        ctx.beginPath();
        ctx.arc(p.x, p.y - 24, r, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }

      function drawTitle() {
        ctx.save();
        ctx.fillStyle = "rgba(10,10,10,0.68)";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";

        const s1 = Math.max(26, Math.min(46, w * 0.04));
        ctx.font = `${s1}px KaiTi, STKaiti, serif`;
        ctx.fillText("梯云纵", 24, 22);

        ctx.font = `${Math.max(13, s1 * 0.36)}px serif`;
        ctx.fillStyle = "rgba(10,10,10,0.48)";
        ctx.fillText("Tī Yún Zòng", 28, 22 + s1 + 4);
        ctx.restore();
      }

      function drawReplayHint() {
        if (!state.ended) return;

        const alpha = 0.46 + Math.sin(state.time * 3.5) * 0.18;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "#111";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `${Math.max(16, Math.min(28, w * 0.024))}px KaiTi, STKaiti, serif`;
        ctx.fillText("点击重演 · Click to Replay", w * 0.5, h * 0.9);
        ctx.restore();
      }

      function render() {
        drawSky();
        drawMoon();

        paintMountain(farMountains, 0.18, "rgba(22,22,22,0.13)");
        for (const c of clouds) drawCloud(c);
        paintMountain(nearMountains, 0.28, "rgba(20,20,20,0.2)");
        drawBamboo();

        drawShockwaves();
        drawInks();
        drawTrails();

        const stepT = state.beat <= 0 ? 0 : state.beatTimer / state.beat;
        drawFighter(fighter.x, fighter.y, 1, state.phase, stepT);
        drawQiAura();

        drawTitle();
        drawReplayHint();
      }

      let last = performance.now();
      function frame(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;

        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("click", () => {
        reset();
      });

      resize();
      initScene();
      reset();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
