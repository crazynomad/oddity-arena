<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baron Munchausen's Impossible Escape</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        #gameCanvas {
            border: 3px solid #8b4513;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        
        .title {
            position: absolute;
            top: 20px;
            color: #f1c40f;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        .instruction {
            position: absolute;
            bottom: 20px;
            color: #ecf0f1;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="title">Baron Munchausen's Impossible Escape</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="instruction">Click to replay the tale!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let animationId;
        let currentScene = 0;
        let sceneTime = 0;
        let totalTime = 0;
        
        // Animation states
        const SCENES = {
            WALKING: 0,
            SINKING: 1,
            PANIC: 2,
            EUREKA: 3,
            PULLING: 4,
            RISING: 5,
            TRIUMPH: 6
        };
        
        // Baron properties
        let baron = {
            x: 100,
            y: 300,
            sinkDepth: 0,
            pullHeight: 0,
            armAngle: 0,
            legAngle: 0,
            eyeState: 'normal',
            mouthState: 'normal',
            walkCycle: 0,
            panicShake: 0
        };
        
        // Particles
        let particles = [];
        let bubbles = [];
        let sparkles = [];
        
        // Particle system
        class Particle {
            constructor(x, y, vx, vy, color, life) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = life;
                this.maxLife = life;
                this.size = Math.random() * 8 + 4;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // gravity
                this.vx *= 0.99; // friction
                this.life--;
                this.size *= 0.99;
            }
            
            draw() {
                const alpha = this.life / this.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        class Bubble {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 10 + 5;
                this.vy = -Math.random() * 2 - 1;
                this.life = 180;
                this.wobble = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.y += this.vy;
                this.x += Math.sin(this.wobble) * 0.5;
                this.wobble += 0.1;
                this.life--;
            }
            
            draw() {
                const alpha = Math.min(this.life / 60, 0.6);
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = '#87ceeb';
                ctx.fillStyle = 'rgba(135, 206, 235, 0.2)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
        
        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 60;
                this.rotation = Math.random() * Math.PI * 2;
                this.size = Math.random() * 3 + 2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += 0.2;
                this.life--;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }
            
            draw() {
                const alpha = this.life / 60;
                ctx.globalAlpha = alpha;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = '#ffd700';
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 10;
                
                // Draw star shape
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * Math.PI * 2) / 5;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }
        
        function createMudSplash(x, y) {
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed - Math.random() * 3;
                particles.push(new Particle(x, y, vx, vy, '#8b4513', 120));
            }
        }
        
        function createBubbles(x, y, count = 5) {
            for (let i = 0; i < count; i++) {
                bubbles.push(new Bubble(x + (Math.random() - 0.5) * 40, y));
            }
        }
        
        function createSparkles(x, y, count = 10) {
            for (let i = 0; i < count; i++) {
                sparkles.push(new Sparkle(x + (Math.random() - 0.5) * 60, y + (Math.random() - 0.5) * 60));
            }
        }
        
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, '#87ceeb');
            gradient.addColorStop(1, '#98fb98');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, 400);
            
            // Swamp
            ctx.fillStyle = '#2d4a2d';
            ctx.fillRect(0, 400, canvas.width, 200);
            
            // Swamp surface with ripples
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(0, 380, canvas.width, 40);
            
            // Add some swamp details
            for (let i = 0; i < canvas.width; i += 20) {
                const ripple = Math.sin((i + totalTime * 0.05) * 0.1) * 3;
                ctx.fillStyle = '#654321';
                ctx.fillRect(i, 380 + ripple, 15, 8);
            }
        }
        
        function drawBaron() {
            ctx.save();
            ctx.translate(baron.x, baron.y - baron.sinkDepth + baron.pullHeight);
            
            // Add panic shake
            if (baron.panicShake > 0) {
                ctx.translate(
                    (Math.random() - 0.5) * baron.panicShake,
                    (Math.random() - 0.5) * baron.panicShake
                );
            }
            
            // Body
            ctx.fillStyle = '#4169e1';
            ctx.fillRect(-20, -10, 40, 60);
            
            // Arms
            ctx.save();
            ctx.translate(-25, 0);
            ctx.rotate(baron.armAngle);
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(-5, -5, 30, 10);
            ctx.restore();
            
            ctx.save();
            ctx.translate(25, 0);
            ctx.rotate(-baron.armAngle);
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(-25, -5, 30, 10);
            ctx.restore();
            
            // Legs (if visible)
            if (baron.sinkDepth < 60) {
                ctx.save();
                ctx.translate(-10, 50);
                ctx.rotate(baron.legAngle);
                ctx.fillStyle = '#8b0000';
                ctx.fillRect(-5, 0, 10, 30);
                ctx.restore();
                
                ctx.save();
                ctx.translate(10, 50);
                ctx.rotate(-baron.legAngle);
                ctx.fillStyle = '#8b0000';
                ctx.fillRect(-5, 0, 10, 30);
                ctx.restore();
            }
            
            // Head
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath();
            ctx.arc(0, -25, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // Hat
            ctx.fillStyle = '#8b0000';
            ctx.fillRect(-20, -50, 40, 25);
            ctx.beginPath();
            ctx.arc(0, -50, 20, Math.PI, 0);
            ctx.fill();
            
            // Magnificent mustache
            ctx.fillStyle = '#8b4513';
            ctx.beginPath();
            ctx.arc(-15, -15, 8, 0, Math.PI);
            ctx.arc(15, -15, 8, 0, Math.PI);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-8, -30, 5, 0, Math.PI * 2);
            ctx.arc(8, -30, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'black';
            const eyeOffset = baron.eyeState === 'panic' ? 2 : 0;
            ctx.beginPath();
            ctx.arc(-8 + eyeOffset, -30, 2, 0, Math.PI * 2);
            ctx.arc(8 + eyeOffset, -30, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Mouth
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (baron.mouthState === 'panic') {
                ctx.arc(0, -10, 8, 0, Math.PI);
            } else if (baron.mouthState === 'eureka') {
                ctx.arc(0, -10, 8, Math.PI, 0);
            } else if (baron.mouthState === 'triumph') {
                ctx.arc(0, -15, 12, Math.PI, 0);
            } else {
                ctx.moveTo(-5, -10);
                ctx.lineTo(5, -10);
            }
            ctx.stroke();
            
            // Hair (magnificent flowing locks)
            ctx.fillStyle = '#8b4513';
            ctx.beginPath();
            ctx.arc(-20, -40, 8, 0, Math.PI * 2);
            ctx.arc(-15, -45, 6, 0, Math.PI * 2);
            ctx.arc(20, -40, 8, 0, Math.PI * 2);
            ctx.arc(15, -45, 6, 0, Math.PI * 2);
            ctx.arc(0, -48, 10, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        function updateScene() {
            sceneTime++;
            totalTime++;
            
            switch (currentScene) {
                case SCENES.WALKING:
                    baron.walkCycle += 0.2;
                    baron.armAngle = Math.sin(baron.walkCycle) * 0.3;
                    baron.legAngle = Math.sin(baron.walkCycle + Math.PI) * 0.3;
                    baron.x += 1;
                    
                    if (baron.x > 350) {
                        currentScene = SCENES.SINKING;
                        sceneTime = 0;
                    }
                    break;
                    
                case SCENES.SINKING:
                    baron.sinkDepth += 1.5;
                    baron.eyeState = 'normal';
                    baron.mouthState = 'normal';
                    
                    if (sceneTime % 20 === 0) {
                        createMudSplash(baron.x, baron.y);
                        createBubbles(baron.x, baron.y - baron.sinkDepth + 20);
                    }
                    
                    if (baron.sinkDepth > 80) {
                        currentScene = SCENES.PANIC;
                        sceneTime = 0;
                    }
                    break;
                    
                case SCENES.PANIC:
                    baron.panicShake = 8;
                    baron.armAngle = Math.sin(totalTime * 0.5) * 1.2;
                    baron.eyeState = 'panic';
                    baron.mouthState = 'panic';
                    
                    if (sceneTime % 10 === 0) {
                        createBubbles(baron.x, baron.y - baron.sinkDepth + 20, 3);
                    }
                    
                    if (sceneTime > 120) {
                        currentScene = SCENES.EUREKA;
                        sceneTime = 0;
                    }
                    break;
                    
                case SCENES.EUREKA:
                    baron.panicShake = 0;
                    baron.armAngle = 0;
                    baron.eyeState = 'normal';
                    baron.mouthState = 'eureka';
                    
                    if (sceneTime === 30) {
                        createSparkles(baron.x, baron.y - baron.sinkDepth - 30, 15);
                    }
                    
                    if (sceneTime > 90) {
                        currentScene = SCENES.PULLING;
                        sceneTime = 0;
                    }
                    break;
                    
                case SCENES.PULLING:
                    baron.armAngle = -Math.PI / 2; // Arms up to hair
                    baron.pullHeight = sceneTime * 0.5;
                    
                    if (sceneTime % 15 === 0) {
                        createSparkles(baron.x, baron.y - baron.sinkDepth - 40, 5);
                    }
                    
                    if (sceneTime > 60) {
                        currentScene = SCENES.RISING;
                        sceneTime = 0;
                    }
                    break;
                    
                case SCENES.RISING:
                    baron.pullHeight += 3;
                    baron.sinkDepth = Math.max(0, baron.sinkDepth - 2);
                    
                    if (sceneTime % 8 === 0) {
                        createSparkles(baron.x, baron.y - baron.sinkDepth + baron.pullHeight - 50, 8);
                        createMudSplash(baron.x, baron.y);
                    }
                    
                    if (baron.pullHeight > 150) {
                        currentScene = SCENES.TRIUMPH;
                        sceneTime = 0;
                    }
                    break;
                    
                case SCENES.TRIUMPH:
                    baron.armAngle = Math.PI / 4;
                    baron.mouthState = 'triumph';
                    baron.pullHeight = 150 + Math.sin(totalTime * 0.1) * 10;
                    
                    if (sceneTime % 20 === 0) {
                        createSparkles(baron.x, baron.y - baron.sinkDepth + baron.pullHeight - 80, 12);
                    }
                    
                    // Loop after triumph
                    if (sceneTime > 300) {
                        resetAnimation();
                    }
                    break;
            }
        }
        
        function updateParticles() {
            particles = particles.filter(p => {
                p.update();
                return p.life > 0;
            });
            
            bubbles = bubbles.filter(b => {
                b.update();
                return b.life > 0 && b.y > -50;
            });
            
            sparkles = sparkles.filter(s => {
                s.update();
                return s.life > 0;
            });
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            
            // Draw particles behind baron
            particles.forEach(p => p.draw());
            bubbles.forEach(b => b.draw());
            
            drawBaron();
            
            // Draw sparkles in front
            sparkles.forEach(s => s.draw());
            
            // Scene title
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(10, 10, 300, 40);
            ctx.fillStyle = '#ffd700';
            ctx.font = '18px Courier New';
            
            const sceneTitles = [
                'A leisurely stroll...',
                'Into the treacherous swamp!',
                'Panic sets in!',
                'A brilliant idea strikes!',
                'By his own hair!',
                'Defying all logic!',
                'Victory through impossibility!'
            ];
            
            ctx.fillText(sceneTitles[currentScene], 20, 35);
        }
        
        function resetAnimation() {
            currentScene = 0;
            sceneTime = 0;
            totalTime = 0;
            baron = {
                x: 100,
                y: 300,
                sinkDepth: 0,
                pullHeight: 0,
                armAngle: 0,
                legAngle: 0,
                eyeState: 'normal',
                mouthState: 'normal',
                walkCycle: 0,
                panicShake: 0
            };
            particles = [];
            bubbles = [];
            sparkles = [];
        }
        
        function gameLoop() {
            updateScene();
            updateParticles();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Start animation
        resetAnimation();
        gameLoop();
        
        // Click to replay
        canvas.addEventListener('click', () => {
            resetAnimation();
        });
    </script>
</body>
</html>
