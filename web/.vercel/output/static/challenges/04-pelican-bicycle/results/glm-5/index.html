<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelican Riding a Bicycle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98D98E 90%, #6B8E23 100%);
            overflow: hidden;
        }
        svg {
            max-width: 90vw;
            max-height: 90vh;
        }
        .wheel {
            animation: spin 2s linear infinite;
            transform-origin: center;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .pelican-body {
            animation: bob 1s ease-in-out infinite;
        }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .leg {
            animation: pedal 1s ease-in-out infinite;
            transform-origin: top center;
        }
        .leg-left {
            animation-delay: 0s;
        }
        .leg-right {
            animation-delay: 0.5s;
        }
        @keyframes pedal {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
        .wing {
            animation: flap 2s ease-in-out infinite;
            transform-origin: top right;
        }
        @keyframes flap {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-5deg); }
        }
        .cloud {
            animation: float 8s ease-in-out infinite;
        }
        .cloud:nth-child(2) {
            animation-delay: -3s;
            animation-duration: 10s;
        }
        @keyframes float {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(20px); }
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#87CEEB"/>
                <stop offset="100%" style="stop-color:#E0F6FF"/>
            </linearGradient>
            <linearGradient id="pelicanBody" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#FFFFFF"/>
                <stop offset="100%" style="stop-color:#E8E8E8"/>
            </linearGradient>
            <linearGradient id="beakGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#FFB347"/>
                <stop offset="100%" style="stop-color:#FF8C00"/>
            </linearGradient>
            <linearGradient id="pouchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#FFD699"/>
                <stop offset="100%" style="stop-color:#FFB347"/>
            </linearGradient>
        </defs>
        
        <!-- Clouds -->
        <g class="cloud">
            <ellipse cx="100" cy="80" rx="40" ry="25" fill="white" opacity="0.9"/>
            <ellipse cx="130" cy="70" rx="35" ry="22" fill="white" opacity="0.9"/>
            <ellipse cx="70" cy="85" rx="30" ry="20" fill="white" opacity="0.9"/>
        </g>
        <g class="cloud">
            <ellipse cx="500" cy="60" rx="45" ry="28" fill="white" opacity="0.8"/>
            <ellipse cx="535" cy="50" rx="38" ry="24" fill="white" opacity="0.8"/>
            <ellipse cx="465" cy="65" rx="32" ry="22" fill="white" opacity="0.8"/>
        </g>
        
        <!-- Sun -->
        <circle cx="520" cy="100" r="40" fill="#FFD700" opacity="0.9"/>
        <circle cx="520" cy="100" r="35" fill="#FFF59D"/>
        
        <!-- Ground -->
        <ellipse cx="300" cy="480" rx="280" ry="30" fill="#6B8E23" opacity="0.5"/>
        
        <!-- Bicycle -->
        <g id="bicycle">
            <!-- Back Wheel -->
            <g class="wheel" style="transform-origin: 180px 380px;">
                <circle cx="180" cy="380" r="70" fill="none" stroke="#2C3E50" stroke-width="6"/>
                <circle cx="180" cy="380" r="60" fill="none" stroke="#34495E" stroke-width="2"/>
                <circle cx="180" cy="380" r="8" fill="#2C3E50"/>
                <!-- Spokes -->
                <line x1="180" y1="310" x2="180" y2="450" stroke="#34495E" stroke-width="2"/>
                <line x1="110" y1="380" x2="250" y2="380" stroke="#34495E" stroke-width="2"/>
                <line x1="130" y1="330" x2="230" y2="430" stroke="#34495E" stroke-width="2"/>
                <line x1="130" y1="430" x2="230" y2="330" stroke="#34495E" stroke-width="2"/>
            </g>
            
            <!-- Front Wheel -->
            <g class="wheel" style="transform-origin: 420px 380px;">
                <circle cx="420" cy="380" r="70" fill="none" stroke="#2C3E50" stroke-width="6"/>
                <circle cx="420" cy="380" r="60" fill="none" stroke="#34495E" stroke-width="2"/>
                <circle cx="420" cy="380" r="8" fill="#2C3E50"/>
                <!-- Spokes -->
                <line x1="420" y1="310" x2="420" y2="450" stroke="#34495E" stroke-width="2"/>
                <line x1="350" y1="380" x2="490" y2="380" stroke="#34495E" stroke-width="2"/>
                <line x1="370" y1="330" x2="470" y2="430" stroke="#34495E" stroke-width="2"/>
                <line x1="370" y1="430" x2="470" y2="330" stroke="#34495E" stroke-width="2"/>
            </g>
            
            <!-- Frame -->
            <line x1="180" y1="380" x2="280" y2="290" stroke="#E74C3C" stroke-width="8" stroke-linecap="round"/>
            <line x1="280" y1="290" x2="280" y2="380" stroke="#E74C3C" stroke-width="8" stroke-linecap="round"/>
            <line x1="280" y1="380" x2="180" y2="380" stroke="#E74C3C" stroke-width="8" stroke-linecap="round"/>
            <line x1="280" y1="290" x2="420" y2="380" stroke="#E74C3C" stroke-width="8" stroke-linecap="round"/>
            <line x1="280" y1="290" x2="400" y2="290" stroke="#E74C3C" stroke-width="8" stroke-linecap="round"/>
            <line x1="400" y1="290" x2="420" y2="380" stroke="#E74C3C" stroke-width="8" stroke-linecap="round"/>
            
            <!-- Seat Post -->
            <line x1="280" y1="290" x2="270" y2="250" stroke="#2C3E50" stroke-width="6" stroke-linecap="round"/>
            <!-- Seat -->
            <ellipse cx="270" cy="245" rx="30" ry="10" fill="#2C3E50"/>
            
            <!-- Handlebar Post -->
            <line x1="400" y1="290" x2="405" y2="240" stroke="#2C3E50" stroke-width="6" stroke-linecap="round"/>
            <!-- Handlebars -->
            <line x1="375" y1="235" x2="435" y2="235" stroke="#2C3E50" stroke-width="6" stroke-linecap="round"/>
            <circle cx="375" cy="235" r="6" fill="#2C3E50"/>
            <circle cx="435" cy="235" r="6" fill="#2C3E50"/>
            
            <!-- Pedal Crank -->
            <circle cx="280" cy="380" r="12" fill="#2C3E50"/>
            <!-- Pedals -->
            <rect x="255" y="395" width="20" height="8" rx="2" fill="#34495E" class="pedal-left"/>
            <rect x="285" y="357" width="20" height="8" rx="2" fill="#34495E" class="pedal-right"/>
        </g>
        
        <!-- Pelican -->
        <g class="pelican-body">
            <!-- Tail feathers -->
            <path d="M200 260 Q160 270 170 290 Q180 285 200 280 Z" fill="#D0D0D0"/>
            <path d="M195 265 Q155 280 165 295 Q175 290 200 280 Z" fill="#E0E0E0"/>
            
            <!-- Body -->
            <ellipse cx="250" cy="230" rx="70" ry="55" fill="url(#pelicanBody)"/>
            
            <!-- Wing -->
            <path class="wing" d="M220 200 Q180 220 190 270 Q220 260 250 230 Q230 220 220 200 Z" fill="#D8D8D8" stroke="#C0C0C0" stroke-width="2"/>
            
            <!-- Wing detail -->
            <path d="M225 215 Q200 235 205 260" fill="none" stroke="#B0B0B0" stroke-width="2"/>
            <path d="M235 220 Q215 240 218 258" fill="none" stroke="#B0B0B0" stroke-width="2"/>
            
            <!-- Neck -->
            <path d="M300 220 Q340 200 350 150 Q360 120 350 90" fill="none" stroke="url(#pelicanBody)" stroke-width="35" stroke-linecap="round"/>
            <path d="M305 215 Q345 195 355 145 Q365 115 355 85" fill="none" stroke="#F5F5F5" stroke-width="30" stroke-linecap="round"/>
            
            <!-- Head -->
            <ellipse cx="355" cy="75" rx="28" ry="25" fill="url(#pelicanBody)"/>
            
            <!-- Eye -->
            <circle cx="365" cy="68" r="8" fill="white"/>
            <circle cx="367" cy="67" r="5" fill="#2C3E50"/>
            <circle cx="369" cy="65" r="2" fill="white"/>
            
            <!-- Beak upper -->
            <path d="M375 72 Q450 60 480 75 Q475 82 460 82 Q440 85 380 80 Z" fill="url(#beakGrad)" stroke="#E67E22" stroke-width="1"/>
            
            <!-- Beak tip hook -->
            <path d="M475 75 Q485 78 480 85 Q478 82 475 80 Z" fill="#FF6B00"/>
            
            <!-- Pouch -->
            <path d="M380 80 Q420 85 450 82 Q440 130 410 150 Q380 145 370 120 Q365 100 380 80 Z" fill="url(#pouchGrad)" stroke="#E67E22" stroke-width="1"/>
            
            <!-- Pouch detail lines -->
            <path d="M390 95 Q410 100 430 95" fill="none" stroke="#E6A04D" stroke-width="1" opacity="0.5"/>
            <path d="M385 110 Q410 118 435 110" fill="none" stroke="#E6A04D" stroke-width="1" opacity="0.5"/>
            <path d="M385 125 Q405 132 425 125" fill="none" stroke="#E6A04D" stroke-width="1" opacity="0.5"/>
            
            <!-- Beak line -->
            <path d="M380 80 Q430 78 458 80" fill="none" stroke="#D35400" stroke-width="2"/>
            
            <!-- Legs -->
            <g class="leg leg-left">
                <path d="M250 280 L255 340 L258 380" fill="none" stroke="#FFB347" stroke-width="8" stroke-linecap="round"/>
                <!-- Foot on pedal -->
                <ellipse cx="265" cy="395" rx="15" ry="6" fill="#FF8C00"/>
            </g>
            <g class="leg leg-right">
                <path d="M270 275 L275 330 L290 365" fill="none" stroke="#FFB347" stroke-width="8" stroke-linecap="round"/>
                <!-- Foot on pedal -->
                <ellipse cx="295" cy="365" rx="15" ry="6" fill="#FF8C00"/>
            </g>
            
            <!-- Belly highlight -->
            <ellipse cx="245" cy="250" rx="35" ry="25" fill="white" opacity="0.3"/>
        </g>
        
        <!-- Motion lines -->
        <g opacity="0.4">
            <line x1="80" y1="350" x2="50" y2="350" stroke="#87CEEB" stroke-width="3" stroke-linecap="round">
                <animate attributeName="opacity" values="0.4;0.1;0.4" dur="0.8s" repeatCount="indefinite"/>
            </line>
            <line x1="85" y1="370" x2="45" y2="370" stroke="#87CEEB" stroke-width="2" stroke-linecap="round">
                <animate attributeName="opacity" values="0.3;0.1;0.3" dur="0.8s" repeatCount="indefinite" begin="0.2s"/>
            </line>
            <line x1="80" y1="390" x2="55" y2="390" stroke="#87CEEB" stroke-width="3" stroke-linecap="round">
                <animate attributeName="opacity" values="0.4;0.1;0.4" dur="0.8s" repeatCount="indefinite" begin="0.4s"/>
            </line>
        </g>
    </svg>
</body>
</html>
