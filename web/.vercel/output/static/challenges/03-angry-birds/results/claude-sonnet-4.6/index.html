<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Birds</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Arial Black', Arial, sans-serif;
  overflow: hidden;
  user-select: none;
}
#ui {
  display: flex;
  gap: 24px;
  align-items: center;
  margin-bottom: 10px;
  color: white;
  font-size: 18px;
}
#ui span { background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 20px; }
#ui b { color: #f1c40f; }
#resetBtn {
  padding: 7px 20px;
  background: linear-gradient(180deg,#e74c3c,#c0392b);
  color: white;
  border: 2px solid #922b21;
  border-radius: 20px;
  cursor: pointer;
  font-size: 15px;
  font-weight: bold;
}
#resetBtn:hover { background: linear-gradient(180deg,#f15a4a,#e74c3c); }
#canvas { display: block; cursor: crosshair; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  align-items: center;
  justify-content: center;
}
#overlay.show { display: flex; }
#overlayBox {
  background: linear-gradient(180deg,#2c3e50,#1a252f);
  border: 3px solid #f1c40f;
  border-radius: 16px;
  padding: 40px 60px;
  text-align: center;
  color: white;
}
#overlayTitle { font-size: 40px; margin-bottom: 8px; }
#overlayScore { font-size: 22px; color: #f1c40f; margin-bottom: 20px; }
#playAgainBtn {
  padding: 12px 32px;
  background: linear-gradient(180deg,#27ae60,#1e8449);
  color: white;
  border: 2px solid #196f3d;
  border-radius: 25px;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
}
#hint { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>
<div id="ui">
  <span>Score: <b id="scoreEl">0</b></span>
  <span>Birds: <b id="birdsEl">5</b></span>
  <button id="resetBtn" onclick="resetLevel()">Reset</button>
</div>
<canvas id="canvas"></canvas>
<p id="hint">Drag the bird in the slingshot to aim &middot; Release to launch</p>
<div id="overlay">
  <div id="overlayBox">
    <div id="overlayTitle"></div>
    <div id="overlayScore"></div>
    <button id="playAgainBtn" onclick="resetLevel()">Play Again</button>
  </div>
</div>
<script>
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var W = Math.min(900, window.innerWidth - 20);
var H = Math.round(W * (500/900));
canvas.width = W; canvas.height = H;
var S = W / 900;

var GRAVITY  = 0.38 * S;
var GROUND_Y = H - 55 * S;
var BIRD_R   = 17 * S;
var SLING_X  = 145 * S;
var SLING_Y  = GROUND_Y - 80 * S;
var FORK_LX  = SLING_X - 14*S, FORK_LY = SLING_Y - 28*S;
var FORK_RX  = SLING_X + 14*S, FORK_RY = SLING_Y - 28*S;
var REST_X   = SLING_X, REST_Y = SLING_Y - 28*S;
var MAX_DRAG = 72 * S;

var score = 0, gamePhase = 'aim';
var dragActive = false, dragX = REST_X, dragY = REST_Y;
var birdQueue = [], activeBird = null;
var blocks = [], pigs = [], particles = [], trail = [], waitTick = 0;

function clampDrag(mx, my) {
  var dx = mx-REST_X, dy = my-REST_Y, d = Math.sqrt(dx*dx+dy*dy);
  if (d > MAX_DRAG) return { x:REST_X+dx/d*MAX_DRAG, y:REST_Y+dy/d*MAX_DRAG };
  return { x:mx, y:my };
}
function updateUI() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('birdsEl').textContent = birdQueue.length + (gamePhase==='aim'?1:0);
}
function showOverlay(title, sub) {
  document.getElementById('overlayTitle').textContent = title;
  document.getElementById('overlayScore').textContent = sub;
  document.getElementById('overlay').classList.add('show');
  gamePhase = 'over';
}
function spawnParticles(x, y, colors, n) {
  for (var i=0;i<n;i++) {
    var a=Math.random()*Math.PI*2, sp=(1+Math.random()*4)*S;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2*S,
      r:(2+Math.random()*4)*S,color:colors[Math.floor(Math.random()*colors.length)],
      life:1,decay:0.025+Math.random()*0.04});
  }
}
function makeBlock(x,y,w,h,type) {
  var hp=type==='stone'?220:type==='ice'?55:110;
  return {x:x*S,y:y*S,w:w*S,h:h*S,type:type,hp:hp,maxHp:hp,vx:0,vy:0,ang:0,angV:0,dead:false};
}
function makePig(x,y) {
  return {x:x*S,y:y*S,r:19*S,hp:90,maxHp:90,vx:0,vy:0,dead:false};
}
function setupLevel() {
  var GY = GROUND_Y/S;
  blocks = [
    makeBlock(565,GY-15,200,15,'ice'),
    makeBlock(572,GY-55,28,40,'wood'), makeBlock(612,GY-55,28,40,'wood'),
    makeBlock(572,GY-70,68,16,'wood'),
    makeBlock(690,GY-55,22,40,'stone'), makeBlock(724,GY-55,22,40,'stone'),
    makeBlock(690,GY-71,56,16,'stone'),
    makeBlock(650,GY-40,30,25,'wood'),
    makeBlock(760,GY-40,35,25,'ice'), makeBlock(760,GY-65,35,25,'wood'),
  ];
  pigs = [makePig(600,GY-50),makePig(720,GY-55),makePig(650,GY-28),makePig(778,GY-28)];
  birdQueue = [0,1,2,3,4].map(function(i){
    return {x:SLING_X-(50+i*30)*S, y:GROUND_Y-BIRD_R};
  });
  particles=[]; trail=[]; activeBird=null;
  dragX=REST_X; dragY=REST_Y; dragActive=false; waitTick=0;
  gamePhase='aim';
  document.getElementById('overlay').classList.remove('show');
  updateUI();
}
function resetLevel() { score=0; setupLevel(); }

function blockColor(b) {
  var r=b.hp/b.maxHp;
  if (b.type==='stone') { var v=Math.floor(80+80*r); return 'rgb('+v+','+v+','+v+')'; }
  if (b.type==='ice') return 'rgba('+Math.floor(90+80*r)+','+Math.floor(180+60*r)+',255,0.85)';
  return 'rgb('+Math.floor(80+80*r)+','+Math.floor(40+30*r)+',0)';
}
function damageBlock(b,dmg) {
  b.hp-=dmg;
  if (b.hp<=0) {
    b.dead=true; score+=100; updateUI();
    spawnParticles(b.x+b.w/2,b.y+b.h/2,
      b.type==='stone'?['#aaa','#888','#ccc']:
      b.type==='ice'?['#7fdbff','#a8e6ff','#fff']:['#8b4513','#a0522d','#cd853f'],12);
  }
}
function damagePig(p,dmg) {
  p.hp-=dmg;
  if (p.hp<=0) {
    p.dead=true; score+=500; updateUI();
    spawnParticles(p.x,p.y,['#27ae60','#2ecc71','#a9dfbf','#f9e79f'],18);
  }
}
function updateBlock(b) {
  if (b.vy===0&&b.vx===0) return;
  b.vy+=GRAVITY*0.35; b.x+=b.vx; b.y+=b.vy;
  b.ang+=b.angV; b.angV*=0.97; b.vx*=0.94;
  if (b.y+b.h>=GROUND_Y) {
    b.y=GROUND_Y-b.h; b.vy*=-0.28; b.vx*=0.65; b.angV*=0.4;
    if (Math.abs(b.vy)<0.6) {b.vy=0;b.vx=0;}
  }
  if (b.x<0){b.x=0;b.vx*=-0.3;} if (b.x+b.w>W){b.x=W-b.w;b.vx*=-0.3;}
}
function updatePig(p) {
  if (p.vy===0&&p.vx===0) return;
  p.vy+=GRAVITY*0.35; p.x+=p.vx; p.y+=p.vy; p.vx*=0.94;
  if (p.y+p.r>=GROUND_Y) {
    p.y=GROUND_Y-p.r; p.vy*=-0.25; p.vx*=0.65;
    if (Math.abs(p.vy)<0.5) p.vy=0;
  }
  if (p.x-p.r<0){p.x=p.r;p.vx*=-0.3;} if (p.x+p.r>W){p.x=W-p.r;p.vx*=-0.3;}
}
function circleRect(cx,cy,rx,ry,rw,rh) {
  var closX=Math.max(rx,Math.min(cx,rx+rw)), closY=Math.max(ry,Math.min(cy,ry+rh));
  var dx=cx-closX, dy=cy-closY;
  return {dx:dx,dy:dy,dist:Math.sqrt(dx*dx+dy*dy)};
}
function checkCollisions(bird) {
  var speed=Math.sqrt(bird.vx*bird.vx+bird.vy*bird.vy), i, b, p, cr, dx, dy, dist;
  for (i=0;i<blocks.length;i++) {
    b=blocks[i]; if (b.dead) continue;
    cr=circleRect(bird.x,bird.y,b.x,b.y,b.w,b.h);
    if (cr.dist<BIRD_R) {
      damageBlock(b,speed*7);
      b.vx+=bird.vx*0.28; b.vy+=bird.vy*0.28; b.angV=(Math.random()-0.5)*0.18;
      bird.vx*=0.45; bird.vy*=0.45;
      if (cr.dist>0) {bird.x+=cr.dx/cr.dist*(BIRD_R-cr.dist);bird.y+=cr.dy/cr.dist*(BIRD_R-cr.dist);}
    }
  }
  for (i=0;i<pigs.length;i++) {
    p=pigs[i]; if (p.dead) continue;
    dx=bird.x-p.x; dy=bird.y-p.y; dist=Math.sqrt(dx*dx+dy*dy);
    if (dist<BIRD_R+p.r) {
      damagePig(p,speed*9);
      p.vx+=bird.vx*0.45; p.vy+=bird.vy*0.45;
      bird.vx*=0.4; bird.vy*=0.4;
      if (dist>0){bird.x+=dx/dist*(BIRD_R+p.r-dist)*0.5;bird.y+=dy/dist*(BIRD_R+p.r-dist)*0.5;}
    }
  }
  for (i=0;i<blocks.length;i++) {
    b=blocks[i]; if (b.dead) continue;
    var bspd=Math.sqrt(b.vx*b.vx+b.vy*b.vy); if (bspd<1.5) continue;
    for (var j=0;j<pigs.length;j++) {
      p=pigs[j]; if (p.dead) continue;
      cr=circleRect(p.x,p.y,b.x,b.y,b.w,b.h);
      if (cr.dist<p.r) damagePig(p,bspd*4);
    }
  }
}
function updateActiveBird() {
  var bird=activeBird;
  trail.push({x:bird.x,y:bird.y});
  if (trail.length>22) trail.shift();
  bird.vy+=GRAVITY; bird.x+=bird.vx; bird.y+=bird.vy;
  checkCollisions(bird);
  if (bird.y+BIRD_R>=GROUND_Y) {
    bird.y=GROUND_Y-BIRD_R; bird.vy*=-0.38; bird.vx*=0.7;
    bird.bounces=(bird.bounces||0)+1;
    spawnParticles(bird.x,bird.y,['#ff6b35','#ff9f43','#fff'],5);
    if (Math.abs(bird.vy)<1.2||bird.bounces>3) {bird.alive=false;gamePhase='settling';}
  }
  if (bird.x>W+60||bird.x<-60||bird.y>H+60) {bird.alive=false;gamePhase='settling';}
}
function launchBird() {
  activeBird={x:dragX,y:dragY,vx:(REST_X-dragX)*0.24,vy:(REST_Y-dragY)*0.24,alive:true,bounces:0};
  trail=[]; gamePhase='flying'; dragActive=false; updateUI();
}
function nextBird() {
  if (birdQueue.length>0) {
    birdQueue.shift(); dragX=REST_X; dragY=REST_Y;
    gamePhase='aim'; waitTick=0; updateUI();
  } else {
    activeBird=null;
    setTimeout(function(){
      if (pigs.every(function(p){return p.dead;})) {
        score+=birdQueue.length*1000; updateUI();
        showOverlay('You Win!','Final Score: '+score);
      } else showOverlay('Game Over!','Score: '+score);
    },1500);
  }
}
function trajectoryPoints() {
  var vx=(REST_X-dragX)*0.24, vy=(REST_Y-dragY)*0.24;
  var pts=[],x=dragX,y=dragY,pvx=vx,pvy=vy;
  for (var i=0;i<70;i++) {
    pvy+=GRAVITY; x+=pvx; y+=pvy;
    if (y>GROUND_Y) break;
    if (i%3===0) pts.push({x:x,y:y});
  }
  return pts;
}
var cloudDefs=[{x:0.10,y:0.10,r:55*S},{x:0.30,y:0.07,r:70*S},{x:0.60,y:0.12,r:60*S},{x:0.85,y:0.07,r:50*S}];
function drawCloud(cx,cy,r) {
  ctx.fillStyle='rgba(255,255,255,0.82)';
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2); ctx.arc(cx+r*0.8,cy-r*0.3,r*0.65,0,Math.PI*2);
  ctx.arc(cx-r*0.65,cy-r*0.2,r*0.55,0,Math.PI*2); ctx.arc(cx+r*0.4,cy-r*0.55,r*0.45,0,Math.PI*2);
  ctx.fill();
}
function drawBackground() {
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#5ba8d4'); sky.addColorStop(1,'#c9e8f5');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  cloudDefs.forEach(function(c){drawCloud(c.x*W,c.y*H,c.r);});
  ctx.fillStyle='#6d4c41'; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle='#558b2f'; ctx.fillRect(0,GROUND_Y,W,11*S);
  ctx.fillStyle='#33691e';
  for (var x=8*S;x<W;x+=18*S){ctx.beginPath();ctx.arc(x,GROUND_Y+5*S,3*S,0,Math.PI*2);ctx.fill();}
}
function drawSlingshot() {
  ctx.strokeStyle='#5d4037'; ctx.lineWidth=7*S; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(SLING_X,GROUND_Y); ctx.lineTo(SLING_X,SLING_Y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(SLING_X,SLING_Y-10*S); ctx.lineTo(FORK_LX,FORK_LY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(SLING_X,SLING_Y-10*S); ctx.lineTo(FORK_RX,FORK_RY); ctx.stroke();
  var bx=(gamePhase==='aim'&&dragActive)?dragX:REST_X;
  var by=(gamePhase==='aim'&&dragActive)?dragY:REST_Y;
  ctx.strokeStyle='#795548'; ctx.lineWidth=3*S;
  ctx.beginPath(); ctx.moveTo(FORK_LX,FORK_LY); ctx.lineTo(bx,by); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(FORK_RX,FORK_RY); ctx.lineTo(bx,by); ctx.stroke();
}
function drawBirdAt(x,y) {
  ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(x,y,BIRD_R,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c0392b';
  ctx.beginPath(); ctx.moveTo(x-4*S,y-BIRD_R); ctx.lineTo(x,y-BIRD_R-8*S); ctx.lineTo(x+4*S,y-BIRD_R); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(x+5*S,y-5*S,6*S,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(x+7*S,y-5*S,3*S,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=2*S;
  ctx.beginPath(); ctx.moveTo(x+1*S,y-12*S); ctx.lineTo(x+12*S,y-9*S); ctx.stroke();
  ctx.fillStyle='#f39c12';
  ctx.beginPath(); ctx.moveTo(x+11*S,y-1*S); ctx.lineTo(x+20*S,y-4*S); ctx.lineTo(x+20*S,y+3*S); ctx.closePath(); ctx.fill();
}
function drawPig(p) {
  var ratio=p.hp/p.maxHp, hurt=1-ratio;
  ctx.fillStyle='rgb('+Math.floor(40+120*hurt)+','+Math.floor(160*ratio+40)+',30)';
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=hurt>0.5?'#e74c3c':'#2ecc71'; ctx.lineWidth=2*S; ctx.stroke();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(p.x-6*S,p.y-5*S,5.5*S,0,Math.PI*2); ctx.arc(p.x+6*S,p.y-5*S,5.5*S,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(p.x-5*S,p.y-5*S,2.5*S,0,Math.PI*2); ctx.arc(p.x+7*S,p.y-5*S,2.5*S,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#a8e6a8'; ctx.beginPath(); ctx.ellipse(p.x,p.y+5*S,7*S,5*S,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2ecc71';
  ctx.beginPath(); ctx.arc(p.x-3*S,p.y+5*S,1.8*S,0,Math.PI*2); ctx.arc(p.x+3*S,p.y+5*S,1.8*S,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#27ae60';
  ctx.beginPath(); ctx.ellipse(p.x-p.r*0.7,p.y-p.r*0.8,4*S,6*S,-0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(p.x+p.r*0.7,p.y-p.r*0.8,4*S,6*S,0.4,0,Math.PI*2); ctx.fill();
}
function drawBlock(b) {
  ctx.save(); ctx.translate(b.x+b.w/2,b.y+b.h/2); ctx.rotate(b.ang);
  ctx.fillStyle=blockColor(b); ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1.5*S; ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
  if (b.hp<b.maxHp*0.6) {
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1*S;
    ctx.beginPath(); ctx.moveTo(-b.w*0.3,-b.h*0.3); ctx.lineTo(b.w*0.15,b.h*0.2);
    ctx.moveTo(b.w*0.1,-b.h*0.4); ctx.lineTo(-b.w*0.1,b.h*0.35); ctx.stroke();
  }
  ctx.restore();
}
function drawTrajectory() {
  var pts=trajectoryPoints();
  for (var i=0;i<pts.length;i++) {
    ctx.globalAlpha=(1-i/pts.length)*0.7; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(pts[i].x,pts[i].y,(4-i/pts.length*2)*S,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}
function loop() {
  var i;
  if (gamePhase==='flying'&&activeBird&&activeBird.alive) updateActiveBird();
  if (gamePhase==='settling') {
    waitTick++;
    if (waitTick>80) {
      waitTick=0;
      if (pigs.every(function(p){return p.dead;})) {
        score+=birdQueue.length*1000; updateUI(); showOverlay('You Win!','Final Score: '+score);
      } else nextBird();
    }
  }
  for (i=0;i<blocks.length;i++){if(!blocks[i].dead)updateBlock(blocks[i]);}
  for (i=0;i<pigs.length;i++){if(!pigs[i].dead)updatePig(pigs[i]);}
  particles=particles.filter(function(p){return p.life>0;});
  particles.forEach(function(p){p.vy+=0.2*S;p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;});

  drawBackground();
  drawSlingshot();
  if (gamePhase==='aim'&&dragActive) drawTrajectory();
  if (gamePhase==='aim') drawBirdAt(dragActive?dragX:REST_X, dragActive?dragY:REST_Y);

  birdQueue.forEach(function(b){
    ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(b.x,b.y,BIRD_R*0.65,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#c0392b'; ctx.beginPath();
    ctx.moveTo(b.x-3*S,b.y-BIRD_R*0.65); ctx.lineTo(b.x,b.y-BIRD_R*0.65-5*S); ctx.lineTo(b.x+3*S,b.y-BIRD_R*0.65); ctx.fill();
  });

  if (gamePhase==='flying'||gamePhase==='settling') {
    for (i=0;i<trail.length;i++) {
      ctx.globalAlpha=(i/trail.length)*0.55; ctx.fillStyle='#ff6b35';
      ctx.beginPath(); ctx.arc(trail[i].x,trail[i].y,3.5*S,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  if (activeBird&&activeBird.alive) drawBirdAt(activeBird.x,activeBird.y);

  for (i=0;i<blocks.length;i++){if(!blocks[i].dead)drawBlock(blocks[i]);}
  for (i=0;i<pigs.length;i++){if(!pigs[i].dead)drawPig(pigs[i]);}
  particles.forEach(function(p){
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  requestAnimationFrame(loop);
}

function getPos(e) {
  var rect=canvas.getBoundingClientRect(), scaleX=W/rect.width, scaleY=H/rect.height;
  if (e.touches) return {x:(e.touches[0].clientX-rect.left)*scaleX,y:(e.touches[0].clientY-rect.top)*scaleY};
  return {x:(e.clientX-rect.left)*scaleX,y:(e.clientY-rect.top)*scaleY};
}
function onDown(e) {
  if (gamePhase!=='aim') return;
  var pos=getPos(e), dx=pos.x-REST_X, dy=pos.y-REST_Y;
  if (Math.sqrt(dx*dx+dy*dy)<40*S) {
    dragActive=true; var c=clampDrag(pos.x,pos.y); dragX=c.x; dragY=c.y;
  }
}
function onMove(e) {
  e.preventDefault(); if (!dragActive) return;
  var pos=getPos(e), c=clampDrag(pos.x,pos.y); dragX=c.x; dragY=c.y;
}
function onUp(e) {
  if (!dragActive||gamePhase!=='aim') return;
  dragActive=false;
  var dx=dragX-REST_X, dy=dragY-REST_Y;
  if (Math.sqrt(dx*dx+dy*dy)>12*S) launchBird();
  else {dragX=REST_X;dragY=REST_Y;}
}
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',function(e){e.preventDefault();onDown(e);},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();onMove(e);},{passive:false});
canvas.addEventListener('touchend',function(e){e.preventDefault();onUp(e);},{passive:false});

setupLevel();
loop();
</script>
