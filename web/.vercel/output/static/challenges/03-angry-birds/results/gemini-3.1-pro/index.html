<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Angry Birds Style Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        user-select: none;
        -webkit-user-select: none;
    }
    canvas {
        display: block;
    }
    #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        font-size: 28px;
        font-weight: bold;
        text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        z-index: 10;
        pointer-events: none;
    }
    #reset {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 12px 24px;
        font-size: 20px;
        cursor: pointer;
        background: #ff4500;
        color: white;
        border: 3px solid #fff;
        border-radius: 8px;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        font-weight: bold;
        text-transform: uppercase;
        z-index: 10;
        transition: transform 0.1s, background 0.1s;
    }
    #reset:hover {
        background: #ff5722;
    }
    #reset:active {
        transform: scale(0.95);
    }
    #message {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 64px;
        font-weight: bold;
        text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        z-index: 10;
        pointer-events: none;
        display: none;
    }
</style>
</head>
<body>
<div id="ui">SCORE: <span id="score">0</span></div>
<div id="message">LEVEL CLEARED!</div>
<button id="reset">RESET LEVEL</button>
<canvas id="game"></canvas>
<script>
    document.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const messageEl = document.getElementById('message');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let bodies = [];
    let bird = null;
    let slingshot = { x: 200, y: canvas.height - 250, r: 120 };
    let isDragging = false;
    let isFlying = false;
    let score = 0;
    let gravity = 0.4MCP ERROR (context7)[ERROR] MCP ERROR (context7)
;
    let groundY = canvas.height - 100;
    let levelCleared = false;

    class Body {
        constructor(x, y, w, h, mass, type) {
            this.x = x; this.y = y; this.w = w; this.h = h;
            this.vx = 0; this.vy = 0;
            this.mass = mass; 
            this.invMass = mass === 0 ? 0 : 1 / mass;
            this.type = type;
            this.maxHp = type === 'block' ? (w > 100 ? 50 : 25) : (type === 'pig' ? 15 : 1000);
            this.hp = this.maxHp;
        }
    }

    const clouds = [];
    for(let i=0; i<8; i++) {
        clouds.push({x: Math.random() * canvas.width, y: Math.random() * (canvas.height/2), s: 0.5 + Math.random() * 0.8});
    }

    function init() {
        bodies = [];
        score = 0;
        scoreEl.innerText = score;
        isFlying = false;
        isDragging = false;
        levelCleared = false;
        messageEl.style.display = 'none';
        
        groundY = canvas.height - 100;
        slingshot.y = groundY - 150;
        
        // Ground
        bodies.push(new Body(-100, groundY, canvas.width + 200, 200, 0, 'ground'));
        
        // Bird
        bird = new Body(slingshot.x - 15, slingshot.y - 15, 30, 30, 1, 'bird');
        bodies.push(bird);
        
        // Castle structure
        let bx = Math.max(canvas.width - 400, 400);
        let bw = 40, bh = 40;
        
        // Left pillar
        for (let i = 0; i < 4; i++) {
            bodies.push(new Body(bx - 80, groundY - bh - i * bh, bw, bh, 0.5, 'block'));
        }
        // Right pillar
        for (let i = 0; i < 4; i++) {
            bodies.push(new Body(bx + 40, groundY - bh - i * bh, bw, bh, 0.5, 'block'));
        }
        // Plank on top
        bodies.push(new Body(bx - 100, groundY - bh - 4 * bh, 200, 20, 1.5, 'block'));
        
        // Top structure
        bodies.push(new Body(bx - 40, groundY - bh - 4 * bh - 20 - bh, bw, bh, 0.5, 'block'));
        bodies.push(new Body(bx, groundY - bh - 4 * bh - 20 - bh, bw, bh, 0.5, 'block'));
        bodies.push(new Body(bx - 60, groundY - bh - 5 * bh - 20, 120, 20, 1, 'block'));

        // Pigs
        bodies.push(new Body(bx - 60, groundY - bh - 4 * bh - 35, 35, 35, 0.4, 'pig'));
        bodies.push(new Body(bx + 20, groundY - bh - 4 * bh - 35, 35, 35, 0.4, 'pig'));
        bodies.push(new Body(bx - 20, groundY - 35, 35, 35, 0.4, 'pig')); // Middle pig on ground
        bodies.push(new Body(bx - 20, groundY - bh - 5 * bh - 20 - 35, 35, 35, 0.4, 'pig')); // Top pig
    }

    function resolveCollision(a, b) {
        if (a.invMass === 0 && b.invMass === 0) return;
        if (!isFlying && (a === bird || b === bird)) return;

        let dx = (a.x + a.w/2) - (b.x + b.w/2);
        let dy = (a.y + a.h/2) - (b.y + b.h/2);
        
        let aw = a.w/2, ah = a.h/2, bw = b.w/2, bh = b.h/2;
        
        if (Math.abs(dx) < aw + bw && Math.abs(dy) < ah + bh) {
            let overlapX = (aw + bw) - Math.abs(dx);
            let overlapY = (ah + bh) - Math.abs(dy);
            
            let nx = 0, ny = 0;
            let sep = 0;
            if (overlapX < overlapY) {
                nx = dx > 0 ? 1 : -1;
                sep = overlapX;
                const percent = 0.8;
                const correction = (sep * percent) / (a.invMass + b.invMass);
                a.x += nx * correction * a.invMass;
                b.x -= nx * correction * b.invMass;
            } else {
                ny = dy > 0 ? 1 : -1;
                sep = overlapY;
                const percent = 0.8;
                const correction = (sep * percent) / (a.invMass + b.invMass);
                a.y += ny * correction * a.invMass;
                b.y -= ny * correction * b.invMass;
            }
            
            let rvx = a.vx - b.vx;
            let rvy = a.vy - b.vy;
            let velAlongNormal = rvx * nx + rvy * ny;
            
            if (velAlongNormal > 0) return;
            
            let e = 0.3; 
            let j = -(1 + e) * velAlongNormal;
            j /= a.invMass + b.invMass;
            
            a.vx += j * nx * a.invMass;
            a.vy += j * ny * a.invMass;
            b.vx -= j * nx * b.invMass;
            b.vy -= j * ny * b.invMass;
            
            let tx = -ny, ty = nx;
            let velAlongTangent = rvx * tx + rvy * ty;
            let friction = 0.6;
            let jt = -velAlongTangent * friction;
            jt /= a.invMass + b.invMass;
            
            a.vx += jt * tx * a.invMass;
            a.vy += jt * ty * a.invMass;
            b.vx -= jt * tx * b.invMass;
            b.vy -= jt * ty * b.invMass;
            
            let impact = Math.abs(j);
            if (impact > 4) {
                if (a.type === 'block') a.hp -= impact;
                if (b.type === 'block') b.hp -= impact;
                if (a.type === 'pig') a.hp -= impact * 1.5;
                if (b.type === 'pig') b.hp -= impact * 1.5;
            }
        }
    }

    function handleDown(e) {
        if (levelCleared) return;
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if (!isFlying && bird) {
            let dx = clientX - (bird.x + bird.w/2);
            let dy = clientY - (bird.y + bird.h/2);
            if (dx*dx + dy*dy < 4000) isDragging = true;
        }
    }

    function handleMove(e) {
        if (isDragging) {
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            let dx = clientX - slingshot.x;
            let dy = clientY - slingshot.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > slingshot.r) {
                dx = (dx / dist) * slingshot.r;
                dy = (dy / dist) * slingshot.r;
            }
            bird.x = slingshot.x + dx - bird.w/2;
            bird.y = slingshot.y + dy - bird.h/2;
        }
    }

    function handleUp(e) {
        if (isDragging) {
            isDragging = false;
            isFlying = true;
            let dx = slingshot.x - (bird.x + bird.w/2);
            let dy = slingshot.y - (bird.y + bird.h/2);
            bird.vx = dx * 0.22;
            bird.vy = dy * 0.22;
        }
    }

    window.addEventListener('mousedown', handleDown);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchstart', handleDown);
    window.addEventListener('touchmove', handleMove);
    window.addEventListener('touchend', handleUp);

    document.getElementById('reset').addEventListener('click', init);

    function updatePhysics() {
        for (let b of bodies) {
            if (b.invMass > 0) {
                if (b === bird && !isFlying) continue;
                
                b.vy += gravity;
                if (b === bird) {
                    b.vx *= 0.995;
                    b.vy *= 0.995;
                } else {
                    b.vx *= 0.98;
                    b.vy *= 0.98;
                }
                
                b.x += b.vx;
                b.y += b.vy;
                
                if (b.x < -200 || b.x > canvas.width + 200 || b.y > canvas.height + 200) {
                    b.hp = 0;
                }
            }
        }
        
        for (let iter = 0; iter < 10; iter++) {
            for (let i = 0; i < bodies.length; i++) {
                for (let j = i + 1; j < bodies.length; j++) {
                    resolveCollision(bodies[i], bodies[j]);
                }
            }
        }
        
        let pigsRemain = false;
        for (let i = bodies.length - 1; i >= 0; i--) {
            let b = bodies[i];
            if (b.type === 'pig' && b.hp > 0) pigsRemain = true;
            
            if (b.hp <= 0 && b.type !== 'ground') {
                if (b.type === 'pig') score += 5000;
                else if (b.type === 'block') score += 500;
                scoreEl.innerText = score;
                bodies.splice(i, 1);
                if (b === bird) bird = null;
            }
        }

        if (!pigsRemain && !levelCleared) {
            levelCleared = true;
            messageEl.style.display = 'block';
        }

        if (isFlying && bird) {
            let speed = Math.sqrt(bird.vx*bird.vx + bird.vy*bird.vy);
            let outOfBounds = bird.x < -100 || bird.x > canvas.width + 100 || bird.y > canvas.height + 100;
            if ((speed < 0.2 && bird.y >= groundY - 35) || outOfBounds) {
                bird.hp = 0; 
                bird = new Body(slingshot.x - 15, slingshot.y - 15, 30, 30, 1, 'bird');
                bodies.push(bird);
                isFlying = false;
            }
        } else if (!isDragging && bird && !isFlying) {
            bird.x = slingshot.x - bird.w/2;
            bird.y = slingshot.y - bird.h/2;
            bird.vx = 0;
            bird.vy = 0;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw clouds
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        for(let c of clouds) {
            ctx.beginPath();
            ctx.arc(c.x, c.y, 40 * c.s, 0, Math.PI*2);
            ctx.arc(c.x + 35*c.s, c.y - 15*c.s, 40*c.s, 0, Math.PI*2);
            ctx.arc(c.x + 70*c.s, c.y, 40*c.s, 0, Math.PI*2);
            ctx.fill();
            c.x -= 0.3 * c.s;
            if (c.x < -150) c.x = canvas.width + 150;
        }

        // Slingshot back pole
        ctx.fillStyle = '#5c4033';
        ctx.fillRect(slingshot.x - 6, slingshot.y, 12, groundY - slingshot.y);

        // Back band
        ctx.strokeStyle = '#301608';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(slingshot.x - 15, slingshot.y);
        if (isDragging && bird) {
            ctx.lineTo(bird.x + bird.w/2, bird.y + bird.h/2);
        } else if (!isFlying) {
            ctx.lineTo(slingshot.x, slingshot.y);
        }
        ctx.stroke();

        // Trajectory
        if (isDragging && bird) {
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 12]);
            let px = bird.x + bird.w/2;
            let py = bird.y + bird.h/2;
            let pvx = (slingshot.x - px) * 0.22;
            let pvy = (slingshot.y - py) * 0.22;
            ctx.moveTo(px, py);
            for (let i = 0; i < 40; i++) {
                pvy += gravity;
                px += pvx;
                py += pvy;
                ctx.lineTo(px, py);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Entities
        for (let b of bodies) {
            if (b.type === 'ground') {
                ctx.fillStyle = '#654321';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = '#228B22';
                ctx.fillRect(b.x, b.y, b.w, 15);
            } else if (b.type === 'block') {
                ctx.fillStyle = '#DEB887';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 2;
                ctx.strokeRect(b.x, b.y, b.w, b.h);
                
                if (b.hp < b.maxHp * 0.7) {
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                    ctx.moveTo(b.x + 5, b.y + 5);
                    ctx.lineTo(b.x + b.w/2, b.y + b.h/2);
                    ctx.lineTo(b.x + b.w - 5, b.y + b.h/2 + 5);
                    ctx.stroke();
                }
            } else if (b.type === 'pig') {
                ctx.fillStyle = '#32CD32';
                ctx.beginPath();
                ctx.arc(b.x + b.w/2, b.y + b.h/2, b.w/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#006400';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // face
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(b.x + b.w/2 - 6, b.y + b.h/2 - 4, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(b.x + b.w/2 + 6, b.y + b.h/2 - 4, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#90EE90';
                ctx.beginPath(); ctx.arc(b.x + b.w/2, b.y + b.h/2 + 5, 6, 0, Math.PI * 2); ctx.fill();
            } else if (b.type === 'bird') {
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.arc(b.x + b.w/2, b.y + b.h/2, b.w/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#8B0000';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // face
                ctx.fillStyle = '#FFF';
                ctx.beginPath(); ctx.arc(b.x + b.w/2 - 6, b.y + b.h/2 - 4, 5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(b.x + b.w/2 + 6, b.y + b.h/2 - 4, 5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(b.x + b.w/2 - 6, b.y + b.h/2 - 4, 2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(b.x + b.w/2 + 6, b.y + b.h/2 - 4, 2, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.moveTo(b.x + b.w/2, b.y + b.h/2 + 2);
                ctx.lineTo(b.x + b.w/2 + 12, b.y + b.h/2 + 5);
                ctx.lineTo(b.x + b.w/2, b.y + b.h/2 + 8);
                ctx.fill();
            }
        }
        
        // Front band
        ctx.strokeStyle = '#4a2511';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(slingshot.x + 10, slingshot.y);
        if (isDragging && bird) {
            ctx.lineTo(bird.x + bird.w/2, bird.y + bird.h/2);
        } else if (!isFlying) {
            ctx.lineTo(slingshot.x, slingshot.y);
        }
        ctx.stroke();
    }

    function loop() {
        updatePhysics();
        draw();
        requestAnimationFrame(loop);
    }

    init();
    loop();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height - 100;
        let ground = bodies.find(b => b.type === 'ground');
        if (ground) {
            ground.w = canvas.width + 200;
            ground.y = groundY;
        }
        if (!isFlying) slingshot.y = groundY - 150;
    });
</script>
</body>
</html>
