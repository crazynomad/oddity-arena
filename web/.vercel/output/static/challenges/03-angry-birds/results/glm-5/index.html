<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slingshot Siege</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a2e;
            --bg-mid: #16213e;
            --accent: #e94560;
            --accent-glow: #ff6b6b;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --gold: #ffd700;
            --wood: #8b5a2b;
            --stone: #6b7b8c;
            --glass: #7ec8e3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            color: var(--text);
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .game-container {
            position: relative;
            background: linear-gradient(180deg, #87ceeb 0%, #e0f4ff 60%, #90c695 60%, #5a8f5c 100%);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 0 100px rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.1);
        }

        #gameCanvas {
            display: block;
            cursor: crosshair;
        }

        .ui-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .score-box {
            background: rgba(0,0,0,0.4);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .score-box span {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box strong {
            color: var(--gold);
            font-size: 1.5rem;
            margin-left: 8px;
            font-weight: 700;
        }

        .birds-left {
            color: var(--accent);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, #c73e54 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(233, 69, 96, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .instructions {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }

        .win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            border-radius: 16px;
            backdrop-filter: blur(5px);
        }

        .win-overlay.active {
            display: flex;
        }

        .win-text {
            color: var(--gold);
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .final-score {
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <h1>Slingshot Siege</h1>
    
    <div class="ui-panel">
        <div class="score-box">
            <span>Score</span>
            <strong id="scoreDisplay">0</strong>
        </div>
        <div class="score-box">
            <span>Birds</span>
            <strong class="birds-left" id="birdsDisplay">3</strong>
        </div>
        <button class="btn" id="resetBtn">Reset Level</button>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="win-overlay" id="winOverlay">
            <div class="win-text" id="winText">Victory!</div>
            <div class="final-score" id="finalScore">Final Score: 0</div>
            <button class="btn" id="playAgainBtn">Play Again</button>
        </div>
    </div>

    <p class="instructions">
        Drag from the slingshot to aim and release to launch. Destroy all blocks to win!
    </p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const birdsDisplay = document.getElementById('birdsDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const winOverlay = document.getElementById('winOverlay');
        const winText = document.getElementById('winText');
        const finalScore = document.getElementById('finalScore');
        const playAgainBtn = document.getElementById('playAgainBtn');

        // Responsive canvas
        const baseWidth = 900;
        const baseHeight = 500;
        let scale = 1;

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, baseWidth);
            scale = maxWidth / baseWidth;
            canvas.width = baseWidth * scale;
            canvas.height = baseHeight * scale;
            ctx.setTransform(scale, 0, 0, scale, 0, 0);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game constants
        const GRAVITY = 0.35;
        const GROUND_Y = 450;
        const SLINGSHOT_X = 120;
        const SLINGSHOT_Y = 380;
        const MAX_PULL = 100;
        const BIRD_RADIUS = 18;

        // Game state
        let score = 0;
        let birdsLeft = 3;
        let gameOver = false;
        let blocks = [];
        let debris = [];
        let particles = [];
        let bird = null;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let dragEnd = { x: 0, y: 0 };
        let birdLaunched = false;
        let trajectoryPoints = [];

        // Block types
        const BLOCK_TYPES = {
            wood: { color: '#c9a66b', borderColor: '#8b5a2b', health: 60, points: 100 },
            stone: { color: '#9ca8b3', borderColor: '#6b7b8c', health: 120, points: 200 },
            glass: { color: '#b8e4f0', borderColor: '#7ec8e3', health: 30, points: 50 }
        };

        // Bird class
        class Bird {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = BIRD_RADIUS;
                this.active = false;
                this.rotation = 0;
            }

            launch(vx, vy) {
                this.vx = vx;
                this.vy = vy;
                this.active = true;
            }

            update() {
                if (!this.active) return;

                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.vx * 0.05;

                // Ground collision
                if (this.y + this.radius > GROUND_Y) {
                    this.y = GROUND_Y - this.radius;
                    this.vy *= -0.5;
                    this.vx *= 0.7;
                    if (Math.abs(this.vy) < 1 && Math.abs(this.vx) < 1) {
                        this.active = false;
                    }
                }

                // Wall collision
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -0.5;
                }
                if (this.x + this.radius > baseWidth) {
                    this.x = baseWidth - this.radius;
                    this.vx *= -0.5;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Body
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.7, '#e94560');
                gradient.addColorStop(1, '#c73e54');
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = '#a03050';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Eyes
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.ellipse(-5, -3, 5, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(5, -3, 5, 6, 0, 0, Math.PI * 2);
                ctx.fill();

                // Pupils
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.arc(-4, -2, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(6, -2, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Beak
                ctx.fillStyle = '#ffa500';
                ctx.beginPath();
                ctx.moveTo(0, 2);
                ctx.lineTo(-6, 8);
                ctx.lineTo(6, 8);
                ctx.closePath();
                ctx.fill();

                // Eyebrows
                ctx.strokeStyle = '#1a1a2e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-10, -10);
                ctx.lineTo(-2, -8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(10, -10);
                ctx.lineTo(2, -8);
                ctx.stroke();

                ctx.restore();
            }
        }

        // Block class
        class Block {
            constructor(x, y, width, height, type) {
                this.x = x;
                this.y = y;
                this.width = Math.max(10, width);
                this.height = Math.max(10, height);
                this.type = type;
                this.health = BLOCK_TYPES[type].health;
                this.maxHealth = this.health;
                this.vx = 0;
                this.vy = 0;
                this.destroyed = false;
                this.rotation = 0;
                this.grounded = true;
            }

            update() {
                if (this.destroyed) return;

                if (!this.grounded) {
                    this.vy += GRAVITY * 0.5;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= 0.98;
                }

                // Ground
                if (this.y + this.height / 2 > GROUND_Y) {
                    this.y = GROUND_Y - this.height / 2;
                    this.vy = 0;
                    this.vx *= 0.8;
                    this.grounded = true;
                }

                // Walls
                if (this.x - this.width / 2 < 0) {
                    this.x = this.width / 2;
                    this.vx *= -0.5;
                }
                if (this.x + this.width / 2 > baseWidth) {
                    this.x = baseWidth - this.width / 2;
                    this.vx *= -0.5;
                }
            }

            draw() {
                if (this.destroyed) return;

                const typeData = BLOCK_TYPES[this.type];
                const damage = 1 - (this.health / this.maxHealth);

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(-this.width / 2 + 3, -this.height / 2 + 3, this.width, this.height);

                // Main body
                const gradient = ctx.createLinearGradient(-this.width / 2, -this.height / 2, this.width / 2, this.height / 2);
                gradient.addColorStop(0, typeData.color);
                gradient.addColorStop(1, this.darkenColor(typeData.color, 20));
                
                ctx.fillStyle = gradient;
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

                // Border
                ctx.strokeStyle = typeData.borderColor;
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.width / 2, -this.height / 2, this.width, this.height);

                // Damage cracks
                if (damage > 0.3) {
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(-this.width / 4, -this.height / 2);
                    ctx.lineTo(0, 0);
                    ctx.lineTo(this.width / 4, this.height / 2);
                    ctx.stroke();
                }

                if (damage > 0.6) {
                    ctx.beginPath();
                    ctx.moveTo(this.width / 4, -this.height / 2);
                    ctx.lineTo(-this.width / 6, this.height / 3);
                    ctx.stroke();
                }

                ctx.restore();
            }

            darkenColor(hex, percent) {
                const num = parseInt(hex.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.max(0, (num >> 16) - amt);
                const G = Math.max(0, ((num >> 8) & 0x00FF) - amt);
                const B = Math.max(0, (num & 0x0000FF) - amt);
                return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
            }

            hit(damage) {
                this.health -= damage;
                if (this.health <= 0) {
                    this.destroyed = true;
                    score += BLOCK_TYPES[this.type].points;
                    updateUI();
                    createDebris(this);
                    return true;
                }
                return false;
            }
        }

        // Debris particle
        class Debris {
            constructor(x, y, size, color) {
                this.x = x;
                this.y = y;
                this.size = Math.max(2, size);
                this.color = color;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.3;
                this.life = 1;
            }

            update() {
                this.vy += GRAVITY * 0.8;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                this.life -= 0.02;
                return this.life > 0 && this.y < baseHeight + 50;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        // Impact particle
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 4 + 2;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.life = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.03;
                return this.life > 0;
            }

            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.5, this.radius * this.life), 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createDebris(block) {
            const typeData = BLOCK_TYPES[block.type];
            for (let i = 0; i < 8; i++) {
                debris.push(new Debris(
                    block.x + (Math.random() - 0.5) * block.width,
                    block.y + (Math.random() - 0.5) * block.height,
                    Math.random() * 10 + 5,
                    typeData.color
                ));
            }
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // Initialize level
        function initLevel() {
            blocks = [];
            debris = [];
            particles = [];
            score = 0;
            birdsLeft = 3;
            gameOver = false;
            birdLaunched = false;
            winOverlay.classList.remove('active');

            bird = new Bird(SLINGSHOT_X, SLINGSHOT_Y);

            // Create structure
            const baseX = 650;
            const baseY = GROUND_Y;

            // Ground layer - stone
            blocks.push(new Block(baseX, baseY - 20, 60, 40, 'stone'));
            blocks.push(new Block(baseX + 80, baseY - 20, 60, 40, 'stone'));

            // Vertical supports - wood
            blocks.push(new Block(baseX - 50, baseY - 80, 20, 80, 'wood'));
            blocks.push(new Block(baseX + 50, baseY - 80, 20, 80, 'wood'));
            blocks.push(new Block(baseX + 130, baseY - 80, 20, 80, 'wood'));

            // Middle platform - wood
            blocks.push(new Block(baseX, baseY - 120, 120, 20, 'wood'));
            blocks.push(new Block(baseX + 80, baseY - 120, 80, 20, 'wood'));

            // Upper structure - glass
            blocks.push(new Block(baseX - 30, baseY - 170, 15, 80, 'glass'));
            blocks.push(new Block(baseX + 30, baseY - 170, 15, 80, 'glass'));
            blocks.push(new Block(baseX + 100, baseY - 170, 15, 80, 'glass'));

            // Top - wood
            blocks.push(new Block(baseX, baseY - 220, 90, 20, 'wood'));
            blocks.push(new Block(baseX + 80, baseY - 200, 50, 60, 'glass'));

            // Tower
            blocks.push(new Block(baseX - 80, baseY - 60, 30, 80, 'wood'));
            blocks.push(new Block(baseX - 80, baseY - 130, 30, 60, 'stone'));
            blocks.push(new Block(baseX - 80, baseY - 180, 40, 40, 'glass'));

            updateUI();
        }

        function updateUI() {
            scoreDisplay.textContent = score;
            birdsDisplay.textContent = birdsLeft;
        }

        // Collision detection
        function circleRectCollision(circle, rect) {
            const closestX = Math.max(rect.x - rect.width / 2, Math.min(circle.x, rect.x + rect.width / 2));
            const closestY = Math.max(rect.y - rect.height / 2, Math.min(circle.y, rect.y + rect.height / 2));

            const distX = circle.x - closestX;
            const distY = circle.y - closestY;
            const dist = Math.sqrt(distX * distX + distY * distY);

            return dist < circle.radius;
        }

        // Physics update
        function updatePhysics() {
            if (bird && bird.active) {
                bird.update();

                // Check collisions with blocks
                for (let block of blocks) {
                    if (block.destroyed) continue;

                    if (circleRectCollision(bird, block)) {
                        const speed = Math.sqrt(bird.vx * bird.vx + bird.vy * bird.vy);
                        const damage = speed * 10;
                        
                        block.hit(damage);
                        block.vx += bird.vx * 0.3;
                        block.vy += bird.vy * 0.3;
                        block.grounded = false;

                        // Bounce bird
                        bird.vx *= -0.5;
                        bird.vy *= -0.5;

                        createParticles(bird.x, bird.y, '#ffd700', 10);
                    }
                }

                // Check if bird stopped
                if (!bird.active && birdLaunched) {
                    birdLaunched = false;
                    setTimeout(() => {
                        if (birdsLeft > 0 && !checkWin()) {
                            bird = new Bird(SLINGSHOT_X, SLINGSHOT_Y);
                        } else if (birdsLeft <= 0 && !checkWin()) {
                            showGameOver(false);
                        }
                    }, 1000);
                }
            }

            // Update blocks
            for (let block of blocks) {
                block.update();
            }

            // Block-to-block collision
            for (let i = 0; i < blocks.length; i++) {
                for (let j = i + 1; j < blocks.length; j++) {
                    if (blocks[i].destroyed || blocks[j].destroyed) continue;
                    // Simple AABB collision
                    const a = blocks[i];
                    const b = blocks[j];
                    if (Math.abs(a.x - b.x) < (a.width + b.width) / 2 &&
                        Math.abs(a.y - b.y) < (a.height + b.height) / 2) {
                        const overlapX = (a.width + b.width) / 2 - Math.abs(a.x - b.x);
                        const overlapY = (a.height + b.height) / 2 - Math.abs(a.y - b.y);
                        
                        if (overlapX < overlapY) {
                            const sign = a.x < b.x ? -1 : 1;
                            a.x += sign * overlapX / 2;
                            b.x -= sign * overlapX / 2;
                            const avgVx = (a.vx + b.vx) / 2;
                            a.vx = avgVx * 0.8;
                            b.vx = avgVx * 0.8;
                        } else {
                            const sign = a.y < b.y ? -1 : 1;
                            a.y += sign * overlapY / 2;
                            b.y -= sign * overlapY / 2;
                            if (sign < 0) {
                                a.grounded = false;
                            }
                        }
                    }
                }
            }

            // Update debris
            debris = debris.filter(d => d.update());

            // Update particles
            particles = particles.filter(p => p.update());

            // Check win
            if (checkWin() && !gameOver) {
                showGameOver(true);
            }
        }

        function checkWin() {
            return blocks.every(b => b.destroyed);
        }

        function showGameOver(won) {
            gameOver = true;
            winText.textContent = won ? 'Victory!' : 'Try Again!';
            winText.style.color = won ? '#ffd700' : '#e94560';
            finalScore.textContent = `Final Score: ${score}`;
            winOverlay.classList.add('active');
        }

        // Drawing
        function draw() {
            // Clear
            ctx.clearRect(0, 0, baseWidth, baseHeight);

            // Draw background elements
            drawBackground();

            // Draw slingshot
            drawSlingshot();

            // Draw trajectory prediction
            if (isDragging) {
                drawTrajectory();
            }

            // Draw blocks
            for (let block of blocks) {
                block.draw();
            }

            // Draw bird
            if (bird) {
                bird.draw();
            }

            // Draw debris
            for (let d of debris) {
                d.draw();
            }

            // Draw particles
            for (let p of particles) {
                p.draw();
            }
        }

        function drawBackground() {
            // Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            drawCloud(100, 80, 40);
            drawCloud(300, 120, 30);
            drawCloud(600, 60, 50);
            drawCloud(800, 100, 35);

            // Grass tufts
            ctx.fillStyle = '#4a7c4f';
            for (let i = 0; i < baseWidth; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, GROUND_Y);
                ctx.lineTo(i + 5, GROUND_Y - 10);
                ctx.lineTo(i + 10, GROUND_Y);
                ctx.fill();
            }
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.3, size * 0.7, 0, Math.PI * 2);
            ctx.arc(x + size * 1.5, y, size * 0.8, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSlingshot() {
            const baseX = SLINGSHOT_X;
            const baseY = SLINGSHOT_Y + 30;

            // Back arm
            ctx.fillStyle = '#5d4037';
            ctx.beginPath();
            ctx.moveTo(baseX - 25, baseY);
            ctx.lineTo(baseX - 20, baseY - 80);
            ctx.lineTo(baseX - 10, baseY - 80);
            ctx.lineTo(baseX - 15, baseY);
            ctx.fill();
            ctx.strokeStyle = '#3e2723';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Rubber band (back)
            if (isDragging && bird) {
                ctx.strokeStyle = '#4a2c2a';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(baseX - 15, baseY - 75);
                ctx.lineTo(bird.x, bird.y);
                ctx.stroke();
            }

            // Front arm
            ctx.fillStyle = '#6d4c41';
            ctx.beginPath();
            ctx.moveTo(baseX + 15, baseY);
            ctx.lineTo(baseX + 20, baseY - 80);
            ctx.lineTo(baseX + 10, baseY - 80);
            ctx.lineTo(baseX + 5, baseY);
            ctx.fill();
            ctx.strokeStyle = '#3e2723';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Base
            ctx.fillStyle = '#4e342e';
            ctx.fillRect(baseX - 20, baseY, 40, 20);
            ctx.strokeStyle = '#3e2723';
            ctx.strokeRect(baseX - 20, baseY, 40, 20);

            // Rubber band (front)
            if (isDragging && bird) {
                ctx.strokeStyle = '#6b3a3a';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(baseX + 15, baseY - 75);
                ctx.lineTo(bird.x, bird.y);
                ctx.stroke();
            } else if (!birdLaunched && bird) {
                // Resting band
                ctx.strokeStyle = '#4a2c2a';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(baseX - 15, baseY - 75);
                ctx.lineTo(baseX, baseY - 40);
                ctx.lineTo(baseX + 15, baseY - 75);
                ctx.stroke();
            }
        }

        function drawTrajectory() {
            if (!bird) return;

            const vx = (SLINGSHOT_X - bird.x) * 0.18;
            const vy = (SLINGSHOT_Y - bird.y) * 0.18;

            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 10]);
            ctx.beginPath();

            let px = SLINGSHOT_X;
            let py = SLINGSHOT_Y;
            let pvx = vx;
            let pvy = vy;

            ctx.moveTo(px, py);

            for (let i = 0; i < 50; i++) {
                pvy += GRAVITY;
                px += pvx;
                py += pvy;

                if (py > GROUND_Y) break;

                ctx.lineTo(px, py);
            }

            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Input handling
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) / scale,
                y: (clientY - rect.top) / scale
            };
        }

        function handleStart(e) {
            if (gameOver || birdLaunched || birdsLeft <= 0) return;
            e.preventDefault();

            const pos = getMousePos(e);
            const dist = Math.sqrt(
                Math.pow(pos.x - SLINGSHOT_X, 2) + 
                Math.pow(pos.y - SLINGSHOT_Y, 2)
            );

            if (dist < 80) {
                isDragging = true;
                dragStart = { x: SLINGSHOT_X, y: SLINGSHOT_Y };
            }
        }

        function handleMove(e) {
            if (!isDragging || !bird) return;
            e.preventDefault();

            const pos = getMousePos(e);

            // Calculate pull distance
            let dx = pos.x - SLINGSHOT_X;
            let dy = pos.y - SLINGSHOT_Y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Limit pull distance
            if (dist > MAX_PULL) {
                dx = (dx / dist) * MAX_PULL;
                dy = (dy / dist) * MAX_PULL;
            }

            // Only allow pulling back (left side)
            if (dx > 20) dx = 20;

            bird.x = SLINGSHOT_X + dx;
            bird.y = SLINGSHOT_Y + dy;

            dragEnd = { x: bird.x, y: bird.y };
        }

        function handleEnd(e) {
            if (!isDragging || !bird) return;
            e.preventDefault();

            isDragging = false;

            const vx = (SLINGSHOT_X - bird.x) * 0.18;
            const vy = (SLINGSHOT_Y - bird.y) * 0.18;

            if (Math.abs(vx) > 1 || Math.abs(vy) > 1) {
                bird.launch(vx, vy);
                birdLaunched = true;
                birdsLeft--;
                updateUI();
            } else {
                bird.x = SLINGSHOT_X;
                bird.y = SLINGSHOT_Y;
            }
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd, { passive: false });

        resetBtn.addEventListener('click', initLevel);
        playAgainBtn.addEventListener('click', initLevel);

        // Game loop
        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start
        initLevel();
        gameLoop();
    </script>
</body>
</html>
